л плату во время прошивки. Это брак?","a":"Нет. Выдернутая в процессе плата — НЕ брак. Стенд это видит, зелёный и красный коротко «стробят» вместе, потом возвращается сердцебиение зелёного. Приложите плату снова — она мгновенно перепрошьётся с начала."},{"q":"Плата сидит в контактах неплотно — что будет?","a":"Плохой контакт стенд авто-повторяет сам. Поправьте плату, прижмите плотнее по четырём сигналам. Если контакта совсем нет — будет ошибка код 2 (см. раздел ошибок)."},{"q":"Может ли плохая плата «повесить» стенд?","a":"Нет. Каждая попытка прошивки ограничена по времени. Сломанная или выдернутая плата не вешает стенд — он вернётся в ожидание и будет готов к следующей плате."},{"q":"Что в самой верхней строке дисплея?","a":"Это «шапка» (тёмные буквы на светлой полосе): слева «OTAБEK STM32», справа метка способа подключения — «USB» или «GPIO»."},{"q":"Что значит экран «НЕТ ПРОШИВКИ»?","a":"Прошивка ещё не загружена. По центру вы увидите «НЕТ ПРОШИВКИ», «вставьте флешку», «USB с одним .hex», «или в firmware/». Решение — вставьте флешку с одним .hex."},{"q":"Что показывает дисплей, когда стенд ждёт плату?","a":"Экран «ГОТОВ»: строка 1 — имя прошивки; строка 2 — хеш (16 символов); ниже «ГОТОВ К РАБОТЕ», «приложите плату» и счётчик «ок <N> сбой <M>»."},{"q":"Что видно во время прошивки?","a":"Имя прошивки, хеш, строку с этапом слева и процентами справа, полосу прогресса и снизу «НЕ ОТКЛЮЧАЙТЕ #<N>». Этапы идут по порядку: «СТАРТ» -> «СВЯЗЬ» -> «РАЗБЛОК» -> «ЗАПИСЬ» -> «ПРОВЕРКА» -> «ЗАЩИТА». Проценты только растут и назад не идут."},{"q":"Как выглядит успешное завершение на дисплее?","a":"Экран «ГОТОВО»: имя, хеш, галочка и «ГОТОВО-СНИМИТЕ», строка «RDP защита ВКЛ» и счётчик «#<N> ок сбой <M>». Можно снимать плату."},{"q":"Что показывает дисплей при ошибке?","a":"Имя, хеш, крестик и «ОШИБКА код <K>». Ниже причина: код 2 -> «нет контакта SWD», код 3 -> «запись/пров/RDP», иначе -> «см. журнал». В самом низу — «снимите плату»."},{"q":"На дисплее что-то про хеш и всего 16 символов — это нормально?","a":"Да. На дисплее показываются первые 16 символов SHA-256. Это нормально, так короче и удобнее. Полный хеш есть в /opt/flashjig/status и в журнале."},{"q":"Что значит «сердцебиение» зелёного (двойная вспышка)?","a":"Стенд в ожидании/готов к работе: зелёный даёт две короткие чёткие вспышки подряд, затем пауза — и так по кругу, как сердцебиение (без плавного разгорания и затухания; чем выше загрузка, тем чаще ритм). Это спокойное рабочее состояние — можно прикладывать плату."},{"q":"Зелёный и красный мигают по очереди — что это?","a":"Нет прошивки. Они медленно мигают попеременно (примерно раз в 0,6 секунды). Загрузите прошивку флешкой с одним .hex."},{"q":"Зелёный часто мигает — что делать?","a":"Идёт прошивка. Плату НЕ снимайте, держите её на месте до конца."},{"q":"Когда зелёный горит ровно?","a":"Когда плата готова. Ровный зелёный (не мигает) = можно снимать плату. Это и есть главный сигнал «снимать»."},{"q":"Зелёный и красный вместе быстро «стробят» — что случилось?","a":"Прошивку прервали — плату выдернули во время записи. Потом вернётся сердцебиение зелёного. Это не брак: верните плату — она сразу перепрошьётся."},{"q":"Красный мигает группами вспышек — как понять? Красный мигает — что делать?","a":"Это код ошибки. Считайте вспышки в группе, потом пауза, потом повтор; для ошибок платы держится, пока плату не снимут:\\n  • 2 вспышки = нет или потерян контакт SWD;\\n  • 3 вспышки = не прошли запись / проверка / подтверждение RDP;\\n  • 4 вспышки = на флешке нет .hex;\\n  • 5 вспышек = два и более .hex на флешке (нужен ровно один)."},{"q":"Красный коротко мигает 4 или 5 раз — это про что?","a":"Это ошибка ФЛЕШКИ (показывается примерно 8 секунд):\\n  • 4 вспышки = на флешке нет .hex;\\n  • 5 вспышек = два и более .hex (нужен ровно один).\\nТекущая прошивка при этом остаётся прежней."},{"q":"Какую флешку использовать?","a":"Лучше чистую или заранее отформатированную (или новую). Положите на неё РОВНО ОДИН файл .hex — он может лежать в любой папке. Вставьте в стенд, дальше всё произойдёт само."},{"q":"Сколько файлов .hex должно быть на флешке?","a":"Ровно один. Если ноль — красный мигнёт 4 раза. Если два и более — красный мигнёт 5 раз, и стенд оставит текущую прошивку. Уберите лишние .hex и вставьте флешку снова."},{"q":"Флешка как-то опасна для стенда? Может ли с неё что-то запуститься?","a":"Нет. Флешка монтируется ТОЛЬКО ДЛЯ ЧТЕНИЯ с жёсткими опциями: ro, noexec, nosuid, nodev, nosymfollow, noatime. С флешки ничего нельзя исполнить или повысить права — читается только сам файл .hex."},{"q":"Сохранится ли имя файла прошивки при импорте?","a":"Да. Имя файла сохраняется как есть — и при импорте с флешки, и при варианте с install.sh."},{"q":"На дисплее «ОШИБКА код 2» / красный мигает 2 раза. Что делать?","a":"Нет контакта SWD. Снимите плату, проверьте четыре провода (SWDIO, SWCLK, GND, 3V3), прижмите плату плотнее и приложите снова. Чаще всего дело в плохом прижиме."},{"q":"На дисплее «ОШИБКА код 3» / красный мигает 3 раза. Что делать?","a":"Не прошли запись, проверка или подтверждение RDP. Снимите плату и приложите снова. Если повторяется на разных платах — проверьте прошивку и питание; полный хеш и детали есть в журнале."},{"q":"Ошибка повторяется снова и снова. Куда смотреть?","a":"Если стенд ещё НЕ опечатан, смотрите журнал (раздел про обслуживание и диагностику). Если уже опечатан, журналы внутри недоступны — попробуйте другую плату и другой .hex, проверьте провода и контакт."},{"q":"Стенд завис или не реагирует — возможно ли это?","a":"Маловероятно: каждая попытка прошивки ограничена по времени и стенд сам возвращается в ожидание. Если экран совсем пуст и ничего не происходит после включения — один раз выполните перезагрузку питанием."},{"q":"Что за хеш и зачем он нужен?","a":"Это SHA-256 (256 бит, FIPS 180-4) по файлу прошивки, считается локально. По нему вы проверяете, что прошивка именно та и не повреждена. Один и тот же файл даёт одинаковый хеш на любом компьютере или прошивалке."},{"q":"Что за «случайные буквы» на дисплее после имени прошивки?","a":"Это хеш (SHA-256) — отпечаток прошивки. Для одной и той же версии он всегда одинаков. Не совпал с ожидаемым — прошивка другая или повреждена."},{"q":"На дисплее 16 символов, а где полный хеш?","a":"На дисплее — первые 16 символов для удобства. Полный хеш лежит в /opt/flashjig/status и в журнале."},{"q":"Хеш не совпал с ожидаемым. Что это значит?","a":"Прошивка другая или повреждённая (а возможно, поддельная). Не используйте такую прошивку — возьмите правильный файл .hex и сверьте хеш заново."},{"q":"Что такое RDP?","a":"Это защита от чтения STM32. Она закрывает считывание прошивки через отладку, чтобы её нельзя было скопировать. Стенд включает RDP на каждой плате."},{"q":"Как стенд убеждается, что защита реально включилась?","a":"Он считывает состояние RDP обратно после включения. Надпись «ГОТОВО» появляется только при подтверждённой защите. Если подтверждения нет — будет ошибка код 3."},{"q":"Можно ли снять RDP?","a":"Снять защиту можно только полным стиранием чипа. Именно так стенд и поступает с уже защищёнными платами перед новой прошивкой."},{"q":"Что именно убирает опечатывание?","a":"Все способы входа: SSH (отключён, замаскирован, ключи удалены), все консоли (tty и последовательный порт), графику, аварийные и спасательные оболочки. Все учётные записи блокируются (паролей нет, оболочка nologin). Отключаются SysRq и Ctrl-Alt-Del; маскируются VNC, Cockpit, telnet."},{"q":"Что с сетью после опечатывания?","a":"Сеть навсегда выключена: Wi-Fi и Bluetooth выключены и в чёрном списке ядра, сетевые службы замаскированы. Стенд автономный и в сети не нуждается."},{"q":"Что продолжает работать после опечатывания?","a":"Загрузка, systemd, udev, сама прошивка, дисплей и импорт прошивки с USB. То есть всё, что нужно для работы стенда."},{"q":"Можно ли отменить опечатывание на работающем приборе? Можно ли войти в устройство после опечатывания?","a":"Нет, с работающей системы это необратимо, и это сделано намеренно. Войти в устройство после опечатывания нельзя. Чтобы что-то изменить, нужно переустановить SD-карту; прошивку при этом по-прежнему меняют флешкой."},{"q":"Как посмотреть, что происходит внутри (пока НЕ опечатано)?","a":"Используйте команды:\\n  • journalctl -u flash-jig -f  — живой журнал службы прошивки;\\n  • cat /opt/flashjig/status    — текущее состояние и полный хеш;\\n  • /opt/flashjig/flash.log     — файл журнала прошивок."},{"q":"Дисплей пустой / после установки дисплей не появился. Что делать?","a":"Один раз выполните перезагрузку: sudo reboot. Дисплей по I2C включается после применения настроек. Также проверьте, что после установки была одна перезагрузка, и провода дисплея."},{"q":"Нужно ли стенду какое-то регулярное обслуживание?","a":"Нет, особого ухода он не требует. Держите контакты чистыми, плату прикладывайте плотно. Прошивку при необходимости меняйте флешкой — без переустановки."},{"q":"Как обновить прошивку без переустановки?","a":"Флешкой с одним .hex или копированием в firmware (если есть доступ). Прошивка обновляется на лету — переустанавливать систему не нужно."},{"q":"Как обновить саму систему / программу стенда?","a":"Переустановкой карты microSD (после опечатывания иначе нельзя)."},{"q":"Когда нужна полная переустановка?","a":"Когда надо изменить то, что закрыто опечатыванием (вход, сеть, настройки системы). Тогда заново подготовьте SD-карту, выполните install.sh и lockdown.sh --commit, затем загрузите прошивку флешкой."},{"q":"После переустановки порядок такой же?","a":"Да: установить и сразу опечатать (sudo ./install.sh && sudo ./lockdown.sh --commit), перезагрузить, а прошивку дать флешкой с одним .hex. Проверьте пробной платой — ровный зелёный и «ГОТОВО»."}]}`),tv={id:ei,title:ti,tagline:ai,sourceFiles:si,summary:li,blocks:ri,data:ii},av=Object.freeze(Object.defineProperty({__proto__:null,blocks:ri,data:ii,default:tv,id:ei,sourceFiles:si,summary:li,tagline:ai,title:ti},Symbol.toStringTag,{value:"Module"})),ni="files",oi="Файлы и службы",ci="Что лежит в архиве, что появляется на устройстве и какие службы всё это запускают.",vi=["документация-2/15-ФАЙЛЫ-И-СЛУЖБЫ.txt","flash-jig.service","flashjig-oled.service"],pi="Справочник по составу стенда: какие файлы поставляются в архиве до установки, какие из них оказываются на устройстве в папке /opt/flashjig после запуска install.sh, какие службы systemd всё это запускают при загрузке, какие правила udev реагируют на подключение ST-Link и USB-флешки, и где менять основные настройки (TRANSPORT, LEDS, I2C для дисплея). Команды управления службами работают только до опечатывания (lockdown) — после него входа в систему уже нет.",di=[{type:"para",text:"Этот раздел — справочник по тому, из чего состоит стенд: файлы в архиве (до установки), рабочие файлы на устройстве, службы systemd, правила udev и места, где меняются настройки."},{type:"heading",text:"В комплекте (в архиве, до установки)"},{type:"para",text:"Это содержимое поставляемого архива — то, что распаковывается и запускается через install.sh."},{type:"table",columns:["Файл / папка","Назначение"],rows:[["install.sh","Установка"],["lockdown.sh","Опечатывание (блокировка входа)"],["flash-jig.sh","Основная служба прошивки"],["flashjig-usb.sh","Приём прошивки с USB-флешки"],["oled.py","Служба дисплея (русский OLED)"],["leds.sh","Индикация светодиодами"],["jig-stlink.cfg","Настройка подключения через ST-Link"],["jig-gpio.cfg","Настройка прямого подключения по GPIO"],["flash-jig.service","Автозапуск службы прошивки"],["flashjig-oled.service","Автозапуск службы дисплея"],["99-flash-jig.rules","Правило: подготовка при подключении ST-Link"],["99-flashjig-usb.rules","Правило: приём прошивки при подключении USB"],["openocd/","Встроенный прошивальщик (bin/openocd + scripts/)"],["wiring.png","Картинка подключения"],["ИНФОРМАЦИЯ.txt, БЕЗОПАСНОСТЬ.txt, документация/, документация-2/","Описания"]]},{type:"heading",text:"На устройстве после установки (папка /opt/flashjig)"},{type:"para",text:"После запуска install.sh всё устанавливается в папку /opt/flashjig. Часть файлов копируется из архива, часть создаётся в процессе работы (журнал, файл состояния, живой вывод)."},{type:"table",columns:["Файл / папка","Назначение"],rows:[["openocd/","Прошивальщик и его скрипты"],["firmware/","Прошивки (.hex) и ссылка current на активную"],["flash-jig.sh, flashjig-usb.sh, oled.py, leds.sh, jig-*.cfg","Рабочие файлы"],["status","Файл состояния (читает дисплей) (см. раздел 13)"],["flash.log","Журнал прошивок"],["flash.live","Живой вывод прошивальщика (для дисплея)"]]},{type:"callout",variant:"info",title:"Ссылка current — активная прошивка",text:"В папке firmware/ лежат файлы прошивок (.hex), а ссылка current указывает на активную. Если ссылки нет, стенд берёт самый новый .hex. Обновить прошивку можно в любой момент — вставить USB-флешку с одним .hex или просто положить .hex в /opt/flashjig/firmware/ (см. раздел 07)."},{type:"heading",text:"Службы (systemd)"},{type:"list",ordered:!1,items:["flash-jig.service — служба прошивки (запускается при загрузке).","flashjig-oled.service — служба дисплея."]},{type:"para",text:"Управление службами (до опечатывания):"},{type:"code",lang:"bash",text:`systemctl status flash-jig
systemctl restart flash-jig
journalctl -u flash-jig -f`},{type:"callout",variant:"warn",title:"Команды управления — только до опечатывания",text:"systemctl и journalctl работают, пока на устройстве есть вход в систему. После опечатывания (lockdown) входа нет — управлять службами и читать журналы с самого устройства уже нельзя (см. раздел 11)."},{type:"heading",text:"Правила подключений (udev, в /etc/udev/rules.d)"},{type:"list",ordered:!1,items:["99-flash-jig.rules — реагирует на подключение ST-Link.","99-flashjig-usb.rules — реагирует на подключение USB-носителя (приём прошивки)."]},{type:"heading",text:"Настройки"},{type:"para",text:"Основные параметры службы прошивки задаются в её unit-файле /etc/systemd/system/flash-jig.service:"},{type:"table",columns:["Параметр","Значения","Назначение"],rows:[["TRANSPORT","auto | stlink | gpio","Способ подключения к плате (по умолчанию auto)"],["LEDS","1 | 0","Индикация светодиодами"]]},{type:"para",text:"Конфигурация загрузки (для шины I2C дисплея): /boot/firmware/config.txt — туда install.sh добавляет включение I2C."},{type:"callout",variant:"info",title:"Что ещё кладёт в unit-файл flash-jig.service",text:"Кроме TRANSPORT и LEDS, в flash-jig.service заданы ADDR=0x08000000 (адрес начала прошивки) и запуск ExecStart=/opt/flashjig/flash-jig.sh с Restart=always (RestartSec=1) и приоритетом Nice=-5. Путь к OpenOCD отдельно указывать не нужно: служба по умолчанию берёт OOCD и SCRIPTS из /opt/flashjig/openocd/... Прошивка тоже подбирается автоматически из /opt/flashjig/firmware/ — путь FW= задавать не требуется."},{type:"callout",variant:"info",title:"Служба дисплея flashjig-oled.service",text:"Дисплей запускается командой /usr/bin/python3 /opt/flashjig/oled.py (Restart=always, RestartSec=2). Ему передаются пути STATUS=/opt/flashjig/status (файл состояния) и FLASH_LIVE=/opt/flashjig/flash.live (живой вывод прошивальщика) — именно из них дисплей берёт данные для отображения (SSD1306 128x64 по I2C)."},{type:"callout",variant:"danger",title:"Менять настройки можно только до опечатывания",text:"Параметры в flash-jig.service (TRANSPORT, LEDS) меняются лишь до опечатывания. После lockdown доступа к системе нет, поэтому режим рекомендуется оставлять auto. После изменения unit-файла выполните перезагрузку конфигурации и перезапуск службы: sudo systemctl daemon-reload && sudo systemctl restart flash-jig."}],ui={files:[{path:"install.sh",role:"В архиве. Установка: копирует комплект в /opt/flashjig, включает I2C для дисплея, ставит и включает службы и правила udev. Идемпотентен (безопасно перезапускать), не стирает уже установленные прошивки."},{path:"lockdown.sh",role:"В архиве. Опечатывание (блокировка входа в систему) — см. раздел 11."},{path:"flash-jig.sh",role:"В архиве и на устройстве (/opt/flashjig). Основная служба прошивки."},{path:"flashjig-usb.sh",role:"В архиве и на устройстве (/opt/flashjig). Приём прошивки с USB-флешки."},{path:"oled.py",role:"В архиве и на устройстве (/opt/flashjig). Служба дисплея (русский OLED, SSD1306 128x64 по I2C)."},{path:"leds.sh",role:"В архиве и на устройстве (/opt/flashjig). Индикация светодиодами."},{path:"jig-stlink.cfg",role:"В архиве и на устройстве (/opt/flashjig). Настройка подключения через ST-Link."},{path:"jig-gpio.cfg",role:"В архиве и на устройстве (/opt/flashjig). Настройка прямого подключения по GPIO."},{path:"flash-jig.service",role:"В архиве; ставится в /etc/systemd/system/. Автозапуск службы прошивки. Здесь же настройки TRANSPORT, LEDS, ADDR."},{path:"flashjig-oled.service",role:"В архиве; ставится в /etc/systemd/system/. Автозапуск службы дисплея."},{path:"99-flash-jig.rules",role:"В архиве; ставится в /etc/udev/rules.d/. Правило: подготовка при подключении ST-Link."},{path:"99-flashjig-usb.rules",role:"В архиве; ставится в /etc/udev/rules.d/. Правило: приём прошивки при подключении USB."},{path:"openocd/",role:"В архиве и на устройстве (/opt/flashjig/openocd). Встроенный прошивальщик: bin/openocd + scripts/."},{path:"wiring.png",role:"В архиве. Картинка подключения."},{path:"ИНФОРМАЦИЯ.txt, БЕЗОПАСНОСТЬ.txt, документация/, документация-2/",role:"В архиве. Описания и документация."},{path:"/opt/flashjig/firmware/",role:"На устройстве. Прошивки (.hex) и ссылка current на активную (если ссылки нет — берётся самый новый .hex)."},{path:"/opt/flashjig/status",role:"На устройстве. Файл состояния «ключ=значение», который читает дисплей (см. раздел 13)."},{path:"/opt/flashjig/flash.log",role:"На устройстве. Журнал прошивок."},{path:"/opt/flashjig/flash.live",role:"На устройстве. Живой вывод прошивальщика (для дисплея)."},{path:"/etc/systemd/system/flash-jig.service",role:"Настройки службы прошивки: TRANSPORT=auto|stlink|gpio (по умолчанию auto), LEDS=1|0, ADDR=0x08000000."},{path:"/boot/firmware/config.txt",role:"Конфигурация загрузки для шины I2C дисплея — туда install.sh добавляет включение I2C."}],services:[{name:"flash-jig.service",role:"Служба прошивки. Запускается при загрузке (WantedBy=multi-user.target). ExecStart=/opt/flashjig/flash-jig.sh, User=root, Restart=always (RestartSec=1), Nice=-5. Окружение: TRANSPORT=auto, LEDS=1, ADDR=0x08000000. OpenOCD и прошивка подбираются из /opt/flashjig автоматически."},{name:"flashjig-oled.service",role:"Служба дисплея (русский OLED, SSD1306 128x64 по I2C). ExecStart=/usr/bin/python3 /opt/flashjig/oled.py, User=root, Restart=always (RestartSec=2). Окружение: STATUS=/opt/flashjig/status, FLASH_LIVE=/opt/flashjig/flash.live."},{name:"99-flash-jig.rules",role:"Правило udev (в /etc/udev/rules.d). Реагирует на подключение ST-Link — подготовка стенда."},{name:"99-flashjig-usb.rules",role:"Правило udev (в /etc/udev/rules.d). Реагирует на подключение USB-носителя — приём прошивки."}]},sv={id:ni,title:oi,tagline:ci,sourceFiles:vi,summary:pi,blocks:di,data:ui},lv=Object.freeze(Object.defineProperty({__proto__:null,blocks:di,data:ui,default:sv,id:ni,sourceFiles:vi,summary:pi,tagline:ci,title:oi},Symbol.toStringTag,{value:"Module"})),fi="firmware",hi="Прошивки и хеши",yi="Одна активная прошивка, один файл .hex, один отпечаток SHA-256 — и вы всегда знаете, что уезжает в каждую плату.",xi=["документация/08-ХЕШИ-ПРОШИВОК.txt","документация/05-ОБНОВЛЕНИЕ-ПРОШИВКИ.txt","документация-2/07-ПРОШИВКИ.txt"],mi="Прошивка — это один файл с расширением .hex, который стенд записывает в каждую плату STM32F103C8T6 при касании. На стенде активна ровно одна прошивка; её имя и первые 16 символов хеша SHA-256 всегда видны на дисплее. Меняют прошивку «на лету» — обычной USB-флешкой с единственным .hex, в том числе на уже опечатанном стенде. Хеш SHA-256 — это «цифровой отпечаток» файла: совпал с эталоном выпуска — загружена именно та сборка и она цела; не совпал — прошивка другая или повреждена, и платы ею прошивать нельзя.",gi=JSON.parse('[{"type":"heading","text":"Что такое здесь «прошивка»"},{"type":"para","text":"Стенд прошивает платы STM32F103C8T6. «Прошивка» — это один файл с расширением .hex, в котором лежит программа, записываемая в каждую плату. Именно этот файл стенд берёт и заливает в микросхему при каждом «таче» (касании платой контактов)."},{"type":"para","text":"На стенде «активна» одна прошивка — именно её получают все платы. Активную видно на дисплее: имя файла и под ним строка хеша (первые 16 знаков). Имя файла прошивки никуда не теряется: оно сохраняется при загрузке, показывается на дисплее, а также пишется в журнал и в файл состояния. По имени и хешу на экране вы всегда видите, какая именно прошивка сейчас активна."},{"type":"callout","variant":"info","title":"Имя файла — это подсказка","text":"Имя прошивки сохраняется как есть и показывается на дисплее. Называйте файлы понятно (например, насос-v4.hex) — так по дисплею сразу видно, что залито."},{"type":"heading","text":"Главное в одной фразе"},{"type":"para","text":"Чтобы дать стенду новую прошивку, вставьте USB-флешку (или картридер), на которой лежит РОВНО ОДИН файл .hex. Стенд сам прочитает этот файл и дальше будет прошивать им платы. Больше ничего делать не нужно."},{"type":"para","text":"Это основной и обычно единственный способ. Менять прошивку можно прямо во время работы стенда, не переустанавливая систему и не перезагружая устройство. На опечатанном (закрытом) стенде входа в систему нет, поэтому флешка — это штатный путь дать новую прошивку."},{"type":"heading","text":"Коротко: пошагово (способ с флешкой)"},{"type":"steps","items":[{"title":"Подготовьте флешку","text":"Возьмите чистую или заранее отформатированную USB-флешку либо картридер с картой памяти. Положите на неё РОВНО ОДИН файл прошивки с расширением .hex — файл может лежать в любой папке на флешке, стенд найдёт его сам. На флешке не должно быть других .hex; лишние .hex уберите. Прочие файлы (фото, документы — что угодно НЕ .hex) не мешают: важен только счёт именно .hex-файлов, их должно быть ровно один."},{"title":"Вставьте флешку","text":"Вставьте флешку в любой свободный USB-разъём стенда (Raspberry Pi). Стенд можно не выключать — вставляйте на ходу. Удобнее вставлять, когда плата в этот момент не прошивается."},{"title":"Дождитесь импорта","text":"Стенд сам прочитает файл и сохранит прошивку у себя. Зелёный светодиод сделает ТРИ коротких (плавных) импульса — это знак, что прошивка принята. На дисплее примерно на 2 секунды появится экран импорта: галочка и слово «ПРОШИВКА», ниже — имя вашего файла, затем хеш, и в самом низу «готова к работе»."},{"title":"Выньте флешку","text":"После того как импорт прошёл, флешка больше не нужна — выньте её."},{"title":"Прошивайте","text":"Следующая приложенная плата будет прошита уже НОВОЙ прошивкой. Имя вашего файла сохранилось: вы увидите его на дисплее в режиме ожидания и сможете сверить по хешу."}]},{"type":"callout","variant":"info","title":"Если что-то пошло не так","text":"Смотрите раздел «Ошибки при импорте с флешки» ниже."},{"type":"heading","text":"Почему именно флешка"},{"type":"para","text":"Стенд устроен так, чтобы работать в одиночку, без интернета и без входа в систему. После опечатывания (закрытия) у стенда отключены все способы зайти внутрь: нет SSH, нет консолей, нет сети. Это сделано ради безопасности — закрытый стенд нельзя взломать через сеть и нельзя тайком подменить в нём программу."},{"type":"para","text":"Но прошивку для плат время от времени надо менять. Чтобы это осталось возможным и при этом безопасным, оставлен ровно один «канал» снаружи: USB-флешка с одним файлом .hex. Стенд читает с неё только сам файл прошивки и ничего больше. Поэтому на опечатанном стенде флешка — это единственный обычный способ выдать новую прошивку."},{"type":"heading","text":"Что видно на дисплее и светодиодах при импорте"},{"type":"para","text":"Светодиоды стенда — это светодиоды самой Raspberry. Зелёный — индикатор работы, красный — индикатор питания. Когда прошивка с флешки ПРИНЯТА, зелёный делает ТРИ импульса (мигнёт три раза подряд). Сигнал короткий и заметный: по нему понятно, что прошивка принята, даже не глядя на текст."},{"type":"para","text":"Дисплей (маленький экран OLED) сразу после импорта примерно на 2 секунды показывает: галочку и слово «ПРОШИВКА»; имя файла прошивки; хеш (первые 16 символов); строку «готова к работе». Потом стенд переходит в обычный режим ожидания платы, где в верхних строках показаны имя прошивки и её хеш, а ниже — «ГОТОВ К РАБОТЕ», «приложите плату» и счётчик «ок <N> сбой <M>»."},{"type":"callout","variant":"info","title":"Метка способа подключения в шапке","text":"В самой верхней строке дисплея слева всегда написано «OTAБEK STM32», а справа — метка способа подключения к плате: «USB» (подключён ST-Link по USB) или «GPIO» (прошивка идёт напрямую по выводам Raspberry). К смене прошивки эта метка прямого отношения не имеет, но полезно знать, что она там есть."},{"type":"heading","text":"Ошибки при импорте с флешки"},{"type":"para","text":"Стенд требует, чтобы на флешке был РОВНО ОДИН файл .hex. Если это условие не выполнено, импорт не происходит, а текущая прошивка ОСТАЁТСЯ прежней (ничего не ломается). Стенд сообщит об этом красным светодиодом — он мигнёт определённым числом вспышек. Сигнал ошибки флешки держится примерно 8 секунд, потом стенд возвращается к работе."},{"type":"table","columns":["Сигнал (красный)","Что значит","Что делать"],"rows":[["Мигает 4 раза","На флешке НЕТ ни одного .hex — стенду нечего импортировать.","Положите на флешку нужный файл .hex и вставьте снова. Проверьте, что у файла именно расширение .hex."],["Мигает 5 раз","На флешке ДВА и более .hex — стенд не угадывает за вас, какой из них нужен, поэтому не берёт ни один.","Оставьте на флешке только один нужный .hex, остальные удалите или перенесите, и вставьте флешку снова."]]},{"type":"para","text":"Чтобы посчитать вспышки: смотрите на красный светодиод, считайте число морганий в группе, затем идёт пауза, и группа повторяется."},{"type":"callout","variant":"warn","title":"Не путайте с ошибками прошивки платы","text":"Ошибки импорта флешки (4 и 5 вспышек) — это ВСЕГДА про флешку. Красные сигналы прошивки платы означают другое: 2 вспышки красным = нет или потерян контакт SWD (это про плату); 3 вспышки красным = запись, проверка или подтверждение защиты RDP не прошли (тоже про плату). То есть 4 и 5 вспышек — про флешку, а 2 и 3 — про плату."},{"type":"callout","variant":"ok","title":"Совет","text":"Лучше всего брать чистую или только что отформатированную флешку и класть на неё единственный файл. Тогда лишних .hex точно не окажется, и импорт пройдёт с первого раза."},{"type":"heading","text":"Безопасность флешек: почему чужая флешка не опасна"},{"type":"para","text":"Флешка — это «вход снаружи», поэтому к ней относятся с осторожностью. Стенд подключает (монтирует) любую вставленную флешку в особом, строгом режиме. С неё разрешено только ОДНО: прочитать файл .hex. Ничего исполнить, ничего записать, никак повысить права — нельзя."},{"type":"para","text":"Флешка монтируется ТОЛЬКО ДЛЯ ЧТЕНИЯ и со следующими жёсткими ограничениями (это технические опции монтирования):"},{"type":"table","columns":["Опция","Что она запрещает / гарантирует"],"rows":[["ro","Только чтение. На флешку нельзя ничего записать, и она не может «попросить» стенд что-то на неё сохранить. Стенд лишь читает с неё файл .hex."],["noexec","Запрет на запуск. Любой файл-программа с флешки не может быть выполнен. Даже если на флешке лежит вирус или скрипт, запустить его с неё невозможно. Файл .hex стенд берёт только как данные для прошивки — он его НЕ запускает."],["nosuid","Игнорируются «биты повышения прав» (SUID/SGID). Файл с флешки не может получить особые права в системе. Этот классический приём захвата прав здесь не работает в принципе."],["nodev","Игнорируются «файлы-устройства». С флешки нельзя подсунуть фальшивое устройство и через него лезть в систему или к «железу»."],["nosymfollow","Не переходить по символьным ссылкам с флешки. Хитро сделанная ссылка не уведёт стенд читать что-то за пределами флешки, внутри системы."],["noatime","Не записывать на флешку отметки времени доступа. Это часть режима «только чтение»: стенд вообще ничего не пишет на флешку."]]},{"type":"para","text":"Сложив всё вместе, получаем простую и крепкую картину: с флешки НИЧЕГО НЕЛЬЗЯ ИСПОЛНИТЬ (noexec) — вредоносная программа с неё просто не запустится; с флешки НЕЛЬЗЯ ПОВЫСИТЬ ПРАВА (nosuid) и нельзя пролезть через файлы-устройства (nodev) — нет лазейки получить контроль над системой; символьные ссылки не уводят стенд в «чужие» места системы (nosymfollow); флешка подключена только для чтения (ro) — стенд лишь читает."},{"type":"callout","variant":"ok","title":"Итог по безопасности","text":"Что бы ни лежало на флешке, стенд возьмёт оттуда лишь содержимое файла .hex. Запустить с флешки программу, получить через неё права или заставить стенд что-то сделать — нельзя по самому способу подключения. Поэтому можно без опаски пользоваться даже флешкой, в которой вы не уверены. И всё же надёжнее держать отдельную чистую флешку только под прошивки."},{"type":"heading","text":"Хеш-суммы прошивок: контроль целостности (SHA-256)"},{"type":"para","text":"У каждой прошивки есть своя «цифровая печать» — хеш-сумма SHA-256. Хеш считается прямо на стенде, локально, без всякого интернета. На дисплее вы видите первые 16 символов этого хеша, а полный хеш записан в файл /opt/flashjig/status и в журнал. Сравните хеш на стенде с эталонным хешем выпуска прошивки: совпали — значит, загружена правильная сборка; не совпали — значит, сборка ДРУГАЯ или ФАЙЛ ПОВРЕЖДЁН. Подделать файл так, чтобы хеш остался прежним, практически невозможно — на этом и строится защита целостности."},{"type":"heading","text":"Что такое хеш и что такое SHA-256"},{"type":"para","text":"Хеш (хеш-сумма, контрольная сумма) — это короткая строка фиксированной длины, которую вычисляют из содержимого файла по строгому математическому правилу. Можно думать о ней как о «цифровом отпечатке пальца» файла: отпечаток короткий, но он уникален для своего владельца."},{"type":"para","text":"На стенде используется алгоритм SHA-256. Расшифруем название: SHA — Secure Hash Algorithm, «защищённый алгоритм хеширования»; 256 — длина результата: 256 бит. 256 бит — это ровно 32 байта. Записывают такой хеш в шестнадцатеричном виде (hex), где каждый байт — это две буквы-цифры от 0 до f. Поэтому полный хеш выглядит как строка из 64 шестнадцатеричных символов."},{"type":"para","text":"SHA-256 — это не самоделка, а признанный мировой стандарт. Он описан в документе NIST FIPS 180-4 (Secure Hash Standard) — официальном стандарте американского института стандартов и технологий (NIST). Тот же самый SHA-256 применяется по всему миру: в обновлениях операционных систем, в проверке скачанных файлов, в банковских и государственных системах, в электронных подписях. Это проверенный временем, надёжный и широко изученный алгоритм."},{"type":"para","text":"Главные свойства, которые делают хеш полезным:"},{"type":"list","ordered":true,"items":["Одинаковый файл — одинаковый хеш. Один и тот же файл всегда даёт одну и ту же сумму. Посчитайте её сегодня, завтра, на другом устройстве — результат тот же.","Любое изменение — совсем другой хеш. Стоит измениться хотя бы одному биту в файле (один-единственный ноль превратился в единицу) — и хеш меняется полностью, до неузнаваемости. Не «чуть-чуть», а целиком.","Фиксированная длина. Файл может быть любого размера, а хеш всегда ровно 256 бит (64 hex-символа). По хешу нельзя узнать, большой был файл или маленький.","Необратимость. По хешу нельзя восстановить сам файл. Хеш — это «слепок», а не сжатая копия. Дорога только в одну сторону: из файла в хеш."]},{"type":"heading","text":"Зачем вообще нужен хеш прошивки"},{"type":"para","text":"Стенд прошивает платы STM32 одним касанием и сразу закрывает каждую плату защитой от чтения (RDP). После этого вынуть прошивку обратно из платы уже нельзя. Значит, в плату должна попасть именно та сборка, которую вы одобрили, — и никакая другая. Цена ошибки высокая: если в плату «уехала» не та или испорченная прошивка, узнать об этом по самой плате потом не получится."},{"type":"para","text":"Хеш решает ровно эту задачу — он даёт вам способ убедиться, ЧТО ИМЕННО сейчас загружено в стенд, ещё ДО того, как вы начнёте прошивать платы. Хеш отвечает на два простых вопроса: «Это точно ТА САМАЯ прошивка, которую мне выдали?» (та сборка, тот выпуск, та версия) и «Файл прошивки ЦЕЛЫЙ, не побился ли он при копировании?» (например, при записи на флешку или переносе между машинами). Если хеш на стенде совпал с эталонным хешем выпуска — оба ответа «да». Это короткая, быстрая и очень надёжная проверка."},{"type":"heading","text":"Почему по хешу нельзя незаметно подделать файл"},{"type":"para","text":"Самый частый вопрос: «А нельзя ли подменить прошивку так, чтобы хеш остался прежним, и подмену никто не заметил?» Ответ: на практике — нет. И вот почему."},{"type":"list","ordered":false,"items":["Эффект лавины. SHA-256 устроен так, что даже мельчайшее изменение во входных данных полностью «перемешивает» результат. Поменяли один бит — и в среднем половина битов хеша становится другой. Предсказать заранее, как именно изменится хеш, невозможно. Поэтому нельзя «подкрутить» файл аккуратно, чтобы хеш случайно сошёлся.","Огромное пространство значений. У 256-битного хеша число возможных значений — это 2 в степени 256. Это число настолько велико, что не укладывается в воображение: оно сопоставимо с количеством атомов в видимой Вселенной. Чтобы случайно наткнуться на другой файл с таким же хешем, не хватит ни времени, ни вычислительной мощности всех компьютеров на планете.","Стойкость к подбору. Чтобы подделать файл незаметно, злоумышленнику нужно было бы создать ДРУГОЙ файл (свою, изменённую прошивку), который даёт ТОТ ЖЕ хеш, что и оригинал. Это называется «атака на прообраз» (и родственная ей «атака на коллизию»). Для SHA-256 практически осуществимых способов сделать это не известно. Алгоритм специально проектировался стойким к таким атакам и многие годы выдерживает проверку специалистов по всему миру."]},{"type":"callout","variant":"ok","title":"Итог","text":"Любая подмена прошивки — будь то злой умысел или случайная порча файла — неизбежно изменит хеш. А изменённый хеш вы сразу увидите при сверке с эталоном. Именно поэтому хеш — это надёжная защита целостности: он не прячет подмену, он её ВЫЯВЛЯЕТ."},{"type":"heading","text":"Важно: хеш считается локально, без сети"},{"type":"para","text":"Хеш прошивки вычисляется прямо на самом стенде по содержимому файла. Для этого НЕ нужен ни интернет, ни какой-либо сервер, ни обращение куда-то наружу. Всё происходит внутри устройства."},{"type":"para","text":"Это не случайность, а принцип работы стенда. Стенд — автономный и полностью офлайн. У него нет и не должно быть никакой сети: Wi-Fi и Bluetooth выключены, сетевые службы отключены. Подсчёт хеша на месте прекрасно вписывается в эту схему — ему сеть просто не требуется."},{"type":"para","text":"Почему это хорошо для вас и для безопасности: нет зависимости от связи — проверка целостности работает всегда, даже там, где интернета нет в принципе; нечего перехватить и нечего подменить «по дороге» — раз данные никуда не уходят, их невозможно подменить в сети; результат честный и воспроизводимый — хеш считается по тому самому файлу, который реально лежит на стенде и которым реально будут прошиваться платы, а не по какой-то копии «где-то на сервере»."},{"type":"para","text":"То же относится и к импорту прошивки с флешки: флешка читается локально, строго ТОЛЬКО ДЛЯ ЧТЕНИЯ, с жёсткими ограничениями (ничего нельзя запустить с флешки и нельзя повысить права). Стенд берёт с неё лишь сам файл прошивки, а хеш считает у себя."},{"type":"heading","text":"Где вы видите хеш"},{"type":"para","text":"Хеш активной прошивки показывается в трёх местах. Они дополняют друг друга: на дисплее — кратко для быстрого взгляда, в файле и в журнале — полностью для точной сверки."},{"type":"steps","items":[{"title":"На дисплее OLED — первые 16 символов","text":"Маленький экран 128x64 точек не вмещает все 64 символа, поэтому на нём показаны ТОЛЬКО ПЕРВЫЕ 16 шестнадцатеричных символов хеша. Это отдельная строка хеша, которую видно: на экране «Готов» (вместе с именем прошивки и надписью «ГОТОВ К РАБОТЕ») и на экране «Прошивка идёт» (вместе с именем и этапом работы). 16 символов — это уже очень короткая «визитка» прошивки. Для беглого взгляда («та ли прошивка стоит?») этого, как правило, достаточно: вероятность, что у двух разных сборок совпадут первые 16 символов, ничтожно мала."},{"title":"В файле /opt/flashjig/status — полный хеш","text":"Файл состояния /opt/flashjig/status содержит полную, все 64 символа, сумму SHA-256 активной прошивки, а также её имя и счётчики работы. Этот же файл стенд использует, чтобы рисовать дисплей. Именно отсюда удобно брать ПОЛНЫЙ хеш для точной сверки с эталоном."},{"title":"В журнале — полный хеш","text":"Полная сумма записывается и в журнал работы стенда. Журнал — это история событий устройства, по которой видно, какая прошивка была активна."}]},{"type":"callout","variant":"info","title":"Важно понимать","text":"На дисплее и в файле/журнале — ОДИН И ТОТ ЖЕ хеш. Просто на дисплее показано его начало (16 символов), а в файле и журнале — он целиком (64 символа). Первые 16 символов на дисплее обязаны совпадать с первыми 16 символами полного хеша из файла."},{"type":"heading","text":"Как посмотреть полный хеш на стенде"},{"type":"para","text":"Самый простой способ — заглянуть в файл состояния. На стенде это делается командой:"},{"type":"code","lang":"bash","text":"cat /opt/flashjig/status"},{"type":"para","text":"В содержимом этого файла, помимо состояния и имени прошивки, есть и полный хеш SHA-256 активной прошивки, и счётчики. Оттуда вы и берёте все 64 символа для сверки."},{"type":"para","text":"Историю по журналу можно посмотреть командой (она показывает события стенда в реальном времени; полезно, когда нужно проследить, какая прошивка была активна и что происходило):"},{"type":"code","lang":"bash","text":"journalctl -u flash-jig -f"},{"type":"callout","variant":"warn","title":"Примечание про опечатанный стенд","text":"Если стенд уже переведён в окончательный «опечатанный» режим (выполнена команда блокировки lockdown), то входа в систему на нём нет вовсе — ни по сети, ни с клавиатуры. В этом случае для повседневной работы вы ориентируетесь на ПЕРВЫЕ 16 СИМВОЛОВ ХЕША НА ДИСПЛЕЕ. А полный хеш фиксируйте заранее — ещё на этапе подготовки и проверки стенда, ДО опечатывания — и сверяйте его с эталоном именно тогда. Дисплей же после опечатывания продолжает честно показывать первые 16 символов того хеша, который вы зафиксировали."},{"type":"heading","text":"Что такое эталонный хеш выпуска"},{"type":"para","text":"Эталонный хеш — это «правильное», заранее известное значение SHA-256 для официально одобренного выпуска прошивки. Его публикуют (передают, кладут в документы выпуска) рядом с самой прошивкой как её «паспортный номер»."},{"type":"para","text":"Идея простая: тот, кто готовит и выдаёт прошивку, один раз честно считает её SHA-256 и объявляет: «у одобренной сборки версии такой-то хеш равен вот этому». Это и есть эталон. Дальше любой может в любой момент пересчитать хеш своего файла и сравнить его с эталоном. Сошлось — файл подлинный и целый. Не сошлось — что-то не так. При этом сам эталон — это просто строка из 64 символов, её удобно передавать, печатать и хранить."},{"type":"heading","text":"Как сверить хеш на стенде с эталонным хешем выпуска (пошагово)"},{"type":"steps","items":[{"title":"Шаг 1. Возьмите эталонный хеш","text":"Найдите официальный (эталонный) хеш SHA-256 нужного выпуска прошивки — там, где он опубликован вместе с прошивкой. Это строка из 64 шестнадцатеричных символов."},{"title":"Шаг 2. Узнайте хеш, который показывает стенд","text":"Вариант «быстро»: посмотрите ПЕРВЫЕ 16 СИМВОЛОВ на дисплее (строка хеша на экране «Готов»). Вариант «точно»: возьмите ПОЛНЫЙ хеш из файла состояния (cat /opt/flashjig/status) — все 64 символа."},{"title":"Шаг 3. Сравните символ в символ","text":"Для быстрой проверки: первые 16 символов эталона должны совпасть с 16 символами на дисплее. Для полной проверки: все 64 символа эталона должны совпасть с 64 символами из файла состояния. Сравнивайте внимательно, по порядку, слева направо. Регистр букв (большие или маленькие) роли не играет — важны сами символы. Если хотите быть совсем уверены, удобно проверять не только начало и конец, но и пройтись по всей строке."},{"title":"Шаг 4. Сделайте вывод","text":"Совпало — прошивка на стенде ИМЕННО ТА, что в выпуске, и она не повреждена; можно спокойно работать. Не совпало — НЕ прошивайте платы этой сборкой, пока не разберётесь (подробности — в следующем разделе)."}]},{"type":"callout","variant":"ok","title":"Совет","text":"Для надёжного результата делайте полную сверку (по всем 64 символам из файла состояния) хотя бы один раз — когда впервые ставите новую прошивку или принимаете новый выпуск. А в повседневной работе для контроля «та ли прошивка стоит» вполне хватает взгляда на 16 символов на дисплее."},{"type":"heading","text":"Что означает несовпадение хеша"},{"type":"para","text":"Если хеш на стенде НЕ совпал с эталонным хешем выпуска — это всегда сигнал. Возможны две основные причины, и обе требуют вашего внимания."},{"type":"list","ordered":false,"items":["Причина 1. Это другая сборка. На стенде лежит не тот файл прошивки, который вы ожидали: другая версия (новее или старее); вообще другая прошивка; случайно загруженный или перепутанный файл. Хеш честно показывает: «это не тот выпуск, на который вы смотрите в документах». Возможно, активной оказалась не та прошивка из папки firmware, или с флешки импортировали не тот файл.","Причина 2. Файл повреждён. Файл прошивки тот самый, но он испортился — изменилось его содержимое. Чаще всего это случается при копировании: сбой при записи на флешку или чтении с неё; неполное, оборванное копирование; повреждение носителя. Даже один испорченный байт полностью меняет хеш. Повреждённой прошивкой прошивать платы нельзя."]},{"type":"para","text":"Что делать при несовпадении:"},{"type":"list","ordered":false,"items":["НЕ прошивайте платы такой прошивкой. Помните: после прошивки на каждой плате включается защита от чтения (RDP), и достать прошивку обратно будет уже нельзя. Лучше остановиться и проверить.","Убедитесь, что вы сравниваете с ПРАВИЛЬНЫМ эталоном — именно для того выпуска и версии, которые вам нужны. Иногда «несовпадение» — это просто взятый не тот эталонный хеш.","Перенесите/импортируйте прошивку заново из надёжного источника: запишите файл .hex на флешку ещё раз (с проверкой) и снова импортируйте его на стенд. После импорта стенд заново посчитает хеш — сверьте его с эталоном ещё раз.","Если после повторного, аккуратного переноса хеш снова не совпадает с эталоном — значит, у вас действительно НЕ тот файл (другая сборка). Возьмите правильный выпуск прошивки."]},{"type":"callout","variant":"danger","title":"Главный принцип","text":"Совпадение хеша — это ваше «зелёный свет». Пока хеш не совпал с эталоном, считайте, что прошивка под вопросом, и не пускайте её в платы. После прошивки включается защита RDP и достать прошивку из платы будет нельзя."},{"type":"heading","text":"Как хеш связан с обновлением прошивки"},{"type":"para","text":"Прошивки лежат в папке /opt/flashjig/firmware/. Активной считается та, на которую указывает ссылка current; если её нет — самый новый файл. Имя файла прошивки при этом сохраняется. Загруженные .hex остаются в папке firmware (старые не удаляются)."},{"type":"para","text":"Когда вы меняете прошивку (импортом с флешки или копированием файла), активной становится новая прошивка — и стенд заново считает её SHA-256. Поэтому ПОСЛЕ каждого обновления имеет смысл свериться с эталоном:"},{"type":"steps","items":[{"title":"Импортируйте новую прошивку","text":"На дисплее появится «ПРОШИВКА ПРИНЯТА» после импорта с флешки."},{"title":"Дождитесь экрана «Готов»","text":"Там будут новое имя прошивки и новая строка хеша (первые 16 символов)."},{"title":"Сверьте хеш с эталоном нового выпуска","text":"Быстро — по дисплею, точно — по файлу /opt/flashjig/status."},{"title":"Совпало — можно прошивать","text":"Прошивайте платы новой сборкой. Так вы каждый раз точно знаете, какая именно сборка стала активной, и не перепутаете выпуски."}]},{"type":"heading","text":"Как понять, что новая прошивка работает"},{"type":"para","text":"После импорта приложите пробную плату и проверьте результат:"},{"type":"list","ordered":false,"items":["Идёт прошивка: зелёный ЧАСТО мигает, на дисплее видны этапы и растущие проценты, внизу — «НЕ ОТКЛЮЧАЙТЕ». Пока зелёный мигает, плату НЕ снимайте.","Готово: зелёный горит РОВНО и не мигает; на дисплее галочка и «ГОТОВО-СНИМИТЕ», строка «RDP защита ВКЛ» и счётчик. Снимать плату можно ТОЛЬКО при ровном зелёном.","Имя и хеш на дисплее в режиме ожидания должны совпадать с тем, что вы загрузили. Если знаете ожидаемый хеш — сверьте первые 16 символов."]},{"type":"callout","variant":"ok","title":"Итог проверки","text":"Если плата прошивается и доходит до ровного зелёного «ГОТОВО» — новая прошивка загружена и работает."},{"type":"heading","text":"Если прошивки вообще нет"},{"type":"para","text":"Если в стенд ещё ни разу не загружали прошивку, он не сможет ничего прошивать и прямо скажет об этом:"},{"type":"list","ordered":false,"items":["На дисплее по центру: «НЕТ ПРОШИВКИ», «вставьте флешку», «USB с одним .hex», «или в firmware/».","Светодиоды: зелёный и красный медленно мигают ПО ОЧЕРЕДИ (попеременно, примерно раз в 0,6 секунды)."]},{"type":"para","text":"Лечится это тем же способом: вставьте флешку с одним .hex (см. раздел «Коротко: пошагово»). После импорта стенд перейдёт в режим готовности."},{"type":"heading","text":"Смена одной прошивки на другую"},{"type":"para","text":"Менять прошивку можно сколько угодно раз и «на лету» — переустановка стенда и перезагрузка не нужны."},{"type":"list","ordered":false,"items":["Чтобы перейти на другую прошивку, просто вставьте флешку с НОВЫМ единственным .hex. После импорта активной становится только что загруженная прошивка, и следующие платы шьются уже ею.","Имя файла сохраняется, поэтому по имени и хешу на дисплее всегда видно, какая прошивка сейчас активна. Сверяйте их, чтобы не перепутать версии.","Хотите вернуться к прежней прошивке — снова вставьте флешку с тем файлом. Активной всегда становится последняя загруженная."]},{"type":"para","text":"Подключать стенд к компьютеру, вводить команды, подключать монитор и клавиатуру для смены прошивки НЕ нужно. Достаточно флешки. Поэтому обновить прошивку вы можете самостоятельно и быстро, в любой момент."},{"type":"heading","text":"Продвинутый / сервисный вариант (только до опечатывания)"},{"type":"para","text":"Есть второй путь дать прошивку — положить файл .hex прямо в папку прошивок стенда /opt/flashjig/firmware/. Имя файла при этом тоже сохраняется. Активной станет либо прошивка, на которую указывает символьная ссылка current, либо — если ссылки нет — самый новый по времени файл в этой папке (то есть обычно тот, который вы только что положили)."},{"type":"para","text":"Есть и третий, ещё более ранний способ: положить .hex рядом со скриптом установки ДО установки — тогда install.sh зальёт его сразу. Обычный путь — всё-таки флешка после установки."},{"type":"callout","variant":"warn","title":"Это НЕ основной способ","text":"Ручная подкладка файла в папку доступна только тогда, когда стенд ещё НЕ опечатан, то есть когда в систему ещё можно войти. После опечатывания (после lockdown) входа внутрь нет, и положить файл в эту папку вручную уже не получится — тогда работает только флешка. Поэтому по умолчанию так НЕ делают; этот вариант — для продвинутой настройки или сервиса на неопечатанном стенде; обычный и рекомендуемый путь для всех и всегда — ФЛЕШКА с одним .hex, уже после установки и опечатывания."},{"type":"heading","text":"Частые вопросы"},{"type":"list","ordered":false,"items":["В: Почему на экране только 16 символов, а не весь хеш? О: Маленький дисплей не вмещает все 64 символа. 16 символов — это удобная короткая «визитка» для быстрого взгляда. Полный хеш всегда доступен в файле /opt/flashjig/status и в журнале.","В: Хватает ли 16 символов для проверки? О: Для повседневного контроля «та ли прошивка стоит» — да. Для самой строгой сверки берите полный хеш (64 символа) из файла состояния хотя бы при первой установке новой прошивки.","В: Меняется ли хеш, если переименовать файл прошивки? О: Нет. Хеш считается по СОДЕРЖИМОМУ файла, а не по его имени. Имя на хеш не влияет.","В: Может ли у двух разных прошивок случайно совпасть хеш? О: На практике — нет. Пространство значений SHA-256 невообразимо велико (2 в степени 256), поэтому случайное совпадение исключено.","В: Нужен ли интернет, чтобы посчитать или проверить хеш? О: Нет. Хеш считается локально, прямо на стенде. Сети у стенда нет и не требуется.","В: Что важнее при несовпадении — остановиться или продолжить? О: Остановиться. Не прошивайте платы, пока хеш не совпал с эталоном: после прошивки включается защита RDP и достать прошивку из платы будет нельзя.","В: На флешке, кроме .hex, есть другие файлы. Это мешает? О: Нет. Стенд считает только файлы .hex. Их должно быть ровно один; остальные файлы он игнорирует.","В: Можно вставлять флешку, не выключая стенд? О: Да. Вставляйте на ходу. Импорт начнётся сам. Удобнее, когда плата в этот момент не прошивается.","В: Файл .hex лежит во вложенной папке. Найдёт ли стенд? О: Да. Файл может быть в любой папке на флешке — стенд его найдёт.","В: После импорта зелёный мигнул три раза, но я не успел прочитать дисплей. Прошивка загрузилась? О: Скорее всего да: три импульса зелёного — это знак принятой прошивки. Выньте флешку, посмотрите имя и хеш в режиме ожидания и при необходимости приложите пробную плату.","В: Я вставил флешку, а красный мигает. Прошивка испортилась? О: Нет. Красный сигнал означает, что на флешке не ровно один .hex (4 вспышки — ни одного, 5 вспышек — два и больше). Текущая прошивка осталась прежней. Поправьте состав флешки и вставьте снова.","В: Опасно ли вставлять чужую флешку? О: Стенд читает с флешки только файл .hex и монтирует её строго для чтения, без права что-либо запускать или менять. Подробности — в разделе про безопасность флешек. И всё же удобнее завести отдельную чистую флешку под прошивки.","В: Нужно ли перезагружать стенд или переустанавливать систему, чтобы сменить прошивку? О: Нет. Смена прошивки идёт «на лету». Переустановка SD-карты нужна совсем для другого — для изменения самой системы опечатанного стенда, а не для замены .hex.","В: «Платы идут со старой версией». Что делать? О: Проверьте имя и хеш на дисплее, при необходимости вставьте флешку с нужной версией ещё раз.","В: Какой формат прошивки? О: Формат — .hex. Иные форматы — на усмотрение того, кто готовит прошивку."]},{"type":"heading","text":"Памятка (коротко)"},{"type":"list","ordered":false,"items":["Хеш = SHA-256, 256 бит, стандарт NIST FIPS 180-4. Полностью — это 64 шестнадцатеричных символа.","Считается локально, без сети, по содержимому файла прошивки.","На дисплее — первые 16 символов. Полностью — в /opt/flashjig/status и в журнале.","Сверяйте хеш стенда с эталонным хешем выпуска: совпало — та сборка и она цела; не совпало — другая сборка или повреждённый файл.","При несовпадении платы НЕ прошивайте; перенесите прошивку заново или возьмите правильный выпуск.","Подделать файл так, чтобы хеш не изменился, практически невозможно — на этом и держится контроль целостности.","Прошивка — это один файл .hex; на флешке должен быть ровно один .hex; смена идёт «на лету», без перезагрузки."]}]'),Si={hashFacts:["Хеш прошивки — это «цифровой отпечаток» файла по алгоритму SHA-256 (стандарт NIST FIPS 180-4): 256 бит = 32 байта = 64 шестнадцатеричных символа.","Считается прямо на стенде, локально, по содержимому файла .hex — без интернета, сервера и любого обращения наружу. Стенд автономный и полностью офлайн.","На дисплее OLED (128x64) показаны только первые 16 символов хеша — короткая «визитка»; полный 64-символьный хеш хранится в файле /opt/flashjig/status и в журнале.","Первые 16 символов на дисплее обязаны совпадать с первыми 16 символами полного хеша из файла — это один и тот же хеш, показанный по-разному.","Зачем он нужен: сверка хеша стенда с эталонным хешем выпуска подтверждает, что загружена именно одобренная сборка и файл цел — ещё ДО прошивки плат.","Хеш должен быть СТАБИЛЬНЫМ: для одной и той же прошивки он всегда одинаков на любом компьютере и прошивальщике. Переименование файла хеш НЕ меняет (считается по содержимому, а не по имени).","Хеш ДОЛЖЕН измениться, когда меняется сама прошивка: любая подмена или даже один испорченный байт полностью «перемешивают» результат (эффект лавины) — изменённый хеш сразу виден при сверке.","Если хеш не совпал с эталоном — это сигнал: либо это ДРУГАЯ сборка (не та версия/файл), либо файл ПОВРЕЖДЁН (сбой копирования, обрыв, порча носителя). Такой прошивкой платы прошивать нельзя.","Подделать файл так, чтобы хеш остался прежним, практически невозможно: пространство значений 2^256 сопоставимо с числом атомов видимой Вселенной, а SHA-256 стоек к атакам на прообраз и коллизию.","Полную сверку (все 64 символа из /opt/flashjig/status) делайте хотя бы раз — при первой установке/приёмке выпуска; в повседневной работе хватает 16 символов на дисплее.","Команды: полный хеш — `cat /opt/flashjig/status`; история активных прошивок — `journalctl -u flash-jig -f`.","На опечатанном (lockdown) стенде входа в систему нет: фиксируйте полный хеш и сверяйте его с эталоном ЗАРАНЕЕ, до опечатывания; после — ориентир только первые 16 символов на дисплее."],updateSteps:[{title:"Подготовьте флешку",text:"Чистая или только что отформатированная USB-флешка (либо картридер с картой). Положите на неё РОВНО ОДИН файл .hex — в любой папке. Других .hex быть не должно; прочие файлы (не .hex) не мешают."},{title:"Вставьте флешку в стенд",text:"В любой свободный USB-разъём Raspberry Pi. Выключать стенд не нужно — вставляйте на ходу; удобнее, когда плата в этот момент не прошивается."},{title:"Дождитесь импорта",text:"Стенд сам прочитает и сохранит прошивку. Зелёный светодиод делает ТРИ коротких (плавных) импульса — прошивка принята. На дисплее ~2 секунды: галочка и «ПРОШИВКА», имя файла, хеш (16 символов), «готова к работе»."},{title:"Выньте флешку",text:"После импорта флешка больше не нужна — выньте её."},{title:"Сверьте по дисплею",text:"В режиме ожидания на дисплее видны имя прошивки и первые 16 символов хеша. Сверьте хеш с эталоном нового выпуска (точно — по /opt/flashjig/status)."},{title:"Прошивайте",text:"Следующая приложенная плата шьётся уже новой прошивкой. Доведите пробную плату до ровного зелёного «ГОТОВО» — значит, новая прошивка работает."},{title:"Смена/возврат версии — тем же путём",text:"Чтобы перейти на другую прошивку или вернуться к прежней, снова вставьте флешку с нужным единственным .hex. Активной всегда становится последняя загруженная. Перезагрузка и переустановка не нужны."}],rules:["На флешке должен лежать РОВНО ОДИН файл .hex. Нет .hex — красный мигает 4 раза; два и более .hex — красный мигает 5 раз; в обоих случаях текущая прошивка остаётся прежней.","Файл .hex может находиться в любой папке на флешке — стенд найдёт его сам.","Прочие файлы (не .hex) на флешке не мешают: учитывается только число именно .hex-файлов.","Формат прошивки — .hex. Иные форматы — на усмотрение того, кто готовит прошивку.","Берите чистую или только что отформатированную флешку — так лишних .hex точно не окажется и импорт пройдёт с первого раза; надёжнее держать отдельную чистую флешку только под прошивки.","Называйте файлы понятно (например, насос-v4.hex): имя сохраняется и показывается на дисплее, по нему видно, что залито.","Менять прошивку можно «на лету», сколько угодно раз: перезагрузка стенда и переустановка системы не нужны — новая версия подхватывается к следующей плате.","Флешка монтируется строго только для чтения и с жёсткими ограничениями (ro, noexec, nosuid, nodev, nosymfollow, noatime): с неё нельзя ничего запустить, записать или повысить права — поэтому даже чужая флешка не опасна.","Загруженные .hex остаются в папке /opt/flashjig/firmware/ (старые не удаляются). Активной считается та, на которую указывает ссылка current, либо самый новый по времени файл.","Сервисный способ (положить .hex в /opt/flashjig/firmware/ вручную или рядом со скриптом до установки через install.sh) доступен ТОЛЬКО до опечатывания (пока есть вход в систему). После lockdown работает только флешка — это штатный путь.","Перед прошивкой убедитесь, что хеш на стенде совпал с эталоном выпуска: пока не совпал — платы не прошивайте, ведь после прошивки включается RDP и достать прошивку из платы будет нельзя."]},rv={id:fi,title:hi,tagline:yi,sourceFiles:xi,summary:mi,blocks:gi,data:Si},iv=Object.freeze(Object.defineProperty({__proto__:null,blocks:gi,data:Si,default:rv,id:fi,sourceFiles:xi,summary:mi,tagline:yi,title:hi},Symbol.toStringTag,{value:"Module"})),_i="flow",bi="Как это работает",ki="Одно касание платы — полный цикл прошивки и блокировки RDP по четырём проводам, без участия человека.",Di=["документация/12-КАК-ЭТО-РАБОТАЕТ.txt","документация-2/14-КАК-ЭТО-РАБОТАЕТ.txt","документация/02-ЕЖЕДНЕВНАЯ-РАБОТА.txt","документация-2/05-КАК-ПРОШИВАТЬ.txt"],wi="Стенд — это полностью офлайн Raspberry Pi 4 (RaspiOS Trixie), единственная задача которого — прошивать платы STM32F103C8T6 и включать на каждой защиту от чтения RDP с обязательным подтверждением. Демон крутится в бесконечном цикле: ждёт плату, выполняет единый сеанс из связи, при необходимости снятия старой защиты, стирания, записи, проверки, включения RDP и обратного считывания, а затем пишет состояние в файл status, который читает программа дисплея. Всё происходит всего по четырём проводам SWD, без отдельного провода сброса и без выключения питания. Плата считается «ГОТОВО» только тогда, когда защита включена и подтверждена обратным считыванием.",Pi=JSON.parse(`[{"type":"para","text":"Этот раздел объясняет, как устроен автономный стенд прошивки STM32 и почему он работает именно так. Цель — чтобы вы ПОНИМАЛИ устройство: что происходит внутри, когда вы прикладываете плату, и почему достаточно четырёх проводов. Это не инструкция, которую нужно заучивать, — это объяснение «как и почему». Пользоваться стендом можно и без этих знаний, но с ними вам будет спокойнее: вы будете понимать каждый шаг и каждую надпись на дисплее."},{"type":"heading","text":"Что это за устройство — общая картина"},{"type":"para","text":"Внутри корпуса — одноплатный компьютер Raspberry Pi 4 с операционной системой RaspiOS Trixie. Это полностью автономный офлайн-стенд: у него НЕТ интернета и он в нём не нуждается. Его единственная задача — прошивать платы STM32F103C8T6 и включать на каждой защиту от чтения, которая называется RDP. Всё это происходит локально, без сети, без облака, без внешних серверов."},{"type":"para","text":"Вы взаимодействуете со стендом очень просто: смотрите на маленький OLED-дисплей, прикладываете плату к контактам — и забираете её, когда дисплей и светодиод скажут «готово». Внутри же в этот момент происходит целая последовательность точных шагов."},{"type":"list","ordered":false,"items":["Демон (постоянно работающая программа) крутится в бесконечном цикле и ждёт, когда вы приложите плату.","Когда плата появилась, демон выполняет прошивку — связь, при необходимости снятие старой защиты, стирание, запись, проверку, включение защиты и её подтверждение.","На каждом шаге демон записывает текущее состояние в особый файл — status.","Отдельная программа дисплея читает этот файл и рисует на экране то, что вы видите: имя прошивки, хеш, этап, проценты, итог.","Светодиоды самой Raspberry дублируют состояние «языком вспышек», чтобы вы понимали статус, даже не глядя на текст."]},{"type":"callout","variant":"info","title":"Самое главное в одной строке","text":"Приложите плату → подождите → снимите ТОЛЬКО тогда, когда зелёный горит РОВНО и на дисплее «ГОТОВО-СНИМИТЕ». Всё остальное — подробное объяснение этой одной строки."},{"type":"heading","text":"Полная последовательность прошивки одной платы — шаг за шагом"},{"type":"para","text":"Когда вы прикладываете одну плату, стенд выполняет один «тач» — единый непрерывный сценарий из нескольких шагов в одном сеансе связи. Вам ничего не нужно нажимать или переключать: достаточно держать плату в контакте. Вот что происходит внутри по порядку."},{"type":"steps","items":[{"title":"Шаг 1. Подключение (связь) и останов ядра","text":"Стенд устанавливает связь с микроконтроллером по интерфейсу отладки SWD и останавливает (halt) ядро. На дисплее этот этап называется «СВЯЗЬ». Здесь проверяется, что контакт есть и чип отвечает. Если контакта нет — дальше дело не идёт (см. раздел про ошибки и живучесть)."},{"title":"Шаг 2. Если плата уже защищена — снятие защиты (разблок)","text":"Стенд проверяет, не включена ли уже на плате защита от чтения (RDP). Если плата УЖЕ ЗАЩИЩЕНА, её нужно сначала разблокировать. Снятие RDP на STM32 возможно ТОЛЬКО через полное стирание чипа — это часть самой защиты, и устройство делает именно полное стирание. На дисплее этот этап называется «РАЗБЛОК». Если плата чистая (защиты нет), этот шаг просто не нужен и сценарий идёт дальше (на чистой плате этап «РАЗБЛОК» проходит мгновенно)."},{"title":"Шаг 3. Сброс","text":"После снятия защиты выполняется сброс микроконтроллера с остановом ядра (reset halt), чтобы изменения вступили в силу и чип перешёл в нужное состояние. Это программный системный сброс по SWD — без отдельного провода сброса и без выключения питания."},{"title":"Шаг 4. Стирание + запись + проверка (запись / проверка)","text":"Стенд стирает флеш-память, записывает в неё вашу прошивку и сразу сверяет записанное с файлом (program ... verify). На дисплее этим соответствуют этапы «ЗАПИСЬ» (стирает память и записывает прошивку) и «ПРОВЕРКА» (перечитывает и сверяет, что записалось верно). Имя файла прошивки при этом сохраняется и показывается на экране."},{"title":"Шаг 5. Включение защиты (защита)","text":"Стенд включает на плате защиту от чтения RDP. На дисплее этот этап называется «ЗАЩИТА». С этого момента прошивку из чипа уже нельзя будет считать через отладку."},{"title":"Шаг 6. Сброс","text":"Снова выполняется программный системный сброс по SWD с остановом ядра (reset halt), чтобы новые настройки защиты (option-байты) вступили в силу."},{"title":"Шаг 7. Обратное считывание RDP — подтверждение","text":"Это очень важный финальный шаг. Стенд считывает регистр опций обратно (options_read) и убеждается, что в выводе есть «read protection: on», то есть защита ДЕЙСТВИТЕЛЬНО ВКЛючена. Плата считается «ГОТОВО» ТОЛЬКО когда RDP подтверждена обратным считыванием. Если подтверждения нет — это засчитывается как сбой, а не как успех."},{"title":"Шаг 8. Запуск и завершение","text":"Стенд снимает плату с останова и даёт ядру стартовать (reset run), после чего корректно завершает сеанс OpenOCD (shutdown). Дисплей показывает «ГОТОВО-СНИМИТЕ», зелёный светодиод горит ровно."}]},{"type":"callout","variant":"warn","title":"Что вы видите на дисплее во время прошивки","text":"Этапы идут строго по порядку: СВЯЗЬ → РАЗБЛОК → ЗАПИСЬ → ПРОВЕРКА → ЗАЩИТА (этап РАЗБЛОК появляется только если плата была защищена). Рядом с названием этапа — проценты и полоса прогресса, а также крупная надпись «НЕ ОТКЛЮЧАЙТЕ #<N>», где <N> — номер платы в этой сессии. Проценты только растут и НИКОГДА не идут назад."},{"type":"callout","variant":"ok","title":"Когда прошло успешно","text":"Дисплей показывает галочку и строки «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ» и «#<N> ок сбой <M>». Зелёный светодиод при этом горит РОВНО. Правило простое: снимать плату можно только при РОВНОМ зелёном — он означает не просто «записал», а «записал, проверил, закрыл от чтения и убедился в этом»."},{"type":"heading","text":"Почему работает по 4 проводам — без NRST и без выключения питания"},{"type":"para","text":"Это, пожалуй, самое интересное в устройстве. Вся прошивка — и снятие старой защиты, и запись, и включение новой защиты — выполняется ВСЕГО ПО ЧЕТЫРЁМ ПРОВОДАМ:"},{"type":"table","columns":["Провод","Назначение"],"rows":[["SWDIO","Линия данных интерфейса отладки SWD"],["SWCLK","Линия тактирования SWD"],["GND","Общий («земля»)"],["3V3","Питание 3,3 В"]]},{"type":"para","text":"Обратите внимание, чего здесь НЕТ: нет отдельного провода аппаратного сброса (NRST) и нет необходимости выключать и снова включать питание платы."},{"type":"para","text":"Почему этого достаточно? Потому что сброс делается ПРОГРАММНО, прямо через тот же интерфейс отладки SWD. Это называется программный системный сброс — по сигналу SYSRESETREQ, который отправляется по SWD. Такой сброс перезагружает микроконтроллер целиком, и — что особенно важно для STM32F1 — он перезагружает option-байты. Именно перезагрузка option-байтов нужна, чтобы изменения защиты от чтения (RDP) вступили в силу: и при СНЯТИИ защиты, и при её ВКЛЮЧЕНИИ."},{"type":"para","text":"То есть стенду не нужно дёргать отдельную ножку сброса и не нужно обесточивать плату, чтобы «применить» новые настройки. Он просто говорит микроконтроллеру по SWD: «выполни системный сброс» — и тот перезагружается вместе с option-байтами. Это ровно тот же механизм, который использует штатная утилита ST-Link Utility от ST: подход проверенный и стандартный для STM32F1. Благодаря этому проводка максимально простая, а прикладывать плату удобно: ничего не надо переключать руками."},{"type":"heading","text":"Почему работает и с чистыми, и с уже защищёнными платами"},{"type":"para","text":"Стенд одинаково уверенно прошивает как ЧИСТЫЕ платы (на которых защиты ещё нет), так и УЖЕ ЗАЩИЩЁННЫЕ (на которых RDP была включена ранее). И в обоих случаях — всё по тем же четырём проводам. Секрет в том, что сценарий сам подстраивается под состояние платы:"},{"type":"list","ordered":false,"items":["Если плата ЧИСТАЯ — этап разблокировки просто не нужен, и стенд сразу переходит к стиранию и записи.","Если плата УЖЕ ЗАЩИЩЕНА — стенд сначала снимает защиту. Снять RDP можно только полным стиранием чипа (это свойство самой защиты), после чего выполняется программный системный сброс по SWD, чтобы перезагрузить option-байты, и только потом идёт обычная запись."]},{"type":"para","text":"Поскольку сброс программный (SYSRESETREQ по SWD) и применяет option-байты без выключения питания и без NRST, снятие старой защиты получается «бесшовным» — той же простой проводкой, без перемычек, кнопок или ручных манипуляций. Поэтому вам не нужно заранее знать, в каком состоянии плата: приложите любую — стенд разберётся сам. Уже защищённые платы прошиваются немного дольше (нужно снять старую защиту), но тоже в одно касание."},{"type":"heading","text":"Что такое RDP и почему она важна"},{"type":"para","text":"RDP — это защита от чтения (Read-Out Protection) у микроконтроллеров STM32. Её смысл: закрыть возможность считать прошивку из чипа через интерфейс отладки. Это защищает вашу прошивку от копирования."},{"type":"list","ordered":false,"items":["Уровень 1 делает флеш-память НЕЧИТАЕМОЙ через отладку. То есть через отладочный интерфейс прочитать содержимое флеша уже нельзя.","Снять защиту можно ТОЛЬКО полным стиранием чипа. А полное стирание уничтожает содержимое флеша. Значит, даже если кто-то захочет снять защиту, чтобы добраться до прошивки, — в момент снятия прошивка стирается. Извлечь её таким образом невозможно."]},{"type":"para","text":"Именно поэтому RDP — надёжная мера: она не «прячет» прошивку, которую потом можно достать обходным путём, а делает так, что любая попытка снять защиту уничтожает то, что защищается. Это и есть причина, почему устройство включает RDP на КАЖДОЙ плате."},{"type":"callout","variant":"danger","title":"Защита обязательно подтверждается","text":"Чтобы защита была не «на словах», стенд её ПОДТВЕРЖДАЕТ: после включения RDP он считывает регистр опций обратно и проверяет, что защита действительно активна. Плата засчитывается успешной ТОЛЬКО при подтверждённой активной защите. Если подтверждения нет — это сбой. Так гарантируется, что ни одна плата не уедет со стенда без реально работающей защиты от чтения."},{"type":"heading","text":"Два транспорта и автовыбор — USB или GPIO"},{"type":"para","text":"«Транспорт» — это способ, которым стенд физически разговаривает с микроконтроллером по SWD. Их два, и стенд выбирает нужный АВТОМАТИЧЕСКИ. Какой выбран — видно в правом верхнем углу дисплея: там написано либо USB, либо GPIO."},{"type":"list","ordered":false,"items":["USB — если к Raspberry подключён программатор ST-Link по USB, стенд использует именно его. В правом верхнем углу дисплея — метка «USB». Сигналы SWD идут через USB-донгл ST-Link. При этом выводы SWD на разъёме GPIO не задействуются (дисплей подключается так же, как обычно).","GPIO — если ST-Link не подключён, стенд прошивает плату напрямую через выводы GPIO самой Raspberry. Это режим «битбанг SWD»: линии SWD формируются прямо на ножках разъёма. В правом верхнем углу дисплея — метка «GPIO»."]},{"type":"para","text":"Логика выбора простая и предсказуемая: есть ST-Link по USB — работаем через него (USB); нет — работаем напрямую через ножки (GPIO). Вам не нужно ничего настраивать или переключать — достаточно посмотреть на метку в углу дисплея. Если метка вдруг изменилась — это нормально, устройство переключается само."},{"type":"para","text":"Под каждый транспорт у стенда есть свой файл настройки: jig-stlink.cfg — для работы через ST-Link (USB); jig-gpio.cfg — для прямой работы через ножки GPIO."},{"type":"heading","text":"Статический OpenOCD — почему он самодостаточен"},{"type":"para","text":"Всю «низкоуровневую» работу с микроконтроллером — связь по SWD, стирание, запись, проверку, операции с option-байтами — выполняет программа OpenOCD. На этом стенде она развёрнута в ПОЛНОСТЬЮ СТАТИЧЕСКОМ виде."},{"type":"list","ordered":false,"items":["Статический бинарник содержит внутри себя всё необходимое и не зависит от системных библиотек и пакетов. Его не нужно ставить через менеджер пакетов (apt), и у него нет внешних зависимостей.","Поэтому стенду не нужен интернет и не нужны установки/обновления пакетов, чтобы OpenOCD работал. Это идеально подходит для офлайн-устройства: меньше движущихся частей — меньше того, что может «отвалиться».","Такой OpenOCD устойчив: он не сломается из-за того, что в системе обновилась или пропала какая-то библиотека. Он просто работает."]},{"type":"para","text":"Файлы OpenOCD лежат на устройстве в папке openocd/ внутри /opt/flashjig: это сам статический бинарник плюс его скрипты. Развёртывает этот статический OpenOCD установочный скрипт install.sh — без apt и без зависимостей."},{"type":"heading","text":"Как демон работает в цикле и пишет состояние"},{"type":"para","text":"Сердце стенда — демон. Это программа flash-jig.sh, которая запускается автоматически и работает постоянно. Она устроена как бесконечный цикл. Что демон делает по кругу:"},{"type":"list","ordered":false,"items":["Определяет режим подключения: есть ST-Link в USB → USB, иначе → GPIO.","Берёт активную прошивку из папки firmware (по ссылке current или самый новый файл) и считает её хеш.","ЖДЁТ плату — быстро проверяет коротким подключением, есть ли плата на контактах. Пока платы нет, дисплей показывает «ГОТОВ К РАБОТЕ», «приложите плату», а зелёный светодиод бьётся сердцебиением (heartbeat: двойная вспышка, затем пауза; ритм ускоряется при росте загрузки).","КАК ТОЛЬКО ПЛАТА ПОЯВИЛАСЬ — запускает полную прошивку: связь, при необходимости разблок, сброс, стирание+запись, проверка, защита, сброс, подтверждение RDP.","НА КАЖДОМ ШАГЕ ПИШЕТ СОСТОЯНИЕ — этап, проценты, имя прошивки, хеш, счётчики «ок» и «сбой» — в файл status, который читает дисплей.","Параллельно следит за USB-флешками для приёма новой прошивки.","ПОСЛЕ ЗАВЕРШЕНИЯ возвращается к ожиданию следующей платы. Если всё хорошо — состояние «ГОТОВО», зелёный горит ровно; после снятия платы демон снова готов к следующей."]},{"type":"para","text":"Важно, что демон работает в цикле и не требует вашего участия между платами: приложили — прошилось — сняли — приложили следующую. Связанные файлы, которые ведёт демон: status — текущее состояние (для дисплея); flash.log — журнал событий (там же полный хеш и история); flash.live — данные о текущей «живой» операции."},{"type":"code","lang":"bash","text":"# следить за журналом демона в реальном времени\\njournalctl -u flash-jig -f\\n\\n# посмотреть текущее состояние\\ncat /opt/flashjig/status"},{"type":"heading","text":"Файл status — мост между демоном и дисплеем"},{"type":"para","text":"Дисплей и демон — это две разные программы. Чтобы они согласованно работали, между ними есть простой и надёжный «мост»: файл status по пути /opt/flashjig/status. Демон (flash-jig.sh) ПИШЕТ в status имя прошивки, её хеш, текущий этап и проценты, а также счётчики «ок» и «сбой» (запись атомарная — через временный файл и переименование). Программа дисплея (oled.py) ЧИТАЕТ status и рисует заголовок, метку транспорта, имя прошивки, строку хеша, этап с прогрессом или итог."},{"type":"para","text":"Такое разделение удобно: одна программа занимается железом и логикой прошивки, другая — отрисовкой. Этап и проценты во время записи берутся из «живого» вывода прошивальщика (flash.live). Если посмотреть содержимое status командой «cat /opt/flashjig/status», вы увидите примерно ту же информацию, что и на дисплее, — включая полный хеш прошивки (на экране показаны только первые 16 шестнадцатеричных знаков, а полный хеш есть в status и в журнале)."},{"type":"para","text":"Что показывает дисплей в разных состояниях (надписи приведены дословно):"},{"type":"table","columns":["Состояние","Что на дисплее (дословно)"],"rows":[["НЕТ ПРОШИВКИ","«НЕТ ПРОШИВКИ», «вставьте флешку», «USB с одним .hex», «или в firmware/»"],["ГОТОВ","имя прошивки, строка хеша, «ГОТОВ К РАБОТЕ», «приложите плату», «ок <N> сбой <M>»"],["ПРОШИВКА ИДЁТ","имя, хеш, текущий этап (СВЯЗЬ / РАЗБЛОК / ЗАПИСЬ / ПРОВЕРКА / ЗАЩИТА) + проценты + полоса прогресса, «НЕ ОТКЛЮЧАЙТЕ #<N>»"],["ГОТОВО","галочка + «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ», «#<N> ок сбой <M>»"],["ОШИБКА","крестик + «ОШИБКА код <K>», строка причины (код 2 → «нет контакта SWD»; код 3 → «запись/пров/RDP»), «снимите плату»"],["ПРИНЯТО","«ПРОШИВКА ПРИНЯТА» — после импорта прошивки с флешки"]]},{"type":"para","text":"Заголовок на дисплее — «OTAБEK STM32». В правом верхнем углу — метка транспорта (USB или GPIO)."},{"type":"heading","text":"Службы systemd и файлы в /opt/flashjig"},{"type":"para","text":"Чтобы стенд работал сам по себе — включился и сразу готов, без входа в систему и без вашего вмешательства, — всё запускается через службы systemd (штатный механизм запуска программ в системе). Две главные службы:"},{"type":"list","ordered":false,"items":["flash-jig.service — запускает демон прошивки (flash-jig.sh).","flashjig-oled.service — запускает программу дисплея (oled.py)."]},{"type":"para","text":"Эти службы включаются установочным скриптом install.sh и стартуют автоматически при загрузке. Кроме того, install.sh настраивает правила udev: при подключении ST-Link стенд переходит в готовность, а при подключении флешки — запускается импорт прошивки. Также install.sh включает I2C (для дисплея) и создаёт папку с прошивками. Всё, что нужно стенду, лежит в одной папке — /opt/flashjig:"},{"type":"table","columns":["Файл / папка","Назначение"],"rows":[["openocd/","Статический бинарник OpenOCD и его скрипты."],["flash-jig.sh","Демон, который ждёт плату и выполняет прошивку."],["oled.py","Программа дисплея."],["leds.sh","Управление светодиодами Raspberry."],["jig-stlink.cfg","Настройка для транспорта через ST-Link (USB)."],["jig-gpio.cfg","Настройка для прямой работы через ножки GPIO."],["firmware/","Папка с прошивками (файлы .hex) и симлинком 'current' на активную прошивку."],["status","Текущее состояние (имя, хеш, счётчики) для дисплея."],["flash.log","Журнал событий (с полным хешем и историей)."],["flash.live","Данные о текущей «живой» операции."]]},{"type":"para","text":"Про прошивки и их обновление: прошивки хранятся в /opt/flashjig/firmware/, имя файла сохраняется как есть. Активной считается та, на которую указывает симлинк 'current'; если симлинка нет — берётся самый новый файл в папке. Обновлять прошивку можно «на лету» — через флешку или копированием файла, — без переустановки и без перезапуска служб."},{"type":"heading","text":"Приём прошивки с USB"},{"type":"para","text":"При подключении USB-носителя срабатывает правило системы (udev), которое монтирует его «только для чтения» с жёсткими ограничениями и ищет ровно один файл .hex. Найден один — копируется в папку firmware и становится активным. Ноль или несколько — отклоняется (с сигналом на светодиодах). После успешного приёма дисплей на пару секунд показывает галочку и слово «ПРОШИВКА», ниже имя файла и хеш, и «готова к работе», а зелёный даёт ТРИ коротких импульса."},{"type":"heading","text":"Хеш прошивки — как подтвердить, что залита нужная сборка"},{"type":"para","text":"Чтобы вы могли быть уверены, что в платы заливается именно та прошивка, которую вы одобрили, а не подменённая или повреждённая, у каждой прошивки есть её «отпечаток» — хеш."},{"type":"list","ordered":false,"items":["Каждая прошивка определяется своей контрольной суммой SHA-256. Это стандартная криптографическая хеш-функция (256 бит, стандарт NIST FIPS 180-4).","Хеш вычисляется ЛОКАЛЬНО на самом устройстве по содержимому файла прошивки. Никакой сети для этого не нужно.","На дисплее показаны первые 16 шестнадцатеричных знаков этого хеша (для краткости). Полный хеш записан в /opt/flashjig/status и в журнал."]},{"type":"para","text":"Как этим пользоваться: сравните хеш, который показывает стенд, с эталонным хешем вашего выпуска прошивки. Если они совпадают — значит, загружена именно одобренная сборка. Любая подмена файла или его повреждение неизбежно дадут ДРУГОЙ хеш, поэтому несовпадение хеша — это сигнал, что что-то не так с файлом, и такую прошивку использовать не следует."},{"type":"heading","text":"Живучесть — почему сломанная плата не «вешает» стенд"},{"type":"para","text":"Стенд спроектирован так, чтобы продолжать работать в неидеальных условиях: плохой контакт, бракованная плата, плата, выдернутая в середине процесса. Ничто из этого не должно «подвесить» устройство."},{"type":"list","ordered":false,"items":["Каждый вызов OpenOCD ОГРАНИЧЕН ПО ВРЕМЕНИ. Если операция не укладывается во время (чип не отвечает или плату выдернули), вызов завершается, а не зависает навсегда. Поэтому сломанная или выдернутая плата не «вешает» стенд.","Дребезжащий или плохой контакт АВТОМАТИЧЕСКИ ПОВТОРЯЕТСЯ. Если связь нестабильна, стенд сам пробует ещё раз, не требуя вашего участия.","Плата, выдернутая В ПРОЦЕССЕ, НЕ считается браком. Это не ошибка записи — это просто прерывание. Достаточно приложить ту же плату снова, и она перепрошьётся с начала. На светодиодах прерывание показано как строб зелёного и красного, после чего стенд автоматически возвращается в готовность."]},{"type":"para","text":"Благодаря этому стенд устойчив к мелким бытовым неприятностям и не требует «спасательных» действий: в большинстве случаев он сам восстанавливается и снова готов к работе. Запомните: пока вы не увидели ровный зелёный, плата НЕ готова, даже если «вроде всё мигало правильно»."},{"type":"heading","text":"Язык светодиодов и коды ошибок"},{"type":"para","text":"Что
