"Дисплей и прошивка — это разные группы проводов, они не пересекаются:"},{"type":"list","ordered":false,"items":["Дисплей (I2C): контакты 1, 6, 3, 5. Эти провода подключают один раз при сборке стенда, и они остаются на месте всё время.","Прошивка по GPIO (SWD): контакты 22, 23, 17, 14. Эти провода идут к плате STM32, которую вы прошиваете."]},{"type":"callout","variant":"info","title":"Дисплей и прошивка не пересекаются","text":"Не подключайте сигналы прошивки к контактам дисплея и наоборот. Дисплей живёт на своих четырёх контактах, прошивка — на своих четырёх. Контакты дисплея (1, 3, 5, 6) и контакты платы по GPIO (14, 17, 22, 23) не пересекаются — можно подключить и то, и другое одновременно."},{"type":"heading","text":"Часть 6. Почему провода нужно держать короткими"},{"type":"para","text":"Провода прошивки (особенно SWDIO и SWCLK) нужно делать как можно короче. Это не прихоть — на то есть причины:"},{"type":"list","ordered":false,"items":["СИГНАЛЫ SWD — БЫСТРЫЕ. По линиям SWDIO и SWCLK идут быстрые цифровые сигналы (данные и такт). Чем длиннее провод, тем сильнее сигнал искажается и тем больше он ловит наводки от окружения. На длинных проводах связь становится неустойчивой: появляются срывы, ошибки «нет контакта SWD».","ПИТАНИЕ ПРОСЕДАЕТ НА ДЛИННЫХ ПРОВОДАХ. Питание 3.3 В тоже идёт по проводу. Чем он длиннее и тоньше, тем больше теряется напряжение, пока ток дойдёт до платы. Короткий провод питания держит напряжение стабильным.","МЕНЬШЕ ПРОВОД — МЕНЬШЕ ПОМЕХ. Длинные провода работают как антенны: и сами «фонят», и ловят чужие помехи. Короткие провода и аккуратная укладка резко снижают эти проблемы."]},{"type":"para","text":"Практические советы:"},{"type":"list","ordered":false,"items":["Держите провода прошивки короткими — буквально настолько, насколько хватает, чтобы дотянуться до платы.","Старайтесь, чтобы провод такта (SWCLK) и провод данных (SWDIO) шли рядом со своей землёй (GND) — это уменьшает наводки.","Не сворачивайте лишнюю длину в большие петли. Если провод длинноват, лучше укоротить, чем сматывать в кольцо.","Если связь нестабильна именно при длинных проводах — укоротите их в первую очередь, это самое частое лекарство."]},{"type":"heading","text":"Часть 7. Полная сводка подключений (для быстрой сверки)"},{"type":"para","text":"Дисплей (I2C) — подключается всегда:"},{"type":"table","columns":["Вывод","Контакт","Назначение"],"rows":[["VDD","контакт 1","питание 3.3 В, 3V3"],["GND","контакт 6","земля"],["SDA","контакт 3","данные I2C, GPIO2"],["SCK / SCL","контакт 5","такт I2C, GPIO3"]]},{"type":"para","text":"Прошивка по GPIO (4 провода SWD) — когда прошиваете прямо с Raspberry:"},{"type":"table","columns":["Сигнал","Контакт","Назначение"],"rows":[["SWDIO","контакт 22","данные SWD, GPIO25"],["SWCLK","контакт 23","такт SWD, GPIO11"],["3V3","контакт 17","питание 3.3 В для платы"],["GND","контакт 14","земля"]]},{"type":"para","text":"Прошивка через ST-Link (по USB) — вместо проводов на GPIO: те же 4 сигнала SWD (SWDIO, SWCLK, 3V3, GND) идут через USB-донгл; выводы SWD на GPIO (контакты 22 и 23) тогда НЕ используются; дисплей подключается так же, как обычно (контакты 1, 6, 3, 5)."},{"type":"para","text":"Режим — смотрите правый верхний угол дисплея: «USB» — работает через ST-Link (подключён по USB); «GPIO» — прямая прошивка с ножек Raspberry."},{"type":"callout","variant":"info","title":"Главная картинка","text":"Самый наглядный источник — картинка с разводкой wiring.png (лежит рядом с папками документации). Сверяйтесь с ней при подключении."}]'),lo={connections:[{signal:"VDD (питание 3.3 В)",fromDevice:"OLED-дисплей (SSD1306)",fromPin:"VDD",toDevice:"Raspberry Pi 4",toPin:"контакт 1 (3V3)",note:"Шина I2C. Только 3.3 В, не 5 В."},{signal:"GND (земля)",fromDevice:"OLED-дисплей (SSD1306)",fromPin:"GND",toDevice:"Raspberry Pi 4",toPin:"контакт 6 (GND)",note:"Общая земля."},{signal:"SDA (данные I2C)",fromDevice:"OLED-дисплей (SSD1306)",fromPin:"SDA",toDevice:"Raspberry Pi 4",toPin:"контакт 3 (GPIO2 / SDA)",note:"Аппаратная шина I2C1."},{signal:"SCK / SCL (такт I2C)",fromDevice:"OLED-дисплей (SSD1306)",fromPin:"SCK (он же SCL)",toDevice:"Raspberry Pi 4",toPin:"контакт 5 (GPIO3 / SCL)",note:"Аппаратная шина I2C1. На модуле подпись SCK или SCL."},{signal:"SWDIO (данные SWD)",fromDevice:"Raspberry Pi 4",fromPin:"контакт 22 (GPIO25)",toDevice:"Плата STM32 (STM32F103C8T6)",toPin:"SWDIO (DIO)",note:"Битбанг SWD прямо с GPIO. В jig-gpio.cfg: adapter gpio swdio -chip 0 25."},{signal:"SWCLK (такт SWD)",fromDevice:"Raspberry Pi 4",fromPin:"контакт 23 (GPIO11)",toDevice:"Плата STM32 (STM32F103C8T6)",toPin:"SWCLK (CLK)",note:"Битбанг SWD прямо с GPIO. В jig-gpio.cfg: adapter gpio swclk -chip 0 11."},{signal:"3V3 (питание платы)",fromDevice:"Raspberry Pi 4",fromPin:"контакт 17 (3V3)",toDevice:"Плата STM32 (STM32F103C8T6)",toPin:"3.3V",note:"Питает плату STM32 во время прошивки. (jig-gpio.cfg также допускает контакт 1 как альтернативу 3V3, но для платы используется контакт 17.)"},{signal:"GND (общая земля)",fromDevice:"Raspberry Pi 4",fromPin:"контакт 14 (GND)",toDevice:"Плата STM32 (STM32F103C8T6)",toPin:"GND",note:"Общая земля. (Любой GND-контакт подходит: 6/9/14/20/25/30/34/39; для платы используется контакт 14.)"}],modes:[{name:"GPIO (битбанг SWD напрямую)",desc:"Raspberry Pi прошивает плату STM32 своими ножками GPIO без внешнего программатора (драйвер OpenOCD bcm2835gpio). Четыре провода SWD идут на гребёнку: SWDIO — контакт 22 (GPIO25), SWCLK — контакт 23 (GPIO11), 3V3 — контакт 17, GND — контакт 14. Этот режим активен, когда ST-Link не подключён; в правом верхнем углу дисплея горит метка «GPIO». Сброс — программный SYSRESETREQ по SWD, провод NRST не нужен."},{name:"USB (через адаптер ST-Link v2)",desc:"Программатор ST-Link v2 вставляется в USB Raspberry Pi (драйвер OpenOCD hla / hla_swd, VID:PID 0483:3748 для донгла V2 или 0483:374b для V2-1). От ST-Link к плате STM32 идут те же четыре сигнала SWD — SWDIO, SWCLK, 3V3, GND. Выводы SWD на GPIO (контакты 22 и 23) при этом не используются. Стенд
