ует учётные записи, отключает SysRq/Ctrl-Alt-Del, маскирует VNC/Cockpit/telnet и навсегда выключает сеть. ВНИМАНИЕ: сразу после успешного lockdown вход закрывается навсегда — изменить что-либо можно только переустановкой SD-карты.",command:"sudo ./install.sh && sudo ./lockdown.sh --commit"},{title:"Сухой прогон lockdown (необязательно, но полезно)",text:"Если хотите сначала просто посмотреть, что сделает опечатывание, запустите lockdown.sh БЕЗ --commit — это сухой прогон, он только объясняет и ничего не меняет. Реально опечатывает лишь вариант с --commit; перед запуском он сам проверяет, что служба flash-jig включена.",command:"sudo ./lockdown.sh"},{title:"Перезагрузите",text:"Перезагрузка применяет все настройки, включая дисплей по I2C. После загрузки на дисплее появляется «шапка» с надписью «OTAБEK STM32» и меткой транспорта (USB или GPIO), а по центру — «НЕТ ПРОШИВКИ». Светодиоды: зелёный и красный медленно мигают по очереди (примерно раз в 0.6 секунды). Если дисплей не появился — перезагрузите ещё раз, обязательно ДО опечатывания.",command:"sudo reboot"},{title:"Загрузите прошивку флешкой (один .hex)",text:"Запишите на чистую USB-флешку РОВНО ОДИН файл .hex (в любой папке) и вставьте её. Стенд сам импортирует прошивку, имя файла сохраняется; примерно на 2 секунды появляется экран импорта с галочкой и хешем. Светодиод: зелёный делает три импульса. Флешка монтируется только для чтения (ro, noexec, nosuid, nodev, nosymfollow, noatime). Ошибки флешки: красный 4 вспышки — нет .hex; 5 вспышек — два и более .hex."},{title:"Проверьте пробной платой",text:"Приложите пробную плату STM32 по четырём проводам (SWDIO, SWCLK, GND, 3V3). Прошивка запускается сама одним «тачем», без кнопки — и для чистой, и для уже защищённой платы. Этапы на дисплее: СТАРТ -> СВЯЗЬ -> РАЗБЛОК -> ЗАПИСЬ -> ПРОВЕРКА -> ЗАЩИТА; зелёный часто мигает — плату НЕ снимайте. Успех: ровный зелёный и «ГОТОВО», «RDP защита ВКЛ» — прошивка записана, проверена и защита подтверждена обратным считыванием, плату можно снимать. Ошибка: код 2 — нет контакта SWD (красный 2 вспышки); код 3 — запись/проверка/RDP не прошли (красный 3 вспышки)."}],notes:["Главное правило: снимайте плату только при РОВНОМ зелёном (когда на дисплее «ГОТОВО»). Пока зелёный мигает — идёт прошивка, плату не трогайте.","Связка «&&» означает, что lockdown.sh --commit запустится только при успешном install.sh. Сразу после успешного lockdown вход в систему (SSH, консоль, последовательный порт, графика, аварийные оболочки) закрывается НАВСЕГДА. Любое изменение после этого возможно только переустановкой SD-карты.","Перед опечатыванием lockdown сам проверяет, что служба прошивки flash-jig включена, и не запустится (ABORT), если она не включена — сначала запустите install.sh и убедитесь, что стенд работает.","Чтобы заранее посмотреть, что сделает опечатывание, запустите lockdown.sh без --commit — это безопасный сухой прогон, он ничего не меняет.","После install.sh нужна одна перезагрузка (sudo reboot), чтобы заработал дисплей по шине I2C. Если дисплей не появился — перезагрузите ещё раз, обязательно ДО опечатывания, так как после lockdown консоль недоступна.","На флешке должен быть РОВНО ОДИН файл .hex (в любой папке). Других .hex быть не должно: при отсутствии .hex красный мигает 4 раза, при двух и более — 5 раз (около 8 секунд), а текущая прошивка остаётся прежней.","Флешка подключается только для чтения с жёсткими ограничениями (ro, noexec, nosuid, nodev, nosymfollow, noatime) — с неё нельзя ничего запустить или повысить права, читается лишь сам .hex.","Хеш — это первые 16 символов SHA-256 по файлу прошивки; он одинаков для одной и той же прошивки на любом компьютере. Полный хеш лежит в /opt/flashjig/status и в журнале.","Если плату случайно выдернули во время прошивки — это не брак: светодиоды коротко «стробят» зелёным и красным вместе, затем возвращается сердцебиение зелёного. Просто приложите плату снова — стенд сразу прошьёт её заново.","Команды диагностики (journalctl -u flash-jig -f, cat /opt/flashjig/status, файл /opt/flashjig/flash.log) работают только пока прибор НЕ опечатан — после lockdown вход закрыт.","Продвинутый необязательный вариант: можно положить .hex рядом с install.sh ДО установки — тогда прошивка зальётся сразу при разворачивании и флешка не понадобится. По умолчанию так не делают; обычный путь — прошивка флешкой по шагам.","Метку транспорта (USB для ST-Link по USB или GPIO для прямого подключения по выводам) прибор определяет сам и показывает в правом углу «шапки» дисплея.","Обновлять прошивку можно в любой момент, на лету, той же флешкой, без переустановки стенда."]},_v={id:xn,title:mn,tagline:gn,sourceFiles:Sn,summary:_n,blocks:bn,data:kn},bv=Object.freeze(Object.defineProperty({__proto__:null,blocks:bn,data:kn,default:_v,id:xn,sourceFiles:Sn,summary:_n,tagline:gn,title:mn},Symbol.toStringTag,{value:"Module"})),Dn="rdp",wn="Защита чтения (RDP)",Pn="Прошивку нельзя слить: стенд включает и подтверждает защиту от чтения на каждой плате.",On=["документация/09-ЗАЩИТА-RDP.txt","документация-2/09-ЗАЩИТА-ЧТЕНИЯ-RDP.txt"],Rn="RDP (Read-Out Protection) — встроенная в микроконтроллер STM32 защита, которая закрывает чтение прошивки через отладочный интерфейс SWD. Стенд включает её на КАЖДОЙ плате автоматически, в самом конце прошивки, и тут же проверяет обратным считыванием регистра опций. Плата получает статус «ГОТОВО» только тогда, когда защита подтверждена как включённая. Благодаря этому готовую плату нельзя «слить»: прошивку из неё не вытащить, не скопировать и не украсть.",Tn=JSON.parse('[{"type":"callout","variant":"info","title":"Коротко: главное в одном абзаце","text":"RDP (Read-Out Protection, защита от считывания) — это встроенная в микроконтроллер STM32 защита, которая закрывает чтение прошивки через интерфейс отладки. Стенд включает её на каждой плате автоматически, в самом конце прошивки, и тут же ПРОВЕРЯЕТ обратным считыванием регистра опций. Плата считается успешной («ГОТОВО») ТОЛЬКО тогда, когда защита подтверждена как включённая. Благодаря этому готовую плату нельзя «слить» — прошивку из неё не вытащить, её нельзя скопировать или украсть."},{"type":"heading","text":"Что такое RDP и зачем она нужна"},{"type":"para","text":"Внутри микроконтроллера STM32F103C8T6 есть встроенная флеш-память — именно туда записывается прошивка. У этой памяти есть важная особенность: к ней можно подключиться снаружи через отладочный интерфейс SWD (те самые выводы SWDIO и SWCLK) и считать её содержимое. Это удобно при разработке, но опасно для готового изделия: любой, у кого есть отладчик и доступ к плате, мог бы прочитать вашу прошивку байт за байтом и сделать её точную копию."},{"type":"para","text":"RDP — это механизм самого чипа, который закрывает такую возможность. Когда защита включена, отладчик больше не может прочитать флеш-память. Прошивка остаётся внутри и продолжает работать, но «выйти наружу» она уже не может."},{"type":"para","text":"Зачем включать её на КАЖДОЙ плате, а не выборочно:"},{"type":"list","ordered":false,"items":["Прошивка — это результат труда и интеллектуальная собственность. Если хотя бы одна плата уйдёт без защиты, с неё можно снять копию прошивки и потом заливать её в любое количество чужих плат.","Защита имеет смысл, только если она стоит на ВСЕХ изделиях. Одна незащищённая плата сводит на нет защиту всех остальных.","Поэтому стенд не оставляет это на ваше усмотрение: он включает RDP сам, в каждом цикле прошивки, и не засчитывает плату, пока защита не подтверждена. Забыть включить защиту физически невозможно."]},{"type":"heading","text":"Как RDP устроена: Уровень 1 и принцип «снять = стереть»"},{"type":"para","text":"Стенд использует RDP Уровня 1 (Level 1). Разберём по шагам, что это значит и почему этого достаточно для надёжной защиты."},{"type":"para","text":"ЧТО ДЕЛАЕТ УРОВЕНЬ 1: флеш-память становится НЕЧИТАЕМОЙ через отладочный интерфейс. Подключившись отладчиком (по USB через ST-Link или напрямую по выводам GPIO), считать содержимое флеша уже нельзя — чип не отдаёт эти данные наружу."},{"type":"para","text":"САМОЕ ВАЖНОЕ — КАК СНИМАЕТСЯ ЗАЩИТА:"},{"type":"list","ordered":false,"items":["Снять защиту Уровня 1 можно. НО единственный способ это сделать — полное стирание (mass erase) всей флеш-памяти чипа.","То есть в тот самый момент, когда защита снимается, вся прошивка стирается подчистую. Чип после снятия защиты оказывается пустым."]},{"type":"callout","variant":"ok","title":"Почему это и есть надёжная защита","text":"Получается ловушка для того, кто хотел бы украсть прошивку: пока защита включена — прошивку прочитать нельзя; чтобы получить доступ — нужно снять защиту; но снятие защиты автоматически стирает прошивку. Иными словами, прошивку и защиту нельзя разделить. Либо защита стоит и прошивка внутри, но недоступна снаружи; либо защиту сняли, но прошивки больше нет — стёрли вместе с защитой. Извлечь прошивку в читаемом виде невозможно ни при каком из этих исходов."},{"type":"para","text":"Именно поэтому Уровень 1 защищает прошивку от кражи: украсть можно только то, что можно прочитать, а прочитать защищённый флеш нельзя, и любая попытка «открыть» его уничтожает содержимое."},{"type":"heading","text":"Где хранится состояние защиты: регистр опций (option-байты)"},{"type":"para","text":"Включена защита или нет — записано не в обычной флеш-памяти, а в особой служебной области чипа, которая называется регистром опций (option-байты). Это маленькая отдельная зона настроек самого микроконтроллера."},{"type":"para","text":"Что важно про эту область:"},{"type":"list","ordered":false,"items":["Именно по значению в регистре опций чип понимает, разрешать чтение флеша снаружи или запрещать. Меняя это значение, мы включаем или выключаем RDP.","Эту область можно прочитать обратно через отладку и убедиться, в каком она состоянии. На этом и построена проверка защиты (см. раздел про обратное считывание ниже).","На STM32F1 для того, чтобы новое значение опций реально вступило в силу, чипу нужна перезагрузка option-байтов. Стенд делает это программным системным сбросом по SWD (команда SYSRESETREQ) — тем же способом, что и фирменная утилита ST-Link Utility. Поэтому НЕ нужен ни отдельный провод сброса NRST, ни выключение питания платы — достаточно четырёх проводов."]},{"type":"heading","text":"Как стенд гарантированно включает и проверяет защиту"},{"type":"para","text":"Включение RDP — это не отдельное действие, которое можно пропустить. Оно встроено в единый цикл прошивки, который стенд выполняет за один «тач» (одно прикладывание платы). Вот этот цикл целиком, по шагам:"},{"type":"steps","items":[{"title":"Подключение","text":"Подключение к плате по SWD."},{"title":"Снятие старой защиты (если есть)","text":"ЕСЛИ плата УЖЕ защищена (на ней уже стоит RDP) — стенд сначала снимает защиту полным стиранием. Это и стирает старую прошивку, и открывает чип для новой записи. Так стенд одинаково хорошо работает и с ЧИСТЫМИ, и с УЖЕ ЗАЩИЩЁННЫМИ платами."},{"title":"Сброс","text":"Сброс, чтобы новое состояние вступило в силу."},{"title":"Стирание + запись","text":"Стирание и запись файла прошивки (.hex) во флеш."},{"title":"Проверка записанного","text":"Проверка записанного — что во флеше лежит ровно то, что нужно."},{"title":"Включение RDP","text":"Стенд записывает в регистр опций значение, которое включает защиту от чтения."},{"title":"Сброс (option-байты)","text":"Программный системный сброс по SWD (SYSRESETREQ), чтобы новые option-байты перезагрузились и защита реально вступила в силу."},{"title":"Обратное считывание RDP","text":"Стенд читает регистр опций назад и проверяет, что защита действительно ВКЛючена."}]},{"type":"callout","variant":"ok","title":"Ключевой момент — шаг 8, подтверждение","text":"Стенд не верит «на слово» тому, что команда включения отправлена. Он отдельно считывает состояние защиты обратно и сверяет: стоит ли RDP на самом деле. Только если обратное считывание подтвердило, что защита активна, плата засчитывается как успешная."},{"type":"list","ordered":false,"items":["Если защита подтверждена — на дисплее «ГОТОВО-СНИМИТЕ» и строка «RDP защита ВКЛ», зелёный светодиод горит РОВНО, счётчик «ок» увеличивается на единицу.","Если на любом из шагов записи, проверки или подтверждения RDP что-то не сошлось — это ошибка. На дисплее появится «ОШИБКА код 3» с причиной «запись/пров/RDP», красный светодиод будет мигать ТРИ раза подряд, и плата НЕ будет засчитана как успешная."]},{"type":"callout","variant":"info","title":"Гарантия","text":"Таким образом «ГОТОВО» физически не может появиться без реально включённой и подтверждённой защиты. Это и есть гарантия: каждая плата, которую стенд отпустил как успешную, защищена от чтения."},{"type":"heading","text":"Как вы видите этап защиты во время прошивки"},{"type":"para","text":"Пока идёт прошивка, на OLED-дисплее показывается текущий этап. Этапы сменяют друг друга в таком порядке (на экране — заглавными):"},{"type":"table","columns":["Этап на экране","Что происходит"],"rows":[["СВЯЗЬ","Установка связи с платой по SWD."],["РАЗБЛОК","Снятие старой защиты (если плата уже была защищена)."],["ЗАПИСЬ","Запись прошивки во флеш."],["ПРОВЕРКА","Сверка записанного."],["ЗАЩИТА","Включение RDP и его подтверждение."]]},{"type":"para","text":"Рядом с названием этапа показываются проценты и полоса прогресса, а также строка «НЕ ОТКЛЮЧАЙТЕ #<N>», где <N> — номер платы в этой сессии. Пока вы видите этап «ЗАЩИТА» — идёт включение и проверка защиты от чтения; плату в этот момент снимать нельзя."},{"type":"callout","variant":"warn","title":"Простое правило снятия платы","text":"Снимайте плату только тогда, когда зелёный светодиод горит РОВНО (а на дисплее — «ГОТОВО-СНИМИТЕ» и «RDP защита ВКЛ»). Ровный зелёный — это и есть сигнал, что защита включена, подтверждена и плату можно забирать."},{"type":"para","text":"Если плату выдернуть в процессе (в том числе на этапе «ЗАЩИТА») — это НЕ брак. Стенд это переживает: загорится строб зелёного с красным, затем стенд снова придёт в готовность. Приложите плату снова — и она перепрошьётся с самого начала, включая повторное включение и подтверждение защиты."},{"type":"heading","text":"Что означает код ошибки, связанный с защитой"},{"type":"para","text":"Если защиту не удалось включить или подтвердить, вы увидите конкретные сигналы. Их полезно уметь читать."},{"type":"para","text":"НА ДИСПЛЕЕ:"},{"type":"list","ordered":false,"items":["«ОШИБКА код 3», строка причины «запись/пров/RDP», и «снимите плату». Код 3 означает, что не прошёл один из этапов: запись, проверка или подтверждение RDP. То есть либо прошивка не легла как надо, либо обратное считывание не подтвердило, что защита включена. В любом из этих случаев плата НЕ засчитывается.","«ОШИБКА код 2», причина «нет контакта SWD». Это не про саму защиту, а про связь: контакт по проводам SWD не установился или потерялся. Без надёжного контакта стенд в принципе не может ни записать прошивку, ни включить, ни проверить защиту."]},{"type":"para","text":"СВЕТОДИОДОМ (красный мигает кодом — считайте число вспышек):"},{"type":"table","columns":["Вспышки красного","Значение"],"rows":[["2 вспышки","Нет или потерян контакт SWD (код 2)."],["3 вспышки","Не прошли запись / проверка / подтверждение RDP (код 3)."]]},{"type":"callout","variant":"info","title":"Удержание кода","text":"Красный держит код до тех пор, пока вы не снимете плату."},{"type":"para","text":"ЧТО ДЕЛАТЬ: снимите плату, проверьте контакт четырёх проводов (SWDIO, SWCLK, GND, 3V3) и приложите её снова. Дребезжащий или плохой контакт стенд повторяет автоматически. Каждая новая попытка снова доходит до этапа «ЗАЩИТА» и снова требует подтверждения защиты — пока оно не получено, плата успешной не станет."},{"type":"heading","text":"От чего конкретно защищает RDP"},{"type":"list","ordered":false,"items":["ОТ КОПИРОВАНИЯ ПРОШИВКИ. Готовую плату нельзя «прочитать» и сделать её клон. Содержимое флеша недоступно через отладку, а попытка снять защиту стирает прошивку. Значит, повторить ваше изделие, просто скопировав код из платы, не получится.","ОТ КРАЖИ ИНТЕЛЛЕКТУАЛЬНОЙ СОБСТВЕННОСТИ. Прошивка — это ваша разработка. RDP не даёт извлечь её и изучить или перепродать.","ОТ «УТЕЧКИ ЧЕРЕЗ ОДНУ ПЛАТУ». Поскольку стенд включает и подтверждает защиту на КАЖДОЙ плате, не остаётся «случайно забытых» незащищённых изделий, с которых можно было бы снять копию."]},{"type":"callout","variant":"warn","title":"Честно о границах (чтобы у вас были верные ожидания)","text":"RDP закрывает чтение через интерфейс ОТЛАДКИ — это главный и самый простой путь, которым пользуются для извлечения прошивки. Именно его стенд гарантированно перекрывает на каждой плате. RDP — это не выключатель «по желанию»: снять Уровень 1 можно лишь ценой полного стирания, то есть с потерей самой прошивки. Поэтому с точки зрения сохранности вашего кода защита делает ровно то, что нужно: даёт прошивке либо остаться внутри и работать, либо исчезнуть — но не быть скопированной."},{"type":"heading","text":"Перепрошивка уже защищённой платы"},{"type":"para","text":"Это обычная ситуация и делается в ОДНО касание. Стенд сам:"},{"type":"steps","items":[{"title":"Снимает старую защиту","text":"При этом плата ПОЛНОСТЬЮ СТИРАЕТСЯ (так устроена защита: снять её можно только со стиранием)."},{"title":"Записывает новую прошивку","text":"Записывает новую прошивку во флеш."},{"title":"Снова включает защиту и подтверждает её","text":"Снова включает RDP и подтверждает её обратным считыванием."}]},{"type":"para","text":"От вас ничего не требуется — просто приложите плату."},{"type":"callout","variant":"warn","title":"Важно понимать","text":"Снятие защиты всегда стирает плату — старую прошивку прочитать перед этим нельзя (в этом и смысл защиты). Это нормально для перепрошивки. Включённая защита не мешает работе самой прошивки на плате — она лишь закрывает чтение через отладку."},{"type":"heading","text":"Частые вопросы"},{"type":"para","text":"В: Нужно ли мне что-то нажимать, чтобы включить защиту? — О: Нет. Стенд включает RDP сам в каждом цикле прошивки и сам же её проверяет. От вас требуется только приложить плату и дождаться ровного зелёного."},{"type":"para","text":"В: Как понять, что на конкретной плате защита точно включилась? — О: По завершению вы увидите «ГОТОВО-СНИМИТЕ» и строку «RDP защита ВКЛ» на дисплее, ровный зелёный светодиод и рост счётчика «ок». Это значит, что обратное считывание регистра опций подтвердило активную защиту. Без этого подтверждения плата успешной не считается."},{"type":"para","text":"В: А если плата уже была защищена раньше — стенд справится? — О: Да. Если на плате уже стоит RDP, стенд сначала снимет старую защиту полным стиранием (на дисплее этап «РАЗБЛОК»), затем запишет новую прошивку, снова включит и подтвердит защиту. Достаточно тех же четырёх проводов."},{"type":"para","text":"В: Можно ли потом снять защиту и достать мою прошивку? — О: Снять защиту Уровня 1 можно только полным стиранием чипа, а это уничтожает прошивку. Достать прошивку в читаемом виде нельзя — в этом и состоит смысл защиты."},{"type":"para","text":"В: Я случайно выдернул плату на этапе «ЗАЩИТА». Это брак? — О: Нет. Стенд это корректно переживёт и вернётся в готовность. Приложите плату снова — она перепрошьётся заново и снова включит и подтвердит защиту."},{"type":"heading","text":"Итог"},{"type":"callout","variant":"ok","title":"Каждая плата выходит со стенда с включённой и проверенной защитой от чтения","text":"RDP Уровня 1 делает флеш STM32 нечитаемым через отладку, а единственный способ снять защиту — полное стирание, которое уничтожает прошивку. Поэтому извлечь прошивку из готовой платы невозможно. Стенд включает эту защиту на КАЖДОЙ плате и подтверждает её обратным считыванием регистра опций; плата получает статус «ГОТОВО» только при подтверждённой активной защите. Снимайте плату только при ровном зелёном — это ваш знак, что защита включена и прошивка надёжно закрыта от копирования и кражи."}]'),In={facts:["RDP (Read-Out Protection, защита от считывания) — встроенная в микроконтроллер STM32 защита, которая закрывает чтение прошивки через отладочный интерфейс SWD (выводы SWDIO и SWCLK).","Прошивка хранится во встроенной флеш-памяти чипа STM32F103C8T6; без защиты её можно считать снаружи отладчиком байт за байтом и сделать точную копию.","Когда RDP включена, отладчик больше не может прочитать флеш-память: прошивка остаётся внутри и работает, но «выйти наружу» уже не может.","Стенд включает RDP автоматически на КАЖДОЙ плате, в самом конце прошивки, и не оставляет это на усмотрение оператора — забыть включить защиту физически невозможно.","Сразу после включения стенд ПОДТВЕРЖДАЕТ защиту обратным считыванием регистра опций (option-байтов) — он не верит «на слово», что команда отправлена.","Плата получает статус «ГОТОВО» ТОЛЬКО при подтверждённой активной защите; «ГОТОВО» физически не может появиться без реально включённой и подтверждённой RDP.","Состояние защиты хранится не в обычной флеш-памяти, а в служебном регистре опций (option-байты) — отдельной зоне настроек микроконтроллера.","Чтобы новые option-байты вступили в силу на STM32F1, стенд делает программный системный сброс по SWD (команда SYSRESETREQ) — как фирменная ST-Link Utility; отдельный провод NRST и выключение питания не нужны, достаточно четырёх проводов.","Защита включается и подтверждается за один «тач» (одно прикладывание платы) внутри единого цикла прошивки из 8 шагов.","Если плату выдернуть в процессе (в том числе на этапе «ЗАЩИТА») — это не брак: стенд переживает это и возвращается в готовность, а при повторном прикладывании перепрошивает с самого начала и снова включает и подтверждает защиту.","RDP закрывает чтение именно через интерфейс отладки — главный и самый простой путь извлечения прошивки; стенд гарантированно перекрывает его на каждой плате.","Сигнал «забирать плату можно» — ровный зелёный светодиод плюс «ГОТОВО-СНИМИТЕ» и «RDP защита ВКЛ» на дисплее."],points:[{title:"Уровень 1 (Level 1)",text:"Стенд использует RDP Уровня 1: флеш-память становится нечитаемой через отладочный интерфейс — ни по USB через ST-Link, ни напрямую по выводам GPIO считать содержимое флеша нельзя, чип не отдаёт эти данные наружу."},{title:"Принцип «снять = стереть»",text:"Снять защиту Уровня 1 можно только полным стиранием (mass erase) всей флеш-памяти. В момент снятия защиты вся прошивка стирается подчистую, и чип остаётся пустым. Прошивку и защиту нельзя разделить: либо защита стоит и прошивка недоступна снаружи, либо защиту сняли — но прошивки уже нет."},{title:"Регистр опций (option-байты)",text:"Включена защита или нет — записано в служебном регистре опций. По его значению чип решает, разрешать ли чтение флеша. Эту область можно прочитать обратно через отладку — на этом построена проверка защиты."},{title:"Включение и сброс option-байтов",text:"Стенд записывает в регистр опций значение, включающее RDP, затем делает программный системный сброс по SWD (SYSRESETREQ), чтобы option-байты перезагрузились и защита реально вступила в силу. Хватает четырёх проводов (SWDIO, SWCLK, GND, 3V3)."},{title:"Обратное считывание и подтверждение",text:"После сброса стенд читает регистр опций назад и сверяет, что RDP действительно включена. Только подтверждённая активная защита засчитывает плату как успешную."},{title:"Что происходит с защищённой платой при перепрошивке",text:"Перепрошивка уже защищённой платы — обычная ситуация в одно касание: стенд сначала снимает старую защиту (плата при этом полностью стирается — этап «РАЗБЛОК»), затем записывает новую прошивку и снова включает и подтверждает защиту. От оператора ничего не требуется."},{title:"Защита не мешает работе прошивки",text:"Включённая RDP не влияет на работу самой прошивки на плате — она лишь закрывает чтение через отладку. Снятие защиты всегда стирает плату, и прочитать старую прошивку перед этим нельзя — в этом и смысл."},{title:"Этап «ЗАЩИТА» на дисплее",text:"Во время прошивки OLED-дисплей показывает этапы по порядку: СВЯЗЬ → РАЗБЛОК → ЗАПИСЬ → ПРОВЕРКА → ЗАЩИТА. Пока виден этап «ЗАЩИТА», идёт включение и проверка RDP — плату снимать нельзя."},{title:"Код ошибки 3 (запись/пров/RDP)",text:"Если запись, проверка или подтверждение RDP не прошли — «ОШИБКА код 3» с причиной «запись/пров/RDP», красный светодиод мигает ТРИ раза подряд, плата не засчитывается. Красный держит код, пока плату не снимут."},{title:"Код ошибки 2 (нет контакта SWD)",text:"«ОШИБКА код 2», причина «нет контакта SWD» — это про связь, а не про саму защиту: контакт по проводам SWD не установился или потерялся. Светодиод: 2 вспышки. Без надёжного контакта стенд не может ни записать прошивку, ни включить, ни проверить защиту."},{title:"От чего защищает RDP",text:"От копирования прошивки (клон сделать нельзя), от кражи интеллектуальной собственности (прошивку не извлечь, не изучить и не перепродать) и от «утечки через одну плату» (защита стоит на каждом изделии, забытых незащищённых плат не остаётся)."}]},kv={id:Dn,title:wn,tagline:Pn,sourceFiles:On,summary:Rn,blocks:Tn,data:In},Dv=Object.freeze(Object.defineProperty({__proto__:null,blocks:Tn,data:In,default:kv,id:Dn,sourceFiles:On,summary:Rn,tagline:Pn,title:wn},Symbol.toStringTag,{value:"Module"})),jn="security",Cn="Безопасность — общий обзор",Wn="Несколько простых и надёжных мер, каждая закрывает свой участок: сеть, вход в систему, целостность прошивки и защиту плат.",Gn=["документация/11-БЕЗОПАСНОСТЬ-ОБЗОР.txt","БЕЗОПАСНОСТЬ.txt"],Mn="Стенд прошивки STM32 (на базе Raspberry Pi 4) делает одну работу — прошивает платы STM32F103C8T6 и включает на каждой защиту от чтения. Он не подключён к интернету, в него нельзя войти и его нельзя перенастроить со стороны. Безопасность складывается не из одного «замка», а из шести взаимодополняющих мер; этот обзор показывает картину целиком, а за подробностями отсылает к профильным файлам базы знаний 08, 09 и 10. Все меры активны после развёртывания (install.sh) и опечатывания устройства (lockdown.sh).",Ln=JSON.parse('[{"type":"para","text":"Этот обзор связывает воедино всё, что делает стенд прошивки STM32 надёжным и защищённым. Здесь нет глубоких технических подробностей по каждой отдельной мере — для них есть профильные файлы базы знаний. Здесь важно увидеть картину целиком: из чего складывается безопасность и почему именно так. Прочитайте этот обзор первым, а затем при необходимости переходите к файлам 08, 09 и 10."},{"type":"para","text":"Идея устройства проста. Это автономный прибор, который делает одну работу — прошивает платы STM32F103C8T6 и включает на каждой защиту от чтения. Он не подключён к интернету, в него нельзя войти, его нельзя перенастроить со стороны. Всё, что он умеет, он умеет и без сети, и без входа в систему. Именно из этой простоты и вырастает его безопасность: чем меньше у прибора лишних возможностей, тем меньше у него слабых мест."},{"type":"heading","text":"Коротко о главном"},{"type":"list","ordered":false,"items":["Сети нет вообще — ни Wi-Fi, ни Bluetooth, ни проводной. Они не «выключены до перезагрузки», а отключены и внесены в чёрный список ядра, сетевые службы замаскированы.","После опечатывания в систему нельзя войти никаким способом: ни по SSH, ни через экран и клавиатуру, ни через последовательный порт, ни в аварийном режиме.","Каждая прошивка имеет свой отпечаток — сумму SHA-256. По первым 16 цифрам на дисплее вы за секунду убеждаетесь, что загружена именно та сборка, что нужно.","На каждую плату включается аппаратная защита от чтения (RDP), и устройство подтверждает её обратным считыванием. Плата засчитывается готовой только при подтверждённой защите.","Флешка с прошивкой подключается строго «только для чтения», с запретом исполнения. С неё считывается лишь сам файл и ничего больше.","Прибор делает одно дело. Набор служб фиксирован, посторонних программ нет. Меньше функций — меньше поверхности для ошибок."]},{"type":"heading","text":"1. Автономность и отсутствие сети"},{"type":"para","text":"Стенд работает полностью офлайн. У него нет интернета и нет никакой локальной сети. Это не временная настройка, которую легко вернуть обратно, — это часть конструкции опечатанного прибора. Wi-Fi и Bluetooth выключены и внесены в чёрный список ядра (то есть соответствующие драйверы просто не загружаются), а сетевые службы операционной системы замаскированы и не запускаются. У устройства нет никакой сети — ни беспроводной, ни проводной."},{"type":"para","text":"Сеть заблокирована необратимо: радиомодули заблокированы, а сетевые службы (NetworkManager, DHCP, systemd-networkd и др.) отключены и замаскированы. Устройство не получает сетевой адрес и не имеет ни одного активного сетевого подключения. Нет облачного управления и нет удалённого доступа; единственная функция — локальная прошивка плат STM32 по проводам."},{"type":"para","text":"Почему это так важно. Подавляющее большинство угроз для любого прибора приходит «по проводам»: через сеть пытаются войти, подменить файлы, снять данные, заразить программу. Если сети нет вообще, целый класс таких угроз исчезает сам собой. Нельзя атаковать то, до чего нельзя дотянуться. Прибор невозможно взломать удалённо просто потому, что у него нет ни одного сетевого входа и выхода."},{"type":"para","text":"Из автономности следует и ещё одно удобное свойство: прибор полностью предсказуем. Он не «ходит» в интернет за обновлениями, ничего не скачивает в фоне, ни с кем не «переговаривается». Что вы в него заложили, тем он и остаётся. Все нужные ему части — программа прошивки, инструмент OpenOCD, дисплей, импорт с флешки — работают локально и в сети не нуждаются. Поэтому отсутствие интернета ничему не мешает: ни одной его функции сеть не требуется."},{"type":"para","text":"Это же объясняет, почему прошивки доставляются на флешке, а не по сети. Флешка — это простой, понятный и контролируемый канал: вы физически держите носитель в руках, вставляете его сами, и только так новая прошивка попадает в прибор. Никакого «прилёта по воздуху» быть не может."},{"type":"callout","variant":"info","title":"Подробнее","text":"Подробно про опечатывание, отключение сети и про то, почему всё это необратимо с работающей системы, — в файле базы знаний 10."},{"type":"heading","text":"2. Отсутствие доступа к системе после опечатывания"},{"type":"para","text":"Когда прибор подготовлен и проверен, его «опечатывают» — переводят в окончательное рабочее состояние, из которого в систему уже нельзя войти. После этого устройство умеет ровно одно: прошивать платы. Все двери для входа закрыты."},{"type":"para","text":"Что именно закрывается:"},{"type":"list","ordered":false,"items":["SSH (удалённый вход по сети) — отключён, замаскирован, ключи хоста и authorized_keys удалены. Войти по сети нельзя — тем более что и сети нет.","Все текстовые консоли — закрыты. Это и все локальные экраны входа (виртуальные терминалы tty1–tty63), и вход через последовательный порт: приглашение входа не выводится. Подключить монитор и клавиатуру и «зайти» не получится.","Графический режим (GUI) — отключён. Рабочего стола и интерактивного GUI, в который можно было бы войти, на приборе нет.","Аварийный и спасательный режимы (rescue/emergency) — отключены. Это те особые режимы загрузки, через которые обычно «чинят» систему изнутри; при сбое загрузки система не предоставляет служебную (root) оболочку.","Все учётные записи заблокированы: рабочих паролей нет (пароли заблокированы, в том числе пароль root), срок действия учётных записей истёк, а в качестве оболочки стоит nologin — то есть, даже если попытаться войти под какой-либо учётной записью, входа не произойдёт. Действующих паролей для входа в систему не существует.","Отключены «горячие» лазейки управления: magic SysRq (специальные сочетания клавиш, дающие низкоуровневые команды ядру) и Ctrl-Alt-Del (перезагрузка с клавиатуры).","Замаскированы службы удалённого управления и удалённого экрана — VNC, Cockpit, telnet, — чтобы они не могли запуститься."]},{"type":"para","text":"Почему это делает прибор безопаснее. Любой «вход» — это потенциальная дверь. Через вход можно изменить настройки, подменить программу, вытащить данные. Если входов нет совсем, то и менять прибор «изнутри на ходу» нельзя — ни случайно, ни намеренно. Устройство становится цельным и неизменным: оно делает свою работу и не поддаётся переделке со стороны работающей системы. Итог: на работающем устройстве отсутствуют интерактивный вход, командная оболочка и средства изменения конфигурации."},{"type":"para","text":"При этом всё нужное продолжает работать без всякого входа: загрузка, системный менеджер systemd, подсистема udev (она замечает подключение ST-Link и флешки), сам демон прошивки, дисплей и импорт прошивки с USB. Ни одной из этих частей не нужен ни вход в систему, ни сеть. То есть прибор остаётся полностью рабочим, оставаясь при этом полностью закрытым."},{"type":"callout","variant":"warn","title":"Состояние необратимо с работающей системы","text":"Изменить что-либо «изнутри» уже нельзя. Единственный законный способ обновить прибор — переустановить SD-карту. Это и есть путь обновления: новая карта = новая версия. Такой подход намеренно прост и честен: пока карта стоит, прибор гарантированно остаётся таким, каким его опечатали."},{"type":"callout","variant":"info","title":"Подробнее","text":"Полный разбор опечатывания (что именно делает lockdown.sh --commit, почему сухой прогон безопасен, как происходит обновление через SD-карту) — в файле базы знаний 10."},{"type":"heading","text":"3. Контроль целостности прошивок — хеши SHA-256"},{"type":"para","text":"У каждой прошивки есть свой «отпечаток пальца» — контрольная сумма SHA-256. Это число длиной 256 бит, вычисленное по всему содержимому файла прошивки по общепринятому стандарту NIST FIPS 180-4. Отпечаток считается прямо на самом приборе, локально, без всякой сети."},{"type":"para","text":"Главное свойство такого отпечатка: он однозначно связан с содержимым. Один и тот же файл всегда даёт одну и ту же сумму. А вот любое, даже самое крошечное изменение в файле — хоть один изменённый байт — даёт совершенно другую сумму. Подбор иного файла с тем же хешем вычислительно невозможен (стойкость к коллизиям и к прообразу), поэтому подделать содержимое так, чтобы отпечаток остался прежним, на практике невозможно. Если отпечаток совпал — перед вами ровно тот файл, что и был; если не совпал — файл другой (подменён или повреждён)."},{"type":"para","text":"Как вы это используете на практике. На дисплее показаны первые 16 шестнадцатеричных цифр отпечатка активной прошивки. Сравните их с эталонным отпечатком нужного выпуска (он у вас должен быть записан заранее). Совпали — значит, в приборе именно та, одобренная сборка, и можно работать спокойно. Не совпали — значит, загружено что-то не то; не прошивайте платы, пока не разберётесь."},{"type":"para","text":"Где взять полный отпечаток. На дисплее — только начало (16 цифр), для быстрой ежедневной проверки этого достаточно. Полный отпечаток целиком записан в файле состояния /opt/flashjig/status и в журнале. Если нужна строгая сверка по всем 256 битам — берите полный отпечаток оттуда. Хеш активной прошивки постоянно отображается на дисплее и фиксируется в журнале, что позволяет в любой момент подтвердить, что установлена именно одобренная сборка."},{"type":"para","text":"Почему это и есть защита целостности. «Целостность» означает, что прошивка не изменилась и не испортилась с момента выпуска. Отпечаток SHA-256 — это надёжный и быстрый способ это подтвердить. Он ловит и случайную порчу (например, файл побился при копировании на флешку), и намеренную подмену (кто-то подложил другую прошивку). В обоих случаях сумма станет другой, и вы это сразу увидите. Так одна короткая строка на экране даёт вам уверенность, что вы заливаете в платы именно то, что нужно."},{"type":"callout","variant":"info","title":"Подробнее","text":"Подробно про SHA-256, про то, как читать строку хеша на дисплее, где лежит полный отпечаток и как сверять его с эталоном выпуска, — в файле базы знаний 09."},{"type":"heading","text":"4. Аппаратная защита плат — RDP с проверкой"},{"type":"para","text":"RDP (Read-Out Protection, защита от чтения) — это встроенная аппаратная возможность микроконтроллеров STM32. Она закрывает считывание прошивки через интерфейс отладки. Прибор включает эту защиту на каждой плате — это часть единого «тача» по плате, не отдельное действие с вашей стороны."},{"type":"para","text":"Как это работает по сути. Без защиты прошивку из STM32 можно было бы вычитать через отладочный интерфейс — то есть «слить» вашу программу с готовой платы. Защита от чтения первого уровня (Уровень 1) делает флеш нечитаемым через отладку. Снять эту защиту можно только одним способом — полным стиранием чипа. А полное стирание уничтожает прошивку. Получается надёжная «вилка»: пока защита включена — прочитать нельзя; чтобы её снять — придётся стереть всё содержимое. Вытащить вашу программу с защищённой платы в обоих случаях не выйдет."},{"type":"callout","variant":"ok","title":"Устройство не просто «включает и верит», а проверяет","text":"После включения защиты оно перезагружает плату и обратным считыванием регистра опций (option-байтов) убеждается, что защита действительно активна. Плата засчитывается успешной только тогда, когда активная защита подтверждена. На дисплее это «ГОТОВО-СНИМИТЕ» и строка «RDP защита ВКЛ»; светодиод ACT в этот момент горит ровно. Если же подтверждения нет, плата не будет помечена готовой — она пойдёт в ошибку."},{"type":"para","text":"Заметьте удобную деталь конструкции: прибор справляется и с ЧИСТЫМИ, и с УЖЕ ЗАЩИЩЁННЫМИ платами, и всё это всего по четырём проводам (SWDIO, SWCLK, GND, 3V3), без отдельного провода сброса и без выключения питания. Если плата пришла уже защищённой, прибор сам снимет защиту (это полностью сотрёт чип), затем выполнит сброс, стирание, запись, проверку — и снова включит защиту с подтверждением. Это тот же механизм, что используется в ST-Link Utility: программный системный сброс по SWD перезагружает option-байты STM32F1."},{"type":"para","text":"Почему это защищает вашу разработку. Защита от чтения — это барьер против копирования. Готовые платы выходят с прибора уже «закрытыми»: прошивку с них не вычитать, а попытка снять защиту уничтожает её содержимое. Плюс к этому — обязательная проверка: вы не полагаетесь на «наверное, включилось», прибор каждый раз подтверждает защиту по факту. Поэтому каждая плата со статусом «ГОТОВО» — это плата, на которой защита точно стоит и подтверждена."},{"type":"callout","variant":"info","title":"Подробнее","text":"Подробный разбор RDP (уровни защиты, как именно проходит снятие и повторное включение, как читается подтверждение, что показывает дисплей и светодиоды на каждом этапе) — в файле базы знаний 08."},{"type":"heading","text":"5. Защищённое чтение флешек (только чтение, без исполнения)"},{"type":"para","text":"Новые прошивки попадают в прибор через USB-флешку. Это единственный канал доставки — и он сделан намеренно осторожным. Флешка для прибора — это «чужой» носитель: вы могли принести её откуда угодно. Поэтому прибор обращается с ней строго и считывает с неё только то, что нужно, не давая ей никаких прав."},{"type":"para","text":"Как происходит импорт. Вставьте флешку, на которой лежит РОВНО ОДИН файл .hex (он может быть в любой папке на флешке). Прибор сам найдёт этот файл, импортирует его (имя файла сохраняется) и покажет на дисплее «ПРОШИВКА ПРИНЯТА». Дальше платы прошиваются уже новой прошивкой. Переустанавливать или перезапускать ничего не нужно — обновление идёт на лету."},{"type":"para","text":"Что будет, если файлов не ровно один. Если на флешке нет ни одного .hex — это ошибка флешки, красный светодиод мигнёт 4 раза. Если файлов два и более — тоже ошибка, красный мигнёт 5 раз (нужен ровно один файл, чтобы не было неоднозначности, какую прошивку брать). В обоих случаях текущая прошивка в приборе остаётся прежней — ничего не портится."},{"type":"para","text":"Теперь — самое важное про безопасность. Флешка монтируется ТОЛЬКО ДЛЯ ЧТЕНИЯ и с жёстким набором ограничений:"},{"type":"table","columns":["Опция","Что означает"],"rows":[["ro","Только чтение. Прибор ничего не пишет на флешку и не может её изменить; изменение её файловой системы исключено."],["noexec","Запрет исполнения. Ни одну программу с флешки запустить нельзя, даже если она там есть."],["nosuid","Запрет повышения прав. Биты setuid/setgid игнорируются — файлы с флешки не могут получить повышенные права в системе."],["nodev","Запрет «устройств». Особые файлы-устройства с флешки не обрабатываются."],["nosymfollow","Запрет переходов по символьным ссылкам. Хитрая ссылка на флешке не уведёт чтение «куда не надо» в систему (защита от подмены путей)."],["noatime","Без обновления времени доступа (служебная опция; лишних записей не делается)."]]},{"type":"para","text":"Что это даёт. С такой флешки в принципе нельзя ничего исполнить и нельзя повысить права. Прибор берёт с неё ровно один предмет — сам файл .hex — и больше ничего; код или содержимое носителя не выполняются и не получают доступа к системе. Даже если на флешке окажутся посторонние программы, скрипты или вредоносные файлы, они для прибора просто неактивны: их нельзя запустить, им нельзя дать права, по ссылкам они никуда не ведут. Флешка остаётся пассивным «конвертом», из которого аккуратно достаётся только нужная прошивка."},{"type":"para","text":"Именно поэтому доставку через USB можно использовать спокойно. Канал открыт ровно настолько, насколько нужно для передачи одного файла, и ни на йоту больше. Это сочетание удобства (просто вставил флешку — и готово) и строгости (с флешки ничего не исполнить и прав не получить) делает обновление прошивок и лёгким, и безопасным."},{"type":"heading","text":"6. Однозадачность — только прошивка, фиксированный набор служб"},{"type":"para","text":"Прибор делает одно дело — прошивает платы. У него нет «лишних» возможностей, нет универсального рабочего стола, нет набора посторонних программ. Это сознательный выбор, и он сам по себе является мерой безопасности. Стороннее или произвольное программное обеспечение не устанавливается и не выполняется."},{"type":"para","text":"Что именно работает на приборе. Набор служб фиксирован и невелик:"},{"type":"list","ordered":false,"items":["flash-jig.service — главный демон прошивки (это он управляет всем процессом: связь, разблокировка, запись, проверка, включение защиты).","flashjig-oled.service — служба дисплея OLED, которая показывает состояние.","правила udev — реагируют на подключение оборудования: при подключении ST-Link прибор готовится к работе, при подключении флешки запускается импорт прошивки."]},{"type":"para","text":"Всё это лежит в одном месте — в /opt/flashjig/ (там статический OpenOCD со скриптами, демон прошивки, программа дисплея, скрипт светодиодов, файлы конфигурации для ST-Link и для GPIO, папка с прошивками, файл состояния и журналы). Ничего постороннего рядом нет."},{"type":"para","text":"Почему однозадачность повышает безопасность. Есть простое правило: чем меньше у прибора возможностей, тем меньше у него мест, где что-то может пойти не так. Каждая лишняя программа, каждая лишняя служба — это потенциальный источник ошибок и потенциальная дверь. Когда прибор умеет только прошивать платы и в нём работает только то, что для этого нужно, ему просто нечем «навредить» и негде «сломаться» сверх своей узкой задачи. Поведение становится предсказуемым и повторяемым: одна и та же плата, приложенная к одному и тому же прибору, обрабатывается одинаково."},{"type":"para","text":"Сюда же отнесём и важное свойство устойчивости. Каждый вызов инструмента прошивки (OpenOCD) ограничен по времени. Поэтому сломанная, плохо подключённая или выдернутая плата не «вешает» стенд: попытка завершится по времени, и прибор вернётся в готовность. Дребезжащий или плохой контакт автоматически повторяется. А плата, которую выдернули прямо в процессе, не считается браком — приложите её снова, и она перепрошьётся заново. Узкая специализация и встроенная защита от зависаний вместе делают работу прибора спокойной и надёжной: его трудно сбить с толку, и он сам возвращается в рабочее состояние."},{"type":"heading","text":"Как это работает вместе"},{"type":"para","text":"Поодиночке каждая мера полезна, но сила — в их сочетании. Сложите картину целиком:"},{"type":"list","ordered":false,"items":["Снаружи к прибору не подобраться — сети нет вообще.","Изнутри прибор не переделать на ходу — после опечатывания нет ни одного входа в систему, а изменить что-либо можно только заменой SD-карты.","То, что вы заливаете в платы, — проверяемо: отпечаток SHA-256 подтверждает, что прошивка именно та, что нужно, и не повреждена.","То, что выходит на платах, — защищено: на каждой включена и подтверждена аппаратная защита от чтения.","Единственный канал доставки — флешка — открыт ровно на один файл и ничего с неё не исполняет.","Сам прибор делает одно дело фиксированным набором служб, и его трудно сбить с толку."]},{"type":"callout","variant":"ok","title":"Итог","text":"Получается прибор, у которого закрыты и внешние двери (сеть), и внутренние (вход в систему), при этом и вход (прошивка по хешу), и выход (защита плат) находятся под контролем. Это и есть его безопасность: не один «замок», а несколько простых и надёжных мер, каждая из которых закрывает свой участок."},{"type":"heading","text":"Куда смотреть дальше"},{"type":"list","ordered":false,"items":["Файл 08 — аппаратная защита плат RDP: уровни защиты, снятие и повторное включение, подтверждение обратным считыванием, что в это время показывают дисплей и светодиоды.","Файл 09 — контроль целостности хешами SHA-256: что такое отпечаток прошивки, как читать строку хеша на дисплее, где взять полный хеш и как сверить его с эталоном выпуска.","Файл 10 — опечатывание устройства: что делает lockdown.sh --commit, какие двери закрываются, почему это необратимо с работающей системы и как происходит обновление через переустановку SD-карты."]}]'),qn={layers:[{name:"Автономность и отсутствие сети (air-gap)",protects:"От удалённых атак: попыток входа по сети, подмены файлов, утечки данных, заражения программы «по проводам».",how:"Нет ни Wi-Fi, ни Bluetooth, ни проводной сети. Драйверы радиомодулей внесены в чёрный список ядра и не загружаются; радиомодули заблокированы. Сетевые службы (NetworkManager, DHCP, systemd-networkd и др.) отключены и замаскированы. Устройство не получает сетевой адрес и не имеет ни одного активного сетевого подключения. Нет облачного управления и удалённого доступа. Необратимо с работающей системы."},{name:"Отсутствие доступа к системе после опечатывания (lockdown)",protects:"От изменения прибора «изнутри на ходу» — случайного или намеренного: смены настроек, подмены программы, извлечения данных.",how:"SSH отключён и замаскирован, ключи хоста и authorized_keys удалены. Все tty (tty1–tty63) и последовательный порт не выводят приглашение входа. GUI отключён. Аварийный/спасательный режимы (rescue/emergency) отключены — при сбое загрузки root-оболочка не выдаётся. Все учётные записи заблокированы: пароли (включая root) заблокированы, оболочка nologin, срок действия истёк. Magic SysRq и Ctrl-Alt-Del отключены. VNC, Cockpit, telnet замаскированы. На работающем устройстве нет интерактивного входа, командной оболочки и средств изменения конфигурации. Необратимо с работающей системы; обновление — только заменой SD-карты."},{name:"Контроль целостности прошивки — SHA-256",protects:"От случайной порчи и намеренной подмены прошивки: гарантирует, что в платы заливается именно одобренная, неповреждённая сборка.",how:"Каждая прошивка идентифицируется хеш-суммой SHA-256 (256 бит, стандарт NIST FIPS 180-4), вычисляемой локально на приборе без сети по всему содержимому файла. Стойкость к коллизиям и к прообразу: подбор иного файла с тем же хешем вычислительно невозможен. Первые 16 шестнадцатеричных цифр постоянно показаны на дисплее для быстрой сверки с эталоном выпуска; полный хеш — в файле состояния /opt/flashjig/status и в журнале."},{name:"Аппаратная защита плат — RDP с проверкой",protects:"От копирования вашей разработки: считать прошивку с готовой платы через отладочный интерфейс нельзя, а попытка снять защиту уничтожает содержимое.",how:"На каждой плате STM32 включается аппаратная защита от чтения (RDP, Уровень 1), блокирующая считывание флеша через интерфейс отладки. Снять её можно только полным стиранием чипа (которое уничтожает прошивку). Прибор не верит «вслепую»: после записи перезагружает плату и обратным считыванием регистра опций (option-байтов) подтверждает активную защиту. Плата засчитывается готовой только при подтверждённой защите (дисплей «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ», светодиод ACT горит ровно). Справляется и с чистыми, и с уже защищёнными платами всего по 4 проводам (SWDIO, SWCLK, GND, 3V3)."},{name:"Защищённое чтение флешек (только чтение, без исполнения)",protects:"От вредоносных USB-носителей: исполнения чужого кода, повышения прав, подмены путей через символьные ссылки.",how:"Единственный канал доставки прошивок — USB-флешка — монтируется в режиме «только чтение» (ro) с жёсткими ограничениями: noexec (нельзя исполнить), nosuid (setuid/setgid игнорируются, повышение прав невозможно), nodev (файлы-устройства игнорируются), nosymfollow (символьные ссылки не раскрываются), noatime. С носителя считывается только сам файл .hex; код и содержимое носителя не выполняются и доступа к системе не получают. Принимается ровно один .hex — пустые и неоднозначные носители отклоняются (красный светодиод: 4 мигания — нет .hex, 5 миганий — два и более)."},{name:"Однозадачность — фиксированный набор служб",protects:"От разрастания поверхности атаки и непредсказуемого поведения: меньше функций — меньше мест, где что-то может пойти не так.",how:"Прибор выполняет единственную задачу — прошивку плат STM32. Стороннее или произвольное ПО не устанавливается и не выполняется. Фиксированный набор служб: flash-jig.service (демон прошивки), flashjig-oled.service (дисплей OLED), правила udev (реакция на подключение ST-Link и флешки). Всё в /opt/flashjig/. Каждый вызов OpenOCD ограничен по времени, поэтому сломанная или выдернутая плата не «вешает» стенд — он возвращается в готовность, плохой контакт повторяется автоматически."}],summaryForSecurityOfficer:["Полный air-gap: ни Wi-Fi, ни Bluetooth, ни проводной сети; драйверы в чёрном списке ядра, сетевые службы замаскированы, сетевого адреса нет. Удалённый вектор атаки отсутствует.","После опечатывания (lockdown.sh) на работающем устройстве нет интерактивного входа: SSH, tty1–tty63, serial, GUI, rescue/emergency закрыты; все учётные записи заблокированы (включая root); VNC/Cockpit/telnet замаскированы; SysRq и Ctrl-Alt-Del отключены.","Состояние опечатывания необратимо с работающей системы. Единственный путь обновления — физическая замена SD-карты (новая карта = новая версия).","Целостность прошивки подтверждается криптографически: SHA-256 (NIST FIPS 180-4), вычисляется локально; первые 16 цифр на дисплее для ежедневной сверки, полный хеш в /opt/flashjig/status и журнале. Подмена/повреждение выявляются немедленно.","Каждая выпущенная плата защищена аппаратно: RDP (Уровень 1) включён и обязательно подтверждён обратным считыванием option-байтов; статус «ГОТОВО» = защита проверена по факту. Снятие защиты невозможно без полного стирания чипа.","Доставка прошивок через USB безопасна: монтирование ro,noexec,nosuid,nodev,nosymfollow,noatime; исполнить код или повысить права с флешки нельзя; берётся ровно один файл .hex.","Однозадачный прибор с фиксированным минимальным набором служб (flash-jig.service, flashjig-oled.service, правила udev); постороннего ПО нет; вызовы OpenOCD ограничены по времени (защита от зависаний и автоматическое восстановление готовности).","Все меры активны после развёртывания (install.sh) и опечатывания (lockdown.sh). База: Raspberry Pi 4; цель — платы STM32F103C8T6."]},wv={id:jn,title:Cn,tagline:Wn,sourceFiles:Gn,summary:Mn,blocks:Ln,data:qn},Pv=Object.freeze(Object.defineProperty({__proto__:null,blocks:Ln,data:qn,default:wv,id:jn,sourceFiles:Gn,summary:Mn,tagline:Wn,title:Cn},Symbol.toStringTag,{value:"Module"})),An="specs",En="Технические характеристики",Bn="Полный перечень аппаратных и программных параметров стенда OTAБEK STM32",Nn=["документация-2/17-ХАРАКТЕРИСТИКИ.txt"],Un="Стенд построен на Raspberry Pi 4 Model B под управлением Raspberry Pi OS и работает полностью офлайн. Он прошивает микроконтроллеры STM32F103C8T6 по интерфейсу SWD, считает контрольную сумму SHA-256 и включает защиту RDP на каждой плате. Ниже приведены все технические параметры: основа, прошиваемые платы, способы подключения, дисплей, прошивальщик, хеширование, индикация, питание и порядок обновления.",Fn=[{type:"callout",variant:"info",title:"Автономная работа",text:"Управляющий компьютер — Raspberry Pi 4 Model B под Raspberry Pi OS (Trixie, 64-бит). Стенд работает офлайн, без интернета."},{type:"heading",text:"Основа"},{type:"list",ordered:!1,items:["Управляющий компьютер: Raspberry Pi 4 Model B.","Система: Raspberry Pi OS (Trixie, 64-бит).","Работа: офлайн, без интернета."]},{type:"heading",text:"Прошиваемые платы"},{type:"list",ordered:!1,items:["STM32F103C8T6 и совместимые (ядро ARM Cortex-M3, STM32F1 «medium density»).","Интерфейс программирования: SWD (выводы SWDIO, SWCLK, GND, 3V3).","Формат прошивки: .hex.","Защита: RDP (Read-Out Protection) включается на каждой плате."]},{type:"heading",text:"Подключение к плате"},{type:"para",text:"Поддержаны два способа подключения с автоопределением."},{type:"list",ordered:!1,items:["ST-Link v2 по USB.","Прямое подключение по GPIO Raspberry Pi: SWDIO = конт. 22 (GPIO25), SWCLK = конт. 23 (GPIO11), GND = конт. 14, 3V3 = конт. 17."]},{type:"table",columns:["Сигнал SWD","Контакт Raspberry Pi","GPIO"],rows:[["SWDIO","конт. 22","GPIO25"],["SWCLK","конт. 23","GPIO11"],["GND","конт. 14","—"],["3V3","конт. 17","—"]]},{type:"heading",text:"Дисплей"},{type:"list",ordered:!1,items:['OLED 0.96", 128x64, контроллер SSD1306, шина I2C, белый.',"Адрес I2C: 0x3C или 0x3D (определяется автоматически).","Подключение: VDD = конт. 1 (3V3), GND = конт. 6, SDA = конт. 3 (GPIO2), SCK/SCL = конт. 5 (GPIO3)."]},{type:"table",columns:["Вывод дисплея","Контакт Raspberry Pi","GPIO"],rows:[["VDD (3V3)","конт. 1","—"],["GND","конт. 6","—"],["SDA","конт. 3","GPIO2"],["SCK/SCL","конт. 5","GPIO3"]]},{type:"heading",text:"Прошивальщик"},{type:"list",ordered:!1,items:["OpenOCD 0.12, встроен отдельным самодостаточным файлом (без зависимостей, без интернета); поддержаны адаптеры st-link, bcm2835gpio, linuxgpiod."]},{type:"heading",text:"Хеширование"},{type:"list",ordered:!1,items:["Алгоритм: SHA-256 (256 бит, стандарт NIST FIPS 180-4).","На дисплее — первые 16 знаков; полный хеш — в файле состояния и журнале."]},{type:"heading",text:"Индикация"},{type:"list",ordered:!1,items:["Дисплей OLED (по-русски) + два штатных светодиода Raspberry Pi (зелёный ACT, красный PWR)."]},{type:"heading",text:"Питание"},{type:"callout",variant:"warn",title:"Только 3.3 В",text:"Логика 3.3 В. На выводы SWD и дисплея подаётся 3.3 В (не 5 В)."},{type:"heading",text:"Обновление"},{type:"list",ordered:!1,items:["Прошивка — USB-флешкой (один .hex), без переустановки.","Система — переустановкой карты microSD."]}],zn={specs:[{label:"Управляющий компьютер",value:"Raspberry Pi 4 Model B"},{label:"Операционная система",value:"Raspberry Pi OS (Trixie, 64-бит)"},{label:"Режим работы",value:"офлайн, без интернета"},{label:"Прошиваемый МК",value:"STM32F103C8T6 и совместимые"},{label:"Ядро МК",value:"ARM Cortex-M3, STM32F1 «medium density»"},{label:"Интерфейс программирования",value:"SWD (SWDIO, SWCLK, GND, 3V3)"},{label:"Формат прошивки",value:".hex"},{label:"Защита платы",value:"RDP (Read-Out Protection) — включается на каждой плате"},{label:"Подключение к плате",value:"два способа с автоопределением: ST-Link v2 по USB или прямое по GPIO"},{label:"GPIO SWDIO",value:"конт. 22 (GPIO25)"},{label:"GPIO SWCLK",value:"конт. 23 (GPIO11)"},{label:"GPIO GND (SWD)",value:"конт. 14"},{label:"GPIO 3V3 (SWD)",value:"конт. 17"},{label:"Дисплей",value:'OLED 0.96", 128x64, SSD1306, I2C, белый'},{label:"Адрес I2C дисплея",value:"0x3C или 0x3D (автоопределение)"},{label:"Дисплей VDD",value:"конт. 1 (3V3)"},{label:"Дисплей GND",value:"конт. 6"},{label:"Дисплей SDA",value:"конт. 3 (GPIO2)"},{label:"Дисплей SCK/SCL",value:"конт. 5 (GPIO3)"},{label:"Прошивальщик",value:"OpenOCD 0.12, встроен самодостаточным файлом (без зависимостей и интернета)"},{label:"Поддержанные адаптеры OpenOCD",value:"st-link, bcm2835gpio, linuxgpiod"},{label:"Алгоритм хеширования",value:"SHA-256 (256 бит, NIST FIPS 180-4)"},{label:"Отображение хеша",value:"первые 16 знаков на дисплее; полный — в файле состояния и журнале"},{label:"Индикация",value:"OLED-дисплей (по-русски) + два штатных светодиода Raspberry Pi (зелёный ACT, красный PWR)"},{label:"Питание логики",value:"3.3 В (на выводы SWD/дисплея — 3.3 В, не 5 В)"},{label:"Обновление прошивки",value:"USB-флешкой (один .hex), без переустановки"},{label:"Обновление системы",value:"переустановкой карты microSD"}]},Ov={id:An,title:En,tagline:Bn,sourceFiles:Nn,summary:Un,blocks:Fn,data:zn},Rv=Object.freeze(Object.defineProperty({__proto__:null,blocks:Fn,data:zn,default:Ov,id:An,sourceFiles:Nn,summary:Un,tagline:Bn,title:En},Symbol.toStringTag,{value:"Module"})),Hn="transport",Kn="Транспорт: USB / GPIO",Vn="Стенд сам выбирает, как связаться с платой, и показывает режим на дисплее.",$n=["документация-2/08-ТРАНСПОРТ.txt","jig-stlink.cfg","jig-gpio.cfg"],Yn="К плате стенд может подключаться двумя способами: через USB-адаптер ST-Link или напрямую по GPIO Raspberry Pi (SWD). Способ выбирается автоматически и отображается в правом верхнем углу дисплея; заранее ничего настраивать не нужно. Оба способа делают одно и то же — прошивают плату по четырём проводам и могут перепрошить уже опечатанную (RDP-locked) плату за один сеанс.",Jn=[{type:"para",text:"К плате можно подключаться двумя способами. Стенд выбирает способ САМ и показывает текущий режим в правом верхнем углу дисплея."},{type:"heading",text:"Два способа"},{type:"list",ordered:!1,items:["USB (через ST-Link) — адаптер ST-Link вставлен в USB Raspberry Pi, от него 4 провода к плате. На дисплее справа вверху: «USB».","GPIO (напрямую) — плата подключена к выводам Raspberry Pi (см. 03-ПОДКЛЮЧЕНИЕ.txt). На дисплее справа вверху: «GPIO»."]},{type:"table",columns:["Режим","Индикатор на дисплее","Подключение к плате"],rows:[["USB (через ST-Link)","USB","Адаптер ST-Link в USB Raspberry Pi, от него 4 провода к плате"],["GPIO (напрямую)","GPIO","Плата подключена прямо к выводам Raspberry Pi (см. 03-ПОДКЛЮЧЕНИЕ.txt)"]]},{type:"heading",text:"Автовыбор"},{type:"list",ordered:!1,items:["Если в USB найден адаптер ST-Link — используется он (режим USB).","Если ST-Link не найден — используется прямое подключение по GPIO.","Переключение происходит само: вставили/вынули ST-Link — режим сменится, и это отразится на дисплее. Заранее ничего настраивать не нужно."]},{type:"callout",variant:"info",title:"Ничего настраивать заранее не нужно",text:"Стенд определяет способ подключения автоматически при вставке или извлечении ST-Link, и сразу показывает актуальный режим в правом верхнем углу дисплея."},{type:"heading",text:"Какой способ выбрать"},{type:"list",ordered:!1,items:["ST-Link (USB) — обычно надёжнее и быстрее, и не занимает выводы GPIO.","GPIO — не требует отдельного адаптера; провода идут прямо на разъём Pi."]},{type:"para",text:"Оба способа делают одно и то же; выбирайте по тому, что есть под рукой."},{type:"heading",text:"Подключение по 4 проводам"},{type:"para",text:"Оба режима используют интерфейс SWD и одни и те же четыре линии: SWDIO, SWCLK, GND и 3V3. Отдельные провода NRST, BOOT0 и кнопки не нужны."},{type:"table",columns:["Линия","USB / ST-Link","GPIO (напрямую)"],rows:[["SWCLK","Провод ST-Link → плата","BCM GPIO11 = вывод (pin) 23"],["SWDIO","Провод ST-Link → плата","BCM GPIO25 = вывод (pin) 22"],["GND","Провод ST-Link → плата","Вывод (pin) 6 (или 9/14/20/25/30/34/39)"],["3V3","Провод ST-Link → плата","Вывод (pin) 1 (или 17) — питает плату STM32 от Pi"]]},{type:"callout",variant:"ok",title:"Перепрошивка уже опечатанной платы — за один сеанс",text:"В обоих режимах команда 'reset' выполняет полный СИСТЕМНЫЙ сброс (через прошивку ST-Link по USB, либо записью SYSRESETREQ по SWD при GPIO). На STM32F1 это перезагружает option bytes, поэтому последовательность 'unlock 0; reset; program; lock; reset' перепрошивает уже RDP-locked плату за один сеанс по этим 4 проводам — без NRST и без отключения питания."},{type:"heading",text:"Скорости подключения (из конфигов OpenOCD)"},{type:"table",columns:["Режим","Драйвер / транспорт","Скорость","Если ошибки SWD/CRC"],rows:[["USB / ST-Link v2","HLA (hla_swd), interface/stlink.cfg, VID/PID 0483:3748 и 0483:374b","1800 кГц","Снизить до 480–1000 кГц при длинных/грязных проводах"],["GPIO (Pi 1/2/3/4)","bcm2835gpio, transport swd","1000 кГц","Снизить до 500 кГц при ошибках «cannot read IDR»/CRC; провода держать короткими"]]},{type:"callout",variant:"info",title:"Raspberry Pi 5 (RP1)",text:"На Raspberry Pi 5 драйвер bcm2835gpio НЕ работает. Вместо него используется linuxgpiod (медленнее, но работает); номер чипа GPIO проверяется командой gpiodetect (40-контактная гребёнка обычно gpiochip0, в некоторых образах — 4)."},{type:"heading",text:"Принудительный режим (до опечатывания, если нужно)"},{type:"para",text:"В файле /etc/systemd/system/flash-jig.service параметр TRANSPORT:"},{type:"table",columns:["Значение TRANSPORT","Поведение"],rows:[["auto","автоматически (по умолчанию, рекомендуется)"],["stlink","всегда USB/ST-Link"],["gpio","всегда прямое подключение"]]},{type:"para",text:"После изменения выполните перезагрузку конфигурации и перезапуск сервиса. После опечатывания доступа к системе нет — режим оставляйте auto."},{type:"code",lang:"bash",text:"sudo systemctl daemon-reload && sudo systemctl restart flash-jig"},{type:"callout",variant:"warn",title:"После опечатывания доступа к системе нет",text:"Менять параметр TRANSPORT можно только до опечатывания. После опечатывания доступа к системе нет — режим оставляйте auto."},{type:"heading",text:"Если режим не тот"},{type:"list",ordered:!1,items:["Ждали USB, а на дисплее GPIO → проверьте, что ST-Link вставлен и распознан (можно вынуть и вставить заново).","На дисплее «--» → подключение ещё не определено / нет адаптера; для GPIO это нормально, плата всё равно прошьётся при касании."]},{type:"callout",variant:"ok",title:"«--» при GPIO — это нормально",text:"Индикатор «--» означает, что подключение ещё не определено или адаптера нет. Для прямого подключения по GPIO это нормально: плата всё равно прошьётся при касании."}],Qn={modes:[{name:"USB (через ST-Link)",when:"Адаптер ST-Link найден в USB Raspberry Pi. На дисплее справа вверху: «USB». Обычно надёжнее и быстрее, не занимает выводы GPIO.",how:"ST-Link v2 вставлен в USB Pi, от него 4 провода к плате (SWDIO, SWCLK, GND, 3V3). OpenOCD: драйвер HLA (hla_swd) через interface/stlink.cfg (VID/PID 0483:3748 и 0483:374b), скорость 1800 кГц (при длинных/грязных проводах снизить до 480–1000 кГц). 'reset' = системный сброс прошивкой ST-Link; на STM32F1 перезагружает option bytes, что позволяет перепрошить RDP-locked плату за один сеанс без NRST."},{name:"GPIO (напрямую)",when:"ST-Link в USB не найден. На дисплее справа вверху: «GPIO». Не требует отдельного адаптера; провода идут прямо на разъём Pi.",how:"Плата подключена к гребёнке Raspberry Pi: SWCLK = BCM GPIO11 (pin 23), SWDIO = BCM GPIO25 (pin 22), GND = pin 6 (или 9/14/20/25/30/34/39), 3V3 = pin 1 (или 17, питает плату STM32 от Pi). OpenOCD: драйвер bcm2835gpio (Pi 1/2/3/4), transport swd, скорость 1000 кГц (при ошибках снизить до 500 кГц). На Raspberry Pi 5 (RP1) использовать linuxgpiod. 'reset' = запись SYSRESETREQ по SWD = полный системный сброс; на STM32F1 перезагружает option bytes — перепрошивка RDP-locked платы за один сеанс без NRST и без отключения питания."}],selection:{logic:"Стенд выбирает способ автоматически и показывает режим в правом верхнем углу дисплея.",rules:["Если в USB найден адаптер ST-Link — используется он (режим USB).","Если ST-Link не найден — используется прямое подключение по GPIO.","Переключение происходит само при вставке/извлечении ST-Link и сразу отражается на дисплее; заранее ничего настраивать не нужно."],displayIndicators:[{indicator:"USB",meaning:"Активен режим USB через ST-Link"},{indicator:"GPIO",meaning:"Активно прямое подключение по GPIO"},{indicator:"--",meaning:"Подключение ещё не определено / нет адаптера; для GPIO это нормально, плата всё равно прошьётся при касании"}],forcedMode:{file:"/etc/systemd/system/flash-jig.service",parameter:"TRANSPORT",values:[{value:"auto",behavior:"автоматически (по умолчанию, рекомендуется)"},{value:"stlink",behavior:"всегда USB/ST-Link"},{value:"gpio",behavior:"всегда прямое подключение"}],applyCommand:"sudo systemctl daemon-reload && sudo systemctl restart flash-jig",note:"После опечатывания доступа к системе нет — режим оставляйте auto."}},wiring:{interface:"SWD, 4 провода (без NRST/BOOT0/кнопок)",lines:["SWDIO","SWCLK","GND","3V3"],gpioPins:{SWCLK:"BCM GPIO11 = pin 23",SWDIO:"BCM GPIO25 = pin 22",GND:"pin 6 (или 9/14/20/25/30/34/39)","3V3":"pin 1 (или 17) — питает плату STM32 от Pi"}}},Tv={id:Hn,title:Kn,tagline:Vn,sourceFiles:$n,summary:Yn,blocks:Jn,data:Qn},Iv=Object.freeze(Object.defineProperty({__proto__:null,blocks:Jn,data:Qn,default:Tv,id:Hn,sourceFiles:$n,summary:Yn,tagline:Vn,title:Kn},Symbol.toStringTag,{value:"Module"})),Zn="wiring",Xn="Подключение проводов: дисплей, прошивка, режимы",eo="Четыре провода на дисплей, четыре на плату STM32 — и ни одного лишнего.",to=["документация/06-ПОДКЛЮЧЕНИЕ.txt","документация-2/03-ПОДКЛЮЧЕНИЕ.txt","wiring.py","jig-gpio.cfg","jig-stlink.cfg"],ao="Стенд собран на Raspberry Pi 4, и все подключения делаются к её 40-контактному разъёму. К дисплею OLED идут четыре провода по шине I2C, а к плате STM32 — четыре провода SWD, либо напрямую с ножек GPIO, либо через программатор ST-Link по USB. Стенд сам определяет способ работы и показывает режим (USB или GPIO) в правом верхнем углу дисплея. Эта страница подробно разбирает каждый провод, что нельзя перепутать и почему провода нужно держать короткими.",so=JSON.parse('[{"type":"para","text":"Этот раздел подробно объясняет, как подключить провода к стенду прошивки STM32. Здесь разобрано: подключение OLED-дисплея по I2C, подключение прошивки STM32 по выводам GPIO (4 провода SWD), вариант подключения через ST-Link по USB, как стенд сам определяет режим работы и показывает его на дисплее, на что обращать внимание, что нельзя перепутать и почему провода нужно держать короткими."},{"type":"para","text":"Стенд собран на Raspberry Pi 4. Все подключения делаются к её разъёму — гребёнке из 40 контактов вдоль края платы. Дальше по тексту контакты называются по их номерам (например «контакт 1», «контакт 6»). Рядом с документацией в архиве лежит картинка с разводкой — wiring.png. Открывайте её, когда будете подключать: на ней видно, где физически находится каждый контакт. Текст и картинка дополняют друг друга — текст объясняет, картинка показывает."},{"type":"heading","text":"Как пронумерован разъём (важно понять до начала)"},{"type":"para","text":"Разъём Raspberry Pi — это два ряда контактов, всего 40 штук. Нумерация идёт НЕ подряд по одному ряду, а зигзагом."},{"type":"list","ordered":false,"items":["Контакт 1 — в углу платы (обычно помечен квадратной площадкой или надписью на плате). Это ваша точка отсчёта.","В одном ряду идут нечётные номера: 1, 3, 5, 7, …","В другом ряду, напротив, идут чётные номера: 2, 4, 6, 8, …","То есть контакт 1 и контакт 2 находятся рядом (поперёк), а контакт 1 и контакт 3 — рядом (вдоль)."]},{"type":"callout","variant":"warn","title":"Всегда отсчитывайте от контакта 1","text":"Сначала находите контакт 1, а от него отсчитывайте нужный номер. Не пытайтесь считать «на глаз» от середины — легко ошибиться на один контакт. На картинке wiring.png номера подписаны, сверяйтесь с ней."},{"type":"heading","text":"Часть 1. Дисплей по I2C (4 провода)"},{"type":"para","text":"Дисплей — это маленький OLED-экран 0.96 дюйма, 128×64 точки, на контроллере SSD1306. Он подключается к Raspberry по шине I2C. У дисплея четыре вывода: питание (VDD), земля (GND) и две линии данных (SDA и SCK, её также подписывают SCL). На модуле выводы обычно подписаны: GND VDD SCK SDA."},{"type":"table","columns":["Вывод дисплея","Куда","Номер контакта"],"rows":[["VDD (питание)","питание 3.3 В (3V3)","контакт 1"],["GND (земля)","земля (GND)","контакт 6"],["SDA (данные)","линия данных I2C (GPIO2)","контакт 3"],["SCK / SCL (такт)","линия такта I2C (GPIO3)","контакт 5"]]},{"type":"para","text":"Расшифровка по каждому проводу:"},{"type":"list","ordered":false,"items":["VDD → контакт 1. Это вывод питания 3.3 вольта. Дисплей питается от 3.3 В, которые даёт сама Raspberry. Не подключайте VDD дисплея к 5-вольтовым контактам — модуль рассчитан на 3.3 В от этой шины.","GND → контакт 6. Это земля (общий минус). Без общей земли дисплей работать не будет, даже если питание и линии данных подключены.","SDA → контакт 3. Это линия данных шины I2C (на ней «ножка» GPIO2 у Raspberry). По ней дисплей и Raspberry обмениваются данными.","SCK (SCL) → контакт 5. Это линия такта шины I2C (ножка GPIO3). Она задаёт ритм передачи. На модулях дисплея эту ногу подписывают то «SCK», то «SCL» — это одно и то же, подключайте к контакту 5."]},{"type":"callout","variant":"info","title":"Почему именно эти контакты","text":"Контакты 3 и 5 на Raspberry — это аппаратная шина I2C (она так и называется I2C1, ноги GPIO2 и GPIO3). Стенд включает I2C в своих настройках при установке, и дисплей обслуживает отдельная служба. Поэтому экран должен висеть именно на контактах 3 и 5, а не на каких-то других."},{"type":"callout","variant":"warn","title":"Важно про первый запуск","text":"Чтобы дисплей по I2C заработал, после установки стенда нужна одна перезагрузка (включение I2C прописывается в настройки загрузки Raspberry и подхватывается при следующем старте). Это делается командой перезагрузки на этапе развёртывания. Если вы только что собрали стенд и дисплей тёмный — сначала проверьте, что была перезагрузка после установки, и только потом ищите проблему в проводах."},{"type":"callout","variant":"ok","title":"Что должно быть видно на дисплее","text":"Когда дисплей подключён правильно и стенд запущен, вверху экрана появляется заголовок «OTAБEK STM32», а в правом верхнем углу — метка режима: либо «USB», либо «GPIO» (об этом подробно в Части 4). Если заголовок виден — значит дисплей подключён верно и I2C работает."},{"type":"heading","text":"Часть 2. Прошивка по GPIO — прямо с Raspberry (4 провода SWD)"},{"type":"para","text":"Это основной способ прошивки, когда вы НЕ используете внешний программатор. Raspberry прошивает плату STM32 напрямую своими ножками GPIO — это режим, который на дисплее обозначается меткой «GPIO». Технически это «битбанг SWD»: Raspberry своими выводами сама формирует сигналы интерфейса отладки SWD."},{"type":"para","text":"Для прошивки нужно ровно ЧЕТЫРЕ провода. Никаких других проводов для прошивки не требуется. Вот они:"},{"type":"table","columns":["Сигнал","Что это","Номер контакта"],"rows":[["SWDIO (данные)","линия данных SWD (GPIO25)","контакт 22"],["SWCLK (такт)","линия такта SWD (GPIO11)","контакт 23"],["3V3 (питание)","питание 3.3 В для платы","контакт 17"],["GND (земля)","общая земля","контакт 14"]]},{"type":"para","text":"Подключение каждого провода к плате STM32:"},{"type":"list","ordered":false,"items":["SWDIO → контакт 22 (это GPIO25 у Raspberry). На плате STM32 этот провод идёт на её вывод SWDIO (он же помечается DIO).","SWCLK → контакт 23 (это GPIO11). На плате STM32 — на вывод SWCLK (помечается CLK).","3V3 → контакт 17. Это питание 3.3 В. Через него Raspberry питает саму плату STM32 во время прошивки. На плате STM32 этот провод идёт на её вывод 3.3V.","GND → контакт 14. Это общая земля. На плате STM32 — на её вывод GND."]},{"type":"callout","variant":"info","title":"Почему только 4 провода и без кнопки сброса","text":"Многие привыкли, что для прошивки STM32 нужен ещё провод сброса (NRST) и иногда приходится дёргать питание. Здесь это НЕ нужно. Стенд снимает защиту и перезагружает плату программно — он подаёт по SWD команду системного сброса (это называется SYSRESETREQ). Такой сброс перезагружает на STM32F1 так называемые option-байты (служебные настройки чипа, куда входит и защита от чтения). Тот же приём использует фирменная программа ST-Link Utility. Благодаря этому всё делается по четырём проводам — SWDIO, SWCLK, 3V3 и GND — без отдельного провода сброса и без выключения питания."},{"type":"para","text":"Что делает стенд за одно прикосновение платы. Когда вы приложили плату этими четырьмя проводами, стенд по шагам делает всё сам:"},{"type":"steps","items":[{"title":"Связь по SWD","text":"устанавливает связь по SWD;"},{"title":"Снятие защиты","text":"если плата уже защищена (RDP) — снимает защиту (это полностью стирает чип) и сбрасывает её;"},{"title":"Запись прошивки","text":"стирает и записывает прошивку (файл .hex);"},{"title":"Проверка записи","text":"проверяет, что записалось правильно;"},{"title":"Включение защиты","text":"включает защиту от чтения (RDP);"},{"title":"Сброс платы","text":"сбрасывает плату;"},{"title":"Подтверждение защиты","text":"считывает регистр защиты обратно и убеждается, что защита ВКЛючена."}]},{"type":"callout","variant":"ok","title":"Когда плата считается «ГОТОВО»","text":"Плата считается «ГОТОВО» только тогда, когда защита подтверждена обратным считыванием. Этот порядок одинаково работает и для чистых плат, и для плат, которые уже были защищены раньше, — и всё это по тем же четырём проводам."},{"type":"heading","text":"Часть 3. Вариант через ST-Link по USB"},{"type":"para","text":"Вместо прямой прошивки с ножек GPIO можно прошивать через внешний программатор ST-Link, подключённый к Raspberry по USB. На дисплее этот режим обозначается меткой «USB»."},{"type":"para","text":"Главное, что нужно понять: сигналы те же самые. ST-Link несёт к плате STM32 те же четыре сигнала SWD — SWDIO, SWCLK, 3V3 и GND, — просто они идут не с ножек Raspberry, а через USB-донгл (через сам программатор ST-Link). От Raspberry к ST-Link идёт обычный кабель USB; от ST-Link к плате STM32 идут те же четыре сигнала."},{"type":"para","text":"Что важно при варианте с ST-Link:"},{"type":"list","ordered":false,"items":["Когда вы прошиваете через ST-Link, выводы SWD на GPIO (контакты 22 и 23) НЕ используются — провода SWDIO/SWCLK на гребёнку Raspberry в этом случае подключать не нужно. Прошивка идёт через программатор.","Дисплей подключается ТОЧНО ТАК ЖЕ, как и в режиме GPIO: те же четыре провода I2C на контакты 1, 6, 3, 5 (см. Часть 1). Способ прошивки на дисплей не влияет — экран всегда висит на одних и тех же контактах.","Подключайте к плате STM32 правильные сигналы ST-Link: SWDIO к SWDIO, SWCLK к SWCLK, землю к земле, питание к питанию. Те же правила, что и для прямого подключения: не перепутать землю, питание и сигналы."]},{"type":"callout","variant":"info","title":"Логика прошивки одинакова","text":"Логика прошивки (снятие защиты → стирание → запись → проверка → включение RDP → подтверждение) при работе через ST-Link такая же, как и по GPIO. Меняется только то, КАК сигналы доходят до платы."},{"type":"heading","text":"Часть 4. Авто-определение режима (видно на дисплее)"},{"type":"para","text":"Вам НЕ нужно вручную переключать стенд между режимами. Он определяет способ работы сам, и результат всегда видно на дисплее — в правом верхнем углу экрана, рядом с заголовком."},{"type":"list","ordered":false,"items":["Если к Raspberry по USB подключён ST-Link — стенд использует его. В правом верхнем углу горит метка: USB.","Если ST-Link не подключён — стенд прошивает напрямую с ножек GPIO (битбанг SWD). В правом верхнем углу горит метка: GPIO."]},{"type":"para","text":"Как этим пользоваться на практике. Перед тем как прикладывать плату, бросьте взгляд на правый верхний угол дисплея и убедитесь, что там тот режим, который вы ожидаете:"},{"type":"list","ordered":false,"items":["Хотите прошивать прямо с Raspberry (4 провода на гребёнку) — в углу должно быть «GPIO». Если там «USB», значит к Raspberry подключён ST-Link; отключите его, если хотите режим GPIO.","Хотите прошивать через программатор — подключите ST-Link по USB и проверьте, что в углу появилось «USB»."]},{"type":"callout","variant":"ok","title":"Простая и надёжная проверка","text":"Эта метка — простой и надёжный способ убедиться, что стенд работает тем способом, который вы задумали. Никаких настроек менять не надо: подключили ST-Link — стало «USB», отключили — стало «GPIO»."},{"type":"heading","text":"Часть 5. На что обратить внимание. Что нельзя перепутать"},{"type":"para","text":"Это самая важная часть. Здесь собрано то, из-за чего чаще всего бывают проблемы. Прочитайте внимательно — аккуратное подключение экономит время и бережёт платы."},{"type":"heading","text":"5.1. Не перепутайте землю, питание и сигналы"},{"type":"para","text":"У вас три рода проводов, и их нельзя путать между собой:"},{"type":"list","ordered":false,"items":["ЗЕМЛЯ (GND) — общий минус. Для дисплея это контакт 6, для прошивки по GND это контакт 14. Земля обязательно должна быть общей: и у дисплея, и у платы STM32 земля идёт на землю Raspberry. Без общей земли ничего не заработает.","ПИТАНИЕ 3.3 В (3V3 / VDD) — плюс 3.3 вольта. Для дисплея это контакт 1, для платы STM32 (по GPIO) — контакт 17. Питание подаётся ТОЛЬКО на вывод питания платы и дисплея, и нигде больше.","СИГНАЛЫ — это линии данных и такта. У дисплея: SDA (контакт 3) и SCK/SCL (контакт 5). У прошивки: SWDIO (контакт 22) и SWCLK (контакт 23). Сигналы идут строго на свои выводы."]},{"type":"callout","variant":"danger","title":"Главное правило","text":"Питание идёт на питание, земля — на землю, сигнал — на свой сигнал. Никогда не подавайте питание (3V3) на сигнальный вывод и не сажайте сигнал на питание или на землю. Самая опасная ошибка — перепутать питание и землю местами: это подаёт напряжение не туда и может повредить плату."},{"type":"para","text":"Как себя подстраховать:"},{"type":"list","ordered":false,"items":["Подключайте по одному проводу и сразу сверяйтесь со списком и с картинкой wiring.png. Проговаривайте вслух: «SWDIO — контакт 22», «земля — контакт 14» и так далее.","Используйте провода разных цветов и держитесь одного правила цветов: например, чёрный — всегда земля, красный — всегда питание 3.3 В. Тогда даже взглядом видно, если земля или питание попали не туда.","Закончив, ещё раз пройдите весь список сверху вниз и проверьте каждый провод с обоих концов: и где он сидит на Raspberry, и где — на плате или дисплее.","Перед самой первой прошивкой прогоните одну пробную плату. Если она дошла до состояния «ГОТОВО» — разводка верная."]},{"type":"heading","text":"5.2. Не перепутайте SWDIO и SWCLK местами"},{"type":"para","text":"Два сигнала прошивки легко перепутать между собой, потому что названия похожи. Запомните:"},{"type":"list","ordered":false,"items":["SWDIO — это ДАННЫЕ, идут на контакт 22.","SWCLK — это ТАКТ, идёт на контакт 23."]},{"type":"callout","variant":"warn","title":"Признак перепутанных сигналов","text":"Если поменять их местами, связь по SWD не установится. На дисплее это проявится ошибкой с причиной «нет контакта SWD» (код 2), а светодиод будет мигать два раза. Увидели такое — первым делом проверьте, что SWDIO сидит на контакте 22, а SWCLK на контакте 23, и что они не перепутаны на стороне платы STM32."},{"type":"heading","text":"5.3. Проверьте плотный контакт"},{"type":"para","text":"Прошивка идёт через крошечные выводы. Если контакт «дребезжит» (провод сидит неплотно, площадка прижата неровно), связь может то появляться, то пропадать. Стенд сам повторяет попытку при дребезжащем контакте, но надёжнее с самого начала добиться плотного прижима. Если плату выдернули в процессе — это не брак: приложите её снова, и она перепрошьётся."},{"type":"callout","variant":"info","title":"Признаки плохого контакта","text":"Ошибка «нет контакта SWD» (код 2, светодиод мигает 2 раза) или связь, которая срывается на середине. Прижмите плату плотнее и приложите заново."},{"type":"heading","text":"5.4. Разделяйте: что для дисплея, а что для прошивки"},{"type":"para","text":
