бы понимать состояние, не глядя на текст, светодиоды Raspberry дублируют статус вспышками (мигание реализовано через таймеры ядра, чтобы оно не «застывало», пока идёт прошивка):"},{"type":"table","columns":["Сигнал светодиода","Что означает"],"rows":[["Зелёный «сердцебиение» (двойная вспышка)","Ожидание / готов: платы на контактах нет (или её только что сняли). Можно прикладывать новую плату."],["Зелёный и красный медленно сменяют друг друга","Нет прошивки: шить нечего, нужно загрузить прошивку."],["Зелёный часто мигает","Идёт прошивка — плату НЕ снимать, держать прижатой."],["Зелёный горит РОВНО","Готово — только теперь снимать плату. Защита подтверждена."],["Зелёный+красный строб, затем авто-готовность","Прервано (плату выдернули в процессе). Это не брак — приложите плату снова."],["Зелёный тройной импульс","Прошивка с флешки принята."],["Красный мигает КОДОМ, держится до снятия платы","ОШИБКА (считайте число вспышек в группе): 2 вспышки = нет или потерян контакт SWD; 3 вспышки = запись / проверка / подтверждение RDP не прошли."],["Красный мигает кодом ~8 секунд (ошибка флешки)","4 вспышки = на флешке нет файла .hex; 5 вспышек = на флешке два и более файла .hex (нужен ровно один)."]]},{"type":"callout","variant":"info","title":"Коды дисплея и светодиода совпадают","text":"Коды на светодиоде совпадают по смыслу с кодами на дисплее: код 2 — «нет контакта SWD», код 3 — «запись/пров/RDP». Снимать плату по дисплею и по светодиоду нужно одинаково — они говорят одно и то же. Если сомневаетесь, смотрите на светодиод: ровный — да, мигающий — нет."},{"type":"heading","text":"Опечатывание (lockdown)"},{"type":"para","text":"После lockdown остаются только эти службы и обычная загрузка; всякий вход в систему закрыт. Службам прошивки и дисплея вход в систему не нужен — они работают от автозапуска."},{"type":"heading","text":"Коротко о главном"},{"type":"list","ordered":false,"items":["Внутри — Raspberry Pi 4, полностью офлайн. Прошивает платы STM32F103 и включает на каждой защиту от чтения RDP.","Один «тач» на плату — это целая последовательность: связь → при необходимости разблок → сброс → стирание+запись → проверка → защита → сброс → подтверждение RDP. Плата «ГОТОВО» только когда RDP подтверждена обратным считыванием.","Всё по 4 проводам (SWDIO, SWCLK, GND, 3V3): без NRST и без выключения питания. Сброс — программный, по SWD (SYSRESETREQ), он перезагружает option-байты F1. Это тот же механизм, что у ST-Link Utility.","Работает и с чистыми, и с уже защищёнными платами: сценарий сам решает, нужна ли разблокировка.","Два транспорта с автовыбором: ST-Link по USB (метка «USB») или прямой битбанг SWD по ножкам Raspberry (метка «GPIO»). Метка — в правом верхнем углу дисплея.","OpenOCD статический: самодостаточный, без apt и без зависимостей — идеально для офлайн-устройства.","Демон крутится в цикле: ждёт плату, прошивает, пишет состояние в файл status, который читает дисплей. Светодиоды дублируют статус вспышками.","Хеш SHA-256 на экране (первые 16 знаков; полный — в status и журнале) подтверждает, что залита именно одобренная сборка.","Стенд живуч: вызовы ограничены по времени, плохой контакт сам повторяется, выдернутая плата — не брак, приложите снова."]}]`),Oi={stages:[{id:"connect",title:"СВЯЗЬ",desc:"Подключение к микроконтроллеру по SWD и останов ядра (init + reset halt). Проверяется, что контакт есть и чип отвечает.",oledHint:"Этап «СВЯЗЬ» + проценты + полоса прогресса, «НЕ ОТКЛЮЧАЙТЕ #<N>»",ledHint:"Зелёный часто мигает"},{id:"unlock",title:"РАЗБЛОК",desc:"Только если плата уже защищена: снятие RDP полным стиранием чипа (stm32f1x unlock 0). На чистой плате проходит мгновенно.",oledHint:"Этап «РАЗБЛОК» (появляется только для защищённой платы)",ledHint:"Зелёный часто мигает"},{id:"reset-after-unlock",title:"СБРОС (после разблока)",desc:"Программный системный сброс по SWD с остановом ядра (reset halt), чтобы перезагрузить option-байты и снятие защиты вступило в силу.",oledHint:"Видно в рамках этапа прошивки (отдельной надписи нет)",ledHint:"Зелёный часто мигает"},{id:"write",title:"ЗАПИСЬ",desc:'Стирание флеш-памяти и запись прошивки (program "$FW" verify; для .bin — с адресом 0x08000000).',oledHint:"Этап «ЗАПИСЬ» + проценты + полоса прогресса, имя прошивки на экране",ledHint:"Зелёный часто мигает"},{id:"verify",title:"ПРОВЕРКА",desc:"Перечитывание записанного и сверка с файлом прошивки (часть program ... verify). Подтверждает, что прошивка легла без ошибок.",oledHint:"Этап «ПРОВЕРКА» + проценты",ledHint:"Зелёный часто мигает"},{id:"lock",title:"ЗАЩИТА",desc:"Включение защиты от чтения RDP (stm32f1x lock 0). С этого момента прошивку из чипа нельзя считать через отладку.",oledHint:"Этап «ЗАЩИТА»",ledHint:"Зелёный часто мигает"},{id:"reset-after-lock",title:"СБРОС (после защиты)",desc:"Программный системный сброс по SWD с остановом ядра (reset halt), чтобы новые option-байты защиты вступили в силу.",oledHint:"Видно в рамках этапа «ЗАЩИТА» (отдельной надписи нет)",ledHint:"Зелёный часто мигает"},{id:"rdp-readback",title:"ПОДТВЕРЖДЕНИЕ RDP",desc:"Обратное считывание регистра опций (stm32f1x options_read 0). В выводе должно быть «read protection: on», иначе плата считается сбоем (код 3).",oledHint:"Завершает этап «ЗАЩИТА»; при успехе ведёт к экрану «ГОТОВО»",ledHint:"Зелёный часто мигает (до подтверждения)"},{id:"run-done",title:"ГОТОВО",desc:"Снятие с останова и запуск ядра (reset run), корректное завершение сеанса (shutdown), счётчик «ок» +1. Плата прошита, проверена, защита включена и подтверждена.",oledHint:"Галочка + «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ», «#<N> ок сбой <M>»",ledHint:"Зелёный горит РОВНО — только теперь снимать плату"}]},nv={id:_i,title:bi,tagline:ki,sourceFiles:Di,summary:wi,blocks:Pi,data:Oi},ov=Object.freeze(Object.defineProperty({__proto__:null,blocks:Pi,data:Oi,default:nv,id:_i,sourceFiles:Di,summary:wi,tagline:ki,title:bi},Symbol.toStringTag,{value:"Module"})),Ri="glossary",Ti="Глоссарий",Ii="Все термины и сокращения стенда OTAБEK STM32 — простыми словами",ji=["документация/15-СЛОВАРЬ-ТЕРМИНОВ.txt","документация-2/18-ГЛОССАРИЙ.txt"],Ci="Этот словарь объясняет простым языком все слова и сокращения, которые встречаются при работе со стендом прошивки STM32 «OTAБEK STM32». Если непонятное слово попалось на дисплее, в инструкции или в разговоре — найдите его здесь. Каждое объяснение привязано именно к этому устройству, поэтому общие определения в интернете искать не нужно (тем более что стенд работает офлайн, без интернета). Термины сгруппированы — от «железа» к «защите» и к «системе»; точные надписи с дисплея приведены в кавычках ровно так, как они показываются.",Wi=JSON.parse(`[{"type":"callout","variant":"info","title":"Что это за устройство (одной фразой)","text":"Это автономный офлайн-стенд на базе мини-компьютера Raspberry Pi 4. Он прошивает платы STM32F103C8T6 и сразу же включает на каждой плате защиту от чтения прошивки. Всё происходит в одно касание: приложили плату — она прошилась и опечаталась. Интернет устройству не нужен и недоступен."},{"type":"para","text":"Как пользоваться словарём: термины идут по группам, от «железа» к «защите» и к «системе»; внутри текста встречаются короткие пояснения «почему так сделано»; точные надписи, которые вы видите на дисплее, приведены в кавычках ровно так, как они показываются."},{"type":"heading","text":"Группа 1. Плата, прошивка, файлы"},{"type":"list","ordered":false,"items":["Прошивка — программа, которая «зашивается» внутрь микросхемы и заставляет её делать свою работу. Без прошивки плата STM32 пустая и ничего не умеет. Стенд берёт файл прошивки и записывает его в каждую плату; одна и та же прошивка записывается во все платы подряд, пока вы не загрузите другую. На стенде активна одна прошивка — её и получают все платы.","Файл .hex (хекс-файл) — файл с прошивкой в специальном текстовом формате (расширение .hex, формат Intel HEX). В нём записано, какие байты и по каким адресам должны оказаться в памяти микросхемы. Стенд работает именно с .hex: такой файл вы кладёте в папку прошивок или приносите на флешке. Имя файла при этом сохраняется — как назвали, так и останется.","Плата STM32 / STM32F103C8T6 — маленькая микросхема-микроконтроллер от компании ST. Внутри неё есть собственная память (флеш), куда и попадает прошивка. STM32F103C8T6 — распространённая модель, на которую рассчитан стенд (семейство STM32F103).","Прошивка «на лету» — прошивки лежат в папке /opt/flashjig/firmware/. Активной считается та, на которую указывает специальная ссылка с именем 'current'; если такой ссылки нет — берётся самый новый файл в папке. Менять прошивку можно прямо во время работы (через флешку или копированием файла) — без переустановки и без перезапуска устройства.","«Тач» / одно касание — так называют весь процесс прошивки одной платы, который запускается одним действием — простым прикладыванием платы. Внутри одного касания устройство само делает целую цепочку шагов: подключение, при необходимости снятие старой защиты с полным стиранием, сброс, стирание и запись прошивки, проверку, включение защиты от чтения, сброс и обратную проверку, что защита действительно включилась. Вам ничего нажимать не нужно."]},{"type":"heading","text":"Группа 2. Как стенд «разговаривает» с платой (интерфейс SWD)"},{"type":"list","ordered":false,"items":["SWD (Serial Wire Debug) — «провод отладки», по которому стенд общается с микросхемой STM32: читает её, стирает, записывает прошивку, перезагружает и проверяет результат. Это основной способ связи между стендом и платой. Для работы по SWD нужно всего 4 провода: SWDIO, SWCLK, GND и 3V3.","SWDIO — один из двух главных проводов SWD, линия данных. По ней информация идёт в обе стороны: команды от стенда к плате и ответы от платы к стенду.","SWCLK — второй главный провод SWD, линия тактов (синхронизации). Это как «метроном»: по нему стенд задаёт ритм, под который передаются биты по линии SWDIO.","NRST — отдельный провод аппаратного сброса (reset) микросхемы. Важная особенность этого стенда: NRST НЕ требуется. Стенд перезагружает плату программно, прямо по проводу SWD (командой системного сброса SYSRESETREQ), и этого достаточно. Поэтому подключать NRST и тем более отключать питание платы не нужно — хватает 4 проводов.","GND — «земля», общий провод. Он обязателен: без общей земли стенд и плата не смогут понять сигналы друг друга. Это один из 4 необходимых проводов.","3V3 (3,3 В) — питание 3,3 вольта. Через него стенд подаёт на плату нужное напряжение для работы. Это четвёртый из обязательных проводов SWD.","Четыре провода (почему их хватает) — прошивка по SWD требует только SWDIO, SWCLK, GND и 3V3. Сброс делается программно по тому же SWD, поэтому отдельный провод NRST и ручное выключение питания не нужны. Это работает одинаково и для чистых, и для уже защищённых плат. Тот же подход применяет известная программа ST-Link Utility."]},{"type":"heading","text":"Группа 3. Через что идёт связь (транспорт: ST-Link или GPIO)"},{"type":"list","ordered":false,"items":["Транспорт — способ, которым стенд физически добирается до проводов SWD. Стенд сам определяет транспорт автоматически и показывает его в правом верхнем углу дисплея: «USB» или «GPIO». Выбирать ничего не надо — стенд решает сам.","ST-Link — небольшой USB-программатор (донгл) для микросхем STM32. Если ST-Link подключён к Raspberry по USB, стенд использует именно его, и в углу дисплея показывается метка «USB». Те же 4 сигнала SWD при этом идут через ST-Link, а выводы SWD на самой Raspberry не задействуются (дисплей подключается так же, как обычно). Это один из двух способов подключения; второй — напрямую по GPIO.","GPIO (General Purpose Input/Output — выводы общего назначения) — ряд контактов-«ножек» на самой Raspberry Pi. Если ST-Link не подключён, стенд прошивает плату напрямую через эти контакты, без отдельного программатора, и в углу дисплея показывается метка «GPIO» (этот способ называют «битбанг SWD»). Те же выводы используются и для подключения дисплея по I2C (через ножки GPIO2 и GPIO3): «GPIO» — это общий ряд контактов, часть из них занимает дисплей, а часть может занимать прямая прошивка по SWD.","Битбанг (bit-bang) — способ, когда сигнал формируется программно, прямым переключением выводов GPIO, без отдельной микросхемы-программатора. Именно так работает режим «GPIO» на этом стенде: Raspberry сама «вручную» дёргает ножками сигнал SWD.","Выводы (контакты, «ножки») — металлические контакты на 40-контактном разъёме Raspberry. К ним подключаются провода к дисплею и к плате. Точная схема подключения есть на картинке wiring.png в архиве. Кратко по SWD через GPIO: SWDIO — контакт 22 (GPIO25), SWCLK — контакт 23 (GPIO11), 3V3 — контакт 17, GND — контакт 14."]},{"type":"table","columns":["Сигнал SWD","Контакт Raspberry Pi","GPIO"],"rows":[["SWDIO","контакт 22","GPIO25"],["SWCLK","контакт 23","GPIO11"],["3V3","контакт 17","—"],["GND","контакт 14","—"]]},{"type":"heading","text":"Группа 4. Защита прошивки (RDP, Option Bytes, стирание)"},{"type":"list","ordered":false,"items":["RDP / защита от чтения (Read-Out Protection — защита от считывания) — встроенная в STM32 аппаратная защита, которая закрывает возможность вычитать прошивку через отладочный интерфейс. Стенд включает RDP на КАЖДОЙ плате. Уровень 1 делает флеш-память недоступной для чтения через отладку. Снять эту защиту можно только полным стиранием микросхемы — а оно стирает саму прошивку, поэтому достать её всё равно не получится. Так ваша прошивка защищена от копирования.","Подтверждение RDP (обратное считывание) — стенд не просто включает защиту, а потом перечитывает регистр опций платы и убеждается, что RDP действительно включена. Плата считается успешной и получает статус «ГОТОВО» ТОЛЬКО когда защита подтверждена. На дисплее в этот момент видна строка «RDP защита ВКЛ».","Option Bytes (опционные байты) — особая маленькая область настроек внутри STM32, отдельная от основной прошивки. В ней, в числе прочего, хранится уровень защиты RDP. Стенд читает и меняет именно эти байты, когда включает защиту или снимает её. При программном сбросе по SWD опционные байты на STM32F1 перечитываются заново — поэтому отдельный аппаратный сброс не нужен.","Массовое стирание (полное стирание) — очистка всей флеш-памяти микросхемы целиком. Стенд применяет его в двух случаях: чтобы снять старую защиту с уже защищённой платы (иначе её не перепрошить) и как часть записи новой прошивки. Поскольку снятие RDP всегда стирает чип, вычитать чужую защищённую прошивку этим путём невозможно — остаётся пустая память.","Чистая и уже защищённая плата — «чистая» плата новая или ранее не защищённая; «уже защищённая» — та, на которой RDP была включена раньше. Стенд умеет работать с обеими: с защищённой он сначала снимет защиту полным стиранием, и только потом запишет новую прошивку. Для вас разницы нет — приложите плату, всё остальное стенд сделает сам."]},{"type":"heading","text":"Группа 5. Хеш и контроль подлинности прошивки"},{"type":"list","ordered":false,"items":["Хеш / контрольная сумма — короткий криптографический «отпечаток пальца» файла: набор символов, который однозначно соответствует содержимому. Для одной и той же прошивки хеш всегда одинаков; если в файле изменится хоть один байт — хеш станет совсем другим. По хешу удобно проверять, что прошивка именно та, что нужно, и что она не повреждена.","SHA-256 — конкретный, признанный во всём мире способ вычисления такого отпечатка (256 бит, стандарт NIST FIPS 180-4). Стенд считает SHA-256 от содержимого файла прошивки прямо у себя, локально (без интернета).","Как хеш показывается и где хранится — на дисплее видны первые 16 шестнадцатеричных знаков (hex) хеша активной прошивки: это короткая строка для быстрой сверки на глаз. Полный хеш целиком записан в файл /opt/flashjig/status и в журнал. Сравнив показанный хеш с эталонным хешем нужного выпуска прошивки, вы убеждаетесь, что загружена именно одобренная сборка; любая подмена или повреждение сразу дадут другой хеш.","Hex (шестнадцатеричный вид) — «hex» означает шестнадцатеричную запись чисел с использованием цифр 0-9 и букв A-F. В таком виде показывается хеш на дисплее. Не путайте с файлом «.hex»: там «hex» — это формат файла прошивки, а здесь — просто способ записи чисел."]},{"type":"heading","text":"Группа 6. Дисплей и связь с ним (OLED, I2C, GPIO)"},{"type":"list","ordered":false,"items":["Дисплей OLED / SSD1306 — маленький светящийся экранчик 0,96 дюйма, 128x64 точки (контроллер SSD1306). Показывает всё по-русски: вверху заголовок «OTABEK STM32», в правом верхнем углу — транспорт «USB» или «GPIO», а ниже — текущее состояние (готов, идёт прошивка, готово, ошибка и т. п.).","I2C — простая двухпроводная «шина» (способ соединения), по которой Raspberry общается с дисплеем. Двух проводов данных (SDA и SCL) плюс питание и земля достаточно, чтобы передавать на экран весь текст и полосу прогресса. Поддержку I2C включает установщик, поэтому после установки нужна перезагрузка, чтобы дисплей заработал.","SDA / SCL (SCK) — два сигнальных провода шины I2C. SDA — линия данных, SCL (иногда подписана SCK) — линия тактов. По схеме: SDA идёт на контакт 3 (GPIO2), SCL/SCK — на контакт 5 (GPIO3); питание дисплея VDD — на контакт 1 (3V3), GND — на контакт 6.","GPIO (применительно к дисплею) — те же выводы Raspberry используются и для подключения дисплея по I2C (через ножки GPIO2 и GPIO3). То есть «GPIO» — это общий ряд контактов; часть из них занимает дисплей, а часть может занимать прямая прошивка по SWD."]},{"type":"table","columns":["Вывод дисплея","Контакт Raspberry Pi","GPIO"],"rows":[["VDD (3V3)","контакт 1","—"],["GND","контакт 6","—"],["SDA","контакт 3","GPIO2"],["SCL / SCK","контакт 5","GPIO3"]]},{"type":"heading","text":"Группа 7. Программы внутри стенда (OpenOCD, демон, службы)"},{"type":"list","ordered":false,"items":["Прошивальщик / OpenOCD — программа, которая собственно умеет «разговаривать» с микросхемами по SWD: стирать, записывать прошивку, читать и менять опционные байты, перезагружать плату. На этом стенде используется полностью статическая (самодостаточная) сборка OpenOCD — без дополнительных пакетов и зависимостей, встроена в комплект. Она лежит в /opt/flashjig/openocd/. Полезно знать: каждый запуск OpenOCD ограничен по времени, поэтому сломанная или выдернутая плата не «вешает» стенд.","Демон — программа, которая постоянно работает в фоне сама по себе, без вашего участия, и тихо делает свою работу. Главный демон стенда — flash-jig (файл flash-jig.sh): он следит за платой, запускает прошивку и обновляет состояние. Слова «демон» и «фоновая служба» здесь означают примерно одно и то же.","systemd / служба (сервис) — systemd это «дирижёр» в Raspberry: он запускает нужные программы при включении и следит, чтобы они работали. Отдельная управляемая им программа называется службой (или сервисом). На стенде две службы: flash-jig.service (демон прошивки) и flashjig-oled.service (вывод на дисплей). Они включаются установщиком и стартуют сами при включении питания.","udev — часть системы, которая замечает, что вы что-то подключили или отключили (например, вставили флешку или ST-Link), и сразу запускает нужное действие. Благодаря правилам udev стенд переходит в готовность при подключении ST-Link и начинает импорт при подключении флешки — автоматически, без вашего вмешательства.","Журнал / journalctl — запись того, что происходило в системе: какие шаги прошли, что вышло, какие были ошибки. Полный хеш прошивки тоже попадает в журнал. Посмотреть журнал демона в реальном времени можно командой journalctl -u flash-jig -f. Текущее состояние видно в файле: cat /opt/flashjig/status.","Файлы состояния (status, flash.log, flash.live) — status это небольшой файл с текущим состоянием: имя прошивки, полный хеш и счётчики «ок/сбой» (его читает дисплей); flash.log — журнал прошивок; flash.live — данные о текущем процессе. Всё это лежит в /opt/flashjig/."]},{"type":"heading","text":"Группа 8. Импорт прошивки с флешки и безопасное монтирование"},{"type":"list","ordered":false,"items":["Импорт прошивки с USB — чтобы загрузить новую прошивку, вставьте в стенд флешку, на которой лежит РОВНО ОДИН файл .hex (в любой папке на флешке). Стенд сам найдёт его и заберёт (имя сохранится), на дисплее покажется «ПРОШИВКА ПРИНЯТА», и дальше платы будут прошиваться уже новой прошивкой. Если на флешке нет ни одного .hex — стенд подаст ошибку (красный мигнёт 4 раза). Если файлов .hex два или больше — тоже ошибка (красный мигнёт 5 раз), и текущая прошивка останется прежней.","Монтирование — подключение флешки к системе так, чтобы можно было прочитать её содержимое. На этом стенде флешка монтируется только для чтения и с жёсткими ограничениями, чтобы с неё нельзя было сделать ничего, кроме считывания самого файла прошивки.","Монтирование только для чтения (ro) — «ro» (read-only) означает «только чтение». Стенд может прочитать с флешки файл .hex, но не может на неё ничего писать или менять. Это защищает и стенд, и саму флешку: посторонние программы не смогут что-либо туда подложить или подменить в момент импорта.","noexec — опция монтирования, которая запрещает запускать (исполнять) что-либо с флешки. Даже если на флешке окажется какая-то программа, стенд её не выполнит — он считывает только файл прошивки. Это защита от вредоносных файлов на чужой флешке.","nosuid — опция, которая запрещает файлам с флешки получать повышенные права (так называемые SUID-права). То есть с флешки нельзя «протащить» в систему что-то с правами администратора.","nodev — опция, которая запрещает воспринимать с флешки специальные файлы-устройства. Это закрывает ещё один возможный обходной путь и не даёт через флешку добраться до «железа» системы.","nosymfollow — опция, которая запрещает идти по символическим ссылкам с флешки. Символическая ссылка — это файл-указатель на другое место; запрет переходить по ним не даёт хитростью увести стенд в чужие файлы за пределами флешки.","noatime — опция, при которой система не записывает на флешку отметки времени доступа к файлам. Лишних записей на флешку не происходит — это согласуется с режимом «только чтение» и бережёт флешку.","Итог по безопасности флешки — все опции монтирования флешки разом: ro, noexec, nosuid, nodev, nosymfollow, noatime. Вместе они означают простую вещь: с флешки считывается только сам файл .hex, и ничего больше — ничего нельзя запустить, нельзя повысить права, нельзя записать на флешку. Так обновление прошивки остаётся удобным (просто вставьте флешку) и при этом безопасным."]},{"type":"heading","text":"Группа 9. Установка и опечатывание (install, lockdown)"},{"type":"list","ordered":false,"items":["Развёртывание (установка) — первичная настройка устройства. По шагам (от имени root): распаковать архив → зайти в его папку → положить туда свой файл .hex → sudo ./install.sh → sudo reboot (перезагрузка нужна, чтобы заработал дисплей по I2C) → прошить пробную плату для проверки → и, когда всё хорошо, в самом конце: sudo ./lockdown.sh --commit → sudo reboot.","install.sh (установщик) — скрипт установки. Он разворачивает самодостаточный OpenOCD (без apt и без зависимостей), включает службы flash-jig и flashjig-oled и правила udev, включает I2C, создаёт папку прошивок /opt/flashjig/firmware и берёт прошивку из любого .hex, лежащего рядом с ним (имя сохраняется). Установщик идемпотентен — его можно безопасно запускать повторно, хуже не станет.","Идемпотентность — «идемпотентный» означает, что повторный запуск даёт тот же результат и ничего не ломает. Про установщик install.sh это сказано прямо: запустите его второй раз — он просто приведёт всё к нужному состоянию.","Опечатывание / lockdown — превращение Raspberry в закрытый, «запломбированный» прибор, у которого нет ни входа, ни сети. Делается командой sudo ./lockdown.sh --commit в самом конце, когда всё уже проверено. После опечатывания устройство только прошивает платы и показывает дисплей — и больше ничего постороннего не умеет; изменения системы — только переустановкой карты.","lockdown.sh --commit (что именно он делает) — эта команда: убирает все способы входа — SSH (отключён, замаскирован, ключи удалены), все текстовые консоли (все tty и последовательный порт), графику (GUI), аварийный и спасательный режимы; блокирует все учётные записи (нет работающих паролей, оболочки заменены на nologin); отключает «горячие клавиши» magic SysRq и сочетание Ctrl-Alt-Del; маскирует VNC, Cockpit и telnet; навсегда отключает сеть: Wi-Fi и Bluetooth выключены и внесены в чёрный список ядра, сетевые службы замаскированы — у устройства не остаётся никакой сети. Продолжают работать только нужное: загрузка, systemd, udev, демон прошивки, дисплей и импорт с USB (ни входа, ни сети им не требуется).","Сухой прогон (dry run) — если запустить lockdown.sh без аргумента --commit, он ничего не меняет, а только объясняет, что бы он сделал. Это «сухой прогон» — безопасный способ заранее прочитать и понять, что произойдёт при опечатывании.","Необратимость и путь обновления — опечатывание необратимо «изнутри»: с уже работающей системы откатить его нельзя, потому что входа в неё больше нет. Чтобы что-то изменить или обновить опечатанное устройство, нужно заново записать SD-карту — это и есть штатный путь обновления.","SSH — обычный способ зайти на компьютер по сети с другого компьютера и управлять им. На опечатанном стенде SSH полностью отключён, замаскирован и его ключи удалены — удалённо войти нельзя. Это часть защиты: к прибору нет сетевого доступа.","tty / консоль — текстовый вход, через который обычно набирают команды на самом устройстве (с клавиатуры или по последовательному порту). После опечатывания все такие консоли отключены, чтобы в прибор нельзя было войти и что-то поменять.","nologin — специальная пустая «оболочка», которую назначают учётным записям, чтобы под ними нельзя было войти и работать. Опечатывание переводит все учётные записи на nologin — то есть зайти под ними невозможно.","Чёрный список ядра (blacklist) — список того, что системе запрещено загружать. Опечатывание вносит туда Wi-Fi и Bluetooth, поэтому они не включатся даже теоретически. Это надёжнее простого выключения.","magic SysRq / Ctrl-Alt-Del — специальные «горячие» сочетания клавиш, которыми обычно можно было бы влиять на работу системы (например, перезагрузить её особым способом). Опечатывание их отключает, чтобы с прибором нельзя было сделать ничего постороннего через клавиатуру.","VNC / Cockpit / telnet — разные способы удалённого доступа и управления компьютером по сети. На опечатанном стенде все они замаскированы (отключены), потому что у прибора вообще не должно быть удалённого доступа."]},{"type":"heading","text":"Группа 10. Небольшие, но полезные понятия"},{"type":"list","ordered":false,"items":["Светодиоды Raspberry (ACT / PWR) — на самой плате Raspberry есть два светодиода: зелёный (ACT) и красный (PWR). Стенд использует их как подсказку без дисплея: зелёный бьётся сердцебиением (две короткие вспышки, затем пауза) в ожидании; ровно горящий зелёный значит «готово, можно снимать плату»; частое мигание зелёного — идёт прошивка, плату не снимать; мигание красного определённым числом вспышек — код ошибки.","Код ошибки — число, которое подсказывает причину сбоя. На дисплее видно «ОШИБКА код <K>» и строка причины, а красный светодиод мигает столько же раз. Главные коды: 2 — «нет контакта SWD» (нет связи с платой); 3 — «запись/пров/RDP» (не прошли запись, проверка или подтверждение защиты). Ошибки флешки: 4 вспышки — нет .hex; 5 вспышек — больше одного .hex.","Живучесть — свойство стенда не зависать из-за плохой или выдернутой платы. Каждый запуск OpenOCD ограничен по времени; дребезжащий или плохой контакт автоматически повторяется; плата, выдернутая в процессе, браком не считается — приложите её снова, и она перепрошится.","Контакты (физические номера) — выводы 40-контактного разъёма Raspberry Pi нумеруются по физическому положению: конт. 1 — с краю (помечен), конт. 2 рядом с ним, и т. д.","Микросхема microSD / карта — карта памяти, с которой загружается Raspberry Pi. На неё записывают подготовленный образ системы и комплект.","Бегущая строка — длинное имя прошивки на дисплее прокручивается, чтобы поместиться."]},{"type":"callout","variant":"ok","title":"Коротко о кодах ошибок","text":"Код 2 — нет контакта SWD (нет связи с платой). Код 3 — запись/проверка/RDP не прошли. Импорт с флешки: 4 вспышки красного — на флешке нет .hex; 5 вспышек — на флешке больше одного .hex. Число вспышек красного светодиода всегда совпадает с кодом ошибки на дисплее."}]`),Gi=JSON.parse(`{"terms":[{"term":"Прошивка","definition":"Программа, которая «зашивается» внутрь микросхемы и заставляет её делать свою работу. Без прошивки плата STM32 пустая и ничего не умеет. Стенд берёт файл прошивки и записывает его в каждую плату; одна и та же прошивка записывается во все платы подряд, пока вы не загрузите другую. На стенде активна одна прошивка — её и получают все платы."},{"term":"Файл .hex (хекс-файл)","definition":"Файл с прошивкой в специальном текстовом формате (расширение .hex, формат Intel HEX). В нём записано, какие байты и по каким адресам должны оказаться в памяти микросхемы. Стенд работает именно с .hex: такой файл вы кладёте в папку прошивок или приносите на флешке. Имя файла при этом сохраняется — как назвали, так и останется."},{"term":"Плата STM32 / STM32F103C8T6","definition":"Маленькая микросхема-микроконтроллер от компании ST. Внутри неё есть собственная память (флеш), куда и попадает прошивка. STM32F103C8T6 — распространённая модель из семейства STM32F103, именно на неё рассчитан стенд."},{"term":"Прошивка «на лету»","definition":"Прошивки лежат в папке /opt/flashjig/firmware/. Активной считается та, на которую указывает специальная ссылка с именем 'current'; если такой ссылки нет — берётся самый новый файл в папке. Менять прошивку можно прямо во время работы (через флешку или копированием файла) — без переустановки и без перезапуска устройства."},{"term":"«Тач» / одно касание","definition":"Весь процесс прошивки одной платы, который запускается одним действием — простым прикладыванием платы. Внутри одного касания устройство само делает целую цепочку шагов: подключение, при необходимости снятие старой защиты с полным стиранием, сброс, стирание и запись прошивки, проверку, включение защиты от чтения, сброс и обратную проверку, что защита действительно включилась. Вам ничего нажимать не нужно."},{"term":"SWD","definition":"Serial Wire Debug — «провод отладки», по которому стенд общается с микросхемой STM32: читает её, стирает, записывает прошивку, перезагружает и проверяет результат. Это основной (двухпроводной плюс земля и питание) способ связи между стендом и платой. Для работы по SWD нужно всего 4 провода: SWDIO (данные), SWCLK (такт), GND (земля), 3V3 (питание)."},{"term":"SWDIO","definition":"Один из двух главных проводов SWD — линия данных. По ней информация идёт в обе стороны: команды от стенда к плате и ответы от платы к стенду."},{"term":"SWCLK","definition":"Второй главный провод SWD — линия тактов (синхронизации). Это как «метроном»: по нему стенд задаёт ритм, под который передаются биты по линии SWDIO."},{"term":"NRST","definition":"Отдельный провод аппаратного сброса (reset) микросхемы. Важная особенность этого стенда: NRST НЕ требуется. Стенд перезагружает плату программно, прямо по проводу SWD (командой системного сброса SYSRESETREQ), и этого достаточно. Поэтому подключать NRST и тем более отключать питание платы не нужно — хватает 4 проводов."},{"term":"GND","definition":"«Земля», общий провод. Он обязателен: без общей земли стенд и плата не смогут понять сигналы друг друга. Это один из 4 необходимых проводов SWD."},{"term":"3V3 (3,3 В)","definition":"Питание 3,3 вольта. Через него стенд подаёт на плату нужное напряжение для работы. Это четвёртый из обязательных проводов SWD."},{"term":"Четыре провода (почему их хватает)","definition":"Прошивка по SWD требует только SWDIO, SWCLK, GND и 3V3. Сброс делается программно по тому же SWD, поэтому отдельный провод NRST и ручное выключение питания не нужны. Это работает одинаково и для чистых, и для уже защищённых плат. Тот же подход применяет известная программа ST-Link Utility."},{"term":"Транспорт","definition":"Способ, которым стенд физически добирается до проводов SWD. Стенд сам определяет транспорт автоматически и показывает его в правом верхнем углу дисплея: «USB» или «GPIO». Выбирать ничего не надо — стенд решает сам."},{"term":"ST-Link","definition":"Небольшой USB-программатор (донгл, USB-адаптер) для микросхем STM32. Если ST-Link подключён к Raspberry по USB, стенд использует именно его, и в углу дисплея показывается метка «USB». Те же 4 сигнала SWD при этом идут через ST-Link, а выводы SWD на самой Raspberry не задействуются (дисплей подключается так же, как обычно). Это один из двух способов подключения к плате; второй — напрямую по GPIO."},{"term":"GPIO","definition":"General Purpose Input/Output (выводы общего назначения) — ряд контактов-«ножек» на самой Raspberry Pi. Если ST-Link не подключён, стенд прошивает плату напрямую через эти контакты, без отдельного программатора, и в углу дисплея показывается метка «GPIO» (этот способ называют «битбанг SWD»). Те же выводы используются и для подключения дисплея по шине I2C (через ножки GPIO2 и GPIO3): «GPIO» — общий ряд контактов, часть из них занимает дисплей, а часть может занимать прямая прошивка по SWD."},{"term":"Битбанг (bit-bang)","definition":"Способ, когда сигнал формируется программно, прямым переключением выводов GPIO, без отдельной микросхемы-программатора. Именно так работает режим «GPIO» на этом стенде: Raspberry сама «вручную» дёргает ножками сигнал SWD."},{"term":"Выводы (контакты, «ножки»)","definition":"Металлические контакты на 40-контактном разъёме Raspberry. К ним подключаются провода к дисплею и к плате. Точная схема подключения есть на картинке wiring.png в архиве. Кратко по SWD через GPIO: SWDIO — контакт 22 (GPIO25), SWCLK — контакт 23 (GPIO11), 3V3 — контакт 17, GND — контакт 14."},{"term":"RDP / защита от чтения","definition":"Read-Out Protection (защита от считывания) — встроенная в STM32 аппаратная защита, которая закрывает возможность вычитать прошивку через отладочный интерфейс. Стенд включает RDP на КАЖДОЙ плате. Уровень 1 делает флеш-память недоступной для чтения через отладку. Снять эту защиту можно только полным стиранием микросхемы — а оно стирает саму прошивку, поэтому достать её всё равно не получится. Так ваша прошивка защищена от копирования."},{"term":"Подтверждение RDP (обратное считывание)","definition":"Стенд не просто включает защиту, а потом перечитывает регистр опций платы и убеждается, что RDP действительно включена. Плата считается успешной и получает статус «ГОТОВО» ТОЛЬКО когда защита подтверждена. На дисплее в этот момент видна строка «RDP защита ВКЛ»."},{"term":"Option Bytes (опционные байты)","definition":"Особая маленькая область настроек внутри STM32, отдельная от основной прошивки. В ней, в числе прочего, хранится уровень защиты RDP. Стенд читает и меняет именно эти байты, когда включает защиту или снимает её. При программном сбросе по SWD опционные байты на STM32F1 перечитываются заново — поэтому отдельный аппаратный сброс не нужен."},{"term":"Массовое стирание (полное стирание)","definition":"Очистка всей флеш-памяти микросхемы целиком. Стенд применяет его в двух случаях: чтобы снять старую защиту с уже защищённой платы (иначе её не перепрошить) и как часть записи новой прошивки. Поскольку снятие RDP всегда стирает чип, вычитать чужую защищённую прошивку этим путём невозможно — остаётся пустая память."},{"term":"Чистая и уже защищённая плата","definition":"«Чистая» плата — новая или ранее не защищённая; «уже защищённая» — та, на которой RDP была включена раньше. Стенд умеет работать с обеими: с защищённой он сначала снимет защиту полным стиранием, и только потом запишет новую прошивку. Для вас разницы нет — приложите плату, всё остальное стенд сделает сам."},{"term":"Хеш / контрольная сумма","definition":"Короткий криптографический «отпечаток пальца» файла: набор символов, который однозначно соответствует содержимому. Для одной и той же прошивки хеш всегда одинаков; если в файле изменится хоть один байт — хеш станет совсем другим. По хешу удобно проверять, что прошивка именно та, что нужно, и что она не повреждена."},{"term":"SHA-256","definition":"Конкретный, признанный во всём мире способ вычисления такого отпечатка (256 бит, стандарт NIST FIPS 180-4). Стенд считает SHA-256 от содержимого файла прошивки прямо у себя, локально (без интернета). На дисплее показываются первые 16 знаков."},{"term":"Как хеш показывается и где хранится","definition":"На дисплее видны первые 16 шестнадцатеричных знаков (hex) хеша активной прошивки — короткая строка для быстрой сверки на глаз. Полный хеш целиком записан в файл /opt/flashjig/status и в журнал. Сравнив показанный хеш с эталонным хешем нужного выпуска прошивки, вы убеждаетесь, что загружена именно одобренная сборка; любая подмена или повреждение сразу дадут другой хеш."},{"term":"Hex (шестнадцатеричный вид)","definition":"«Hex» означает шестнадцатеричную запись чисел с использованием цифр 0-9 и букв A-F. В таком виде показывается хеш на дисплее. Не путайте с файлом «.hex»: там «hex» — это формат файла прошивки, а здесь — просто способ записи чисел."},{"term":"Дисплей OLED / SSD1306","definition":"Маленький светящийся экранчик 0,96 дюйма, 128x64 точки (контроллер SSD1306). Показывает всё по-русски: вверху заголовок «OTABEK STM32», в правом верхнем углу — транспорт «USB» или «GPIO», а ниже — текущее состояние (готов, идёт прошивка, готово, ошибка и т. п.)."},{"term":"I2C","definition":"Простая двухпроводная «шина» (способ соединения), по которой Raspberry общается с дисплеем. Двух проводов данных (SDA и SCL) плюс питание и земля достаточно, чтобы передавать на экран весь текст и полосу прогресса. Поддержку I2C включает установщик, поэтому после установки нужна перезагрузка, чтобы дисплей заработал."},{"term":"SDA / SCL (SCK)","definition":"Два сигнальных провода шины I2C. SDA — линия данных, SCL (иногда подписана SCK) — линия тактов. По схеме: SDA идёт на контакт 3 (GPIO2), SCL/SCK — на контакт 5 (GPIO3); питание дисплея VDD — на контакт 1 (3V3), GND — на контакт 6."},{"term":"GPIO (применительно к дисплею)","definition":"Те же выводы Raspberry используются и для подключения дисплея по I2C (через ножки GPIO2 и GPIO3). То есть «GPIO» — это общий ряд контактов; часть из них занимает дисплей, а часть может занимать прямая прошивка по SWD."},{"term":"Прошивальщик / OpenOCD","definition":"Программа, которая собственно умеет «разговаривать» с микросхемами по SWD: стирать, записывать прошивку, читать и менять опционные байты, перезагружать плату. На этом стенде используется полностью статическая (самодостаточная) сборка OpenOCD — без дополнительных пакетов и зависимостей, встроена в комплект. Она лежит в /opt/flashjig/openocd/. Полезно знать: каждый запуск OpenOCD ограничен по времени, поэтому сломанная или выдернутая плата не «вешает» стенд."},{"term":"Демон","definition":"Программа, которая постоянно работает в фоне сама по себе, без вашего участия, и тихо делает свою работу. Главный демон стенда — flash-jig (файл flash-jig.sh): он следит за платой, запускает прошивку и обновляет состояние. Слова «демон» и «фоновая служба» здесь означают примерно одно и то же."},{"term":"systemd / служба (сервис)","definition":"systemd — это «дирижёр» в Raspberry: он запускает нужные программы при включении и следит, чтобы они работали. Отдельная управляемая им программа называется службой (или сервисом). На стенде две службы: flash-jig.service (демон прошивки) и flashjig-oled.service (вывод на дисплей). Они включаются установщиком и стартуют сами при включении питания."},{"term":"udev","definition":"Часть системы, которая замечает, что вы что-то подключили или отключили (например, вставили флешку или ST-Link), и сразу запускает нужное действие. Благодаря правилам udev стенд переходит в готовность при подключении ST-Link и начинает импорт при подключении флешки — автоматически, без вашего вмешательства."},{"term":"Журнал / journalctl","definition":"Запись того, что происходило в системе: какие шаги прошли, что вышло, какие были ошибки. Полный хеш прошивки тоже попадает в журнал. Посмотреть журнал демона в реальном времени можно командой journalctl -u flash-jig -f. Текущее состояние видно в файле: cat /opt/flashjig/status."},{"term":"Файлы состояния (status, flash.log, flash.live)","definition":"status — небольшой файл с текущим состоянием: имя прошивки, полный хеш и счётчики «ок/сбой» (его читает дисплей). flash.log — журнал прошивок. flash.live — данные о текущем процессе. Всё это лежит в /opt/flashjig/."},{"term":"Импорт прошивки с USB","definition":"Чтобы загрузить новую прошивку, вставьте в стенд флешку, на которой лежит РОВНО ОДИН файл .hex (в любой папке на флешке). Стенд сам найдёт его и заберёт (имя сохранится), на дисплее покажется «ПРОШИВКА ПРИНЯТА», и дальше платы будут прошиваться уже новой прошивкой. Если на флешке нет ни одного .hex — стенд подаст ошибку (красный мигнёт 4 раза). Если файлов .hex два или больше — тоже ошибка (красный мигнёт 5 раз), и текущая прошивка останется прежней."},{"term":"Монтирование","definition":"Подключение флешки к системе так, чтобы можно было прочитать её содержимое. На этом стенде флешка монтируется только для чтения и с жёсткими ограничениями, чтобы с неё нельзя было сделать ничего, кроме считывания самого файла прошивки."},{"term":"Монтирование только для чтения (ro)","definition":"«ro» (read-only) означает «только чтение». Стенд может прочитать с флешки файл .hex, но не может на неё ничего писать или менять. Это защищает и стенд, и саму флешку: посторонние программы не смогут что-либо туда подложить или подменить в момент импорта."},{"term":"noexec","definition":"Опция монтирования, которая запрещает запускать (исполнять) что-либо с флешки. Даже если на флешке окажется какая-то программа, стенд её не выполнит — он считывает только файл прошивки. Это защита от вредоносных файлов на чужой флешке."},{"term":"nosuid","definition":"Опция, которая запрещает файлам с флешки получать повышенные права (так называемые SUID-права). То есть с флешки нельзя «протащить» в систему что-то с правами администратора."},{"term":"nodev","definition":"Опция, которая запрещает воспринимать с флешки специальные файлы-устройства. Это закрывает ещё один возможный обходной путь и не даёт через флешку добраться до «железа» системы."},{"term":"nosymfollow","definition":"Опция, которая запрещает идти по символическим ссылкам с флешки. Символическая ссылка — это файл-указатель на другое место; запрет переходить по ним не даёт хитростью увести стенд в чужие файлы за пределами флешки."},{"term":"noatime","definition":"Опция, при которой система не записывает на флешку отметки времени доступа к файлам. Лишних записей на флешку не происходит — это согласуется с режимом «только чтение» и бережёт флешку."},{"term":"Итог по безопасности флешки","definition":"Все опции монтирования флешки разом — ro, noexec, nosuid, nodev, nosymfollow, noatime. Вместе они означают простую вещь: с флешки считывается только сам файл .hex, и ничего больше — ничего нельзя запустить, нельзя повысить права, нельзя записать на флешку. Так обновление прошивки остаётся удобным (просто вставьте флешку) и при этом безопасным."},{"term":"Развёртывание (установка)","definition":"Первичная настройка устройства. По шагам (от имени root): распаковать архив → зайти в его папку → положить туда свой файл .hex → sudo ./install.sh → sudo reboot (перезагрузка нужна, чтобы заработал дисплей по I2C) → прошить пробную плату для проверки → и, когда всё хорошо, в самом конце: sudo ./lockdown.sh --commit → sudo reboot."},{"term":"install.sh (установщик)","definition":"Скрипт установки. Он разворачивает самодостаточный OpenOCD (без apt и без зависимостей), включает службы flash-jig и flashjig-oled и правила udev, включает I2C, создаёт папку прошивок /opt/flashjig/firmware и берёт прошивку из любого .hex, лежащего рядом с ним (имя сохраняется). Установщик идемпотентен — его можно безопасно запускать повторно, хуже не станет."},{"term":"Идемпотентность","definition":"«Идемпотентный» означает, что повторный запуск даёт тот же результат и ничего не ломает. Про установщик install.sh это сказано прямо: запустите его второй раз — он просто приведёт всё к нужному состоянию."},{"term":"Опечатывание / lockdown","definition":"Превращение Raspberry в закрытый, «запломбированный» прибор, у которого нет ни входа, ни сети. Делается командой sudo ./lockdown.sh --commit в самом конце, когда всё уже проверено. После опечатывания устройство только прошивает платы и показывает дисплей — и больше ничего постороннего не умеет; изменения системы возможны только переустановкой карты."},{"term":"lockdown.sh --commit (что именно он делает)","definition":"Эта команда: убирает все способы входа — SSH (отключён, замаскирован, ключи удалены), все текстовые консоли (все tty и последовательный порт), графику (GUI), аварийный и спасательный режимы; блокирует все учётные записи (нет работающих паролей, оболочки заменены на nologin); отключает «горячие клавиши» magic SysRq и сочетание Ctrl-Alt-Del; маскирует VNC, Cockpit и telnet; навсегда отключает сеть: Wi-Fi и Bluetooth выключены и внесены в чёрный список ядра, сетевые службы замаскированы — у устройства не остаётся никакой сети. Продолжают работать только нужное: загрузка, systemd, udev, демон прошивки, дисплей и импорт с USB (ни входа, ни сети им не требуется)."},{"term":"Сухой прогон (dry run)","definition":"Если запустить lockdown.sh без аргумента --commit, он ничего не меняет, а только объясняет, что бы он сделал. Это «сухой прогон» — безопасный способ заранее прочитать и понять, что произойдёт при опечатывании."},{"term":"Необратимость и путь обновления","definition":"Опечатывание необратимо «изнутри»: с уже работающей системы откатить его нельзя, потому что входа в неё больше нет. Чтобы что-то изменить или обновить опечатанное устройство, нужно заново записать SD-карту — это и есть штатный путь обновления."},{"term":"SSH","definition":"Обычный способ зайти на компьютер по сети с другого компьютера и управлять им. На опечатанном стенде SSH полностью отключён, замаскирован и его ключи удалены — удалённо войти нельзя. Это часть защиты: к прибору нет сетевого доступа."},{"term":"tty / консоль","definition":"Текстовый вход, через который обычно набирают команды на самом устройстве (с клавиатуры или по последовательному порту). После опечатывания все такие консоли отключены, чтобы в прибор нельзя было войти и что-то поменять."},{"term":"nologin","definition":"Специальная пустая «оболочка», которую назначают учётным записям, чтобы под ними нельзя было войти и работать. Опечатывание переводит все учётные записи на nologin — то есть зайти под ними невозможно."},{"term":"Чёрный список ядра (blacklist)","definition":"Список того, что системе запрещено загружать. Опечатывание вносит туда Wi-Fi и Bluetooth, поэтому они не включатся даже теоретически. Это надёжнее простого выключения."},{"term":"magic SysRq / Ctrl-Alt-Del","definition":"Специальные «горячие» сочетания клавиш, которыми обычно можно было бы влиять на работу системы (например, перезагрузить её особым способом). Опечатывание их отключает, чтобы с прибором нельзя было сделать ничего постороннего через клавиатуру."},{"term":"VNC / Cockpit / telnet","definition":"Разные способы удалённого доступа и управления компьютером по сети. На опечатанном стенде все они замаскированы (отключены), потому что у прибора вообще не должно быть удалённого доступа."},{"term":"Светодиоды Raspberry (ACT / PWR)","definition":"На самой плате Raspberry есть два светодиода: зелёный (ACT) и красный (PWR). Стенд использует их как подсказку без дисплея: зелёный бьётся сердцебиением (две короткие вспышки, затем пауза) в ожидании; ровно горящий зелёный значит «готово, можно снимать плату»; частое мигание зелёного — идёт прошивка, плату не снимать; мигание красного определённым числом вспышек — код ошибки."},{"term":"Код ошибки","definition":"Число, которое подсказывает причину сбоя. На дисплее видно «ОШИБКА код <K>» и строка причины, а красный светодиод мигает столько же раз. Главные коды: 2 — «нет контакта SWD» (нет связи с платой); 3 — «запись/пров/RDP» (не прошли запись, проверка или подтверждение защиты). Ошибки флешки: 4 вспышки — нет .hex; 5 вспышек — больше одного .hex."},{"term":"Живучесть","definition":"Свойство стенда не зависать из-за плохой или выдернутой платы. Каждый запуск OpenOCD ограничен по времени; дребезжащий или плохой контакт автоматически повторяется; плата, выдернутая в процессе, браком не считается — приложите её снова, и она перепрошится."},{"term":"Контакты (физические номера)","definition":"Выводы 40-контактного разъёма Raspberry Pi нумеруются по физическому положению: конт. 1 — с краю (помечен), конт. 2 рядом с ним, и т. д."},{"term":"Микросхема microSD / карта","definition":"Карта памяти, с которой загружается Raspberry Pi. На неё записывают подготовленный образ системы и комплект."},{"term":"Бегущая строка","definition":"Длинное имя прошивки на дисплее прокручивается, чтобы поместиться."}]}`),cv={id:Ri,title:Ti,tagline:Ii,sourceFiles:ji,summary:Ci,blocks:Wi,data:Gi},vv=Object.freeze(Object.defineProperty({__proto__:null,blocks:Wi,data:Gi,default:cv,id:Ri,sourceFiles:ji,summary:Ci,tagline:Ii,title:Ti},Symbol.toStringTag,{value:"Module"})),Mi="leds",Li="Светодиоды Raspberry: полный справочник по сигналам",qi="Зелёный ACT и красный PWR говорят главное даже без дисплея — снимайте плату только по ровному зелёному.",Ai=["документация/04-ИНДИКАТОРЫ.txt","документация-2/06-ДИСПЛЕЙ-И-СВЕТОДИОДЫ.txt"],Ei="На плате Raspberry Pi 4 есть два штатных светодиода, и стенд использует их, чтобы показывать своё состояние без дисплея — с любого угла и издалека. Зелёный (ACT) несёт основной смысл (сердцебиение, частое мигание, ровное свечение, тройной импульс), а красный (PWR) включается в паре с зелёным и мигает кодами ошибок. Этот справочник разбирает каждый сигнал дословно: как он выглядит, что означает и что делать. Главное правило одно: снимайте плату только тогда, когда зелёный горит ровно.",Bi=JSON.parse(`[{"type":"para","text":"На плате Raspberry есть два светодиода, и стенд использует их, чтобы показывать своё состояние БЕЗ дисплея. Если дисплей погас, не виден или вы стоите сбоку, светодиоды всё равно скажут вам главное: можно ли прикладывать плату, идёт ли прошивка, всё ли прошло хорошо и можно ли снимать плату."},{"type":"para","text":"Дисплей OLED показывает подробности (имя прошивки, хеш, этап, проценты), а светодиоды видно с любого угла и издалека. Поэтому держите в голове прежде всего ОДНО главное правило, всё остальное — детали к нему. Этот файл разбирает КАЖДЫЙ сигнал дословно: как он выглядит, что он означает и что вам делать. Ни один сигнал не пропущен."},{"type":"heading","text":"Два светодиода: кто есть кто"},{"type":"para","text":"Речь о ДВУХ штатных светодиодах самой Raspberry Pi 4 (не о светодиодах прошиваемой платы STM32F103C8T6 и не о значках на дисплее). Пока работает стенд, они показывают его состояние, а не обычную активность."},{"type":"list","ordered":false,"items":["ЗЕЛЁНЫЙ светодиод — это «ACT» (активность). Он несёт основной смысл: сердцебиение (готов), частое мигание (идёт прошивка), ровное свечение (готово), тройной импульс (принята флешка).","КРАСНЫЙ светодиод — это «PWR» (питание). Он включается в паре с зелёным (по очереди или вместе) и, главное, мигает КОДАМИ ОШИБОК (мигает столько раз, каков номер ошибки)."]},{"type":"para","text":"Дальше в тексте «зелёный» всегда означает ACT, «красный» — PWR. Запомните простую связку: спокойный, ровный зелёный — это хорошо. Красный, который мигает группами вспышек, — это ошибка, и её надо прочитать (посчитать вспышки) по таблицам ниже."},{"type":"callout","variant":"danger","title":"Самое главное правило (прочтите первым)","text":"СНИМАЙТЕ ПЛАТУ ТОЛЬКО ТОГДА, КОГДА ЗЕЛЁНЫЙ ГОРИТ РОВНО — горит постоянно, НЕ мигает, НЕ пульсирует, НЕ стробит."},{"type":"para","text":"Почему это так важно:"},{"type":"list","ordered":false,"items":["Ровный зелёный — единственный сигнал, который означает, что прошивка полностью завершена: прошито, проверено, защита от чтения (RDP) включена и подтверждена обратным считыванием.","Прошивка одной платы — это цепочка шагов: подключение, при необходимости снятие старой защиты, стирание, запись, проверка, включение защиты и обратное считывание. Плата засчитывается как «ГОТОВО» только после подтверждения активной защиты.","Если снять плату раньше (когда зелёный часто мигает — идёт прошивка), процесс прервётся на середине: на плате может не оказаться рабочей прошивки или включённой защиты. Для стенда это НЕ страшно (он сам вернётся в готовность), но конкретную плату придётся приложить заново.","Любое мигание, сердцебиение или строб зелёного — это «ещё не время». Дождитесь именно РОВНОГО зелёного свечения."]},{"type":"heading","text":"Быстрая шпаргалка: все сигналы одним списком"},{"type":"para","text":"Сначала — короткий перечень, чтобы охватить картину целиком. Ниже каждый сигнал разобран подробно: что значит и что делать."},{"type":"table","columns":["Сигнал","Что значит / что делать"],"rows":[["Зелёный (ACT): СЕРДЦЕБИЕНИЕ (двойная вспышка)","Готов, ждёт плату. Прикладывайте плату."],["Зелёный (ACT): ЧАСТО мигает","Идёт прошивка. НЕ снимайте, ждите."],["Зелёный (ACT): горит РОВНО","ГОТОВО. Снимайте плату (это тот момент)."],["Зелёный (ACT): ТРИ импульса","Прошивка с флешки принята. Можно вынуть флешку."],["Зелёный + красный: по очереди, медленно","НЕТ прошивки. Вставьте флешку с одним .hex."],["Зелёный + красный: вместе быстро СТРОБЯТ","Прошивка прервана (выдернули плату). Затем стенд сам вернётся в готовность."],["Красный (PWR): 2 вспышки","Нет/потерян контакт SWD (держится до снятия платы)."],["Красный (PWR): 3 вспышки","Не прошли запись/проверка/подтверждение RDP (держится до снятия платы)."],["Красный (PWR): 4 вспышки","На флешке НЕТ .hex (показ ~8 секунд)."],["Красный (PWR): 5 вспышек","На флешке ДВА и более .hex; нужен ровно один (показ ~8 секунд)."],["Оба не горят","Служба не запущена, индикация выключена (LEDS=0) или нет питания."]]},{"type":"heading","text":"Раздел 1. Обычные (рабочие) сигналы зелёного"},{"type":"heading","text":"1.1. Зелёный «сердцебиение» — стенд готов, ждёт плату"},{"type":"para","text":"КАК ВЫГЛЯДИТ: Зелёный мигает как сердцебиение — две короткие вспышки подряд, близко друг к другу («тук-тук»), затем пауза, и снова по кругу. Вспышки чёткие и резкие: светодиод просто включается и выключается, без плавного разгорания и затухания. Чем выше загрузка системы, тем чаще ритм. Красный при этом не участвует."},{"type":"para","text":"ЧТО ЗНАЧИТ: Стенд полностью готов к работе. Прошивка загружена и выбрана как активная, все проверки пройдены, плат сейчас нет, устройство ждёт, когда вы приложите плату STM32. Это спокойное, «дежурное» состояние."},{"type":"para","text":"ЧТО ПОКАЗЫВАЕТ ДИСПЛЕЙ: Экран готовности: имя файла прошивки, строка хеша (первые 16 символов SHA-256), надпись «ГОТОВ К РАБОТЕ», подсказка «приложите плату» и счётчик результатов «ок N сбой M» (сколько плат успешно прошито и сколько было сбоев)."},{"type":"list","ordered":false,"items":["Прикладывайте плату STM32 к контактам по 4 проводам (SWDIO, SWCLK, GND, 3V3), либо подключайте через ST-Link, если используете USB. Прошивка начнётся сама, одним «касанием» — нажимать ничего не нужно.","Если приложить плату не к чему (вы только что включили стенд) — просто подождите; пульсация-сердцебиение означает, что всё в порядке."]},{"type":"callout","variant":"info","title":"Почему «сердцебиение», а не ровное свечение","text":"Это сделано специально, чтобы вы НЕ перепутали «жду плату» с «готово, снимай». Ровный зелёный зарезервирован ТОЛЬКО под завершённую, защищённую плату (см. пункт 1.3). Пульсирующий зелёный (сердцебиение) — это «всё хорошо, но работа ещё не сделана»."},{"type":"heading","text":"1.2. Зелёный часто мигает — идёт прошивка (не снимать!)"},{"type":"para","text":"КАК ВЫГЛЯДИТ: Зелёный мигает ЧАСТО — быстрые, ровные вспышки одна за другой (примерно 80 мс включён / 80 мс выключен). Это явно «рабочее», деловое мигание, заметно быстрее спокойного сердцебиения. Красный не используется (если он начнёт мигать кодом — это уже ошибка, см. Раздел 3)."},{"type":"para","text":"ЧТО ЗНАЧИТ: Прямо сейчас плата прошивается. Идёт цепочка действий по одному «касанию»: установление связи, при необходимости снятие старой защиты, стирание и запись прошивки, проверка, включение защиты от чтения (RDP) и подтверждение этой защиты."},{"type":"para","text":"ЧТО ПОКАЗЫВАЕТ ДИСПЛЕЙ: Экран прошивки: имя прошивки, хеш, текущий ЭТАП и проценты с полосой прогресса, плюс предупреждение «НЕ ОТКЛЮЧАЙТЕ #N». Этап — это одно из коротких слов, по которому видно, на каком шаге работа. Проценты растут и не идут назад."},{"type":"steps","items":[{"title":"СТАРТ","text":"Запуск операции."},{"title":"СВЯЗЬ","text":"Устанавливается связь с платой по SWD."},{"title":"РАЗБЛОК","text":"Снимается старая защита от чтения (полное стирание), если была."},{"title":"ЗАПИСЬ","text":"Стирается и записывается прошивка."},{"title":"ПРОВЕРКА","text":"Записанное сверяется с файлом."},{"title":"ЗАЩИТА","text":"Включается RDP и подтверждается обратным считыванием."}]},{"type":"list","ordered":false,"items":["НИЧЕГО не трогайте. НЕ снимайте плату. НЕ шевелите провода, пока зелёный мигает.","Просто ждите. Когда всё закончится успешно, зелёный перестанет мигать и загорится РОВНО (пункт 1.3) — вот тогда плату можно снимать.","Не нужно ускорять процесс, отключать питание или нажимать сброс — стенд всё делает сам по четырём проводам."]},{"type":"callout","variant":"warn","title":"Почему нельзя снимать сейчас","text":"Прошивка идёт по шагам. Если выдернуть плату в середине, на ней может остаться недописанная прошивка или невключённая защита. Стенд это переживёт спокойно (увидите «прервано», затем он сам вернётся в готовность), но конкретная плата не будет завершена — её нужно будет приложить снова. Поэтому ждите ровного зелёного."},{"type":"heading","text":"1.3. Зелёный горит ровно — готово, плату можно снимать"},{"type":"para","text":"КАК ВЫГЛЯДИТ: Зелёный горит постоянно и неподвижно — НЕ мигает, НЕ пульсирует, НЕ стробит. Ровный, спокойный свет. Красный не участвует."},{"type":"para","text":"ЧТО ЗНАЧИТ: Плата полностью прошита, проверена, защита от чтения (RDP) ВКЛючена и ПОДТВЕРЖДЕНА обратным считыванием. Это единственный сигнал, после которого плату можно снимать. Именно к нему относится главное правило в начале файла."},{"type":"para","text":"ЧТО ПОКАЗЫВАЕТ ДИСПЛЕЙ: Экран «Готово»: галочка и надписи «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ», а также счётчик «#N ок сбой M». Держится, пока плату не снимут; затем экран переходит в «ГОТОВ К РАБОТЕ»."},{"type":"list","ordered":false,"items":["Снимайте плату — это именно тот момент, которого вы ждёте.","Берите следующую плату и прикладывайте её — стенд снова перейдёт в работу, а после снятия платы вернётся к сердцебиению зелёного.","Если хотите дополнительно убедиться, что записана именно нужная сборка — сверьте показанный хеш (первые 16 символов SHA-256) с эталонным хешем вашего выпуска. Совпадение хеша подтверждает, что загружена одобренная прошивка без подмены и повреждения."]},{"type":"callout","variant":"ok","title":"Почему ровный зелёный = безопасно снимать","text":"Стенд доводит цепочку до конца: после записи и проверки он включает защиту и ПЕРЕЧИТЫВАЕТ регистр опций, чтобы убедиться, что защита действительно активна. Плата получает статус «ГОТОВО» только при подтверждённой защите. Ровный зелёный — это сигнал именно об этом подтверждённом, завершённом состоянии."},{"type":"heading","text":"1.4. Зелёный тройной импульс — прошивка с флешки принята"},{"type":"para","text":"КАК ВЫГЛЯДИТ: Зелёный делает РОВНО ТРИ импульса подряд — три коротких чётких мигания (мигнул-мигнул-мигнул). Красный не участвует."},{"type":"para","text":"ЧТО ЗНАЧИТ: Вы вставили USB-флешку, на которой ровно один файл .hex, и стенд успешно импортировал с неё новую прошивку. Имя файла сохраняется. Тройной импульс зелёного — это подтверждение «новая прошивка принята и загружена»."},{"type":"para","text":"ЧТО ПОКАЗЫВАЕТ ДИСПЛЕЙ: Примерно 2 секунды показывается экран импорта: галочка, слово «ПРОШИВКА», ниже имя файла, хеш и «готова к работе». После этого активной становится уже новая прошивка, и платы будут шиться ею."},{"type":"list","ordered":false,"items":["Можно вынимать флешку — файл уже скопирован на устройство (имя сохранено).","Прикладывайте плату: дальше будет прошиваться новая, только что принятая прошивка. Убедитесь, что доходит до ровного зелёного.","При желании сверьте на дисплее хеш новой прошивки с эталонным, чтобы убедиться, что приняли именно ту сборку, которую хотели."]},{"type":"callout","variant":"info","title":"Чем это отличается от ошибок флешки","text":"Тройной ЗЕЛЁНЫЙ импульс — это успех (ровно один .hex на флешке). Если же на флешке файлов .hex ноль или два и более — это будет не зелёный импульс, а КРАСНЫЕ вспышки кодом (4 или 5 раз), и текущая прошивка останется прежней. См. Раздел 3.2."},{"type":"callout","variant":"ok","title":"Чем безопасен импорт с флешки","text":"Флешка монтируется ТОЛЬКО ДЛЯ ЧТЕНИЯ и с жёсткими ограничениями: ro (только чтение), noexec (ничего нельзя запускать), nosuid (нельзя повысить права), nodev, nosymfollow (символьные ссылки не раскрываются), noatime. С флешки считывается ТОЛЬКО сам файл .hex — ничего исполнить или получить лишние права через неё нельзя. Поэтому обновлять прошивку флешкой можно спокойно."},{"type":"heading","text":"Раздел 2. Парные сигналы зелёного и красного"},{"type":"heading","text":"2.1. Зелёный и красный по очереди — нет прошивки"},{"type":"para","text":"КАК ВЫГЛЯДИТ: Зелёный и красный мигают ПОПЕРЕМЕННО, по очереди, медленно — примерно раз в 0.6 секунды переключаются: то зелёный, то красный. Спокойный, неторопливый ритм перемигивания двух цветов."},{"type":"para","text":"ЧТО ЗНАЧИТ: В стенде НЕТ загруженной прошивки, поэтому прошивать нечем. Прошивать платы он не может, пока вы не дадите ему файл .hex. Это не поломка, а сообщение «загрузите прошивку»."},{"type":"para","text":"ЧТО ПОКАЗЫВАЕТ ДИСПЛЕЙ: Экран «Нет прошивки»: крупная надпись «НЕТ ПРОШИВКИ» и подсказки, как её дать: «вставьте флешку», «USB с одним .hex», «или в firmware/»."},{"type":"para","text":"ЧТО ДЕЛАТЬ (два способа дать прошивку):"},{"type":"list","ordered":false,"items":["Через флешку (на месте, без компьютера): возьмите USB-флешку, на которой лежит РОВНО ОДИН файл .hex (в любой папке на флешке), вставьте её в Raspberry. Стенд сам прочитает файл, импортирует его (имя сохранится) и покажет экран импорта. Затем зелёный трижды мигнёт (пункт 1.4), и стенд перейдёт к сердцебиению зелёного (готов).","Через папку прошивок: поместите файл .hex в каталог /opt/flashjig/firmware/. Активной становится прошивка по симлинку 'current', а если его нет — самый новый файл в папке."]},{"type":"callout","variant":"warn","title":"Важно про флешку","text":"На флешке должен быть именно ОДИН файл .hex. Если их ноль — будет ошибка флешки (красный мигнёт 4 раза). Если их два и более — тоже ошибка (красный мигнёт 5 раз). Подробнее — в Разделе 3.2. Флешку лучше брать чистую или заранее отформатированную."},{"type":"heading","text":"2.2. Зелёный + красный строб — прошивка прервана"},{"type":"para","text":"КАК ВЫГЛЯДИТ: Зелёный и красный ВМЕСТЕ быстро «стробят» — оба цвета часто вспыхивают одновременно (примерно 1.5 секунды). Это короткая, заметная тревожная вспышка, после которой стенд сам возвращается к спокойному сердцебиению зелёного."},{"type":"para","text":"ЧТО ЗНАЧИТ: Плату выдернули (или потеряли контакт) ПРЯМО В ПРОЦЕССЕ прошивки. Цепочка действий не была доведена до конца. Совместный быстрый строб — это сигнал «прервано». Это НЕ брак платы и НЕ поломка стенда — это нормальная, предусмотренная ситуация."},{"type":"para","text":"ЧТО ДЕЛАЕТ СТЕНД: Он не «зависает» и не уходит в ошибку: показывает строб, а затем автоматически переходит обратно в готовность (зелёный начнёт «дышать»). Если вернуть ту же плату на контакты — она мгновенно перепрошивается с начала."},{"type":"list","ordered":false,"items":["Просто приложите эту же плату снова и дождитесь РОВНОГО зелёного. Стенд тут же начнёт прошивать её заново с самого начала и доведёт до конца.","Не считайте такую плату испорченной из-за самого прерывания. Главное — довести прошивку до конца (до ровного зелёного) при повторной попытке.","Чтобы такое не повторялось, держите плату плотно прижатой к контактам всё время, пока зелёный часто мигает (идёт прошивка), и снимайте только при ровном зелёном."]},{"type":"callout","variant":"info","title":"Почему так сделано","text":"Стенд рассчитан на «живучесть»: дребезжащий или пропавший контакт он переносит без зависаний и без необходимости перезапуска. Выдернутая в процессе плата не засчитывается как сбой по вине стенда — её просто нужно приложить ещё раз."},{"type":"heading","text":"Раздел 3. Красный мигает кодами — это ошибки"},{"type":"para","text":"Когда что-то идёт не так, КРАСНЫЙ светодиод сообщает КОД ошибки числом вспышек. Принцип простой: ПОСЧИТАЙТЕ, СКОЛЬКО РАЗ МИГНУЛ КРАСНЫЙ ПОДРЯД — это и есть номер кода."},{"type":"para","text":"Чтобы не сбиться при счёте:"},{"type":"list","ordered":false,"items":["Вспышки идут группой, затем короткая пауза (~1.2 секунды), затем группа повторяется — столько же вспышек. Дождитесь паузы, посчитайте вспышки в одной группе — это и есть код.","Ошибки ПЛАТЫ (коды 2 и 3) ДЕРЖАТСЯ до тех пор, пока вы не снимете плату — времени посчитать достаточно, спешить не нужно.","Ошибки ФЛЕШКИ (коды 4 и 5) показываются ОКОЛО 8 СЕКУНД после того, как вы вставили флешку, а затем гаснут."]},{"type":"para","text":"Сводка кодов:"},{"type":"table","columns":["Код","Группа","Значение"],"rows":[["2","плата","Нет / потерян контакт SWD"],["3","плата","Не прошли запись / проверка / подтверждение RDP"],["4","флешка","На флешке нет файла .hex"],["5","флешка","На флешке два и более файлов .hex (нужен ровно один)"]]},{"type":"heading","text":"3.1. Ошибки платы (держатся, пока плату не снимут)"},{"type":"para","text":"Эти коды относятся к прошивке конкретной приложенной платы. Они ДЕРЖАТСЯ до тех пор, пока вы не снимете плату, — чтобы вы точно успели их заметить и прочитать. На дисплее при этом крестик, «ОШИБКА код K», строка причины и снизу «снимите плату»."},{"type":"callout","variant":"danger","title":"Код 2 (красный мигает группами по 2 вспышки) — НЕТ КОНТАКТА SWD","text":"Стенд не смог установить или потерял связь с платой по интерфейсу SWD. Проще говоря — нет надёжного электрического контакта между стендом и платой по нужным выводам (плохо прижато или не туда подключено)."},{"type":"para","text":"ЧТО ПОКАЗЫВАЕТ ДИСПЛЕЙ (код 2): Крестик, надпись «ОШИБКА код 2», строка причины «нет контакта SWD» и подсказка «снимите плату»."},{"type":"para","text":"САМЫЕ ЧАСТЫЕ ПРИЧИНЫ (код 2):"},{"type":"list","ordered":false,"items":["Плата неплотно приложена, перекошена или контакты не прижаты.","Грязь, окисел или плохая пайка на контактных площадках.","Перепутаны или не подключены провода SWD."]},{"type":"steps","items":[{"title":"Снимите плату","text":"Это убирает сигнал ошибки."},{"title":"Проверьте контакт","text":"Приложите плату ровно и плотно, убедитесь, что соприкасаются нужные выводы."},{"title":"Проверьте провода SWD","text":"Для прошивки нужны всего четыре: SWDIO, SWCLK, GND и 3V3. При прошивке по выводам Raspberry (метка «GPIO» в правом верхнем углу дисплея): SWDIO → контакт 22 (GPIO25), SWCLK → контакт 23 (GPIO11), 3V3 → контакт 17, GND → контакт 14. При прошивке через ST-Link (метка «USB»): те же четыре сигнала идут через USB; выводы SWD на GPIO в этом случае не используются."},{"title":"Приложите плату снова","text":"Дождитесь РОВНОГО зелёного."}]},{"type":"callout","variant":"info","title":"Полезно знать (код 2)","text":"Дребезжащий или плохой контакт стенд автоматически пытается повторить. Поэтому иногда достаточно чуть плотнее прижать плату — и связь установится сама. Какой транспорт используется (USB или GPIO), определяется автоматически и показан в правом верхнем углу дисплея."},{"type":"callout","variant":"danger","title":"Код 3 (красный мигает группами по 3 вспышки) — НЕ ПРОШЛИ ЗАПИСЬ / ПРОВЕРКА / ПОДТВЕРЖДЕНИЕ RDP","text":"Связь с платой была, но не удалось довести дело до конца на одном из ключевых шагов: запись прошивки, её проверка (сверка с файлом) или подтверждение включённой защиты от чтения (RDP). Иначе говоря, плата не получила статус «ГОТОВО», потому что не подтвердилось, что всё записано правильно и защита встала."},{"type":"para","text":"ЧТО ПОКАЗЫВАЕТ ДИСПЛЕЙ (код 3): Крестик, надпись «ОШИБКА код 3», строка причины «запись/пров/RDP» и подсказка «снимите плату»."},{"type":"para","text":"ВОЗМОЖНЫЕ ПРИЧИНЫ (код 3):"},{"type":"list","ordered":false,"items":["Контакт «дёрнулся» или ухудшился в середине записи/проверки.","Проблема с конкретной платой (например, неисправный кристалл).","Питание платы нестабильно во время операции."]},{"type":"steps","items":[{"title":"Снимите плату","text":"Снимите приложенную плату с контактов."},{"title":"Проверьте контакт","text":"Проверьте, что плата приложена плотно и контакт стабилен (см. рекомендации для кода 2 — они здесь тоже помогают)."},{"title":"Приложите плату снова","text":"Дождитесь РОВНОГО зелёного. Часто помогает повторная попытка, особенно если в первый раз дрогнул контакт."},{"title":"Если код 3 повторяется стабильно","text":"Если ровно эта плата стабильно даёт код 3 несколько раз подряд при хорошем контакте — вероятно, дело в самой плате; отложите её и попробуйте другую."}]},{"type":"callout","variant":"warn","title":"Важно про защиту (код 3)","text":"Плата засчитывается успешной ТОЛЬКО при подтверждённой активной RDP. Стенд специально перечитывает регистр опций после включения защиты. Если подтверждение не получено — он честно показывает ошибку (код 3) и не выдаёт ложного «готово». Это и есть гарантия, что снятая «готовой» плата действительно защищена."},{"type":"heading","text":"3.2. Ошибки флешки (показываются примерно 8 секунд)"},{"type":"para","text":"Эти коды появляются, когда вы вставили USB-флешку для загрузки прошивки, но с её содержимым что-то не так. Такой код красного показывается ОКОЛО 8 СЕКУНД, после чего гаснет, а текущая (ранее загруженная) прошивка в стенде ОСТАЁТСЯ без изменений — ошибка флешки не стирает и не портит то, что уже загружено."},{"type":"callout","variant":"warn","title":"Код 4 (красный мигает группами по 4 вспышки, ~8 секунд) — НА ФЛЕШКЕ НЕТ НИ ОДНОГО ФАЙЛА .hex","text":"Стенд просмотрел флешку и не нашёл на ней ни одного файла .hex. Импортировать нечего, поэтому новая прошивка не принята."},{"type":"steps","items":[{"title":"Выньте флешку","text":"Извлеките USB-флешку из Raspberry."},{"title":"Запишите файл .hex","text":"Запишите на неё нужный файл прошивки в формате .hex (он может лежать в любой папке на флешке — стенд найдёт его сам)."},{"title":"Проверьте файл","text":"Убедитесь, что файл именно с расширением .hex, он там РОВНО ОДИН и скопировался полностью."},{"title":"Вставьте флешку снова","text":"При успехе увидите тройной зелёный импульс (пункт 1.4) и экран импорта «ПРОШИВКА … готова к работе»."}]},{"type":"callout","variant":"warn","title":"Код 5 (красный мигает группами по 5 вспышек, ~8 секунд) — НА ФЛЕШКЕ ДВА ИЛИ БОЛЬШЕ ФАЙЛОВ .hex","text":"На флешке найдено ДВА и более файлов .hex. Стенд не угадывает, какой из них вам нужен, поэтому не импортирует ни один. Нужен РОВНО ОДИН файл .hex."},{"type":"steps","items":[{"title":"Выньте флешку","text":"Извлеките USB-флешку из Raspberry."},{"title":"Оставьте один .hex","text":"Оставьте на флешке ТОЛЬКО ОДИН нужный файл .hex, лишние удалите. Удобнее всего взять чистую (отформатированную) флешку и положить на неё единственный файл .hex."},{"title":"Вставьте флешку снова","text":"При успехе — тройной зелёный импульс и экран импорта."}]},{"type":"callout","variant":"info","title":"Почему стенд не выбирает сам","text":"Так безопаснее: автоматический выбор «одного из нескольких» мог бы привести к загрузке не той сборки. Требование «ровно один .hex» исключает ошибку — вы всегда точно знаете, какая прошивка будет принята."},{"type":"heading","text":"Раздел 4. Почему светодиоды — надёжный способ контроля"},{"type":"para","text":"Светодиодные сигналы продуманы так, чтобы вы не могли случайно «испортить» плату из-за неверного толкования:"},{"type":"list","ordered":false,"items":["Разные состояния выглядят ОЧЕВИДНО по-разному. «Жду плату» (сердцебиение — двойная вспышка с паузой) и «готово, снимай» (ровный зелёный) специально сделаны непохожими, чтобы их нельзя было перепутать. Ровный зелёный зарезервирован исключительно под завершённую и подтверждённо защищённую плату.","Ошибки не молчат. Если что-то не так — красный явно мигает кодом и держит сигнал до снятия платы (для ошибок платы), так что у вас есть время спокойно прочитать код и понять причину по дисплею.","Прерывание не равно поломке. Если плату выдернули в процессе, стенд показывает строб и сам возвращается в готовность — он не зависает и не требует перезапуска. Это защищает и стенд, и ваш темп работы.","Импорт прошивки с флешки безопасен. Флешка подключается только для чтения и с жёсткими ограничениями (ro, noexec, nosuid, nodev, nosymfollow, noatime); считывается лишь сам файл .hex. С неё нельзя ничего запустить или повысить права — поэтому красный «код флешки» означает максимум, что файл не тот, но не угрозу для устройства.","Доверие к содержимому прошивки. На дисплее показывается хеш SHA-256 активной прошивки (первые 16 символов; полный хеш есть в /opt/flashjig/status и в журнале). Сверив его с эталонным хешем выпуска, вы убеждаетесь, что записывается именно одобренная сборка: любая подмена или повреждение дали бы другой хеш."]},{"type":"heading","text":"Если сомневаетесь"},{"type":"list","ordered":false,"items":["Любой сигнал, кроме ровного зелёного, означает «снимать ещё рано» либо «нужно ваше действие». Не торопитесь.","Если красный мигает — это ошибка. Спокойно посчитайте вспышки в группе и найдите код в Разделе 3.","Подробности по любому коду и причине дублируются на дисплее (имя прошивки, хеш, текст причины) — при возможности сверьтесь и с ним."]},{"type":"callout","variant":"ok","title":"Главный вывод","text":"ВЕРЬТЕ РОВНОМУ ЗЕЛЁНОМУ. Снимайте плату только по нему. Всё остальное свечение — это либо «подожди», либо «посмотри на дисплей и пойми, что случилось»."}]`),Ni={green:[{pattern:"Сердцебиение (heartbeat: двойная вспышка + пауза)",appearance:"Зелёный мигает как сердцебиение: две короткие вспышки подряд, близко друг к другу («тук-тук»), затем пауза — и снова, по кругу. Вспышки чёткие, резкие (светодиод просто включается и выключается, без плавного разгорания и затухания). Чем выше загрузка системы, тем чаще ритм. Красный не участвует.",meaning:"Стенд готов к работе: прошивка загружена и выбрана как активная, все проверки пройдены, плат нет, устройство ждёт плату STM32. Дежурное состояние.",action:"Прикладывайте плату STM32 по 4 проводам (SWDIO, SWCLK, GND, 3V3) либо через ST-Link по USB — прошивка начнётся сама. Если платы нет — просто ждите."},{pattern:"Частое мигание (быстрый блинк ~80 мс вкл / 80 мс выкл)",appearance:"Зелёный мигает ЧАСТО — быстрые ровные вспышки одна за другой, заметно быстрее сердцебиения. Красный не используется.",meaning:"Прямо сейчас идёт прошивка платы: связь, при необходимости снятие старой защиты, стирание, запись, проверка, включение RDP и подтверждение защиты. Этапы на дисплее: СТАРТ → СВЯЗЬ → РАЗБЛОК → ЗАПИСЬ → ПРОВЕРКА → ЗАЩИТА.",action:"НЕ снимайте плату, НЕ трогайте провода. Просто ждите ровного зелёного. Не отключайте питание и не нажимайте сброс."},{pattern:"Ровное свечение (SOLID)",appearance:"Зелёный горит постоянно и неподвижно — НЕ мигает, НЕ пульсирует, НЕ стробит. Ровный спокойный свет. Красный не участвует.",meaning:"Плата полностью прошита, проверена, RDP включена и ПОДТВЕРЖДЕНА обратным считыванием. Единственный сигнал, после которого плату можно снимать.",action:"Снимайте плату — это тот момент. Берите следующую. При желании сверьте хеш (первые 16 символов SHA-256) с эталонным хешем выпуска."},{pattern:"Тройной импульс (три плавные вспышки: 0.35 с вкл / 0.2 с выкл, ×3)",appearance:"Зелёный делает РОВНО ТРИ импульса подряд — три коротких чётких мигания (мигнул-мигнул-мигнул). Красный не участвует.",meaning:"С USB-флешки, где ровно один файл .hex, успешно импортирована новая прошивка (имя файла сохранено). Подтверждение «новая прошивка принята и загружена». На дисплее ~2 с экран импорта «ПРОШИВКА … готова к работе».",action:"Можно вынимать флешку (файл уже скопирован). Прикладывайте плату — будет шиться новая прошивка. При желании сверьте хеш новой прошивки с эталонным."},{pattern:"Зелёный + красный по очереди (медленное чередование ~0.6 с каждый)",appearance:"Зелёный и красный мигают ПОПЕРЕМЕННО, по очереди, медленно — примерно раз в 0.6 секунды переключаются. Спокойный ритм перемигивания двух цветов.",meaning:"В стенде НЕТ загруженной прошивки — прошивать нечем. Это не поломка, а сообщение «загрузите прошивку». На дисплее экран «НЕТ ПРОШИВКИ».",action:"Дайте прошивку: вставьте флешку с РОВНО ОДНИМ файлом .hex, либо положите .hex в /opt/flashjig/firmware/ (активна по симлинку 'current', иначе самый новый файл)."},{pattern:"Зелёный + красный строб (вместе быстро ~0.07 с вкл / 0.07 с выкл, ~1.5 с, затем сердцебиение)",appearance:"Зелёный и красный ВМЕСТЕ быстро «стробят» — оба цвета часто вспыхивают одновременно около 1.5 секунды. Затем стенд сам возвращается к сердцебиению зелёного.",meaning:"Плату выдернули или потеряли контакт ПРЯМО В ПРОЦЕССЕ прошивки — цепочка не доведена до конца. Сигнал «прервано». Это НЕ брак платы и НЕ поломка стенда, а предусмотренная ситуация; экран при этом состояние не меняет.",action:"Приложите ту же плату снова и дождитесь РОВНОГО зелёного — стенд перепрошьёт её с начала. Держите плату плотно прижатой всё время, пока идёт прошивка."}],redErrors:[{blinks:2,meaning:"Нет / потерян контакт SWD. Стенд не смог установить или потерял связь с платой по интерфейсу SWD (нет надёжного электрического контакта по нужным выводам). Ошибка платы — держится, пока плату не снимут. На дисплее: «ОШИБКА код 2», причина «нет контакта SWD», «снимите плату».",fix:"Снимите плату. Приложите ровно и плотно, убедитесь в контакте нужных выводов. Проверьте 4 провода SWD: при GPIO — SWDIO→контакт 22 (GPIO25), SWCLK→контакт 23 (GPIO11), 3V3→контакт 17, GND→контакт 14; при ST-Link («USB») сигналы идут через USB. Приложите снова и дождитесь ровного зелёного. Часто достаточно плотнее прижать — стенд сам повторит."},{blinks:3,meaning:"Не прошли запись / проверка / подтверждение RDP. Связь была, но не удалось довести до конца на ключевом шаге: запись прошивки, её проверка (сверка с файлом) или подтверждение включённой RDP. Плата не получила статус «ГОТОВО». Ошибка платы — держится, пока плату не снимут. На дисплее: «ОШИБКА код 3», причина «запись/пров/RDP», «снимите плату».",fix:"Снимите плату. Проверьте плотность и стабильность контакта (рекомендации кода 2 помогают). Приложите снова и дождитесь ровного зелёного — часто помогает повтор, если дрогнул контакт. Если эта плата стабильно даёт код 3 при хорошем контакте — вероятно, дело в самой плате; отложите её и возьмите другую."},{blinks:4,meaning:"На флешке НЕТ ни одного файла .hex. Стенд просмотрел флешку и не нашёл .hex — импортировать нечего, новая прошивка не принята. Ошибка флешки — показывается около 8 секунд, затем гаснет; текущая прошивка остаётся без изменений.",fix:"Выньте флешку. Запишите на неё нужный файл прошивки в формате .hex (можно в любой папке). Убедитесь, что файл именно .hex, он РОВНО ОДИН и скопировался полностью. Вставьте снова — при успехе будет тройной зелёный импульс и экран импорта."},{blinks:5,meaning:"На флешке ДВА или более файлов .hex (нужен ровно один). Стенд не угадывает, какой нужен, поэтому не импортирует ни один. Ошибка флешки — показывается около 8 секунд, затем гаснет; текущая прошивка остаётся без изменений.",fix:"Выньте флешку. Оставьте на ней ТОЛЬКО ОДИН нужный файл .hex, лишние удалите (удобнее взять чистую отформатированную флешку с еди
