 вы ничего не нажимаете, экран просто отражает то, что происходит. Здесь разобран каждый экран, каждая строка и каждое слово, которое вы можете увидеть.",Hr=JSON.parse('[{"type":"heading","text":"Что это за экран"},{"type":"para","text":"На стенде установлен маленький экран OLED: разрешение 128 на 64 точки, подключён по шине I2C (два сигнальных провода). Это тот же тип экрана, который часто ставят в простую электронику: яркий, контрастный, хорошо видно даже сбоку и при ярком свете. Включается экран сам после загрузки стенда — отдельно его трогать не нужно."},{"type":"para","text":"Весь текст на экране — на русском языке. Экран рассчитан на то, чтобы вы всё понимали сразу, без инструкций под рукой. Надписи короткие, потому что места немного, поэтому каждое слово несёт смысл. Ниже расшифровано каждое из них дословно."},{"type":"para","text":"Экран показывает состояние стенда в реальном времени. Он сам меняет картинку, когда меняется ситуация: вы приложили плату — он показывает ход прошивки; прошивка закончилась — он показывает результат; вставили флешку с новой прошивкой — он сообщает, что принял её. Вам не нужно ничего нажимать: у стенда нет кнопок, экран просто отражает то, что происходит."},{"type":"callout","variant":"info","title":"Экран и светодиоды говорят об одном и том же","text":"Кроме экрана у стенда есть ещё два световых сигнала — собственные светодиоды Raspberry Pi (зелёный ACT и красный PWR). Они дублируют главное короткими «языком света»: видно через всю комнату, не подходя к экрану. Подробно про них — в отдельном разделе про светодиоды; здесь мы иногда на них ссылаемся, потому что экран и светодиоды всегда сообщают одно и то же."},{"type":"heading","text":"Постоянные элементы: что есть на экране почти всегда"},{"type":"para","text":"Прежде чем разбирать отдельные экраны, познакомьтесь с элементами, которые встречаются на большинстве из них. Когда вы будете узнавать их с первого взгляда, любой экран станет понятным."},{"type":"heading","text":"1) Шапка сверху: «OTAБEK STM32» слева и метка режима справа"},{"type":"para","text":"В самом верху экрана идёт узкая светлая полоса, а на ней — тёмные буквы (то есть наоборот: фон светлый, буквы тёмные). Это «шапка» стенда. Она не меняется по ходу работы и служит вашим постоянным ориентиром."},{"type":"para","text":"Слева в шапке всегда стоит надпись «OTAБEK STM32». Это имя стенда. Буквы именно такие. Обратите внимание: в слове есть русская буква «Б» — пишется «OTAБEK», а не латиницей целиком. Через пробел идёт «STM32» — семейство микроконтроллеров (STM32F103C8T6), которые прошивает прибор. Заголовок не несёт тревоги: это просто подпись устройства, как табличка на корпусе."},{"type":"para","text":"Справа в шапке стоит метка режима — одно короткое слово: «USB», «GPIO» либо «--». Это указатель того, КАК стенд сейчас прошивает платы, то есть по какому пути идёт сигнал к микроконтроллеру."},{"type":"list","ordered":false,"items":["«USB» — к стенду подключён программатор ST-Link через USB, и стенд работает через него. Сигналы отладки SWD идут через этот USB-донгл.","«GPIO» — ST-Link не подключён, и стенд прошивает напрямую своими ножками — выводами GPIO самой Raspberry Pi (стенд сам формирует сигналы SWD на своих контактах).","«--» — режим ещё не определён."]},{"type":"para","text":"Стенд выбирает режим САМ, автоматически. Правило простое: если воткнут ST-Link по USB — берётся он, и в углу будет «USB». Если ST-Link нет — стенд переходит на прямую прошивку по GPIO, и в углу будет «GPIO». Вам не нужно ничего переключать. По этой метке вы сразу видите, какой путь сейчас рабочий, и понимаете, к каким проводам подключать плату. На качество прошивки режим не влияет, оба пути равноценны."},{"type":"heading","text":"2) Имя прошивки"},{"type":"para","text":"На рабочих экранах показывается имя файла активной прошивки — той самой, которой стенд сейчас будет прошивать платы (например, что-то вроде «tractor-2026-06.hex» или другое имя — какое у вашего файла, то и будет). Имя файла стенд сохраняет как есть, не переименовывает. Если имя длинное и не помещается, оно прокручивается бегущей строкой. Это помогает быстро убедиться, что заряжена именно та прошивка, которая нужна."},{"type":"heading","text":"3) Строка хеша (первые 16 символов)"},{"type":"para","text":"Рядом с именем прошивки показывается строка из шестнадцати символов (цифры и буквы a–f) БЕЗ подписи — это начало «хеша» прошивки, её криптографической контрольной суммы SHA-256. На экране помещаются только первые 16 символов; этого достаточно, чтобы на глаз отличить одну прошивку от другой."},{"type":"para","text":"Зачем это вам: хеш — способ убедиться, что заряжена именно та сборка, которая одобрена, и что файл не повреждён и не подменён. Если сверить эти символы с эталонными (теми, что указаны в документе на вашу прошивку), и они совпадают — значит, прошивка та самая. Если хоть один символ другой — файл другой (об этом подробнее ниже)."},{"type":"heading","text":"4) Счётчики «ок» и «сбой»"},{"type":"para","text":"На рабочих экранах внизу показываются два счётчика — сколько плат прошито успешно и сколько с ошибкой. Они выглядят как пара чисел рядом со словами «ок» и «сбой» (например, «ок 12 сбой 1»). Это простая статистика за текущую работу стенда: удобно видеть, сколько плат уже сделано и не накопились ли отказы."},{"type":"list","ordered":false,"items":["«ок <N>» — число плат, прошитых успешно (с подтверждённой защитой).","«сбой <M>» — число плат, на которых прошивка не удалась."]},{"type":"para","text":"На разных экранах счётчики могут стоять чуть по-разному (например, на экране готовности — «ок N сбой M», а на экране успеха — «#N ок сбой M», где «#N» это номер только что сделанной платы). Смысл цифр всегда один и тот же."},{"type":"heading","text":"Все состояния экрана — по порядку"},{"type":"para","text":"Дальше идёт главное: каждое состояние, которое может показать дисплей. Для каждого приведены точные русские надписи (в кавычках — дословно, как на экране), объяснение, что это значит, и что вам делать. Состояний шесть, и здесь разобрано каждое — ни одно не пропущено."},{"type":"heading","text":"Состояние 1. «НЕТ ПРОШИВКИ»"},{"type":"code","lang":"text","text":"OTAБEK STM32                 [USB / GPIO / --]\\n\\n        НЕТ ПРОШИВКИ\\n       вставьте флешку\\n      USB с одним .hex\\n\\n      или в firmware/"},{"type":"para","text":"Что это значит: стенду нечем прошивать — у него сейчас нет ни одного файла прошивки, который он мог бы заливать в платы. Пока файла нет, прикладывать плату бесполезно: заливать нечего. Этот экран вы увидите на свежем стенде сразу после установки, пока ещё не дали ему ни одной прошивки. Прошивки лежат на стенде в папке firmware; если в этой папке нет ни одного подходящего файла .hex, стенду нечего брать, и он честно об этом сообщает, вместо того чтобы делать вид, что готов."},{"type":"steps","items":[{"title":"Вставить флешку","text":"На экране написано «вставьте флешку» и «USB с одним .hex». Возьмите обычную USB-флешку, на которой лежит РОВНО ОДИН файл .hex (в любой папке на флешке), и вставьте её в стенд. Стенд сам прочитает этот файл и возьмёт его в работу. Это основной способ загрузки."},{"title":"Положить файл в папку firmware","text":"На экране написано «или в firmware/». Это второй путь: поместить файл .hex прямо в рабочую папку прошивок на стенде. Так делают при первичной настройке."}]},{"type":"para","text":"После того как прошивка появится, экран сам сменится на «ГОТОВ К РАБОТЕ»."},{"type":"callout","variant":"info","title":"Подсказка по свету","text":"В этом состоянии зелёный и красный светодиоды стенда мигают по очереди, медленно сменяя друг друга (попеременно, примерно раз в 0,6 секунды). Это «маячок» того, что прошивки нет."},{"type":"heading","text":"Состояние 2. «ГОТОВ К РАБОТЕ»"},{"type":"code","lang":"text","text":"OTAБEK STM32                 [USB / GPIO / --]\\n\\n<имя прошивки>\\n<первые 16 символов хеша>\\nГОТОВ К РАБОТЕ\\nприложите плату\\nок <N> сбой <M>"},{"type":"para","text":"Что это значит: стенд полностью готов прошивать. Прошивка заряжена, всё на месте, можно работать. Это основной экран ожидания — именно его вы видите между платами."},{"type":"list","ordered":false,"items":["«<имя прошивки>» — имя файла, которым будут прошиваться платы. Бросьте взгляд: то ли это, что нужно?","«<первые 16 символов хеша>» — короткая подпись этой прошивки. Если у вас есть эталонные символы для сверки — сравните. Совпали — значит, заряжена правильная одобренная сборка.","«ГОТОВ К РАБОТЕ» — прямое сообщение: всё готово, ждём плату.","«приложите плату» — что от вас требуется: приложить (подключить) плату STM32 к проводам стенда. Как только контакт появится, стенд сам начнёт прошивать — это работа «в один тач», отдельно ничего нажимать не надо.","«ок <N> сбой <M>» — счётчики: сколько плат уже сделано успешно и сколько с ошибкой за текущую работу."]},{"type":"para","text":"Что делать: подключите плату к стенду (по тем проводам, которые соответствуют режиму в углу — «USB» или «GPIO»). Дальше ничего нажимать не нужно: прошивка начнётся сама."},{"type":"callout","variant":"info","title":"Подсказка по свету","text":"В ожидании зелёный светодиод стенда мигает как сердцебиение — две короткие вспышки подряд («тук-тук»), затем пауза, и снова по кругу. Вспышки чёткие, резкие (без плавного разгорания и затухания), а ритм ускоряется при росте загрузки системы. Это знак спокойной готовности."},{"type":"heading","text":"Состояние 3. Идёт прошивка (этапы, проценты, полоса)"},{"type":"code","lang":"text","text":"OTAБEK STM32                 [USB / GPIO / --]\\n\\n<имя прошивки>\\n<первые 16 символов хеша>\\n<ЭТАП>                  <проценты>%\\n[######______]   (полоса прогресса)\\nНЕ ОТКЛЮЧАЙТЕ #<N>"},{"type":"para","text":"Где <ЭТАП> — одно из шести слов, по очереди, по мере работы: СТАРТ → СВЯЗЬ → РАЗБЛОК → ЗАПИСЬ → ПРОВЕРКА → ЗАЩИТА."},{"type":"para","text":"Что это значит: стенд сейчас прошивает приложенную плату. Это происходит «в один тач»: вы приложили плату — и стенд автоматически проходит всю цепочку от начала до конца. Текущий шаг показан словом-этапом, рядом — проценты, а под ними ползёт полоса прогресса, которая постепенно заполняется."},{"type":"callout","variant":"warn","title":"НЕ ОТКЛЮЧАЙТЕ #<N>","text":"Очень важная строка внизу. Это значит ровно то, что написано: пока идёт прошивка, плату НЕ снимать, провода не дёргать. «#<N>» — порядковый номер платы в текущей работе (например, «НЕ ОТКЛЮЧАЙТЕ #13»). По нему удобно понимать, какую по счёту плату стенд сейчас делает."},{"type":"para","text":"Что означает каждый этап (строго по порядку — слово в слово, как на экране):"},{"type":"list","ordered":false,"items":["СТАРТ — стенд начинает работу с платой: подготовка, запуск всей последовательности. Это самый первый шаг.","СВЯЗЬ — стенд устанавливает связь с микроконтроллером по интерфейсу отладки (SWD), «здоровается» с платой и проверяет контакт. Без надёжной связи дальше идти нельзя.","РАЗБЛОК — снятие защиты, если плата пришла уже защищённой. Если на плате ранее была включена защита от чтения (RDP), стенд сначала снимает её. Снятие защиты на STM32 всегда сопровождается полным стиранием чипа — это устроено так специально. Для чистой платы этот этап проходит мгновенно — снимать нечего.","ЗАПИСЬ — стенд стирает флеш-память и записывает в неё вашу прошивку (файл .hex). Это основной этап заливки кода в плату.","ПРОВЕРКА — стенд считывает записанное обратно и сверяет с тем, что должно было записаться. Так подтверждается, что прошивка легла без ошибок, байт в байт.","ЗАЩИТА — стенд включает на плате защиту от чтения (RDP) и затем подтверждает это обратным считыванием. Этот этап — обязательное завершение: плата считается готовой ТОЛЬКО когда защита включена и подтверждена."]},{"type":"para","text":"Как читать прогресс: «<ЭТАП> <проценты>%» — какой шаг идёт сейчас и насколько он выполнен; полоса прогресса показывает то же наглядно: она заполняется слева направо. Проценты только растут и НЕ идут назад (в пределах одной платы не откатываются). Этапы сменяют друг друга в показанном порядке — видеть смену слов нормально: это значит, что работа идёт."},{"type":"para","text":"Что делать: ничего. Просто ждите и НЕ ТРОГАЙТЕ плату. Не снимайте её, не шевелите провода, не выдёргивайте флешку. Прошивка идёт сама и закончится сама — экран сменится либо на «ГОТОВО-СНИМИТЕ» (успех), либо на «ОШИБКА» (если что-то не вышло)."},{"type":"callout","variant":"ok","title":"Если плату всё-таки сняли в процессе","text":"Ничего страшного и никакого «брака». Стенд это переживает спокойно: прошивка прервётся, стенд сам вернётся в готовность. Прерванная плата просто не готова (в ней нет полной прошивки и не включена защита) — но если приложить ту же плату снова, она тут же перепрошьётся с начала. По свету в момент обрыва зелёный и красный коротко «стробят» вместе (~1,5 с), потом стенд снова готов, и зелёный снова бьётся сердцебиением."},{"type":"callout","variant":"info","title":"Подсказка по свету","text":"Во время прошивки зелёный светодиод стенда часто мигает (~80 мс включён / 80 мс выключен). Простое правило на всю работу: пока зелёный часто мигает — плату НЕ снимать."},{"type":"heading","text":"Состояние 4. «ГОТОВО-СНИМИТЕ» (успех, защита включена)"},{"type":"code","lang":"text","text":"OTAБEK STM32                 [USB / GPIO / --]\\n\\n<имя прошивки>\\n<первые 16 символов хеша>\\n[галочка]  ГОТОВО-СНИМИТЕ\\nRDP защита ВКЛ\\n#<N> ок  сбой <M>"},{"type":"para","text":"Что это значит: готово! Плата прошита успешно, и защита от чтения на ней ВКЛючена и подтверждена. Это и есть успешный результат — то, ради чего всё делалось. Рядом с надписью стоит «галочка» — значок успеха."},{"type":"list","ordered":false,"items":["«<имя прошивки>» и «<первые 16 символов хеша>» — те же имя и подпись прошивки, которой только что прошили плату.","«[галочка] ГОТОВО-СНИМИТЕ» — прошивка завершена удачно, плату можно снимать. «Снимите» здесь — прямое разрешение и указание: можно отключать плату.","«RDP защита ВКЛ» — на плате включена защита от чтения прошивки (RDP), и стенд это подтвердил обратным считыванием. Это важная гарантия: с такой платы прошивку нельзя вычитать через отладочный интерфейс. Плата засчитывается успешной только при подтверждённой защите — то есть если вы видите этот экран, защита точно стоит.","«#<N> ок сбой <M>» — итог по этой плате: «#<N>» это её номер, «ок» — признак успеха, «сбой <M>» — сколько всего отказов накопилось за работу."]},{"type":"para","text":"Что делать: снимите готовую плату — теперь это безопасно. Отложите её к готовым. Берите следующую плату и прикладывайте: стенд снова покажет ход прошивки. После снятия экран вернётся к ожиданию следующей платы."},{"type":"callout","variant":"ok","title":"Важное правило снятия","text":"Снимайте плату только тогда, когда видите этот экран успеха. По свету ему соответствует РОВНО ГОРЯЩИЙ (не мигающий) зелёный светодиод. Золотое правило: «снимать плату — только при ровном зелёном». Если зелёный мигает — прошивка ещё идёт, ждите."},{"type":"heading","text":"Состояние 5. «ОШИБКА код <K>»"},{"type":"code","lang":"text","text":"OTAБEK STM32                 [USB / GPIO / --]\\n\\n<имя прошивки>\\n<первые 16 символов хеша>\\n[крестик]  ОШИБКА код <K>\\n<строка причины>\\nснимите плату"},{"type":"para","text":"Где <строка причины> зависит от кода: код 2 → «нет контакта SWD»; код 3 → «запись/пров/RDP»; любой другой код → «см. журнал»."},{"type":"para","text":"Что это значит: прошивка этой платы не удалась. Рядом с надписью стоит «крестик» — значок неудачи. Стенд показывает код ошибки <K> и короткую строку причины, чтобы вы сразу поняли, в чём дело. Стенд не «зависает» и не молчит — после ошибки он сам готов к следующей попытке."},{"type":"callout","variant":"danger","title":"Код 2 — «нет контакта SWD»","text":"Стенд не смог установить или удержать связь с платой по линиям отладки. Чаще всего это про провода и контакт: что-то подключено неплотно, перепутаны сигналы SWDIO/SWCLK, нет питания или «земли», плохо прижата плата. То есть стенд «не дозвонился» до микроконтроллера. Что делать: снимите плату, проверьте контакт и подключение (плотно ли сидят провода, на месте ли SWDIO, SWCLK, GND и 3V3), при необходимости поправьте и приложите плату снова. Часто помогает просто переподключить поаккуратнее. Стенд и сам повторяет попытку при дребезжащем контакте, но если контакт совсем плохой — он честно сообщит кодом 2."},{"type":"callout","variant":"danger","title":"Код 3 — «запись/пров/RDP»","text":"Связь с платой была, но не прошёл один из содержательных этапов: либо запись прошивки, либо проверка записанного, либо включение/подтверждение защиты от чтения (RDP). Иначе говоря, до платы «достучались», но результат не сошёлся: данные не записались как надо, проверка не совпала или защита не подтвердилась. Что делать: снимите плату и приложите снова — нередко вторая попытка проходит. Если ошибка повторяется именно на этой плате, скорее всего дело в самой плате (например, неисправный чип). Возьмите другую плату и продолжайте."},{"type":"callout","variant":"warn","title":"Любой другой код — «см. журнал»","text":"Это значит, что причина не из двух типовых выше, и подробности нужно смотреть в журнале стенда. Если стенд ещё не опечатан, журнал можно открыть служебными средствами. Если стенд уже опечатан, запишите код ошибки и обратитесь к тому, кто настраивал стенд."},{"type":"para","text":"Что делать (общее): на экране прямо написано «снимите плату» — это и есть первое действие. Ошибка «держится» на экране и на красном светодиоде до тех пор, пока вы не снимете плату; это сделано нарочно, чтобы вы точно заметили отказ и не пропустили плохую плату как хорошую. После снятия стенд вернётся в готовность. Важно: ошибка по одной плате — это не поломка стенда. Прибор специально сделан так, чтобы сбойная или плохо прижатая плата не «вешала» его."},{"type":"callout","variant":"info","title":"Подсказка по свету — можно «прочитать» код издалека","text":"При ошибке платы красный светодиод стенда мигает КОДОМ — считайте число вспышек в группе, потом пауза (~1,2 с), потом повтор. Держится, пока плату не снимут: 2 вспышки = нет или потерян контакт SWD (код 2); 3 вспышки = не прошли запись / проверка / подтверждение RDP (код 3). Так вы понимаете причину, даже не подходя к экрану."},{"type":"heading","text":"Состояние 6. Экран после импорта прошивки с флешки (на ~2 секунды)"},{"type":"code","lang":"text","text":"OTAБEK STM32                 [USB / GPIO / --]\\n\\n[галочка]  ПРОШИВКА\\n<имя файла>\\n<первые 16 символов хеша>\\n\\nготова к работе"},{"type":"para","text":"Обратите внимание на порядок строк: сверху именно слово «ПРОШИВКА» (с галочкой), а отдельной нижней строкой — «готова к работе». Эти две надписи стоят раздельно, ровно как здесь показано."},{"type":"para","text":"Что это значит: вы вставили флешку с новой прошивкой, и стенд её принял — то есть успешно импортировал новый файл .hex с флешки и теперь будет прошивать платы уже ИМ. Этот экран показывается коротко, примерно две секунды, сразу после удачного импорта с USB, и означает «прошивка принята, всё хорошо»."},{"type":"list","ordered":false,"items":["«[галочка] ПРОШИВКА» — стенд подтверждает, что прошивка с флешки принята и загружена.","«<имя файла>» — имя прошивки, которое сохранилось с флешки. Проверьте глазами, что это действительно та прошивка, которую вы хотели занести.","«<первые 16 символов хеша>» — те же 16 символов подписи. Можно сверить с эталонными, чтобы убедиться, что файл цел и тот самый.","«готова к работе» — прошивка готова: стенд сейчас перейдёт в обычное ожидание и будет лить именно её."]},{"type":"para","text":"Как это работает (коротко): положите на обычную USB-флешку РОВНО ОДИН файл .hex (в любой папке на ней — стенд его найдёт), вставьте флешку в стенд. Стенд автоматически прочитает этот файл, возьмёт его в работу (имя файла сохраняется) и покажет этот экран импорта примерно на две секунды. После этого новый файл становится активной прошивкой, и платы прошиваются уже им. Переустановка или перезапуск не нужны — обновление происходит «на лету». Флешка при этом монтируется только для чтения и с жёсткими ограничениями: с неё считывается лишь сам файл .hex, и ничего с неё не может быть запущено или как-то повлиять на стенд."},{"type":"para","text":"Что происходит дальше: примерно через две секунды экран сам сменится на обычный «ГОТОВ К РАБОТЕ» (Состояние 2), и можно прикладывать платы — в них пойдёт уже новая прошивка. Старую прошивку стенд заменил на эту."},{"type":"callout","variant":"warn","title":"Если импорт не прошёл — этот экран не появится","text":"Стенд берёт прошивку только тогда, когда на флешке РОВНО ОДИН файл .hex. Возможны два промаха, и оба видны по красному светодиоду (короткая сигнализация около 8 секунд), а текущая прошивка при этом остаётся прежней: на флешке НЕТ ни одного .hex → красный мигает 4 раза; на флешке ДВА или больше .hex → красный мигает 5 раз (нужен ровно один — стенд не угадывает, какой из них взять). В обоих случаях исправьте содержимое флешки (оставьте на ней ровно один нужный .hex) и вставьте снова."},{"type":"callout","variant":"info","title":"Подсказка по свету","text":"Когда прошивка с флешки принята, зелёный светодиод даёт тройной импульс (три плавные вспышки подряд) — короткий сигнал «принято»."},{"type":"heading","text":"Дополнительно: про надпись «RDP защита ВКЛ»"},{"type":"para","text":"RDP — это защита от чтения, встроенная в микроконтроллеры STM32. Когда она включена, прошивку нельзя считать из чипа через отладочный интерфейс: флеш-память становится недоступной для вычитывания. Снять такую защиту можно только полным стиранием чипа — а стирание уничтожает саму прошивку. Поэтому «достать» залитую прошивку с защищённой платы не получится: либо защита стоит и читать нельзя, либо вы стираете всё и читать уже нечего."},{"type":"para","text":"Стенд включает эту защиту на КАЖДОЙ плате и обязательно ПОДТВЕРЖДАЕТ её, считывая обратно признак защиты. Именно поэтому плата засчитывается успешной только тогда, когда защита реально включена и подтверждена. Когда вы видите на экране успеха «RDP защита ВКЛ» — это значит, что проверка пройдена: на этой плате защита точно стоит. Полезно знать: стенд умеет прошивать и платы, которые пришли уже защищёнными. Он сам снимет с них защиту (этап РАЗБЛОК, с полным стиранием), зальёт прошивку заново и снова включит защиту — поэтому одна и та же простая последовательность работает и для чистых, и для уже защищённых плат."},{"type":"heading","text":"Дополнительно: про строку хеша — что значат эти 16 символов"},{"type":"para","text":"Каждая прошивка имеет свою «подпись» — сумму SHA-256, вычисленную по содержимому файла. SHA-256 — это широко применяемый стандарт (FIPS 180-4), который по любому файлу выдаёт строку фиксированной длины (256 бит). Главное свойство: даже крошечное изменение в файле полностью меняет эту подпись. Стенд считает хеш сам, локально, прямо у себя."},{"type":"para","text":"На экране показываются первые 16 символов этой подписи — потому что больше просто не помещается, а 16 символов уже достаточно, чтобы на глаз отличить одну прошивку от другой. Полная подпись хранится на стенде (в файле состояния и в журнале) — её можно сверить целиком при необходимости. Одна и та же прошивка всегда даёт один и тот же хеш — на любом компьютере и на любой прошивалке. Поэтому если у вашей прошивки есть «эталонные» символы (их обычно указывают в документе на выпуск), сравните их с тем, что на экране. Совпали — заряжена именно та одобренная сборка, и файл не повреждён. Не совпали — перед вами другой, повреждённый или поддельный файл, и стоит разобраться, прежде чем прошивать платы."},{"type":"heading","text":"Короткая памятка: увидел на экране — сделай"},{"type":"table","columns":["Что на экране","Что делать"],"rows":[["Шапка вверху","Слева «OTAБEK STM32», справа «USB», «GPIO» или «--» (способ подключения). Это ориентир."],["«НЕТ ПРОШИВКИ»","Заряди прошивку: вставь флешку с одним .hex или положи .hex в папку firmware."],["«ГОТОВ К РАБОТЕ»","Проверь имя/хеш, приложи плату. Стенд начнёт сам."],["<ЭТАП> + % + полоса, «НЕ ОТКЛЮЧАЙТЕ #N»","Жди и НЕ ТРОГАЙ плату. Этапы по порядку: СТАРТ, СВЯЗЬ, РАЗБЛОК, ЗАПИСЬ, ПРОВЕРКА, ЗАЩИТА. Проценты только растут."],["«ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ»","Успех, защита стоит. Снимай плату (зелёный горит РОВНО), бери следующую."],["«ОШИБКА код 2», «нет контакта SWD»","Нет контакта. Сними плату, поправь провода, приложи снова."],["«ОШИБКА код 3», «запись/пров/RDP»","Не прошли запись/проверка/RDP. Сними плату, приложи снова; повторяется — возьми другую."],["«ОШИБКА» с иной причиной, «см. журнал»","Редкий случай. Запиши код, смотри журнал или обратись к тому, кто настраивал стенд."],["[галочка] «ПРОШИВКА» + имя + хеш + «готова к работе»","Новая прошивка с флешки загружена (экран на ~2 с). Можешь вынуть флешку и прошивать дальше."]]},{"type":"callout","variant":"ok","title":"Главное правило на всю работу","text":"Снимай плату только при РОВНО горящем зелёном (экран «ГОТОВО-СНИМИТЕ»). Пока зелёный часто мигает — прошивка идёт, плату не трогай. Если выдернул случайно — не страшно, приложи снова, стенд перепрошьёт заново."}]'),Kr={layout:[{region:"Шапка сверху (светлая полоса, тёмные буквы, высота 13 точек)",shows:"Слева — «OTAБEK STM32» (с русской буквой «Б»); справа — метка режима подключения: «USB» (ST-Link по USB), «GPIO» (прямая прошивка по выводам Raspberry Pi) или «--» (режим ещё не определён). Шапка постоянна и не меняется по ходу работы."},{region:"Строка 1 содержимого (под шапкой)",shows:"Имя файла активной прошивки (например, «tractor-2026-06.hex»). Если имя длинное и не помещается — прокручивается бегущей строкой. На экранах «НЕТ ПРОШИВКИ» и «ПРОШИВКА» (импорт) эта область занята другим текстом."},{region:"Строка 2 содержимого",shows:"Первые 16 символов хеша SHA-256 прошивки (цифры и буквы a–f), без подписи. Для одной и той же прошивки всегда одинаков; изменился — значит прошивка другая или повреждена."},{region:"Строка 3 содержимого",shows:"Главное сообщение состояния: «ГОТОВ К РАБОТЕ», либо «<ЭТАП> <проценты>%» во время прошивки (этап слева, проценты прижаты к правому краю), либо «[галочка] ГОТОВО-СНИМИТЕ» при успехе, либо «[крестик] ОШИБКА код <K>» при сбое."},{region:"Строка 4 содержимого",shows:"Вспомогательная строка: «приложите плату» (готов), полоса прогресса (во время прошивки), «RDP защита ВКЛ» (успех) или строка причины ошибки (сбой)."},{region:"Строка 5 содержимого (нижняя)",shows:"Счётчики и инструкции: «ок <N> сбой <M>» (готов), «НЕ ОТКЛЮЧАЙТЕ #<N>» (прошивка), «#<N> ок сбой <M>» (успех) или «снимите плату» (ошибка)."}],states:[{stage:"НЕТ ПРОШИВКИ (NOFW) — ни одна прошивка не загружена",line1:"НЕТ ПРОШИВКИ / вставьте флешку",line2:"USB с одним .hex / или в firmware/"},{stage:"ПРОШИВКА ЗАГРУЖЕНА (IMPORTED) — после флешки, держится ~2 c, затем → ГОТОВ К РАБОТЕ",line1:"[галочка] ПРОШИВКА / tractor-2026-06.hex",line2:"157e3aaef1df68da / готова к работе"},{stage:"ГОТОВ К РАБОТЕ (ARMED) — ожидание платы",line1:"pump-controller-v4.2-rc1.hex / 9a1c0fbe22d4e7aa",line2:"ГОТОВ К РАБОТЕ / приложите плату / ок 500 сбой 0"},{stage:"ИДЁТ ПРОШИВКА (FLASHING) — этап «ЗАПИСЬ», проценты только растут",line1:"tractor-2026-06.hex / 157e3aaef1df68da",line2:"ЗАПИСЬ 45% / [######______] / НЕ ОТКЛЮЧАЙТЕ #123"},{stage:"ГОТОВО-СНИМИТЕ (OK) — успех, защита включена; держится до снятия платы",line1:"tractor-2026-06.hex / 157e3aaef1df68da",line2:"[галочка] ГОТОВО-СНИМИТЕ / RDP защита ВКЛ / #124 ок сбой 2"},{stage:"ОШИБКА (FAIL) код 2 — нет контакта SWD; держится до снятия платы",line1:"tractor-2026-06.hex / 157e3aaef1df68da",line2:"[крестик] ОШИБКА код 2 / нет контакта SWD / снимите плату"},{stage:"ОШИБКА (FAIL) код 3 — запись/проверка/RDP не прошли",line1:"tractor-2026-06.hex / 157e3aaef1df68da",line2:"[крестик] ОШИБКА код 3 / запись/пров/RDP / снимите плату"}],stages:["СТАРТ (~5%)","СВЯЗЬ (~10–16%)","РАЗБЛОК (~28%)","ЗАПИСЬ (~45–70%)","ПРОВЕРКА (~86%)","ЗАЩИТА (~95–96%)"]},Qc={id:Br,title:Nr,tagline:Ur,sourceFiles:Fr,summary:zr,blocks:Hr,data:Kr},Zc=Object.freeze(Object.defineProperty({__proto__:null,blocks:Hr,data:Kr,default:Qc,id:Br,sourceFiles:Fr,summary:zr,tagline:Ur,title:Nr},Symbol.toStringTag,{value:"Module"})),Vr="errors",$r="Ошибки и решения",Yr="Что значит каждый сигнал стенда и что делать по шагам.",Jr=["документация/07-ОШИБКИ-И-РЕШЕНИЯ.txt","документация-2/10-ОШИБКИ-И-РЕШЕНИЯ.txt"],Qr="База знаний по всем ошибкам автономного стенда прошивки STM32: как ошибка выглядит (признак), почему происходит (причина) и что делать по шагам. Стенд устроен надёжно и не «зависает» из-за плохой платы — каждая попытка прошивки ограничена по времени, плохой контакт повторяется автоматически, а выдернутую плату стенд спокойно ждёт обратно. Поэтому большинство «ошибок» решаются за несколько секунд и без сложных действий. Состояние всегда видно сразу по двум каналам: дисплею и двум светодиодам, которые дублируют друг друга.",Zr=JSON.parse('[{"type":"callout","variant":"ok","title":"Главное правило","text":"Снимать плату можно ТОЛЬКО на ровном зелёном (зелёный горит и не мигает) — это значит «ГОТОВО», прошивка удалась. Пока зелёный мигает — идёт запись, плату не трогать."},{"type":"heading","text":"1. Как стенд сообщает об ошибке"},{"type":"para","text":"У стенда два способа показать, что что-то пошло не так: дисплей и два светодиода. Они говорят об одном и том же, просто разными словами, и полностью дублируют друг друга."},{"type":"heading","text":"Дисплей при ошибке"},{"type":"para","text":"При ошибке на дисплее появляется крестик и строка «ОШИБКА код <K>», где <K> — это номер (число). Под ней идёт строка с короткой причиной, а ещё ниже — подсказка «снимите плату»."},{"type":"table","columns":["Код на дисплее","Строка причины"],"rows":[["код 2","нет контакта SWD"],["код 3","запись/пров/RDP"]]},{"type":"heading","text":"Светодиоды"},{"type":"list","ordered":false,"items":["Зелёный — это ACT (активность / готовность).","Красный — это PWR (питание / ошибка)."]},{"type":"para","text":"Когда происходит ошибка платы, красный светодиод начинает МИГАТЬ, и число вспышек — это и есть код ошибки. Просто посчитайте, сколько раз он мигнул: 2 вспышки — нет контакта SWD (то же, что «ОШИБКА код 2»); 3 вспышки — запись / проверка / RDP не прошли («код 3»). Красный держит этот код до тех пор, пока вы не снимете плату. Это сделано специально: код не пропадёт, пока вы его не увидите и не уберёте плату."},{"type":"heading","text":"Отдельно — ошибки флешки"},{"type":"para","text":"Ошибки, связанные с флешкой (USB-носителем), показываются короткой серией вспышек примерно 8 секунд, после чего гаснут: 4 вспышки — на флешке нет файла .hex; 5 вспышек — на флешке два и более файлов .hex (нужен ровно один)."},{"type":"callout","variant":"info","title":"Запомните главное","text":"Ровный зелёный (горит, не мигает) = ГОТОВО, прошивка удалась, снимать плату можно. Красный мигает кодом = ошибка платы (2 или 3). Короткая серия вспышек ~8 секунд = ошибка флешки (4 или 5). Зелёный и красный «стробят» вместе = плату выдернули в процессе, стенд уже снова готов — это НЕ брак."},{"type":"heading","text":"2. «ОШИБКА код 2» — нет контакта SWD"},{"type":"callout","variant":"warn","title":"Признак","text":"На дисплее: крестик, «ОШИБКА код 2», ниже «нет контакта SWD», ниже «снимите плату». Красный светодиод мигает по 2 раза и держит этот код, пока вы не снимете плату."},{"type":"para","text":"Что это значит. Стенд не смог «достучаться» до микроконтроллера по линии SWD. Проще говоря — нет надёжного электрического соединения между стендом и платой. Либо его не было с самого начала, либо оно пропало в процессе."},{"type":"para","text":"Почему так происходит. Связь идёт по четырём проводам SWD. Если хотя бы один из них не касается как следует, чип «молчит». Самые частые причины — плохой прижим платы к контактам, грязь или окисел на площадках, оборванный или плохо сидящий провод, слишком длинные провода."},{"type":"steps","items":[{"title":"Снимите плату","text":"Как просит дисплей."},{"title":"Проверьте прижим","text":"Плата должна плотно и ровно прилегать к контактам. Прижмите её ещё раз, без перекоса."},{"title":"Проверьте чистоту контактов","text":"Посмотрите на контактные площадки и пого-контакты (подпружиненные иглы). Если есть грязь, пыль или налёт — аккуратно очистите."},{"title":"Проверьте провода","text":"Должны быть все четыре провода SWD: SWDIO, SWCLK, GND, 3V3. Убедитесь, что каждый сидит плотно и нигде не оборван."},{"title":"Проверьте, что провода короткие","text":"Длинные провода ухудшают сигнал. Чем короче — тем надёжнее."},{"title":"Проверьте распиновку","text":"Если подключали сами по GPIO: SWDIO → контакт 22, SWCLK → контакт 23, 3V3 → контакт 17, GND → контакт 14. Либо используйте ST-Link по USB — это альтернативный способ подключения (на дисплее тогда «USB»)."},{"title":"Приложите плату снова","text":"Если контакт хороший — прошивка пойдёт сама."}]},{"type":"callout","variant":"info","title":"Важно: авто-повтор","text":"Дребезжащий (неустойчивый) контакт стенд пытается победить сам: он делает несколько попыток подряд. Поэтому иногда достаточно просто чуть сильнее прижать плату — и со второй-третьей попытки всё проходит. Если код 2 повторяется упорно — дело именно в контакте или проводах, вернитесь к шагам выше."},{"type":"heading","text":"3. «ОШИБКА код 3» — запись / проверка / RDP"},{"type":"callout","variant":"warn","title":"Признак","text":"На дисплее: крестик, «ОШИБКА код 3», ниже «запись/пров/RDP», ниже «снимите плату». Красный светодиод мигает по 3 раза и держит код до снятия платы."},{"type":"para","text":"Что это значит. Контакт со стендом был, чип ответил, но один из главных шагов не завершился успешно. «запись/пров/RDP» — это сокращение от трёх этапов."},{"type":"list","ordered":false,"items":["ЗАПИСЬ — запись прошивки в память чипа.","ПРОВЕРКА — сверка: то, что записалось, совпадает с прошивкой.","RDP — установка защиты от чтения (Read-Out Protection) после прошивки."]},{"type":"para","text":"Код 3 означает, что один из этих этапов не прошёл или не подтвердился."},{"type":"para","text":"Почему так происходит. Чаще всего причина — контакт, который «дожил» до начала работы, но стал нестабильным во время записи или проверки (плата чуть сдвинулась, дрогнул провод, площадка касается неплотно). Реже — особенности самой платы. Изредка — проблема в самой прошивке."},{"type":"steps","items":[{"title":"Снимите плату","text":"Уберите её с контактов."},{"title":"Проверьте контакт так же тщательно, как для кода 2","text":"Прижим, чистота площадок, целость и плотность проводов, короткие провода, правильная распиновка. Нестабильный контакт — самая частая причина кода 3."},{"title":"Приложите плату снова и не двигайте её во время работы","text":"Дайте стенду спокойно записать и проверить прошивку. Убедитесь, что провода держатся всё время прошивки, а не только вначале."},{"title":"Если код 3 повторяется на этой же плате раз за разом","text":"А другие платы при тех же условиях прошиваются нормально — скорее всего, проблема в самой плате (см. раздел про сломанную плату). Отложите плату как подозрительную и проверьте другую."}]},{"type":"callout","variant":"ok","title":"Приятная деталь про RDP","text":"Если плата УЖЕ защищена (на ней стоит RDP), это НЕ помеха. Стенд сам снимает защиту, заново прошивает и снова ставит защиту. Никаких отдельных действий от вас не нужно — защищённые платы прошиваются точно так же, как чистые."},{"type":"heading","text":"4. Ошибки флешки (USB-носителя)"},{"type":"para","text":"Эти ошибки не про плату, а про файл прошивки на флешке. Они показываются короткой серией вспышек красного примерно 8 секунд и гаснут."},{"type":"heading","text":"4.1. Красный 4 раза — на флешке нет .hex"},{"type":"para","text":"Признак: красный мигнул 4 раза (серия ~8 секунд). Что это значит: стенд прочитал флешку, но не нашёл на ней ни одного файла .hex. Прошивать нечего."},{"type":"steps","items":[{"title":"Достаньте флешку","text":"Извлеките USB-носитель."},{"title":"Запишите файл прошивки .hex","text":"Запишите на неё файл прошивки с расширением .hex."},{"title":"Ровно один .hex","text":"На флешке должен быть РОВНО один .hex — не ноль и не два."},{"title":"Вставьте флешку обратно","text":"Стенд импортирует прошивку."}]},{"type":"heading","text":"4.2. Красный 5 раз — два и более .hex"},{"type":"para","text":"Признак: красный мигнул 5 раз (серия ~8 секунд). Что это значит: на флешке найдено два или больше файлов .hex. Стенд не может сам решить, какой из них правильный, поэтому не берёт ни один."},{"type":"steps","items":[{"title":"Достаньте флешку","text":"Извлеките USB-носитель."},{"title":"Оставьте ровно один нужный .hex","text":"Все лишние .hex удалите (или перенесите в другое место)."},{"title":"Вставьте флешку обратно","text":"Теперь стенд возьмёт единственный файл."}]},{"type":"callout","variant":"info","title":"Почему нужен ровно один .hex","text":"Стенд берёт прошивку без вопросов и подтверждений — чтобы работать быстро и без лишних действий. Если файлов несколько, он не угадывает, а честно сообщает об ошибке. Так вы не зальёте по ошибке не ту прошивку."},{"type":"heading","text":"5. Плата не прошивается"},{"type":"para","text":"Признак. Вы приложили плату, но прошивка не идёт: вместо ровного зелёного вы видите ошибку (красный мигает кодом) или вообще ничего не меняется."},{"type":"steps","items":[{"title":"Посмотрите, какой сигнал даёт стенд — это половина ответа","text":"Красный 2 раза → раздел про код 2 (контакт SWD); красный 3 раза → раздел про код 3 (запись/RDP); красный 4 раза → на флешке нет .hex (раздел 4.1); красный 5 раз → на флешке несколько .hex (раздел 4.2); дисплей пустой → раздел про пустой дисплей."},{"title":"Если код связан с контактом (2 или 3)","text":"Проверьте прижим, чистоту контактов, провода и распиновку (см. соответствующие разделы)."},{"title":"Если стенд вообще никак не реагирует на плату","text":"Проверьте, что вы подключили все четыре провода SWD и что есть питание 3V3 на плату. Проверьте, что на дисплее «ГОТОВ К РАБОТЕ» (а не «НЕТ ПРОШИВКИ»), и режим подключения на дисплее (USB / GPIO)."},{"title":"Приложите плату ещё раз","text":"Помните: плохой контакт стенд повторяет сам, поэтому иногда помогает просто переустановить плату плотнее."}]},{"type":"heading","text":"6. Плохой / дребезжащий контакт (авто-повтор)"},{"type":"para","text":"Признак. Прошивка то идёт, то срывается. Иногда плата прошивается со второй или третьей попытки. Вы замечаете, что результат зависит от того, как плотно лежит плата."},{"type":"para","text":"Что это значит. Контакт между стендом и платой неустойчивый («дребезжит»). Стенд знает про это и борется сам: при плохом контакте он автоматически делает несколько попыток подряд, прежде чем сообщить об ошибке."},{"type":"steps","items":[{"title":"Прижмите плату плотнее и ровнее","text":"Без перекоса."},{"title":"Не двигайте плату, пока идёт работа","text":"Дайте циклу завершиться."},{"title":"Очистите контактные площадки и иглы","text":"Если на них есть налёт."},{"title":"Проверьте провода","text":"Целые, плотно сидят, короткие."},{"title":"Если после этого всё проходит","text":"Значит, дело было именно в контакте, и теперь всё в порядке."}]},{"type":"callout","variant":"ok","title":"Почему это не страшно","text":"Авто-повтор как раз и придуман для таких случаев. Один сорвавшийся заход не означает брак — стенд просто попробует снова. Ваша задача — обеспечить хороший прижим и чистые контакты."},{"type":"heading","text":"7. Сломанная плата"},{"type":"para","text":"Признак. Конкретная плата упорно не прошивается: код 2 или код 3 повторяется раз за разом, хотя контакт хороший и провода в порядке. При этом ДРУГИЕ платы на этом же стенде, при тех же проводах и прижиме, прошиваются нормально."},{"type":"para","text":"Что это значит. Скорее всего, дело в самой плате (повреждён чип, площадки, цепи питания и т.п.), а не в стенде."},{"type":"steps","items":[{"title":"Сначала исключите контакт","text":"Ещё раз проверьте прижим, чистоту площадок, провода и распиновку. Это самое частое."},{"title":"Проверьте ту же плату пару раз","text":"Если код держится упорно — переходите к следующему шагу."},{"title":"Проверьте соседнюю заведомо нормальную плату при тех же условиях","text":"Если она прошивается — проблема в первой плате, а не в стенде."},{"title":"Отложите подозрительную плату в брак","text":"Уберите её из потока."}]},{"type":"callout","variant":"info","title":"Хорошая новость","text":"Сломанная плата НЕ «вешает» стенд. Каждая попытка работы с чипом ограничена по времени, поэтому даже на полностью неисправной плате стенд не зависнет — он просто покажет ошибку и будет готов к следующей."},{"type":"heading","text":"8. Плату выдернули в процессе (это не брак)"},{"type":"para","text":"Признак. Плату убрали или она отскочила, пока шла прошивка. Зелёный и красный светодиоды «стробят» вместе (мигают одновременно). Стенд после этого сразу снова готов к работе."},{"type":"para","text":"Что это значит. Стенд заметил, что плата пропала в середине процесса. Это штатная ситуация, а НЕ брак платы. Стенд просто прервал начатое и встал в готовность."},{"type":"steps","items":[{"title":"Не паникуйте","text":"Ничего страшного не случилось."},{"title":"Просто приложите эту же плату снова","text":"Как только контакт появится, стенд мгновенно перепрошьёт её заново."},{"title":"Дождитесь ровного зелёного","text":"Это значит, прошивка удалась. Только тогда снимайте плату."}]},{"type":"callout","variant":"info","title":"Почему так сделано","text":"Стенд устроен так, чтобы случайно выдернутая плата не превращалась в проблему. Полупрошитая плата — не брак: верните её, и она прошьётся заново с начала. Никаких лишних действий не требуется."},{"type":"heading","text":"9. Дисплей пустой / не включается"},{"type":"para","text":"Признак. Дисплей ничего не показывает — пустой, тёмный, не включается. Что это значит: чаще всего не поднялась шина связи с дисплеем (I2C). Это бывает сразу после установки или первого включения стенда."},{"type":"steps","items":[{"title":"Сделайте перезагрузку один раз","text":"Это включает шину I2C, по которой работает дисплей. Убедитесь, что после установки была ОДНА перезагрузка."},{"title":"Дождитесь запуска","text":"Пока стенд снова запустится, и посмотрите на дисплей."},{"title":"Проверьте 4 провода дисплея","text":"VDD → контакт 1, GND → контакт 6, SDA → контакт 3, SCK → контакт 5."},{"title":"Проверьте тип модуля","text":"Дисплей должен быть именно I2C-модулем 0.96\\" 128×64."},{"title":"Пока разбираетесь — ориентируйтесь по светодиодам","text":"Они показывают то же самое (готовность, коды ошибок). Дисплей и светодиоды дублируют друг друга."}]},{"type":"code","lang":"bash","text":"sudo reboot"},{"type":"callout","variant":"info","title":"Полезно знать","text":"Дисплей подключён по отдельной шине I2C — это не те же провода, что SWD. Поэтому проблема с дисплеем НЕ мешает прошивке плат: стенд может прошивать и без дисплея, просто вы не увидите текстовых подсказок."},{"type":"heading","text":"10. «НЕТ ПРОШИВКИ»"},{"type":"para","text":"Признак. На дисплее показано состояние: «НЕТ ПРОШИВКИ», «вставьте флешку», «USB с одним .hex», «или в firmware/». Светодиоды при этом медленно мигают попеременно зелёный↔красный (примерно раз в 0,6 секунды)."},{"type":"para","text":"Что это значит. У стенда сейчас нет файла прошивки, которым он мог бы прошивать платы. Ему нужно дать прошивку — одним из двух способов, прямо как подсказано на дисплее."},{"type":"steps","items":[{"title":"Способ 1 — через флешку","text":"Возьмите флешку (USB-носитель), запишите на неё РОВНО один файл .hex и вставьте флешку в стенд."},{"title":"Способ 2 — положить файл в папку прошивок","text":"Положите файл .hex в папку /opt/flashjig/firmware/. После этого у стенда появится прошивка."}]},{"type":"para","text":"После любого из способов стенд будет готов прошивать платы."},{"type":"heading","text":"11. Платы прошиваются старой версией / хеш не совпадает"},{"type":"para","text":"Если платы прошиваются старой версией — посмотрите имя и хеш на дисплее. Если не та версия, вставьте флешку с нужной прошивкой ещё раз. Если хеш на дисплее не совпадает с ожидаемым — значит залита другая прошивка или файл повреждён. Загрузите правильный .hex и сверьте его хеш с эталонным от вашей версии."},{"type":"heading","text":"12. Как посмотреть, что происходит (диагностика)"},{"type":"para","text":"Если нужно разобраться глубже, у стенда есть журнал и файл состояния. Эти команды работают, если устройство ещё не опечатано (не переведено в режим lockdown)."},{"type":"code","lang":"bash","text":"# Живой журнал (смотреть в реальном времени)\\njournalctl -u flash-jig -f\\n\\n# Текущее состояние: имя прошивки, хеш, счётчики\\ncat /opt/flashjig/status\\n\\n# Журнал в файле (история)\\n/opt/flashjig/flash.log\\n\\n# Если дисплей не появился после установки — один раз для включения I2C\\nsudo reboot"},{"type":"list","ordered":false,"items":["Живой журнал (journalctl -u flash-jig -f) — видно, что стенд делает прямо сейчас: попытки прошивки, ошибки, повторы. Первое место, куда стоит заглянуть, когда что-то непонятно.","Текущее состояние (cat /opt/flashjig/status) — имя загруженной прошивки, её хеш (контрольная сумма) и счётчики. Удобно проверить, какая прошивка активна и сколько плат уже прошито.","Журнал в файле (/opt/flashjig/flash.log) — тот же журнал записывается в файл, его можно открыть позже, чтобы посмотреть историю."]},{"type":"heading","text":"Короткая памятка по сигналам"},{"type":"table","columns":["Сигнал","Что значит и что делать"],"rows":[["Ровный зелёный","ГОТОВО. Снимать плату можно."],["Красный 2 раза","Нет контакта SWD (код 2). Проверьте контакт, прижим, провода, распиновку."],["Красный 3 раза","Запись/проверка/RDP не прошли (код 3). Чаще всего — нестабильный контакт."],["Красный 4 раза (~8 сек)","На флешке нет .hex. Запишите один .hex."],["Красный 5 раз (~8 сек)","На флешке несколько .hex. Оставьте один."],["Зелёный+красный строб","Плату выдернули в процессе. Не брак — приложите снова, перепрошьётся."],["Зелёный↔красный по очереди (~0,6 с)","Нет прошивки. Загрузите флешку с одним .hex."],["Дисплей пустой","Сделайте один раз sudo reboot (для I2C)."]]},{"type":"heading","text":"Провода SWD (распиновка по GPIO)"},{"type":"table","columns":["Сигнал","Номер контакта"],"rows":[["SWDIO","контакт 22 (GPIO25)"],["SWCLK","контакт 23 (GPIO11)"],["3V3","контакт 17"],["GND","контакт 14"]]},{"type":"para","text":"Либо ST-Link по USB (на дисплее тогда «USB»). Дисплей подключается отдельно по шине I2C: VDD → контакт 1, GND → контакт 6, SDA → контакт 3, SCK → контакт 5."},{"type":"callout","variant":"danger","title":"Главное, что стоит запомнить","text":"Снимайте плату только на РОВНОМ зелёном. Большинство ошибок (код 2 и код 3) — это контакт: прижим, чистота площадок, провода — вот что проверять в первую очередь. Плохой контакт повторяется сам; выдернутую плату стенд ждёт обратно; защищённые платы прошиваются как чистые — всё это штатно. Ошибки 4 и 5 вспышек — про флешку: нужен РОВНО один .hex. Пустой дисплей лечится одной перезагрузкой и на прошивку не влияет."}]'),Xr={codes:[{blinks:2,name:"Нет контакта SWD («ОШИБКА код 2»)",meaning:"Стенд не смог связаться с микроконтроллером по линии SWD: нет надёжного электрического соединения между стендом и платой (его не было с самого начала либо оно пропало в процессе). На дисплее: крестик, «ОШИБКА код 2», «нет контакта SWD», «снимите плату». Красный мигает по 2 раза и держит код, пока плату не снимут.",fix:"Снимите плату. Проверьте прижим (плотно и ровно, без перекоса), чистоту контактных площадок и пого-игл, все четыре провода SWD (SWDIO, SWCLK, GND, 3V3 — плотно и не оборваны), короткие провода. Проверьте распиновку GPIO: SWDIO→22, SWCLK→23, 3V3→17, GND→14 (либо ST-Link по USB). Приложите плату снова — плохой контакт стенд авто-повторяет сам, иногда помогает просто прижать плотнее."},{blinks:3,name:"Запись / проверка / RDP не подтверждены («ОШИБКА код 3»)",meaning:"Контакт был и чип ответил, но один из главных этапов не завершился: ЗАПИСЬ прошивки, ПРОВЕРКА (сверка записанного с прошивкой) или RDP (установка защиты от чтения). На дисплее: крестик, «ОШИБКА код 3», «запись/пров/RDP», «снимите плату». Красный мигает по 3 раза и держит код до снятия платы. Чаще всего причина — контакт, ставший нестабильным во время записи/проверки; реже — сама плата; изредка — сама прошивка.",fix:"Снимите плату. Проверьте контакт так же тщательно, как для кода 2 (прижим, чистота, провода, короткие провода, распиновка). Приложите плату снова и не двигайте её во время работы — провода должны держаться всю прошивку, а не только вначале. Если код 3 упорно повторяется на этой же плате, а другие платы при тех же условиях прошиваются нормально — отложите плату как подозрительную (см. «Сломанная плата»). Уже защищённые RDP-платы прошивать НЕ мешает: стенд сам снимает защиту, перепрошивает и снова ставит её."},{blinks:4,name:"На флешке нет файла .hex (ошибка USB)",meaning:"Стенд прочитал флешку (USB-носитель), но не нашёл на ней ни одного файла .hex — прошивать нечего. Показывается короткой серией из 4 вспышек красного примерно 8 секунд, затем гаснет.",fix:"Достаньте флешку. Запишите на неё файл прошивки с расширением .hex — РОВНО один (не ноль и не два). Вставьте флешку обратно."},{blinks:5,name:"На флешке два и более файлов .hex (ошибка USB)",meaning:"На флешке найдено два или больше файлов .hex. Стенд не выбирает из нескольких — он не может сам решить, какой правильный, и не берёт ни один. Показывается короткой серией из 5 вспышек красного примерно 8 секунд, затем гаснет.",fix:"Достаньте флешку. Оставьте на ней РОВНО один нужный файл .hex, все лишние .hex удалите или перенесите в другое место. Вставьте флешку обратно."},{blinks:null,name:"Плату выдернули в процессе (прерывание) — НЕ брак",meaning:"Плату убрали или она отскочила во время прошивки. Стенд заметил пропажу платы в середине процесса, прервал начатое и сразу встал в готовность. Зелёный и красный светодиоды «стробят» вместе (мигают одновременно). Это штатная ситуация, а не брак платы.",fix:"Не паникуйте. Просто приложите эту же плату снова — как только контакт появится, стенд мгновенно перепрошьёт её заново с начала. Дождитесь ровного зелёного и только тогда снимайте плату."},{blinks:null,name:"«НЕТ ПРОШИВКИ» (нет загруженной прошивки)",meaning:"У стенда нет файла прошивки для работы. На дисплее: «НЕТ ПРОШИВКИ», «вставьте флешку», «USB с одним .hex», «или в firmware/». Светодиоды медленно мигают попеременно зелёный↔красный, примерно раз в 0,6 секунды.",fix:"Дайте стенду прошивку одним из двух способов: (1) флешка с РОВНО одним файлом .hex, вставленная в стенд; либо (2) положите файл .hex в папку /opt/flashjig/firmware/. После любого способа стенд будет готов прошивать."},{blinks:null,name:"Дисплей пустой / не включается",meaning:"Дисплей ничего не показывает (пустой, тёмный). Чаще всего не поднялась шина связи с дисплеем (I2C) — бывает сразу после установки или первого включения. На прошивку плат это НЕ влияет: I2C — отдельная шина, не SWD; стенд может прошивать и без дисплея, ориентируйтесь по светодиодам.",fix:'Сделайте перезагрузку один раз командой sudo reboot (включает шину I2C); убедитесь, что после установки была одна перезагрузка. Проверьте 4 провода дисплея: VDD→1, GND→6, SDA→3, SCK→5. Проверьте, что дисплей — именно I2C-модуль 0.96" 128×64.'},{blinks:null,name:"Платы прошиваются старой версией / хеш не совпадает",meaning:"На платы заливается не та (старая) версия прошивки, либо показанный на дисплее хеш (контрольная сумма) не совпадает с ожидаемым. Это значит, что активна другая прошивка или файл повреждён.",fix:"Посмотрите имя и хеш на дисплее. Загрузите правильный .hex заново (флешкой с одним .hex) и сверьте его хеш с эталонным от вашей версии."},{blinks:null,name:"Плохой / дребезжащий контакт (авто-повтор)",meaning:"Прошивка то идёт, то срывается; плата прошивается со второй-третьей попытки; результат зависит от того, как плотно лежит плата. Контакт между стендом и платой неустойчивый («дребезжит»). Стенд при плохом контакте сам автоматически делает несколько попыток подряд, прежде чем сообщить об ошибке (по умолчанию ещё 2 повтора после первой попытки).",fix:"Прижмите плату плотнее и ровнее, без перекоса; не двигайте её во время работы; очистите площадки и иглы от налёта; проверьте провода (целые, плотно сидят, короткие). Один сорвавшийся заход — не брак: стенд просто попробует снова."},{blinks:null,name:"Сломанная плата",meaning:"Конкретная плата упорно не прошивается (код 2 или код 3 повторяется раз за разом) при хорошем контакте и исправных проводах, тогда как другие платы на этом же стенде при тех же условиях прошиваются нормально. Скорее всего, повреждена сама плата (чип, площадки, цепи питания и т.п.), а не стенд.",fix:"Сначала исключите контакт (прижим, чистота площадок, провода, распиновка). Проверьте ту же плату пару раз; если код держится — проверьте соседнюю заведомо нормальную плату при тех же условиях. Если она прошивается, проблема в первой плате — отложите её в брак. Сломанная плата не «вешает» стенд: каждая попытка ограничена по времени."}]},Xc={id:Vr,title:$r,tagline:Yr,sourceFiles:Jr,summary:Qr,blocks:Zr,data:Xr},ev=Object.freeze(Object.defineProperty({__proto__:null,blocks:Zr,data:Xr,default:Xc,id:Vr,sourceFiles:Jr,summary:Qr,tagline:Yr,title:$r},Symbol.toStringTag,{value:"Module"})),ei="faq",ti="Вопросы и ответы",ai="Короткие ответы по делу с пояснениями «почему так» — найдите свой вопрос и точную надпись с экрана.",si=["документация/14-ВОПРОСЫ-И-ОТВЕТЫ.txt","документация-2/16-ВОПРОСЫ-И-ОТВЕТЫ.txt"],li="Собрание частых вопросов и понятных ответов про автономный офлайн-стенд прошивки плат STM32F103C8T6 «OTAБEK STM32». Стенд собран на Raspberry Pi 4, работает полностью без интернета и прошивает каждую плату «в один тач»: вы приложили плату — она прошилась и закрылась защитой от чтения (RDP). Ответы короткие и по делу, но с пояснениями «почему так»; точные надписи, которые показывает дисплей, приведены в кавычках дословно. Если чего-то нет здесь — смотрите подробные разделы документации по конкретной теме (запуск, дисплей, светодиоды, ошибки, опечатывание и так далее).",ri=JSON.parse(`[{"type":"para","text":"Это собрание частых вопросов и понятных ответов про автономный стенд прошивки плат STM32F103C8T6. Стенд собран на Raspberry Pi 4, работает полностью без интернета и прошивает каждую плату «в один тач»: вы приложили плату — она прошилась и закрылась защитой от чтения (RDP)."},{"type":"para","text":"Ответы короткие и по делу, но с пояснениями «почему так». Если чего-то не нашли здесь — смотрите подробные разделы документации по конкретной теме (запуск, дисплей, светодиоды, ошибки, опечатывание и так далее)."},{"type":"callout","variant":"info","title":"Как пользоваться этим разделом","text":"Найдите свой вопрос глазами или поиском по словам. Точные надписи, которые показывает дисплей, приведены в кавычках дословно — ищите ровно такую строку на экране. Разделы идут по темам, от простого к сложному."},{"type":"heading","text":"Содержание (по темам)"},{"type":"list","ordered":false,"items":["1. Что это и как работает","2. Запуск и установка (развёртывание)","3. Загрузка и смена прошивки","4. Ежедневная работа: как прошивать платы","5. Дисплей OLED: что показывает","6. Светодиоды Raspberry: как читать","7. Флешки (импорт с USB)","8. Ошибки и что делать","9. Хеши (SHA-256): проверка подлинности","10. Защита от чтения (RDP)","11. Опечатывание (lockdown) и сеть","12. Обслуживание и диагностика","13. Переустановка и обновление"]},{"type":"heading","text":"1. Что это и как работает"},{"type":"para","text":"В: Что это за устройство и для чего оно?\\nО: Это автономный офлайн-стенд на Raspberry Pi 4 (RaspiOS). Он прошивает платы STM32F103C8T6 и на каждой включает защиту от чтения (RDP). Интернет ему не нужен — он работает полностью локально."},{"type":"para","text":"В: Что значит «прошивает в один тач»?\\nО: Вы просто прикладываете плату к контактам — и весь цикл проходит сам: подключение, при необходимости снятие старой защиты, стирание, запись прошивки .hex, проверка, включение RDP, сброс и обратное считывание RDP для подтверждения. От вас — только приложить плату и снять её, когда стенд покажет «ГОТОВО»."},{"type":"para","text":"В: Какие именно шаги делает стенд при прошивке одной платы?\\nО: По порядку: подключение к плате -> если плата уже защищена (RDP), снятие защиты (это полное стирание чипа) -> сброс -> стирание и запись .hex -> проверка записанного -> включение RDP -> сброс -> обратное считывание RDP, чтобы убедиться, что защита включена. «ГОТОВО» появляется только тогда, когда RDP подтверждена."},{"type":"para","text":"В: Стенд берёт чистые платы или уже защищённые?\\nО: И те, и другие. Если плата уже закрыта RDP, стенд сам снимет старую защиту полным стиранием, прошьёт заново и снова закроет. Делать ничего руками не нужно."},{"type":"para","text":"В: Сколько проводов нужно к плате?\\nО: Четыре: SWDIO, SWCLK, GND, 3V3. Провод сброса NRST не нужен, отключать питание тоже не нужно — стенд делает программный сброс по SWD, как это делает ST-Link Utility."},{"type":"para","text":"В: Сколько занимает прошивка одной платы?\\nО: Обычно несколько секунд. Уже защищённые платы — чуть дольше, но тоже в одно касание."},{"type":"heading","text":"2. Запуск и установка (развёртывание)"},{"type":"callout","variant":"warn","title":"Правильный порядок установки","text":"Сначала установить и СРАЗУ опечатать, а прошивку загрузить флешкой ПОСЛЕ этого."},{"type":"steps","items":[{"title":"Перенесите архив на SD-карту","text":"Скопируйте архив .zip на SD-карту (раздел /boot) с компьютера."},{"title":"Установка и опечатывание одной командой","text":"На самой Raspberry один раз зайдите (например, ssh pi@<адрес>) и выполните подряд: sudo ./install.sh && sudo ./lockdown.sh --commit"},{"title":"Перезагрузите","text":"Перезагрузите — применятся все настройки, включая дисплей по I2C."},{"title":"Вставьте USB-флешку","text":"Вставьте USB-флешку, на которой РОВНО ОДИН файл .hex."},{"title":"Проверьте пробной платой","text":"Приложите пробную плату и убедитесь, что горит ровный зелёный и на дисплее «ГОТОВО»."}]},{"type":"para","text":"В: Что делает install.sh?\\nО: Разворачивает полностью статический OpenOCD (без apt и зависимостей), включает службы flash-jig и flashjig-oled, ставит правила udev, включает I2C и создаёт папку /opt/flashjig/firmware. Скрипт идемпотентный — можно запускать повторно без вреда."},{"type":"para","text":"В: Что делает lockdown.sh --commit?\\nО: Опечатывает прибор: убирает все способы входа, блокирует учётные записи, выключает сеть. После него входа в систему больше нет. Запускайте его сразу после install.sh."},{"type":"para","text":"В: А если запустить lockdown.sh без --commit?\\nО: Это «сухой прогон» — скрипт только объяснит, что он сделает, и ничего не изменит. Чтобы реально опечатать, нужен ключ --commit."},{"type":"para","text":"В: Нужно ли класть .hex перед установкой?\\nО: По умолчанию НЕТ. Основной способ — дать прошивку флешкой ПОСЛЕ установки и опечатывания. Класть .hex рядом с install.sh заранее — это лишь продвинутый необязательный вариант (см. вопрос ниже)."},{"type":"heading","text":"3. Загрузка и смена прошивки"},{"type":"para","text":"В: Как загрузить прошивку в первый раз?\\nО: Флешкой, ПОСЛЕ установки и опечатывания. Возьмите чистую (лучше заранее отформатированную) USB-флешку, положите на неё РОВНО ОДИН файл .hex, вставьте в стенд. Стенд сам импортирует прошивку — имя файла сохраняется. Так делают по умолчанию."},{"type":"para","text":"В: Как сменить прошивку на другую?\\nО: Так же — флешкой с одним .hex. Вставили флешку, стенд импортировал новую прошивку на лету, и дальше платы шьются уже ей. Переустановка не нужна."},{"type":"para","text":"В: Что показывает дисплей, когда прошивка принята с флешки?\\nО: Примерно 2 секунды — экран импорта: галочка и слово «ПРОШИВКА», ниже имя файла, хеш и строка «готова к работе». После этого стенд готов шить этой прошивкой."},{"type":"para","text":"В: Как стенд подаёт сигнал светодиодом, что флешка принята?\\nО: Зелёный светодиод делает ТРИ импульса (три раза мигнул). Это значит: прошивка с флешки импортирована успешно."},{"type":"para","text":"В: Что за «продвинутый» вариант с .hex до установки?\\nО: Можно положить файл .hex рядом с install.sh ДО запуска установки — тогда install.sh подхватит его при разворачивании (имя сохранится). По умолчанию так не делают: основной путь — флешка ПОСЛЕ установки и опечатывания. Используйте этот вариант только как необязательный."},{"type":"para","text":"В: Где лежат прошивки и какая из них активная?\\nО: Прошивки хранятся в /opt/flashjig/firmware/, имена файлов сохраняются. Активной считается та, на которую указывает симлинк 'current', а если его нет — самый новый файл."},{"type":"para","text":"В: Нужно ли перезагружать после смены прошивки?\\nО: Нет. Новая версия применяется к следующей плате автоматически."},{"type":"heading","text":"4. Ежедневная работа: как прошивать платы"},{"type":"para","text":"В: Как прошить плату в обычной работе?\\nО: Приложите плату к контактам и держите. Стенд сам начнёт цикл. Дождитесь ровного зелёного и надписи «ГОТОВО» — тогда снимайте плату. Берите следующую и повторяйте."},{"type":"callout","variant":"danger","title":"Главное правило: когда можно снимать плату","text":"Только когда зелёный светодиод горит РОВНО (не мигает) и на дисплее «ГОТОВО». Пока зелёный часто мигает — идёт запись, снимать нельзя."},{"type":"para","text":"В: Что значит метка «USB» или «GPIO» в правом верхнем углу дисплея?\\nО: Это способ подключения, определяется автоматически. «USB» — подключён ST-Link по USB. «GPIO» — прямая прошивка по выводам Raspberry. Просто показывает, как именно стенд связан с платой."},{"type":"para","text":"В: Я случайно выдернул плату во время прошивки. Это брак?\\nО: Нет. Выдернутая в процессе плата — НЕ брак. Стенд это видит, зелёный и красный коротко «стробят» вместе, потом возвращается сердцебиение зелёного. Приложите плату снова — она мгновенно перепрошьётся с начала."},{"type":"para","text":"В: Плата сидит в контактах неплотно — что будет?\\nО: Плохой контакт стенд авто-повторяет сам. Поправьте плату, прижмите плотнее по четырём сигналам. Если контакта совсем нет — будет ошибка код 2 (см. раздел ошибок)."},{"type":"para","text":"В: Может ли плохая плата «повесить» стенд?\\nО: Нет. Каждая попытка прошивки ограничена по времени. Сломанная или выдернутая плата не вешает стенд — он вернётся в ожидание и будет готов к следующей плате."},{"type":"heading","text":"5. Дисплей OLED: что показывает"},{"type":"para","text":"В: Что в самой верхней строке дисплея?\\nО: Это «шапка» (тёмные буквы на светлой полосе): слева «OTAБEK STM32», справа метка способа подключения — «USB» или «GPIO»."},{"type":"para","text":"В: Что значит экран «НЕТ ПРОШИВКИ»?\\nО: Прошивка ещё не загружена. По центру вы увидите «НЕТ ПРОШИВКИ», «вставьте флешку», «USB с одним .hex», «или в firmware/». Решение — вставьте флешку с одним .hex (см. раздел 3)."},{"type":"para","text":"В: Что показывает дисплей, когда стенд ждёт плату?\\nО: Экран «ГОТОВ»: строка 1 — имя прошивки; строка 2 — хеш (16 символов); ниже «ГОТОВ К РАБОТЕ», «приложите плату» и счётчик «ок <N> сбой <M>»."},{"type":"para","text":"В: Что видно во время прошивки?\\nО: Имя прошивки, хеш, строку с этапом слева и процентами справа, полосу прогресса и снизу «НЕ ОТКЛЮЧАЙТЕ #<N>». Этапы идут по порядку: «СТАРТ» -> «СВЯЗЬ» -> «РАЗБЛОК» -> «ЗАПИСЬ» -> «ПРОВЕРКА» -> «ЗАЩИТА». Проценты только растут и назад не идут."},{"type":"para","text":"В: Как выглядит успешное завершение на дисплее?\\nО: Экран «ГОТОВО»: имя, хеш, галочка и «ГОТОВО-СНИМИТЕ», строка «RDP защита ВКЛ» и счётчик «#<N> ок сбой <M>». Можно снимать плату."},{"type":"para","text":"В: Что показывает дисплей при ошибке?\\nО: Имя, хеш, крестик и «ОШИБКА код <K>». Ниже причина: код 2 -> «нет контакта SWD», код 3 -> «запись/пров/RDP», иначе -> «см. журнал». В самом низу — «снимите плату»."},{"type":"para","text":"В: На дисплее что-то про хеш и всего 16 символов — это нормально?\\nО: Да. На дисплее показываются первые 16 символов SHA-256. Это нормально, так короче и удобнее. Полный хеш есть в /opt/flashjig/status и в журнале."},{"type":"para","text":"В: Дисплей пустой / после установки дисплей не появился. Что делать?\\nО: Проверьте, что после установки была одна перезагрузка (sudo reboot), и провода дисплея. Дисплей по I2C включается после применения настроек (см. разделы про подключение и дисплей)."},{"type":"heading","text":"6. Светодиоды Raspberry: как читать"},{"type":"para","text":"В: Что значит «сердцебиение» зелёного (двойная вспышка)?\\nО: Стенд в ожидании/готов к работе: зелёный даёт две короткие чёткие вспышки подряд, затем пауза — и так по кругу, как сердцебиение (без плавного разгорания и затухания; чем выше загрузка, тем чаще ритм). Это спокойное рабочее состояние — можно прикладывать плату."},{"type":"para","text":"В: Зелёный и красный мигают по очереди — что это?\\nО: Нет прошивки. Они медленно мигают попеременно (примерно раз в 0,6 секунды). Загрузите прошивку флешкой с одним .hex."},{"type":"para","text":"В: Зелёный часто мигает — что делать?\\nО: Идёт прошивка. Плату НЕ снимайте, держите её на месте до конца."},{"type":"para","text":"В: Когда зелёный горит ровно?\\nО: Когда плата готова. Ровный зелёный (не мигает) = можно снимать плату. Это и есть главный сигнал «снимать»."},{"type":"para","text":"В: Зелёный и красный вместе быстро «стробят» — что случилось?\\nО: Прошивку прервали — плату выдернули во время записи. Потом вернётся сердцебиение зелёного. Это не брак: верните плату — она сразу перепрошьётся."},{"type":"para","text":"В: Красный мигает группами вспышек — как понять?\\nО: Это код ошибки платы. Считайте вспышки в группе, потом пауза, потом повтор; держится, пока плату не снимут:\\n  • 2 вспышки = нет или потерян контакт SWD;\\n  • 3 вспышки = не прошли запись / проверка / подтверждение RDP."},{"type":"para","text":"В: Красный коротко мигает 4 или 5 раз — это про что?\\nО: Это ошибка ФЛЕШКИ (показывается примерно 8 секунд):\\n  • 4 вспышки = на флешке нет .hex;\\n  • 5 вспышек = два и более .hex (нужен ровно один).\\nТекущая прошивка при этом остаётся прежней."},{"type":"table","columns":["Сигнал красного","Длительность","Значение"],"rows":[["2 вспышки","пока плату не снимут","Нет или потерян контакт SWD"],["3 вспышки","пока плату не снимут","Не прошли запись / проверка / подтверждение RDP"],["4 вспышки","примерно 8 секунд","На флешке нет .hex (текущая прошивка остаётся)"],["5 вспышек","примерно 8 секунд","Два и более .hex на флешке (нужен ровно один; текущая прошивка остаётся)"]]},{"type":"heading","text":"7. Флешки (импорт с USB)"},{"type":"para","text":"В: Какую флешку использовать?\\nО: Лучше чистую или заранее отформатированную (или новую). Положите на неё РОВНО ОДИН файл .hex — он может лежать в любой папке. Вставьте в стенд, дальше всё произойдёт само."},{"type":"para","text":"В: Сколько файлов .hex должно быть на флешке?\\nО: Ровно один. Если ноль — красный мигнёт 4 раза. Если два и более — красный мигнёт 5 раз, и стенд оставит текущую прошивку. Уберите лишние .hex и вставьте флешку снова."},{"type":"callout","variant":"ok","title":"Флешка безопасна для стенда","text":"Флешка монтируется ТОЛЬКО ДЛЯ ЧТЕНИЯ с жёсткими опциями: ro, noexec, nosuid, nodev, nosymfollow, noatime. С флешки ничего нельзя исполнить или повысить права — читается только сам файл .hex."},{"type":"para","text":"В: Флешка как-то опасна для стенда? Может ли с неё что-то запуститься?\\nО: Нет. Флешка монтируется ТОЛЬКО ДЛЯ ЧТЕНИЯ с жёсткими опциями: ro, noexec, nosuid, nodev, nosymfollow, noatime. С флешки ничего нельзя исполнить или повысить права — читается только сам файл .hex."},{"type":"para","text":"В: Сохранится ли имя файла прошивки при импорте?\\nО: Да. Имя файла сохраняется как есть — и при импорте с флешки, и при варианте с install.sh."},{"type":"heading","text":"8. Ошибки и что делать"},{"type":"para","text":"В: На дисплее «ОШИБКА код 2» / красный мигает 2 раза. Что делать?\\nО: Нет контакта SWD. Снимите плату, проверьте четыре провода (SWDIO, SWCLK, GND, 3V3), прижмите плату плотнее и приложите снова. Чаще всего дело в плохом прижиме."},{"type":"para","text":"В: На дисплее «ОШИБКА код 3» / красный мигает 3 раза. Что делать?\\nО: Не прошли запись, проверка или подтверждение RDP. Снимите плату и приложите снова. Если повторяется на разных платах — проверьте прошивку и питание; полный хеш и детали есть в журнале."},{"type":"para","text":"В: Ошибка повторяется снова и снова. Куда смотреть?\\nО: Если стенд ещё НЕ опечатан, смотрите журнал (см. раздел 12). Если уже опечатан, журналы внутри недоступны — попробуйте другую плату и другой .hex, проверьте провода и контакт."},{"type":"para","text":"В: Стенд завис или не реагирует — возможно ли это?\\nО: Маловероятно: каждая попытка прошивки ограничена по времени и стенд сам возвращается в ожидание. Если экран совсем пуст и ничего не происходит после включения — один раз выполните перезагрузку питанием."},{"type":"table","columns":["Надпись на дисплее","Красный","Причина","Что делать"],"rows":[["ОШИБКА код 2","2 вспышки","Нет контакта SWD","Проверить 4 провода (SWDIO, SWCLK, GND, 3V3), прижать плотнее, приложить снова"],["ОШИБКА код 3","3 вспышки","Не прошли запись / проверка / подтверждение RDP","Снять и приложить снова; при повторе проверить прошивку и питание, смотреть журнал"]]},{"type":"heading","text":"9. Хеши (SHA-256): проверка подлинности"},{"type":"para","text":"В: Что за хеш и зачем он нужен?\\nО: Это SHA-256 (256 бит, FIPS 180-4) по файлу прошивки, считается локально. По нему вы проверяете, что прошивка именно та и не повреждена. Один и тот же файл даёт одинаковый хеш на любом компьютере или прошивалке."},{"type":"para","text":"В: Что за «случайные буквы» на дисплее после имени прошивки?\\nО: Это хеш (SHA-256) — отпечаток прошивки. Для одной и той же версии он всегда одинаков. Не совпал с ожидаемым — прошивка другая или повреждена."},{"type":"para","text":"В: На дисплее 16 символов, а где полный хеш?\\nО: На дисплее — первые 16 символов для удобства. Полный хеш лежит в /opt/flashjig/status и в журнале."},{"type":"para","text":"В: Хеш не совпал с ожидаемым. Что это значит?\\nО: Прошивка другая или повреждённая (а возможно, поддельная). Не используйте такую прошивку — возьмите правильный файл .hex и сверьте хеш заново."},{"type":"heading","text":"10. Защита от чтения (RDP)"},{"type":"para","text":"В: Что такое RDP?\\nО: Это защита от чтения STM32. Она закрывает считывание прошивки через отладку, чтобы её нельзя было скопировать. Стенд включает RDP на каждой плате."},{"type":"para","text":"В: Как стенд убеждается, что защита реально включилась?\\nО: Он считывает состояние RDP обратно после включения. Надпись «ГОТОВО» появляется только при подтверждённой защите. Если подтверждения нет — будет ошибка код 3."},{"type":"para","text":"В: Можно ли снять RDP?\\nО: Снять защиту можно только полным стиранием чипа. Именно так стенд и поступает с уже защищёнными платами перед новой прошивкой."},{"type":"heading","text":"11. Опечатывание (lockdown) и сеть"},{"type":"para","text":"В: Что именно убирает опечатывание?\\nО: Все способы входа: SSH (отключён, замаскирован, ключи удалены), все консоли (tty и последовательный порт), графику, аварийные и спасательные оболочки. Все учётные записи блокируются (паролей нет, оболочка nologin). Отключаются SysRq и Ctrl-Alt-Del; маскируются VNC, Cockpit, telnet."},{"type":"para","text":"В: Что с сетью после опечатывания?\\nО: Сеть навсегда выключена: Wi-Fi и Bluetooth выключены и в чёрном списке ядра, сетевые службы замаскированы. Стенд автономный и в сети не нуждается."},{"type":"para","text":"В: Нужен ли интернет?\\nО: Нет. Устройство полностью автономно; после опечатывания сеть отключается."},{"type":"para","text":"В: Что продолжает работать после опечатывания?\\nО: Загрузка, systemd, udev, сама прошивка, дисплей и импорт прошивки с USB. То есть всё, что нужно для работы стенда."},{"type":"para","text":"В: Можно ли отменить опечатывание на работающем приборе? Можно ли войти в устройство после опечатывания?\\nО: Нет, с работающей системы это необратимо, и это сделано намеренно. Войти в устройство после опечатывания нельзя. Чтобы что-то изменить, нужно переустановить SD-карту; прошивку при этом по-прежнему меняют флешкой (см. раздел 13)."},{"type":"heading","text":"12. Обслуживание и диагностика"},{"type":"para","text":"В: Как посмотреть, что происходит внутри (пока НЕ опечатано)?\\nО: Используйте команды:\\n  • journalctl -u flash-jig -f  — живой журнал службы прошивки;\\n  • cat /opt/flashjig/status    — текущее состояние и полный хеш;\\n  • /opt/flashjig/flash.log     — файл журнала прошивок."},{"type":"code","lang":"bash","text":"journalctl -u flash-jig -f    # живой журнал службы прошивки\\ncat /opt/flashjig/status      # текущее состояние и полный хеш\\n/opt/flashjig/flash.log       # файл журнала прошивок"},{"type":"para","text":"В: После установки дисплей не появился. Что делать?\\nО: Один раз выполните перезагрузку: sudo reboot . Дисплей по I2C включается после применения настроек."},{"type":"para","text":"В: Нужно ли стенду какое-то регулярное обслуживание?\\nО: Нет, особого ухода он не требует. Держите контакты чистыми, плату прикладывайте плотно. Прошивку при необходимости меняйте флешкой — без переустановки."},{"type":"heading","text":"13. Переустановка и обновление"},{"type":"para","text":"В: Как обновить прошивку без переустановки?\\nО: Флешкой с одним .hex или копированием в firmware (если есть доступ). Прошивка обновляется на лету — переустанавливать систему не нужно."},{"type":"para","text":"В: Как обновить саму систему / программу стенда?\\nО: Переустановкой карты microSD (после опечатывания иначе нельзя). См. раздел про обслуживание."},{"type":"para","text":"В: Когда нужна полная переустановка?\\nО: Когда надо изменить то, что закрыто опечатыванием (вход, сеть, настройки системы). Тогда заново подготовьте SD-карту, выполните install.sh и lockdown.sh --commit, затем загрузите прошивку флешкой."},{"type":"para","text":"В: После переустановки порядок такой же?\\nО: Да: установить и сразу опечатать (sudo ./install.sh && sudo ./lockdown.sh --commit), перезагрузить, а прошивку дать флешкой с одним .hex. Проверьте пробной платой — ровный зелёный и «ГОТОВО»."},{"type":"code","lang":"bash","text":"sudo ./install.sh && sudo ./lockdown.sh --commit"}]`),ii=JSON.parse(`{"qa":[{"q":"Что это за устройство и для чего оно?","a":"Это автономный офлайн-стенд на Raspberry Pi 4 (RaspiOS). Он прошивает платы STM32F103C8T6 и на каждой включает защиту от чтения (RDP). Интернет ему не нужен — он работает полностью локально."},{"q":"Что значит «прошивает в один тач»?","a":"Вы просто прикладываете плату к контактам — и весь цикл проходит сам: подключение, при необходимости снятие старой защиты, стирание, запись прошивки .hex, проверка, включение RDP, сброс и обратное считывание RDP для подтверждения. От вас — только приложить плату и снять её, когда стенд покажет «ГОТОВО»."},{"q":"Какие именно шаги делает стенд при прошивке одной платы?","a":"По порядку: подключение к плате -> если плата уже защищена (RDP), снятие защиты (это полное стирание чипа) -> сброс -> стирание и запись .hex -> проверка записанного -> включение RDP -> сброс -> обратное считывание RDP, чтобы убедиться, что защита включена. «ГОТОВО» появляется только тогда, когда RDP подтверждена."},{"q":"Стенд берёт чистые платы или уже защищённые?","a":"И те, и другие. Если плата уже закрыта RDP, стенд сам снимет старую защиту полным стиранием, прошьёт заново и снова закроет. Делать ничего руками не нужно."},{"q":"Сколько проводов нужно к плате?","a":"Четыре: SWDIO, SWCLK, GND, 3V3. Провод сброса NRST не нужен, отключать питание тоже не нужно — стенд делает программный сброс по SWD, как это делает ST-Link Utility."},{"q":"Сколько занимает прошивка одной платы?","a":"Обычно несколько секунд. Уже защищённые платы — чуть дольше, но тоже в одно касание."},{"q":"Нужен ли интернет?","a":"Нет. Устройство полностью автономно; после опечатывания сеть отключается."},{"q":"Какой правильный порядок установки?","a":"Сначала установить и СРАЗУ опечатать, а прошивку загрузить флешкой ПОСЛЕ этого. По шагам:\\n  1) Перенесите архив .zip на SD-карту (раздел /boot) с компьютера.\\n  2) На самой Raspberry один раз зайдите (например, ssh pi@<адрес>) и выполните подряд: sudo ./install.sh && sudo ./lockdown.sh --commit\\n  3) Перезагрузите — применятся все настройки, включая дисплей по I2C.\\n  4) Вставьте USB-флешку, на которой РОВНО ОДИН файл .hex.\\n  5) Приложите пробную плату и убедитесь, что горит ровный зелёный и на дисплее «ГОТОВО»."},{"q":"Что делает install.sh?","a":"Разворачивает полностью статический OpenOCD (без apt и зависимостей), включает службы flash-jig и flashjig-oled, ставит правила udev, включает I2C и создаёт папку /opt/flashjig/firmware. Скрипт идемпотентный — можно запускать повторно без вреда."},{"q":"Что делает lockdown.sh --commit?","a":"Опечатывает прибор: убирает все способы входа, блокирует учётные записи, выключает сеть. После него входа в систему больше нет. Запускайте его сразу после install.sh."},{"q":"А если запустить lockdown.sh без --commit?","a":"Это «сухой прогон» — скрипт только объяснит, что он сделает, и ничего не изменит. Чтобы реально опечатать, нужен ключ --commit."},{"q":"Нужно ли класть .hex перед установкой? Нужно ли класть прошивку до установки?","a":"По умолчанию НЕТ. Основной (рекомендуемый) способ — дать прошивку флешкой ПОСЛЕ установки и опечатывания. Класть .hex рядом с install.sh заранее — это лишь продвинутый необязательный (расширенный) вариант."},{"q":"Как загрузить прошивку в первый раз? Как залить/сменить прошивку?","a":"Флешкой, ПОСЛЕ установки и опечатывания. Возьмите чистую (лучше заранее отформатированную или новую) USB-флешку, положите на неё РОВНО ОДИН файл .hex, вставьте в стенд. Стенд сам импортирует прошивку — имя файла сохраняется. На дисплее появится «ПРОШИВКА … готова к работе». Так делают по умолчанию."},{"q":"Как сменить прошивку на другую?","a":"Так же — флешкой с одним .hex. Вставили флешку, стенд импортировал новую прошивку на лету, и дальше платы шьются уже ей. Переустановка не нужна."},{"q":"Что показывает дисплей, когда прошивка принята с флешки?","a":"Примерно 2 секунды — экран импорта: галочка и слово «ПРОШИВКА», ниже имя файла, хеш и строка «готова к работе». После этого стенд готов шить этой прошивкой."},{"q":"Как стенд подаёт сигнал светодиодом, что флешка принята?","a":"Зелёный светодиод делает ТРИ импульса (три раза мигнул). Это значит: прошивка с флешки импортирована успешно."},{"q":"Что за «продвинутый» вариант с .hex до установки?","a":"Можно положить файл .hex рядом с install.sh ДО запуска установки — тогда install.sh подхватит его при разворачивании (имя сохранится). По умолчанию так не делают: основной путь — флешка ПОСЛЕ установки и опечатывания. Используйте этот вариант только как необязательный."},{"q":"Где лежат прошивки и какая из них активная?","a":"Прошивки хранятся в /opt/flashjig/firmware/, имена файлов сохраняются. Активной считается та, на которую указывает симлинк 'current', а если его нет — самый новый файл."},{"q":"Нужно ли перезагружать после смены прошивки?","a":"Нет. Новая версия применяется к следующей плате автоматически."},{"q":"Как прошить плату в обычной работе?","a":"Приложите плату к контактам и держите. Стенд сам начнёт цикл. Дождитесь ровного зелёного и надписи «ГОТОВО» — тогда снимайте плату. Берите следующую и повторяйте."},{"q":"Когда можно снимать плату?","a":"Только когда зелёный светодиод горит РОВНО (не мигает) и на дисплее «ГОТОВО». Это главное правило. Пока зелёный часто мигает — идёт запись, снимать нельзя."},{"q":"Что значит метка «USB» или «GPIO» в правом верхнем углу дисплея? Нужен ли ST-Link?","a":"Это способ подключения, определяется автоматически. «USB» — подключён ST-Link по USB. «GPIO» — прямая прошивка по выводам Raspberry. ST-Link не обязателен: можно подключаться напрямую по выводам GPIO. Стенд сам определяет способ и показывает его на дисплее (USB или GPIO)."},{"q":"Я случайно выдерну
