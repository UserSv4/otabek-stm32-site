нственным .hex). Вставьте снова — при успехе тройной зелёный импульс и экран импорта."}]},pv={id:Mi,title:Li,tagline:qi,sourceFiles:Ai,summary:Ei,blocks:Bi,data:Ni},dv=Object.freeze(Object.defineProperty({__proto__:null,blocks:Bi,data:Ni,default:pv,id:Mi,sourceFiles:Ai,summary:Ei,tagline:qi,title:Li},Symbol.toStringTag,{value:"Module"})),Ui="lockdown",Fi="Блокировка системы: опечатывание прибора",zi="Одна команда закрывает все входы и всю сеть — остаётся только прошивка плат.",Hi=["документация/10-БЛОКИРОВКА-СИСТЕМЫ.txt","документация-2/11-БЛОКИРОВКА-СИСТЕМЫ.txt","lockdown.sh"],Ki="Блокировка (опечатывание) — последний шаг подготовки стенда: команда «sudo ./lockdown.sh --commit» превращает обычную Raspberry Pi в опечатанный прибор, у которого не остаётся ни одного способа войти внутрь и ни одного способа выйти в сеть. Закрываются все входы (SSH, консоли, графика, аварийные режимы, учётные записи, горячие клавиши, удалённый доступ) и вся сеть (Wi-Fi, Bluetooth, сетевые службы). Прошивка плат STM32, OLED-дисплей и импорт прошивки с USB продолжают полноценно работать. Шаг необратим с работающей системы — отмена только переустановкой SD-карты, поэтому запускать его нужно В САМОМ КОНЦЕ, после проверки на пробной плате.",Vi=JSON.parse('[{"type":"callout","variant":"info","title":"Коротко, одной строкой","text":"Команда закрывает ВСЕ входы (SSH, консоли, графику, аварийные режимы, учётные записи) и ВСЮ сеть (Wi-Fi, Bluetooth, сетевые службы). Прошивка плат, дисплей и импорт с USB продолжают работать. Запускайте В САМОМ КОНЦЕ, после проверки на пробной плате. Отмена — только переустановкой SD-карты."},{"type":"callout","variant":"danger","title":"Прочитайте до запуска: шаг необратим","text":"Прочитайте этот материал целиком до того, как запустите команду. Шаг необратим с работающей системы: отменить его, не переустановив SD-карту, нельзя. Важно понимать заранее, что именно вы отключаете и почему это сделано так, а не иначе."},{"type":"heading","text":"О чём этот файл"},{"type":"para","text":"Здесь подробно разобран последний шаг подготовки стенда — превращение обычной Raspberry Pi в опечатанный прибор одной командой: «sudo ./lockdown.sh --commit». После этого шага у устройства не остаётся ни одного способа войти внутрь и ни одного способа выйти в сеть. Остаётся только то, ради чего стенд сделан: прошивать платы STM32, показывать состояние на дисплее и принимать новые прошивки с флешки."},{"type":"heading","text":"Зачем вообще опечатывать устройство"},{"type":"para","text":"Стенд работает автономно и офлайн. Он стоит и делает одну задачу: приложили плату — прошили — сняли. Для этого ему не нужны ни вход снаружи, ни сеть. Всё, что не нужно для работы, — это лишняя поверхность, через которую теоретически можно вмешаться в устройство. Логика простая: чего нет, то и не используешь против устройства."},{"type":"list","ordered":false,"items":["Нет входа — значит, никто не зайдёт и не подменит прошивку, настройки или сам демон, который управляет стендом.","Нет сети — значит, к устройству нельзя подключиться удалённо, и оно само никуда не «уходит». Полностью офлайн.","Остаётся ровно то, что нужно для дела, — и ничего сверх этого."]},{"type":"para","text":"Поэтому опечатывание — это не «усложнение ради усложнения», а способ зафиксировать устройство в одном проверенном состоянии: то, что вы проверили на пробной плате, таким и останется."},{"type":"heading","text":"Что именно отключается"},{"type":"para","text":"Команда lockdown.sh --commit убирает все способы входа и всю сеть. Ниже — что именно и почему, по пунктам."},{"type":"heading","text":"1. SSH и ключи"},{"type":"para","text":"SSH — это удалённый вход в систему по сети. На стенде он не нужен."},{"type":"list","ordered":false,"items":["Служба SSH отключается (не запускается при загрузке).","Служба SSH маскируется — это более жёсткий запрет, чем простое отключение: замаскированную службу нельзя запустить вообще, даже по ошибке или по запросу другой службы.","Ключи SSH с устройства удаляются (ключи хоста и authorized_keys)."]},{"type":"para","text":"Почему так. Отключённую службу теоретически можно было бы включить обратно. Маскировка же делает запуск невозможным. А удаление ключей означает, что даже механизм входа по ключу больше не существует — входить попросту нечем."},{"type":"heading","text":"2. Все консоли: текстовые TTY и последовательный порт"},{"type":"para","text":"Консоль — это место, где можно набрать логин и пароль и попасть в систему. Их несколько видов, и закрываются все."},{"type":"list","ordered":false,"items":["Отключаются все текстовые консоли (tty) — те, что обычно дают приглашение входа на подключённом мониторе или по переключению между виртуальными терминалами. Маскируются все getty (tty1..63), а также autovt; монитор и клавиатура входа не дают.","Отключается вход через последовательный порт (serial console) — это вход по проводу напрямую к плате, в обход сети."]},{"type":"para","text":"Почему так. Текстовая консоль — самый прямой способ войти, если есть физический доступ к устройству. Последовательный порт — обходной путь «мимо» всего остального: он работает без сети и без графики, поэтому его закрывают отдельно и обязательно."},{"type":"heading","text":"3. Графика (GUI)"},{"type":"para","text":"Стенду не нужен рабочий стол. Вся информация выводится на маленький OLED-дисплей, а не на полноценный экран с окнами."},{"type":"list","ordered":false,"items":["Графический интерфейс (GUI) отключается: целью загрузки по умолчанию становится multi-user (без графики), а менеджеры дисплея маскируются."]},{"type":"para","text":"Почему так. Графическая среда — это ещё один экран входа и ещё один набор программ, работающих в фоне. Ни то, ни другое для прошивки плат не требуется. Убирая графику, вы убираете лишний способ взаимодействия с системой и разгружаете устройство."},{"type":"callout","variant":"info","title":"Не путать: OLED — это не графика рабочего стола","text":"Отключается именно полноценная графика рабочего стола. Маленький OLED-дисплей стенда («OTAБEK STM32») — это не графика в этом смысле, он продолжает работать (см. раздел «Что продолжает работать»)."},{"type":"heading","text":"4. Аварийные и спасательные оболочки"},{"type":"para","text":"В обычной системе есть «запасные двери» на случай поломки: аварийный (emergency) и спасательный (rescue) режимы. Они дают доступ к системе, когда обычная загрузка не удалась."},{"type":"list","ordered":false,"items":["Аварийный и спасательный режимы отключаются (маскируются) — при сбое загрузки служебной root-оболочки не будет."]},{"type":"para","text":"Почему так. Эти режимы — по сути ещё один вход, просто включается он при сбое загрузки. Раз цель — закрыть все входы, эти «запасные двери» тоже закрываются, иначе через них можно было бы обойти всё остальное."},{"type":"heading","text":"5. Блокировка всех учётных записей"},{"type":"para","text":"Даже если бы консоль осталась, в систему нужно чем-то войти — учётной записью с паролем. Этой возможности тоже не остаётся."},{"type":"list","ordered":false,"items":["Все учётные записи блокируются.","Ни у одной записи нет работающего пароля — войти по паролю нельзя в принципе.","Оболочкой для входа назначается nologin — при попытке войти под любой учётной записью сразу происходит отказ, оболочка (командная строка) не запускается. Учётные записи людей помечаются как просроченные.","Пароль root блокируется отдельно (при этом оболочка root оставлена для служб)."]},{"type":"para","text":"Почему так. Это «защита в глубину»: даже если представить, что какой-то путь ко входу остался, входить всё равно нечем — нет ни одного рабочего пароля, и ни одна запись не получает командную строку. Оболочка nologin — это специальная «пустышка», которая вместо запуска командной строки просто завершает попытку входа."},{"type":"heading","text":"6. SysRq и Ctrl-Alt-Del"},{"type":"para","text":"Это «волшебные» сочетания клавиш, которыми с клавиатуры можно отдавать системе низкоуровневые команды или перезагружать её."},{"type":"list","ordered":false,"items":["Magic SysRq отключается (kernel.sysrq=0).","Ctrl-Alt-Del отключается (цель ctrl-alt-del маскируется)."]},{"type":"para","text":"Почему так. SysRq позволяет с физической клавиатуры вмешиваться в работу ядра (например, аварийно что-то сделать с системой). Ctrl-Alt-Del обычно перезагружает машину. На опечатанном стенде ни то, ни другое не должно срабатывать от случайного или намеренного нажатия — устройство должно просто стоять и работать, не реагируя на «горячие клавиши»."},{"type":"heading","text":"7. VNC, Cockpit, telnet"},{"type":"para","text":"Это дополнительные способы удалённого доступа и управления:"},{"type":"list","ordered":false,"items":["VNC — удалённый рабочий стол (видеть и управлять экраном по сети).","Cockpit — веб-панель управления системой через браузер.","telnet — старый текстовый удалённый вход."]},{"type":"list","ordered":false,"items":["VNC, Cockpit и telnet маскируются."]},{"type":"para","text":"Почему так. Каждый из них — это ещё одна дверь снаружи. Маскировка (самый жёсткий вид запрета) гарантирует, что эти службы не поднимутся, даже если что-то попробует их запустить. На офлайн-стенде им всё равно нечего обслуживать — сети нет."},{"type":"heading","text":"8. Полная блокировка сети"},{"type":"para","text":"Это ключевая часть опечатывания. У устройства не остаётся НИКАКОЙ сети."},{"type":"list","ordered":false,"items":["Wi-Fi выключается И вносится в чёрный список ядра.","Bluetooth выключается И вносится в чёрный список ядра.","Сетевые службы маскируются (NetworkManager, wpa_supplicant, dhcpcd, systemd-networkd, avahi, connman, ModemManager, systemd-resolved и др.)."]},{"type":"para","text":"Что значит «чёрный список ядра». Это запрет на уровне самого ядра системы: соответствующий беспроводной модуль просто не загружается. Это сильнее, чем «выключить Wi-Fi кнопкой»: выключенное можно включить обратно, а внесённое в чёрный список ядро не поднимает вообще."},{"type":"para","text":"Почему так — тройной запрет (выключить + чёрный список + маскировка): выключение убирает работу здесь и сейчас; чёрный список ядра не даёт модулю загрузиться при следующем старте; маскировка сетевых служб не даёт подняться тому, что управляет сетью сверху."},{"type":"para","text":"В сумме у устройства нет ни Wi-Fi, ни Bluetooth, ни работающих сетевых служб — оно полностью офлайн и не может ни принять подключение, ни куда-либо подключиться само. Это согласуется со всей идеей стенда: он автономный и офлайн. Сеть ему не нужна для работы — новые прошивки приходят с USB-флешки, а не из сети."},{"type":"heading","text":"Что продолжает работать"},{"type":"para","text":"Опечатывание убирает входы и сеть, но НЕ трогает то, ради чего стенд существует. После команды продолжают полноценно работать:"},{"type":"list","ordered":false,"items":["Загрузка системы — устройство нормально включается.","systemd — система служб, которая поднимает всё нужное при старте.","udev — механизм, который замечает подключение ST-Link и флешки (именно он переводит стенд в готовность и запускает импорт).","Демон flash-jig — главная программа стенда, которая и прошивает платы.","Дисплей — OLED-экран «OTAБEK STM32» с состоянием, хешем и счётчиками.","Импорт прошивки с USB — вставленную флешку с одним файлом .hex устройство по-прежнему читает и принимает."]},{"type":"para","text":"Почему всё это работает без входа и без сети. Ничему из перечисленного ни вход, ни сеть не нужны. Прошивка платы идёт по проводам SWD (по USB через ST-Link или напрямую по выводам GPIO), состояние выводится на дисплей по I2C, а новые прошивки приходят с флешки. Всё это — локальные процессы внутри устройства и его проводные подключения; интернет и удалённый вход тут вообще ни при чём. Все эти службы работают от root через systemd/udev — им не нужен ни вход, ни сеть. Коротко: убрали лишнее, оставили рабочее."},{"type":"heading","text":"Когда запускать: в самом конце, после проверки"},{"type":"para","text":"Опечатывание — ПОСЛЕДНИЙ шаг подготовки. Запускайте его только тогда, когда устройство уже собрано, настроено и проверено на деле. Полный порядок подготовки выглядит так (команды от root):"},{"type":"steps","items":[{"title":"Распаковать архив","text":"Распакуйте архив со стендом."},{"title":"Зайти в папку","text":"Зайдите в распакованную папку."},{"title":"Положить .hex","text":"Положите ваш файл .hex в эту папку."},{"title":"Установка","text":"sudo ./install.sh"},{"title":"Перезагрузка","text":"sudo reboot — нужен, чтобы заработал дисплей по I2C."},{"title":"Проверка на пробной плате","text":"Прошейте пробную плату и убедитесь, что всё в порядке. Этот пункт идёт ПЕРЕД опечатыванием."},{"title":"Опечатывание","text":"sudo ./lockdown.sh --commit"},{"title":"Финальная перезагрузка","text":"sudo reboot — чтобы блокировка вступила в силу."}]},{"type":"callout","variant":"warn","title":"Проверка идёт ПЕРЕД опечатыванием","text":"Пункт 6 (проверка на пробной плате) идёт ПЕРЕД пунктом 7 (опечатывание). Сначала вы убеждаетесь, что стенд реально прошивает платы как надо, и только потом опечатываете. После опечатывания вы уже не сможете зайти в систему и что-то поправить, поэтому все настройки, проверка дисплея и пробная прошивка должны быть сделаны ДО этого шага."},{"type":"callout","variant":"ok","title":"Как понять, что проверка пройдена","text":"На пробной плате стенд должен дойти до экрана готовности (галочка, «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ»), а зелёный светодиод Raspberry — гореть РОВНО. Ровный зелёный — это и есть сигнал успешного завершения. Если плата проходит цикл и подтверждается защита от чтения (RDP), значит, стенд настроен правильно и его можно опечатывать."},{"type":"callout","variant":"info","title":"Встроенная проверка перед опечатыванием","text":"Сама команда дополнительно проверяет, что служба прошивки (flash-jig.service) включена, и НЕ запустится, если что-то не так: при отключённой службе она прерывается с сообщением «ABORT: flash-jig.service is not enabled. Run install.sh and verify the jig first.». Перед опечатыванием скрипт также включает flash-jig.service и flashjig-oled.service."},{"type":"heading","text":"Это необратимо с работающей системы"},{"type":"para","text":"После команды sudo ./lockdown.sh --commit отменить опечатывание изнутри работающего устройства НЕЛЬЗЯ. Входов больше нет, сети больше нет — значит, и «открыть обратно» неоткуда."},{"type":"para","text":"Как тогда вносить изменения. Через переустановку SD-карты. Это и есть штатный путь обновления опечатанного стенда:"},{"type":"list","ordered":false,"items":["Нужно поменять прошивку прямо на устройстве — это можно сделать и БЕЗ опечатывания/переустановки: просто импортируйте новую с флешки (см. отдельный материал про импорт с USB). Сеть и вход для этого не нужны, поэтому замена прошивки опечатыванию не мешает.","Нужно изменить саму систему (настройки, службы, что-то ещё) — готовится новая SD-карта с нужными изменениями, и она ставится взамен старой."]},{"type":"para","text":"Иначе говоря, опечатанный прибор обновляется не «изнутри по сети», а заменой карты. Это сознательное решение: устройство должно оставаться в одном проверенном состоянии, а любое изменение системы — проходить через подготовку новой карты, а не через удалённый или локальный вход."},{"type":"heading","text":"Сухой прогон: запуск без аргументов"},{"type":"para","text":"Прежде чем опечатывать всерьёз, можно посмотреть, что команда собирается сделать, ничего при этом не меняя. Запуск БЕЗ аргументов — это сухой прогон (dry run). Он ничего не отключает и не блокирует: только объясняет, что было бы сделано. Устройство при этом остаётся как есть."},{"type":"code","lang":"bash","text":"# Сухой прогон — только объясняет, ничего не меняет (безопасно):\\nsudo ./lockdown.sh\\n\\n# Реальное опечатывание происходит ТОЛЬКО при явном --commit:\\nsudo ./lockdown.sh --commit\\n\\n# После опечатывания — чтобы блокировка вступила в силу:\\nsudo reboot"},{"type":"list","ordered":false,"items":["без аргументов  ->  только показывает, ничего не меняет (безопасно);","--commit  ->  реально опечатывает (необратимо с работающей системы)."]},{"type":"callout","variant":"info","title":"Рекомендация","text":"Сначала запустите сухой прогон и прочитайте, что он сообщает. Убедитесь, что вы готовы к перечисленным изменениям, что пробная плата уже прошита успешно, — и только потом добавляйте --commit."},{"type":"heading","text":"Что блокируется на уровне ядра (модули)"},{"type":"para","text":"Для полной блокировки беспроводной связи опечатывание создаёт файл /etc/modprobe.d/99-lockdown-noradio.conf, который запрещает загрузку модулей Wi-Fi и Bluetooth на уровне ядра. Дополнительно kernel.sysrq=0 пишется в /etc/sysctl.d/99-lockdown.conf."},{"type":"code","lang":"bash","text":"# /etc/modprobe.d/99-lockdown-noradio.conf\\n# kill Wi-Fi + Bluetooth at the kernel level (offline appliance)\\nblacklist brcmfmac\\nblacklist brcmutil\\nblacklist btbcm\\nblacklist hci_uart\\nblacklist bnep\\nblacklist bluetooth\\ninstall brcmfmac /bin/true\\ninstall bluetooth /bin/true"},{"type":"heading","text":"Сводная таблица: что закрывается"},{"type":"table","columns":["Что","Способ","Зачем закрывается"],"rows":[["SSH и ключи","отключение + маскировка, ключи (хоста и authorized_keys) удаляются","удалённый вход по сети; входить нечем"],["Текстовые консоли (tty)","маскируются все getty (tty1..63) и autovt","прямой вход с монитора/клавиатуры"],["Последовательный порт","маскируется serial-getty","обходной вход по проводу, мимо сети и графики"],["Графика (GUI)","цель по умолчанию = multi-user, менеджеры дисплея замаскированы","лишний экран входа и фоновые программы"],["Аварийный / спасательный режим","rescue и emergency маскируются","«запасные двери» при сбое загрузки"],["Учётные записи","блокируются, пароль снят, оболочка nologin, записи просрочены","входить нечем — нет рабочих паролей"],["Пароль root","блокируется (passwd -l root); оболочка root оставлена для служб","нет рабочего пароля суперпользователя"],["Magic SysRq","kernel.sysrq=0","не вмешиваться в ядро с клавиатуры"],["Ctrl-Alt-Del","цель ctrl-alt-del маскируется","не перезагружать машину «горячей клавишей»"],["VNC / Cockpit / telnet","маскируются","дополнительные двери удалённого доступа"],["Wi-Fi","выключается + чёрный список ядра (модули brcmfmac, brcmutil)","беспроводной канал снаружи"],["Bluetooth","выключается + чёрный список ядра (btbcm, hci_uart, bnep, bluetooth)","ещё один беспроводной канал снаружи"],["Сетевые службы","маскируются (NetworkManager, wpa_supplicant, dhcpcd, networkd, avahi, connman, ModemManager, resolved)","устройство полностью офлайн"]]},{"type":"heading","text":"Частые вопросы"},{"type":"para","text":"Я случайно запустил lockdown.sh без --commit — всё пропало? — Нет. Без --commit это сухой прогон: ничего не меняется, устройство осталось прежним. Опечатывание происходит только с --commit."},{"type":"para","text":"После опечатывания смогу ли я ещё менять прошивку? — Да. Импорт с USB продолжает работать. Вставьте флешку ровно с одним файлом .hex — стенд её примет («ПРОШИВКА ПРИНЯТА») и дальше будет прошивать новую. Для этого не нужны ни вход, ни сеть."},{"type":"para","text":"Дисплей ведь не перестанет показывать состояние? — Нет, дисплей работает. Отключается полноценная графика рабочего стола, а маленький OLED-экран стенда — нет."},{"type":"para","text":"Можно ли отменить опечатывание потом? — С работающей системы — нет. Только переустановкой SD-карты. Это и есть путь обновления опечатанного прибора."},{"type":"para","text":"Зачем выключать ещё и Bluetooth, если устройство и так офлайн? — Bluetooth — это тоже беспроводная связь, то есть ещё один возможный канал снаружи. Раз цель — полностью убрать сеть, его выключают и вносят в чёрный список ядра наравне с Wi-Fi."},{"type":"para","text":"Что вообще остаётся работать после опечатывания? — Загрузка, systemd, udev, демон flash-jig, дисплей и импорт с USB. То есть всё, что нужно для прошивки плат, — и ничего сверх этого."},{"type":"heading","text":"Короткая памятка"},{"type":"list","ordered":false,"items":["Команда: sudo ./lockdown.sh --commit","Когда: в самом конце, ПОСЛЕ проверки на пробной плате","Сухой прогон: sudo ./lockdown.sh (без аргументов, ничего не меняет, только объясняет)","Закрывает входы: SSH и ключи, все консоли (tty + последовательный порт), графику, аварийный/спасательный режимы, все учётные записи (нет паролей, оболочка nologin, пароль root заблокирован), SysRq и Ctrl-Alt-Del, VNC/Cockpit/telnet","Закрывает сеть: Wi-Fi и Bluetooth выключены и в чёрном списке ядра, сетевые службы замаскированы — сети нет","Остаётся работать: загрузка, systemd, udev, демон flash-jig, дисплей, импорт с USB","Отмена: только переустановкой SD-карты (это и есть путь обновления)"]}]'),$i={whatCloses:["SSH: служба отключается и маскируется, ключи хоста и authorized_keys удаляются — удалённого входа по сети нет","Все текстовые консоли (tty1..63) и autovt — приглашения входа на мониторе/клавиатуре нет","Последовательный порт (serial-getty) — вход по проводу в обход сети закрыт","Графика рабочего стола (GUI): цель по умолчанию = multi-user, менеджеры дисплея замаскированы","Аварийный (emergency) и спасательный (rescue) режимы — служебной root-оболочки при сбое загрузки нет","Все учётные записи заблокированы: нет рабочих паролей, оболочка nologin, записи помечены просроченными","Пароль root заблокирован (оболочка root оставлена для служб)","Magic SysRq отключён (kernel.sysrq=0)","Ctrl-Alt-Del отключён (цель ctrl-alt-del замаскирована)","VNC, Cockpit, telnet — замаскированы","Wi-Fi выключен и в чёрном списке ядра (модули brcmfmac, brcmutil)","Bluetooth выключен и в чёрном списке ядра (модули btbcm, hci_uart, bnep, bluetooth)","Сетевые службы замаскированы (NetworkManager, wpa_supplicant, dhcpcd, systemd-networkd, avahi, connman, ModemManager, systemd-resolved) — устройство полностью офлайн"],commands:[{cmd:"sudo ./lockdown.sh",desc:"Сухой прогон (dry run): только объясняет, что было бы сделано, ничего не отключает и не блокирует. Безопасно."},{cmd:"sudo ./lockdown.sh --commit",desc:"Реальное опечатывание: закрывает все входы и всю сеть. Необратимо с работающей системы. Перед началом проверяет, что flash-jig.service включён, и прерывается («ABORT»), если служба не включена."},{cmd:"sudo reboot",desc:"Перезагрузка после опечатывания — чтобы блокировка полностью вступила в силу."}],facts:["Опечатывание — последний шаг подготовки: запускать В САМОМ КОНЦЕ, только после успешной проверки на пробной плате.","Проверка идёт ПЕРЕД опечатыванием: сначала убеждаетесь, что стенд реально прошивает платы (экран готовности «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ», ровный зелёный светодиод Raspberry), и только потом запускаете --commit.","Шаг необратим с работающей системы: отменить опечатывание изнутри нельзя — входов и сети больше нет.","Единственный способ что-то изменить в системе после опечатывания — переустановка (re-image) SD-карты; это и есть штатный путь обновления.","Прошивку можно менять и без переустановки карты: импорт нового .hex с USB-флешки продолжает работать после опечатывания.","Запуск без аргументов — сухой прогон, он ничего не меняет; реальное опечатывание только с явным --commit.","Встроенная защита: команда не запустится, если flash-jig.service не включён, и перед опечатыванием сама включает flash-jig.service и flashjig-oled.service.","После опечатывания продолжают работать загрузка, systemd, udev, демон flash-jig, OLED-дисплей и импорт прошивки с USB — все они работают от root через systemd/udev и не нуждаются ни во входе, ни в сети.","Блокировка сети тройная: выключение (rfkill), чёрный список модулей ядра (файл /etc/modprobe.d/99-lockdown-noradio.conf) и маскировка сетевых служб.","После команды обязательно выполнить sudo reboot, чтобы блокировка вступила в силу."]},uv={id:Ui,title:Fi,tagline:zi,sourceFiles:Hi,summary:Ki,blocks:Vi,data:$i},fv=Object.freeze(Object.defineProperty({__proto__:null,blocks:Vi,data:$i,default:uv,id:Ui,sourceFiles:Hi,summary:Ki,tagline:zi,title:Fi},Symbol.toStringTag,{value:"Module"})),Yi="logs",Ji="Журналы и файл состояния",Qi="Где смотреть события, результаты и полный хеш — пока стенд ещё не опечатан",Zi=["документация-2/13-ЖУРНАЛЫ-И-СОСТОЯНИЕ.txt"],Xi="Журналы и файл состояния полезны при проверке работы стенда и разборе проблем. Они доступны, пока на устройстве есть вход в систему, то есть ДО опечатывания: после lockdown входа уже нет. Здесь описано, где смотреть живые события службы, журнал прошивок, файл состояния, который читает дисплей, технический живой вывод прошивальщика, а также как получить полный SHA-256 для сверки с эталоном.",en=[{type:"para",text:"Журналы и файл состояния полезны при проверке и разборе проблем. Они доступны, пока есть вход в систему, то есть ДО опечатывания (после lockdown входа нет — см. раздел 11)."},{type:"callout",variant:"warn",title:"Только до опечатывания",text:"Всё, что описано ниже, работает лишь пока на устройство ещё есть вход в систему. После lockdown (опечатывания) входа нет, и журналы с самого устройства уже недоступны."},{type:"heading",text:"Живой журнал службы"},{type:"para",text:"Показывает события в реальном времени: обнаружение платы, начало прошивки, «OK» с номером, ошибки с кодом и причиной, смену прошивки с флешки, смену режима подключения. Выход — Ctrl+C."},{type:"code",lang:"bash",text:"journalctl -u flash-jig -f"},{type:"heading",text:"Журнал прошивок (файл)"},{type:"para",text:"В файл /opt/flashjig/flash.log пишутся строки о каждой прошивке и результат — то же, что видно в живом журнале службы."},{type:"code",lang:"bash",text:"tail -f /opt/flashjig/flash.log"},{type:"heading",text:"Файл состояния (его читает дисплей)"},{type:"para",text:"Файл /opt/flashjig/status — это текстовый файл вида «ключ=значение», который обновляется на каждом изменении. Именно из него дисплей берёт данные для отображения. Поля файла состояния:"},{type:"table",columns:["Поле","Значение"],rows:[["state","Текущее состояние (ARMED, FLASHING, OK, FAIL, NOFW, IMPORTED)"],["firmware","Имя активной прошивки"],["sha256","ПОЛНЫЙ хеш активной прошивки (на дисплее — первые 16 знаков)"],["short","Первые 16 знаков хеша (как на дисплее)"],["count","Число удачных прошивок"],["fails","Число неудачных прошивок"],["last","Последний результат (например READY, OK, FAIL2)"],["transport","Режим подключения (stlink или gpio)"]]},{type:"code",lang:"bash",text:"cat /opt/flashjig/status"},{type:"heading",text:"Полный хеш для сверки"},{type:"para",text:"На дисплее видны только первые 16 знаков хеша. Полный SHA-256 находится в поле sha256 файла состояния и в журнале. Именно его сравнивают с эталонным хешем вашей версии прошивки."},{type:"callout",variant:"info",title:"Как сверить версию",text:"Возьмите полный SHA-256 из поля sha256 файла состояния (или из журнала) и сравните его с эталонным хешем вашей версии прошивки. Первые 16 знаков, видимые на дисплее, — лишь сокращённая форма того же хеша."},{type:"heading",text:"Живой вывод прошивальщика"},{type:"para",text:"Файл /opt/flashjig/flash.live — технический. Из него дисплей берёт текущий этап и проценты во время прошивки. Обычно смотреть его не нужно."},{type:"code",lang:"bash",text:"cat /opt/flashjig/flash.live"},{type:"heading",text:"После опечатывания"},{type:"para",text:"Доступа к журналам с самого устройства уже нет. Для разбора снимите карту и посмотрите файлы на компьютере, либо переустановите карту и проверьте до опечатывания."},{type:"callout",variant:"danger",title:"Журналы недоступны с опечатанного устройства",text:"После lockdown зайти на устройство и прочитать журналы нельзя. Если нужен разбор: снимите карту памяти и посмотрите файлы на компьютере, либо переустановите карту и выполните проверку до опечатывания."}],tn={statusFields:[{field:"state",meaning:"Текущее состояние (ARMED, FLASHING, OK, FAIL, NOFW, IMPORTED)"},{field:"firmware",meaning:"Имя активной прошивки"},{field:"sha256",meaning:"ПОЛНЫЙ хеш активной прошивки (на дисплее показаны только первые 16 знаков)"},{field:"short",meaning:"Первые 16 знаков хеша (как на дисплее)"},{field:"count",meaning:"Число удачных прошивок"},{field:"fails",meaning:"Число неудачных прошивок"},{field:"last",meaning:"Последний результат (например READY, OK, FAIL2)"},{field:"transport",meaning:"Режим подключения (stlink или gpio)"}],logs:[{path:"journalctl -u flash-jig -f",what:"Живой журнал службы: события в реальном времени — обнаружение платы, начало прошивки, «OK» с номером, ошибки с кодом и причиной, смена прошивки с флешки, смена режима подключения. Выход — Ctrl+C."},{path:"/opt/flashjig/flash.log",what:"Журнал прошивок: строки о каждой прошивке и её результат. Смотреть: tail -f /opt/flashjig/flash.log"},{path:"/opt/flashjig/status",what:"Файл состояния «ключ=значение», который читает дисплей; обновляется на каждом изменении. Смотреть: cat /opt/flashjig/status"},{path:"/opt/flashjig/flash.live",what:"Живой вывод прошивальщика (технический файл): из него дисплей берёт текущий этап и проценты во время прошивки. Обычно смотреть не нужно."}]},hv={id:Yi,title:Ji,tagline:Qi,sourceFiles:Zi,summary:Xi,blocks:en,data:tn},yv=Object.freeze(Object.defineProperty({__proto__:null,blocks:en,data:tn,default:hv,id:Yi,sourceFiles:Zi,summary:Xi,tagline:Qi,title:Ji},Symbol.toStringTag,{value:"Module"})),an="maintenance",sn="Обслуживание",ln="Эксплуатация изо дня в день, проверка работоспособности и обновление опечатанного стенда",rn=["документация/13-ОБСЛУЖИВАНИЕ.txt","документация-2/12-ОБСЛУЖИВАНИЕ.txt"],nn="Раздел объясняет, как пользоваться готовым стендом прошивки STM32 изо дня в день: как проверить, что всё работает, где лежат журнал и состояние, как перезапустить службу (пока стенд ещё НЕ опечатан) и что сделать сразу после развёртывания. Отдельно разобрано, почему обновление опечатанного стенда выполняется только переустановкой SD-карты, и почему при этом смена заливаемой прошивки делается на лету флешкой даже на полностью закрытом приборе. Стенд — это автономный офлайн-прибор на Raspberry Pi 4 (RaspiOS Trixie): он прошивает платы STM32F103C8T6 и включает на каждой защиту от чтения (RDP). Интернета у него нет и не должно быть — всё необходимое уже лежит внутри.",on=JSON.parse(`[{"type":"callout","variant":"info","title":"Что это за прибор","text":"Стенд — это автономный офлайн-прибор на Raspberry Pi 4 (RaspiOS Trixie). Он прошивает платы STM32F103C8T6 и включает на каждой защиту от чтения (RDP). Интернета у него нет и не должно быть. Всё, что ему нужно для работы, уже лежит внутри."},{"type":"heading","text":"1. Что такое «опечатанный» стенд и почему обновление — это новая SD-карта"},{"type":"para","text":"Стенд проходит через два состояния жизни."},{"type":"steps","items":[{"title":"ДО опечатывания — обычная система","text":"Есть вход, можно перезапускать службы, можно менять настройки, можно зайти и посмотреть, что внутри. Именно в этом состоянии его настраивают и проверяют."},{"title":"ПОСЛЕ опечатывания (после запуска lockdown.sh --commit)","text":"Это уже закрытый прибор. Войти в него нельзя НИКАК."}]},{"type":"para","text":"Что именно делает опечатывание (lockdown.sh --commit), коротко:"},{"type":"list","ordered":false,"items":["убирает ВСЕ способы входа: SSH отключён, замаскирован, ключи удалены;","отключает все текстовые консоли (все tty и последовательный порт);","отключает графику (GUI) и аварийный/спасательный режимы;","блокирует все учётные записи — рабочих паролей нет, оболочки заменены на nologin;","отключает «волшебные» клавиши: magic SysRq и Ctrl-Alt-Del;","маскирует удалённый доступ: VNC, Cockpit, telnet;","НАВСЕГДА выключает сеть: Wi-Fi и Bluetooth выключены и внесены в чёрный список ядра, сетевые службы замаскированы. У прибора нет никакой сети."]},{"type":"para","text":"Продолжают работать ровно те части, которым ни вход, ни сеть не нужны: загрузка, systemd, udev, демон flash-jig, дисплей и импорт прошивки с USB. То есть прошивать платы стенд умеет, а пускать кого-то внутрь — уже нет."},{"type":"callout","variant":"warn","title":"Почему обновление идёт только через переустановку SD-карты","text":"Опечатывание необратимо с работающей системы. Это сделано НАМЕРЕННО: смысл закрытого прибора в том, что после опечатывания его уже нельзя «приоткрыть» ни случайно, ни специально — нет двери, через которую можно было бы войти и что-то поменять. А раз войти нельзя, то и обновить систему «на месте» нельзя: для этого пришлось бы оставить путь внутрь, а его как раз и закрыли."},{"type":"para","text":"Поэтому единственный способ изменить опечатанную систему — записать SD-карту заново (новый образ или повторное развёртывание из архива) и поставить её в Raspberry. Это и есть штатный путь обновления самой системы. Звучит строго, но именно это и защищает прибор: невозможно тихо подменить его поведение по сети или через консоль, потому что ни сети, ни консоли нет. Этот же путь гарантирует чистое состояние системы."},{"type":"heading","text":"Важно разделять два разных «обновления»"},{"type":"table","columns":["Что обновляем","Как обновляем"],"rows":[["ОБНОВЛЕНИЕ САМОЙ СИСТЕМЫ (демон, скрипты, настройки опечатывания)","Только переустановкой SD-карты. По-другому в опечатанном приборе никак. Редкое событие."],["ОБНОВЛЕНИЕ ПРОШИВКИ, которую стенд заливает в платы","НЕ требует ни переустановки, ни перезапуска. Прошивку можно менять на лету: вставить флешку с одним файлом .hex или скопировать новый .hex в папку прошивок. Работает даже на полностью опечатанном приборе. Обычное дело, делается за секунды."]]},{"type":"para","text":"Не путайте эти два случая. «Поменять заливаемую прошивку» — обычное дело, делается за секунды флешкой. «Поменять саму систему» — редкое событие, делается новой SD-картой. Подробности про импорт прошивки — в разделе 8 ниже."},{"type":"heading","text":"2. Как проверить, что всё работает"},{"type":"para","text":"Есть два главных способа посмотреть «живой» статус стенда. Оба доступны ТОЛЬКО пока стенд ещё не опечатан (после опечатывания войти и выполнить эти команды уже нельзя — тогда единственный индикатор это дисплей и светодиоды)."},{"type":"heading","text":"2.1. Живой журнал службы"},{"type":"code","lang":"bash","text":"journalctl -u flash-jig -f"},{"type":"para","text":"Эта команда показывает журнал службы flash-jig в реальном времени (флаг -f = «follow», то есть новые строки добавляются по мере работы). Здесь видно каждый шаг: как стенд находит плату, какие этапы проходит, какой получился результат, какой хеш у активной прошивки."},{"type":"para","text":"Что полезно увидеть в журнале:"},{"type":"list","ordered":false,"items":["стенд запустился и нашёл активную прошивку (её имя и полный хеш SHA-256);","выбран транспорт — ST-Link по USB или прямой SWD по выводам GPIO;","ход прошивки платы по этапам и итог (успех или код ошибки);","события импорта новой прошивки с флешки."]},{"type":"callout","variant":"ok","title":"Выход из режима слежения","text":"Чтобы выйти из режима слежения, нажмите Ctrl-C (сама служба при этом продолжает работать — вы выходите только из просмотра журнала)."},{"type":"heading","text":"2.2. Текущее состояние одним файлом"},{"type":"code","lang":"bash","text":"cat /opt/flashjig/status"},{"type":"para","text":"Файл status — это короткая «карточка» текущего состояния, которую ведёт сам демон и из которой берёт данные дисплей. В нём есть:"},{"type":"list","ordered":false,"items":["имя активной прошивки;","её полный хеш SHA-256 (на дисплее показаны только первые 16 знаков, а здесь — целиком);","счётчики: сколько плат прошито успешно («ок») и сколько со сбоем («сбой»)."]},{"type":"para","text":"Так вы за секунду видите, какая именно сборка сейчас активна и как идут дела по счётчикам, не вглядываясь в маленький дисплей."},{"type":"heading","text":"2.3. Самый быстрый способ — просто посмотреть на стенд"},{"type":"para","text":"Даже без команд многое видно по дисплею и по двум светодиодам самой Raspberry (зелёный = ACT, красный = PWR). Это работает всегда, в том числе на опечатанном приборе."},{"type":"para","text":"Дисплей OLED 0.96\\" (128x64, русский). Заголовок «OTAБEK STM32». В правом верхнем углу — метка транспорта: «USB» (подключён ST-Link) или «GPIO» (прямая прошивка по выводам Raspberry)."},{"type":"para","text":"Главные экраны дисплея:"},{"type":"table","columns":["Экран","Что показано"],"rows":[["Готов к работе","имя прошивки, строка хеша, «ГОТОВ К РАБОТЕ», «приложите плату», счётчики «ок <N> сбой <M>»."],["Нет прошивки","«НЕТ ПРОШИВКИ», «вставьте флешку», «USB с одним .hex», «или в firmware/»."],["Идёт прошивка","имя, хеш, текущий этап (СВЯЗЬ / РАЗБЛОК / ЗАПИСЬ / ПРОВЕРКА / ЗАЩИТА), проценты, полоса прогресса и «НЕ ОТКЛЮЧАЙТЕ #<N>»."],["Готово","галочка, «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ», «#<N> ок сбой <M>»."],["Ошибка","крестик, «ОШИБКА код <K>», строка причины и «снимите плату»."]]},{"type":"para","text":"Светодиоды (быстрый язык состояний):"},{"type":"table","columns":["Сигнал светодиода","Что означает"],"rows":[["зелёный «сердцебиение» (двойная вспышка)","ожидание / готов"],["зелёный медленно чередуется с красным","прошивки нет"],["зелёный часто мигает","идёт прошивка, плату НЕ снимать"],["зелёный горит РОВНО","готово; снимать плату можно только при ровном зелёном (это главное правило)"],["зелёный + красный строб","плату выдернули в процессе (брак не засчитывается; вернёте плату — мгновенно перепрошьётся)"],["зелёный тройной импульс","принята новая прошивка с флешки"],["красный мигает 2 раза","ошибка: нет / потерян контакт SWD"],["красный мигает 3 раза","ошибка: не прошли запись / проверка / подтверждение RDP"],["красный мигает 4 раза (короткая серия ~8 секунд по флешке)","на флешке нет .hex"],["красный мигает 5 раз (короткая серия ~8 секунд по флешке)","два и более .hex (нужен ровно один)"]]},{"type":"callout","variant":"info","title":"Как читать ошибку по красному светодиоду","text":"При ошибке красный светодиод мигает КОДОМ — считайте число вспышек. Коды 2 и 3 относятся к прошивке платы; коды 4 и 5 относятся к флешке (короткая серия около 8 секунд)."},{"type":"heading","text":"3. Где лежат журнал и состояние. Размещение файлов"},{"type":"para","text":"Всё хозяйство стенда находится в одной папке: /opt/flashjig/"},{"type":"table","columns":["Путь / файл","Назначение"],"rows":[["openocd/","статический бинарник OpenOCD и его скрипты (без зависимостей)"],["flash-jig.sh","демон (главный скрипт, который и прошивает платы)"],["oled.py","программа дисплея"],["leds.sh","управление светодиодами Raspberry"],["jig-stlink.cfg","настройка транспорта ST-Link (USB)"],["jig-gpio.cfg","настройка транспорта прямого SWD по выводам GPIO"],["firmware/","прошивки (.hex) и симлинк 'current' (активная прошивка)"],["status","состояние: имя + полный хеш + счётчики (его читает дисплей)"],["flash.log","ЖУРНАЛ работы (история событий)"],["flash.live","рабочий «живой» файл текущего процесса"]]},{"type":"para","text":"Что важно запомнить из этого списка:"},{"type":"list","ordered":false,"items":["ЖУРНАЛ — это /opt/flashjig/flash.log. В нём пишется история: что прошивалось, с каким результатом, какой хеш. Там же фигурирует полный хеш активной прошивки.","СОСТОЯНИЕ — это /opt/flashjig/status. Короткая текущая «карточка»: имя прошивки, полный хеш, счётчики ок/сбой. Именно её и удобно смотреть командой cat /opt/flashjig/status.","ПРОШИВКИ — в /opt/flashjig/firmware/. Активной считается та, на которую указывает симлинк 'current'; если симлинка нет — берётся самый новый файл в папке. Имя файла всегда сохраняется как есть."]},{"type":"para","text":"Две службы systemd:"},{"type":"list","ordered":false,"items":["flash-jig.service — сам демон прошивки;","flashjig-oled.service — программа дисплея."]},{"type":"para","text":"Полезные команды (повторим, чтобы были под рукой):"},{"type":"code","lang":"bash","text":"journalctl -u flash-jig -f      # живой журнал службы\\ncat /opt/flashjig/status        # текущее состояние одним файлом"},{"type":"heading","text":"4. Перезапуск службы (только пока стенд ещё не опечатан)"},{"type":"para","text":"Если стенд ещё НЕ опечатан и нужно перезапустить демон прошивки:"},{"type":"code","lang":"bash","text":"systemctl restart flash-jig"},{"type":"para","text":"После этой команды служба перезапускается заново: снова находит активную прошивку, пересчитывает её хеш и возвращается в готовность. Полезно, например, если хочется чисто перечитать состояние или после ручных правок во время настройки."},{"type":"callout","variant":"danger","title":"Очень важно про опечатанный прибор","text":"После lockdown.sh --commit эту команду выполнить НЕЛЬЗЯ — войти в систему уже невозможно (нет ни консоли, ни SSH, ни сети). Перезапуск службы — это инструмент периода настройки, до опечатывания. На готовом опечатанном приборе «перезапуск» делается только выключением и включением питания самой Raspberry."},{"type":"para","text":"И помните: чтобы поменять ЗАЛИВАЕМУЮ прошивку, перезапуск НЕ нужен — это делается на лету флешкой или копированием файла (см. раздел 8). Перезапуск службы и смена прошивки — разные вещи."},{"type":"heading","text":"5. Что проверить сразу после развёртывания"},{"type":"para","text":"Напоминание про порядок развёртывания (все команды от root):"},{"type":"steps","items":[{"title":"Распаковать архив","text":"распаковать архив, зайти в папку."},{"title":"Положить прошивку","text":"положить ваш файл .hex в эту папку."},{"title":"Установка","text":"sudo ./install.sh"},{"title":"Перезагрузка","text":"sudo reboot — обязательно, чтобы заработал дисплей по I2C."},{"title":"Пробная плата","text":"прошить пробную плату для проверки."},{"title":"Опечатывание","text":"когда всё хорошо: sudo ./lockdown.sh --commit"},{"title":"Финальная перезагрузка","text":"sudo reboot"}]},{"type":"callout","variant":"warn","title":"Когда опечатывать","text":"После шага с перезагрузкой и ДО опечатывания обязательно пройдите короткий список проверок ниже. Опечатывать стенд имеет смысл только тогда, когда все пункты в порядке."},{"type":"heading","text":"5.1. Версия (какая прошивка активна и её хеш)"},{"type":"para","text":"Убедитесь, что активна именно нужная сборка. Посмотрите cat /opt/flashjig/status (там имя и полный хеш) или прочитайте имя и строку хеша прямо с дисплея на экране «ГОТОВ К РАБОТЕ»."},{"type":"para","text":"Сверьте показанный хеш с эталонным хешем выпуска. Каждая прошивка однозначно определяется своей суммой SHA-256, которую стенд считает локально по содержимому файла. На дисплее видны первые 16 знаков хеша, полный хеш — в /opt/flashjig/status и в журнале. Если хеш совпал с эталонным — загружена именно одобренная сборка. Если не совпал — значит файл другой или повреждён; любая подмена проявится другим хешем. Это и есть проверка «той самой версии»."},{"type":"heading","text":"5.2. Адаптеры (транспорт): USB или GPIO"},{"type":"para","text":"Транспорт стенд выбирает САМ и показывает в правом верхнем углу дисплея:"},{"type":"list","ordered":false,"items":["«USB» — подключён ST-Link через USB-донгл, используется он;","«GPIO» — ST-Link не подключён, идёт прямая прошивка по выводам Raspberry (битбанг SWD по GPIO)."]},{"type":"para","text":"Проверьте, что метка соответствует тому, как вы реально подключили плату:"},{"type":"list","ordered":false,"items":["Если работаете через ST-Link — он должен быть воткнут в USB, а в углу должно стоять «USB». Те же 4 сигнала SWD идут через донгл; выводы SWD на GPIO в этом случае не используются.","Если работаете напрямую по GPIO — ST-Link не подключайте, в углу должно быть «GPIO», и провода SWD должны идти на правильные контакты Raspberry."]},{"type":"para","text":"Контакты для справки (40-контактный разъём; см. wiring.png в архиве):"},{"type":"table","columns":["Назначение","Сигнал","Контакт Raspberry"],"rows":[["Прямой SWD по GPIO","SWDIO","контакт 22 (GPIO25)"],["Прямой SWD по GPIO","SWCLK","контакт 23 (GPIO11)"],["Прямой SWD по GPIO","3V3","контакт 17"],["Прямой SWD по GPIO","GND","контакт 14"],["Дисплей (I2C)","VDD","контакт 1 (3V3)"],["Дисплей (I2C)","GND","контакт 6"],["Дисплей (I2C)","SDA","контакт 3 (GPIO2)"],["Дисплей (I2C)","SCK/SCL","контакт 5 (GPIO3)"]]},{"type":"callout","variant":"info","title":"Прошивка по 4 проводам","text":"Прошивка идёт всего по 4 проводам (SWDIO, SWCLK, GND, 3V3), без NRST и без снятия питания платы — сброс делается программно по SWD. Это работает и для чистых плат, и для уже защищённых."},{"type":"heading","text":"5.3. Дисплей"},{"type":"para","text":"После перезагрузки дисплей должен ожить и показать заголовок «OTAБEK STM32», метку транспорта в углу и осмысленный экран («ГОТОВ К РАБОТЕ», если прошивка есть, либо «НЕТ ПРОШИВКИ», если её ещё нет). Если дисплей пустой — смотрите раздел 7 (почти всегда помогает один reboot ради I2C)."},{"type":"heading","text":"5.4. Пробная плата"},{"type":"para","text":"Это главная проверка. Возьмите тестовую плату STM32 и приложите её (или подключите 4 провода SWD). Стенд должен сам выполнить весь цикл одним «тачем»:"},{"type":"list","ordered":false,"items":["подключение ->","при необходимости снятие старой защиты (полное стирание) ->","сброс ->","стирание и запись .hex ->","проверка ->","включение RDP ->","сброс ->","обратное считывание RDP для подтверждения, что защита ВКЛючена."]},{"type":"para","text":"Что вы должны увидеть как признак успеха:"},{"type":"list","ordered":false,"items":["на дисплее во время работы идут этапы (СВЯЗЬ / РАЗБЛОК / ЗАПИСЬ / ПРОВЕРКА / ЗАЩИТА) с процентами и полосой, плюс «НЕ ОТКЛЮЧАЙТЕ #<N>»;","зелёный светодиод во время прошивки часто мигает;","в конце — экран «ГОТОВО-СНИМИТЕ», строка «RDP защита ВКЛ», и зелёный горит РОВНО;","счётчик «ок» увеличился на единицу."]},{"type":"callout","variant":"ok","title":"Когда плата засчитана","text":"Плата засчитывается как «ГОТОВО» ТОЛЬКО когда защита RDP подтверждена обратным считыванием регистра опций. Снимать плату — строго при ровном зелёном."},{"type":"para","text":"Если вместо успеха появился крестик и «ОШИБКА код <K>», прочитайте строку причины и сверьтесь с кодами:"},{"type":"table","columns":["Код","Причина","Что делать"],"rows":[["код 2","«нет контакта SWD»","проверьте провода/контакт (SWDIO, SWCLK, GND, 3V3), это почти всегда механика контакта"],["код 3","«запись/пров/RDP» — не прошла запись, проверка или подтверждение RDP","снимите плату и попробуйте снова, при повторе — проверьте саму плату"]]},{"type":"para","text":"Красный светодиод при ошибке мигает кодом (2 или 3 вспышки) и держится до снятия платы. Плохой/дребезжащий контакт стенд повторяет сам."},{"type":"callout","variant":"ok","title":"Готовность к опечатыванию","text":"Только когда пробная плата уверенно проходит цикл «ГОТОВО» с подтверждённой RDP — можно переходить к опечатыванию (lockdown.sh --commit и reboot)."},{"type":"heading","text":"6. Резервная копия рабочей прошивки"},{"type":"callout","variant":"danger","title":"После опечатывания прошивку из платы не вытащить","text":"После опечатывания вытащить прошивку из самой платы будет НЕЛЬЗЯ. Это сознательная защита: на каждой плате включается RDP, который закрывает считывание прошивки через отладку. Снять RDP можно только полным стиранием чипа, поэтому достать заводскую прошивку обратно из готовой платы невозможно. Это хорошо для защиты изделия, но означает простое правило: ХРАНИТЕ ОТДЕЛЬНУЮ РЕЗЕРВНУЮ КОПИЮ ИСХОДНОГО ФАЙЛА .hex."},{"type":"para","text":"Файл .hex — это и есть ваш единственный «оригинал» прошивки. Сам стенд держит активную прошивку в /opt/flashjig/firmware/ (имя файла сохраняется, активная помечена симлинком 'current'). Но эту папку нужно рассматривать как рабочую, а не как архив: при переустановке SD-карты вы зальёте систему заново, и важно иметь под рукой проверенный файл .hex, чтобы снова положить именно его."},{"type":"para","text":"Что разумно хранить в надёжном месте (вне стенда):"},{"type":"list","ordered":false,"items":["сам файл .hex рабочей прошивки (с понятным именем);","его эталонный хеш SHA-256 — чтобы потом сверять, что это та же сборка;","при желании — отметку, на какой дате/выпуске эта прошивка использовалась;","архив комплекта (.zip) — он самодостаточен (внутри уже есть прошивальщик);","подготовленный образ системы для microSD."]},{"type":"para","text":"Тогда восстановление сводится к простому: при развёртывании новой SD-карты положить тот же .hex и сверить хеш на дисплее с сохранённым эталоном. Если хеш совпал — это ровно та одобренная сборка, что и раньше. Имея архив, образ и проверенные прошивки, устройство всегда можно восстановить переустановкой карты."},{"type":"heading","text":"7. Если дисплей не появился"},{"type":"para","text":"Самая частая причина — шина I2C, по которой работает дисплей, ещё не была включена на момент загрузки. install.sh включает I2C в config.txt, но это изменение вступает в силу только после перезагрузки. Поэтому в порядке развёртывания и стоит обязательный шаг «sudo reboot» сразу после install.sh."},{"type":"para","text":"Что делать, если дисплей пустой:"},{"type":"steps","items":[{"title":"Сделайте ОДНУ перезагрузку","text":"sudo reboot — один reboot ради I2C это штатное лекарство; после него дисплей с заголовком «OTAБEK STM32» обычно появляется."},{"title":"Если после перезагрузки дисплей всё ещё пустой — проверьте 4 провода дисплея на правильных контактах","text":"VDD -> контакт 1 (3V3); GND -> контакт 6; SDA -> контакт 3 (GPIO2); SCK/SCL -> контакт 5 (GPIO3). Убедитесь, что это именно дисплей 0.96\\" 128x64 на SSD1306 (I2C)."}]},{"type":"callout","variant":"info","title":"Пустой дисплей не значит, что стенд не работает","text":"Пустой дисплей сам по себе НЕ означает, что стенд не прошивает. Демон, светодиоды и импорт с USB работают независимо от дисплея. Но дисплей очень удобен, поэтому добиться его появления стоит ДО опечатывания: на опечатанном приборе вы уже не сможете войти и что-то поправить — останутся только дисплей и светодиоды."},{"type":"heading","text":"8. Обновление заливаемой прошивки с флешки (работает всегда)"},{"type":"para","text":"Этот раздел — про то, как менять прошивку, которую стенд заливает в платы. Это НЕ обновление системы и переустановки SD-карты не требует. Работает и на опечатанном приборе. Перезагрузка не нужна."},{"type":"steps","items":[{"title":"Положите на флешку РОВНО ОДИН файл .hex","text":"он может лежать в любой папке на флешке."},{"title":"Вставьте флешку в стенд","text":"стенд обнаружит её сам."},{"title":"Стенд сам импортирует файл","text":"имя сохраняется, на дисплее появится «ПРОШИВКА ПРИНЯТА», зелёный даст тройной импульс. Дальше платы прошиваются уже новой прошивкой."}]},{"type":"para","text":"Если что-то не так с флешкой (короткая серия ~8 секунд):"},{"type":"list","ordered":false,"items":["на флешке НЕТ файла .hex -> красный мигает 4 раза;","на флешке ДВА и более .hex -> красный мигает 5 раз (нужен ровно один)."]},{"type":"callout","variant":"ok","title":"Ничего не ломается","text":"В обоих случаях текущая прошивка остаётся прежней — ничего не ломается, просто поправьте содержимое флешки (оставьте ровно один .hex) и повторите."},{"type":"para","text":"Почему это безопасно. Флешка монтируется ТОЛЬКО ДЛЯ ЧТЕНИЯ с жёсткими опциями: ro, noexec, nosuid, nodev, nosymfollow, noatime. Это значит:"},{"type":"list","ordered":false,"items":["ничего с флешки нельзя ЗАПУСТИТЬ (noexec) и нельзя ПОВЫСИТЬ права (nosuid);","устройства и символические ссылки с флешки игнорируются (nodev, nosymfollow) — через них тоже ничего не подсунуть;","стенд лишь СЧИТЫВАЕТ сам файл .hex и ничего на флешке не меняет."]},{"type":"para","text":"Поэтому импорт с USB остаётся включённым даже на полностью закрытом приборе: он не открывает никакой лазейки — это безопасный «вход» только для одного файла прошивки, и ничего более."},{"type":"heading","text":"9. Регулярное и чего делать не нужно"},{"type":"callout","variant":"warn","title":"Регулярное обслуживание","text":"Следите за чистотой и надёжностью контактов проводов SWD — это главный источник ошибок. Питание должно быть стабильным; не выдёргивайте питание во время прошивки."},{"type":"list","ordered":false,"items":["Не нужно вручную перезапускать службы при обычной работе.","Не нужно подключать устройство к интернету — оно работает офлайн."]},{"type":"heading","text":"10. Короткая памятка «что где»"},{"type":"table","columns":["Задача","Команда / место"],"rows":[["Живой журнал службы","journalctl -u flash-jig -f"],["Текущее состояние","cat /opt/flashjig/status"],["Перезапуск службы (до опечатывания)","systemctl restart flash-jig"],["Журнал (история)","/opt/flashjig/flash.log"],["Состояние (карточка)","/opt/flashjig/status"],["Прошивки","/opt/flashjig/firmware/ (активная = 'current')"],["Службы","flash-jig.service, flashjig-oled.service"],["Сменить заливаемую прошивку","флешка с одним .hex -> «ПРОШИВКА ПРИНЯТА»"],["Обновить саму систему","только переустановкой SD-карты"],["Дисплей не появился","один sudo reboot (ради I2C)"],["Снимать плату","только при РОВНОМ зелёном (экран «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ»)"]]}]`),cn={tasks:[{title:"Обновление заливаемой прошивки (часто, на лету)",text:"Вставьте USB-флешку с РОВНО одним файлом .hex (он может лежать в любой папке на флешке). Стенд сам импортирует файл, имя сохраняется, на дисплее появится «ПРОШИВКА ПРИНЯТА», зелёный даст тройной импульс. Не требует ни перезагрузки, ни переустановки SD-карты, ни перезапуска службы. Работает даже на полностью опечатанном приборе. Если на флешке нет .hex — красный мигает 4 раза; если два и более .hex — красный мигает 5 раз; в обоих случаях текущая прошивка остаётся прежней."},{title:"Обновление самой системы (редко, новой SD-картой)",text:"После опечатывания (lockdown.sh --commit) войти в систему нельзя НИКАК, поэтому любые изменения самой системы (демон, скрипты, настройки опечатывания) делаются только переустановкой карты microSD: 1) запишите на microSD подготовленный образ системы (с компьютера); 2) положите на карту новый архив .zip комплекта; 3) загрузите Raspberry Pi, выполните установку и опечатывание заново; 4) загрузите прошивку флешкой и проверьте. Это штатный путь обновления, он же гарантирует чистое состояние."},{title:"Что хранить как резервную копию (вне стенда)",text:"Файлы прошивок .hex (с понятными именами) и их эталонные хеши SHA-256 для сверки — после опечатывания вытащить прошивку из платы НЕЛЬЗЯ (RDP закрывает считывание). Самодостаточный архив комплекта .zip (внутри уже есть прошивальщик). Подготовленный образ системы для microSD. При желании — отметку, на какой дате/выпуске использовалась прошивка. Имея это, устройство всегда можно восстановить переустановкой карты."},{title:"Проверка работы (после развёртывания и до опечатывания)",text:"На дисплее — нужная прошивка (имя + хеш) и состояние «ГОТОВ К РАБОТЕ»; сверьте показанный хеш с эталонным хешем выпуска. Метка транспорта в углу («USB» или «GPIO») соответствует реальному подключению. Пробная плата проходит весь цикл до ровного зелёного «ГОТОВО» с подтверждённой RDP, счётчик «ок» растёт. До опечатывания можно смотреть живой журнал (journalctl -u flash-jig -f) и состояние (cat /opt/flashjig/status)."},{title:"Регулярные проверки и чего делать НЕ нужно",text:"Следите за чистотой и надёжностью контактов проводов SWD — это главный источник ошибок (ошибка код 2 — нет контакта SWD). Питание должно быть стабильным; не выдёргивайте питание во время прошивки (плату снимать строго при ровном зелёном). Не нужно вручную перезапускать службы при обычной работе. Не нужно подключать устройство к интернету — оно работает офлайн."},{title:"Перезапуск службы (только до опечатывания)",text:"Пока стенд НЕ опечатан, демон прошивки можно перезапустить командой systemctl restart flash-jig — служба заново находит активную прошивку, пересчитывает её хеш и возвращается в готовность. После lockdown.sh --commit эту команду выполнить НЕЛЬЗЯ (нет ни консоли, ни SSH, ни сети): на готовом приборе «перезапуск» делается только выключением и включением питания Raspberry. Для смены заливаемой прошивки перезапуск НЕ нужен."},{title:"Если дисплей не появился (один reboot ради I2C)",text:'Самая частая причина — шина I2C ещё не была включена на момент загрузки (install.sh включает I2C в config.txt, но это вступает в силу только после перезагрузки). Сделайте одну перезагрузку: sudo reboot — после неё дисплей с заголовком «OTAБEK STM32» обычно появляется. Если всё ещё пусто — проверьте 4 провода дисплея (VDD -> контакт 1, GND -> контакт 6, SDA -> контакт 3, SCK/SCL -> контакт 5) и что это дисплей 0.96" 128x64 на SSD1306 (I2C). Пустой дисплей сам по себе не значит, что стенд не прошивает — демон, светодиоды и импорт с USB работают независимо.'}]},xv={id:an,title:sn,tagline:ln,sourceFiles:rn,summary:nn,blocks:on,data:cn},mv=Object.freeze(Object.defineProperty({__proto__:null,blocks:on,data:cn,default:xv,id:an,sourceFiles:rn,summary:nn,tagline:ln,title:sn},Symbol.toStringTag,{value:"Module"})),vn="overview",pn="Что это за устройство",dn="Автономный офлайн-стенд: приложил плату STM32F103 — она прошита и опечатана защитой от чтения.",un=["документация-2/01-ЧТО-ЭТО.txt","документация/12-КАК-ЭТО-РАБОТАЕТ.txt","README.txt","ИНФОРМАЦИЯ.txt"],fn="OTAБEK STM32 — это автономный стенд для прошивки микроконтроллеров STM32F103C8T6, собранный на одноплатном компьютере Raspberry Pi 4. Достаточно приложить плату к контактам SWD: стенд сам устанавливает связь, при необходимости снимает старую защиту, стирает и записывает вашу прошивку, проверяет запись и включает аппаратную защиту от чтения (RDP), подтверждая, что она встала. Всё происходит локально, без интернета, сети, облака и без участия компьютера; ход работы показывает русскоязычный OLED-дисплей и два светодиода Raspberry Pi.",hn=[{type:"para",text:"Это автономный стенд для прошивки микроконтроллеров STM32F103. Основан на одноплатном компьютере Raspberry Pi 4. Достаточно приложить плату к контактам — стенд сам прошьёт её и включит защиту от чтения. Дисплей показывает, что происходит."},{type:"callout",variant:"info",title:"Общая картина",text:"Внутри корпуса — одноплатный компьютер Raspberry Pi 4 с операционной системой RaspiOS Trixie. Это полностью автономный офлайн-стенд: у него НЕТ интернета и он в нём не нуждается. Его единственная задача — прошивать платы STM32F103C8T6 и включать на каждой защиту от чтения, которая называется RDP. Всё это происходит локально, без сети, без облака, без внешних серверов."},{type:"para",text:"Вы взаимодействуете со стендом очень просто: смотрите на маленький OLED-дисплей, прикладываете плату к контактам — и забираете её, когда дисплей и светодиод скажут «готово». Внутри же в этот момент происходит целая последовательность точных шагов."},{type:"heading",text:"Что делает одно касание платы"},{type:"para",text:"Когда вы прикладываете одну плату, стенд выполняет один «тач» — единый непрерывный сценарий. Вам ничего не нужно нажимать или переключать: достаточно держать плату в контакте."},{type:"steps",items:[{title:"Связь по SWD",text:"Подключается к плате по проводам SWD."},{title:"Снятие старой защиты (если была)",text:"Если на плате уже стояла защита — снимает её (плата при этом стирается)."},{title:"Стирание и запись",text:"Полностью стирает и записывает вашу прошивку."},{title:"Проверка записи",text:"Проверяет запись (сверяет с файлом)."},{title:"Включение и подтверждение RDP",text:"Включает аппаратную защиту от чтения (RDP) и подтверждает, что она встала."}]},{type:"callout",variant:"ok",title:"Без кнопок и без компьютера",text:"Всё это — за несколько секунд, без кнопок и без компьютера. Картина проста: приложили — прошилось — сняли — приложили следующую."},{type:"para",text:"В целом устройство устроено так: демон (постоянно работающая программа) крутится в бесконечном цикле и ждёт, когда вы приложите плату. Когда плата появилась, демон выполняет прошивку — связь, при необходимости снятие старой защиты, стирание, запись, проверку, включение защиты и её подтверждение. На каждом шаге демон записывает текущее состояние в особый файл status. Отдельная программа дисплея читает этот файл и рисует на экране то, что вы видите: имя прошивки, хеш, этап, проценты, итог. Светодиоды самой Raspberry дублируют состояние «языком вспышек», чтобы вы понимали статус, даже не глядя на текст."},{type:"heading",text:"Основные свойства"},{type:"list",ordered:!1,items:["Полностью автономно: интернет и сеть не нужны и не используются.","Два способа подключения к плате, выбираются автоматически: через адаптер ST-Link по USB или напрямую по выводам GPIO самого Raspberry Pi.","Русскоязычный дисплей (OLED) показывает название прошивки, её хеш, ход работы в процентах и результат.","Два встроенных светодиода Raspberry Pi дублируют состояние (зелёный/красный).","Прошивка обновляется простой USB-флешкой — без переустановки.","Каждая прошивка имеет криптографический отпечаток (хеш SHA-256), который виден на дисплее — можно убедиться, что стоит именно нужная версия.","После настройки устройство можно «опечатать»: закрыть любой вход в систему, оставив только функцию прошивки."]},{type:"callout",variant:"ok",title:"Один сеанс — и для чистых, и для уже защищённых плат",text:"Стенд одинаково уверенно прошивает как чистые платы (на которых защиты ещё нет), так и уже защищённые (на которых RDP была включена ранее) — за один «тач» и по тем же четырём проводам. Сценарий сам подстраивается под состояние платы; заранее знать, в каком она состоянии, не нужно — приложите любую."},{type:"heading",text:"Чего устройство НЕ делает"},{type:"list",ordered:!1,items:["Не выходит в интернет и не передаёт данные наружу.","Не запускает никаких посторонних программ — только прошивку.","Не требует клавиатуры, мыши или монитора в обычной работе."]},{type:"heading",text:"Что нужно для работы"},{type:"list",ordered:!1,items:["Raspberry Pi 4 с установленной системой (карта microSD уже подготовлена).",'Дисплей OLED 0.96" 128x64 по шине I2C (подключение — см. 03-ПОДКЛЮЧЕНИЕ).',"Платы STM32F103 для прошивки.","Файл прошивки в формате .hex.","По желанию: адаптер ST-Link (если не подключаться напрямую по GPIO)."]},{type:"callout",variant:"ok",title:"Когда снимать плату",text:"Правило простое: снимать плату можно только при РОВНОМ зелёном светодиоде. Если зелёный загорелся (НЕ мигает и не потух) — значит плата прошита. При успехе дисплей показывает галочку и строки «ГОТОВО-СНИМИТЕ», «RDP защита ВКЛ»."},{type:"callout",variant:"info",title:"Дальше",text:"02-БЫСТРЫЙ-СТАРТ.txt — как запустить с нуля. Разделы «документация» и «документация-2» — больше информации и инструкций."}],yn={oneTouch:[{n:1,title:"Связь",desc:"Подключается к плате по проводам SWD: устанавливает связь с микроконтроллером и проверяет, что контакт есть и чип отвечает."},{n:2,title:"Снятие защиты (если была)",desc:"Если на плате уже стояла защита от чтения (RDP) — снимает её. На STM32 это возможно только через полное стирание чипа, поэтому плата при этом стирается. Для чистой платы шаг не нужен."},{n:3,title:"Стирание + запись",desc:"Полностью стирает флеш-память и записывает вашу прошивку — файл .hex. Имя файла прошивки сохраняется и показывается на экране."},{n:4,title:"Проверка",desc:"Считывает записанное обратно и сверяет с файлом — подтверждает, что прошивка легла в чип без ошибок."},{n:5,title:"Защита (RDP) + подтверждение",desc:"Включает аппаратную защиту от чтения (RDP) и подтверждает её обратным считыванием регистра опций. Плата считается «ГОТОВО» только когда RDP подтверждена; иначе это засчитывается как сбой."}],properties:["Полностью автономно: интернет и сеть не нужны и не используются (офлайн).","Основа — одноплатный компьютер Raspberry Pi 4 (RaspiOS Trixie).","Прошивает платы STM32F103C8T6 и включает на каждой защиту от чтения RDP.","Один «тач» на плату: связь → при необходимости снятие старой защиты → стирание+запись → проверка → включение и подтверждение RDP.","Работает и с чистыми, и с уже защищёнными платами — сценарий сам решает, нужна ли разблокировка.","Два способа подключения к плате, выбираются автоматически: ST-Link по USB или напрямую по выводам GPIO Raspberry Pi (битбанг SWD).",'Русскоязычный OLED-дисплей (0.96" 128x64, I2C) показывает название прошивки, хеш, ход работы в процентах и результат.',"Два встроенных светодиода Raspberry Pi (зелёный/красный) дублируют состояние «языком вспышек».","Прошивка обновляется простой USB-флешкой — без переустановки и без перезапуска служб.","У каждой прошивки криптографический отпечаток SHA-256, видимый на дисплее — можно убедиться, что стоит именно нужная версия.","После настройки устройство можно «опечатать»: закрыть любой вход в систему, оставив только функцию прошивки.","Живучесть: вызовы ограничены по времени, плохой контакт повторяется сам, выдернутая плата — не брак, её достаточно приложить снова."],notDoes:["Не выходит в интернет и не передаёт данные наружу.","Не запускает никаких посторонних программ — только прошивку.","Не требует клавиатуры, мыши или монитора в обычной работе.","Не использует облако или внешние серверы — вся работа локальная.","Не требует кнопок, переключений или участия компьютера между платами."],needs:["Raspberry Pi 4 с установленной системой (карта microSD уже подготовлена).",'Дисплей OLED 0.96" 128x64 по шине I2C (подключение — см. 03-ПОДКЛЮЧЕНИЕ).',"Платы STM32F103 для прошивки.","Файл прошивки в формате .hex.","По желанию: адаптер ST-Link (если не подключаться напрямую по GPIO)."]},gv={id:vn,title:pn,tagline:dn,sourceFiles:un,summary:fn,blocks:hn,data:yn},Sv=Object.freeze(Object.defineProperty({__proto__:null,blocks:hn,data:yn,default:gv,id:vn,sourceFiles:un,summary:fn,tagline:dn,title:pn},Symbol.toStringTag,{value:"Module"})),xn="quickstart",mn="Быстрый старт",gn="Самый короткий путь от коробки до первой прошитой платы — пять шагов сверху вниз.",Sn=["документация/01-БЫСТРЫЙ-СТАРТ.txt","документация-2/02-БЫСТРЫЙ-СТАРТ.txt","документация-2/04-УСТАНОВКА.txt"],_n="Это инструкция для тех, кто впервые включает автономный стенд прошивки OTAБEK STM32. Стенд собран на Raspberry Pi 4, работает полностью офлайн, без интернета, прошивает платы STM32F103C8T6 и на каждой включает защиту от чтения (RDP), чтобы прошивку нельзя было считать. Рекомендуемый порядок: сначала установить и сразу опечатать прибор, перезагрузить, и только потом загрузить прошивку флешкой и проверить пробной платой. Делайте ровно по шагам сверху вниз — ничего пропускать не нужно.",bn=JSON.parse('[{"type":"para","text":"Этот файл — для тех, кто впервые включает автономный стенд прошивки OTAБEK STM32. Здесь самый короткий путь: сначала установить и сразу опечатать прибор, перезагрузить, и только потом загрузить прошивку флешкой и проверить пробной платой. Делайте ровно по шагам сверху вниз. Ничего пропускать не нужно."},{"type":"para","text":"Стенд собран на Raspberry Pi 4 и работает полностью офлайн, без интернета. Он прошивает платы STM32F103C8T6 и на каждой включает защиту от чтения (RDP), чтобы прошивку нельзя было считать."},{"type":"heading","text":"Что вам понадобится"},{"type":"list","ordered":false,"items":["Raspberry Pi 4 с SD-картой и собранным стендом (дисплей по I2C, провода SWD или ST-Link по USB — см. файл со схемой wiring.png).","Архив стенда .zip (в нём install.sh и lockdown.sh).","Компьютер, чтобы один раз положить .zip на SD-карту.","USB-флешка или картридер с ОДНИМ файлом .hex (это ваша прошивка). Флешку лучше взять чистую или заранее отформатировать.","Одна пробная плата STM32, на которой не жалко проверить."]},{"type":"heading","text":"Рекомендуемый порядок (делайте именно так)"},{"type":"para","text":"Сначала установка и опечатывание, потом перезагрузка, и в самом конце — прошивка флешкой."},{"type":"steps","items":[{"title":"Шаг 1","text":"Перенесите архив на SD-карту."},{"title":"Шаг 2","text":"Установите и сразу опечатайте (одной командой)."},{"title":"Шаг 3","text":"Перезагрузите."},{"title":"Шаг 4","text":"Загрузите прошивку флешкой (один .hex)."},{"title":"Шаг 5","text":"Проверьте пробной платой (ровный зелёный «ГОТОВО»)."}]},{"type":"para","text":"Ниже — каждый шаг подробно, с тем, что вы увидите на дисплее и светодиодах после него."},{"type":"heading","text":"Шаг 1. Перенесите архив на SD-карту"},{"type":"para","text":"С компьютера скопируйте архив .zip на SD-карту, в раздел /boot. Распакуйте его там, чтобы рядом оказались файлы install.sh и lockdown.sh. Вставьте SD-карту обратно в Raspberry и включите питание."},{"type":"callout","variant":"info","title":"Почему так","text":"Раздел /boot виден с обычного компьютера, и это самый простой способ передать установочные файлы на прибор, пока он ещё не опечатан."},{"type":"heading","text":"Шаг 2. Установите и сразу опечатайте (одной командой)"},{"type":"para","text":"Один раз подключитесь к Raspberry. Например, по сети:"},{"type":"code","lang":"bash","text":"ssh pi@<адрес>"},{"type":"para","text":"Перейдите в папку с распакованным архивом и запустите подряд установку и опечатывание одной строкой:"},{"type":"code","lang":"bash","text":"sudo ./install.sh && sudo ./lockdown.sh --commit"},{"type":"para","text":"Что делает каждая часть:"},{"type":"list","ordered":false,"items":["install.sh — разворачивает всё, что нужно стенду: статический OpenOCD (без интернета и без лишних пакетов), службы прошивки (flash-jig) и дисплея (flashjig-oled), правила udev, включает I2C для дисплея и создаёт папку для прошивок /opt/flashjig/firmware. Команду можно запускать повторно без вреда (она идемпотентна).","lockdown.sh --commit — опечатывает прибор. Убирает все способы входа (SSH отключён, замаскирован, ключи удалены; все консоли — tty и последовательный порт; графика; аварийные оболочки), блокирует все учётные записи (рабочих паролей нет, оболочки — nologin), отключает SysRq и Ctrl-Alt-Del, маскирует VNC/Cockpit/telnet и НАВСЕГДА выключает сеть (Wi-Fi и Bluetooth в чёрном списке ядра, сетевые службы замаскированы). Работать остаются только загрузка, systemd, udev, сама прошивка, дисплей и приём прошивки с USB-флешки."]},{"type":"callout","variant":"danger","title":"Важное предупреждение","text":"Связка с «&&» устроена так: вторая команда запустится, только если первая прошла без ошибок. Сразу после успешного lockdown вход в систему закрывается. Больше зайти по SSH или в консоль будет НЕЛЬЗЯ. Любое изменение после этого возможно ТОЛЬКО переустановкой SD-карты. Поэтому запускайте опечатывание осознанно."},{"type":"callout","variant":"info","title":"Подсказка: сухой прогон","text":"Если хотите сначала просто посмотреть, что именно сделает опечатывание, запустите lockdown.sh БЕЗ «--commit» — это сухой прогон, он только объясняет и ничего не меняет. Реально опечатывает лишь вариант с «--commit». Перед опечатыванием lockdown сам проверит, что служба прошивки (flash-jig) включена, и не запустится, если что-то не так."},{"type":"heading","text":"Шаг 3. Перезагрузите"},{"type":"para","text":"Перезагрузка применяет все настройки, включая дисплей по I2C:"},{"type":"code","lang":"bash","text":"sudo reboot"},{"type":"para","text":"После загрузки на дисплее должна появиться верхняя строка-«шапка» (тёмные буквы на светлой полосе): слева надпись «OTAБEK STM32», справа метка транспорта — «USB», если подключён ST-Link по USB, или «GPIO», если прошивка идёт напрямую по выводам. Метку прибор определяет сам."},{"type":"para","text":"Так как прошивку вы ещё не загружали, по центру дисплея будет:"},{"type":"code","lang":"text","text":"«НЕТ ПРОШИВКИ»\\n«вставьте флешку»\\n«USB с одним .hex»\\n«или в firmware/»"},{"type":"callout","variant":"ok","title":"Светодиоды: стенд готов и ждёт прошивку","text":"Зелёный и красный медленно мигают ПО ОЧЕРЕДИ (попеременно, примерно раз в 0.6 секунды). Это нормально — стенд готов и ждёт прошивку."},{"type":"callout","variant":"warn","title":"Если дисплей не появился","text":"Выполните перезагрузку ещё раз (sudo reboot). Это нужно сделать ДО опечатывания; после него консоль уже недоступна. Поэтому, если перезагрузку запускаете отдельно от команды установки, убедитесь в наличии дисплея до запуска lockdown."},{"type":"heading","text":"Шаг 4. Загрузите прошивку флешкой (один .hex)"},{"type":"para","text":"Теперь подайте стенду рабочую прошивку. Возьмите USB-флешку или картридер, на котором лежит РОВНО ОДИН файл .hex. Файл может быть в любой папке — стенд его найдёт. Других .hex на флешке быть не должно."},{"type":"para","text":"Флешку лучше заранее отформатировать или взять новую чистую: так на ней гарантированно один .hex и ничего лишнего."},{"type":"para","text":"Вставьте флешку. Стенд сам импортирует прошивку, имя файла при этом сохраняется. Примерно на 2 секунды на дисплее появится экран импорта:"},{"type":"code","lang":"text","text":"галочка + «ПРОШИВКА»\\nимя файла\\nхеш (16 символов)\\n«готова к работе»"},{"type":"callout","variant":"ok","title":"Светодиод: прошивка с флешки принята","text":"Зелёный делает ТРИ импульса (мигнёт три раза). Это значит, что прошивка с флешки принята."},{"type":"para","text":"Если что-то не так с флешкой, красный мигнёт кодом (показывается около 8 секунд), а текущая прошивка останется прежней:"},{"type":"table","columns":["Вспышки красного","Что значит"],"rows":[["4 вспышки","На флешке нет ни одного .hex."],["5 вспышек","На флешке два и более .hex (нужен ровно один)."]]},{"type":"para","text":"В этом случае поправьте содержимое флешки (оставьте один .hex) и вставьте её снова."},{"type":"callout","variant":"info","title":"Безопасность флешки","text":"Флешка подключается ТОЛЬКО ДЛЯ ЧТЕНИЯ, с жёсткими ограничениями (ro, noexec, nosuid, nodev, nosymfollow, noatime) — с неё ничего нельзя запустить или повысить права, читается лишь сам файл .hex."},{"type":"para","text":"После импорта дисплей переходит в режим ожидания платы. На нём будет:"},{"type":"code","lang":"text","text":"имя прошивки\\nхеш (16 символов)\\n«ГОТОВ К РАБОТЕ»\\n«приложите плату»\\n«ок <N> сбой <M>»"},{"type":"callout","variant":"ok","title":"Светодиод","text":"Зелёный бьётся как сердцебиение — две короткие чёткие вспышки подряд, затем пауза (без плавного разгорания/затухания)."},{"type":"callout","variant":"info","title":"Про хеш","text":"Это первые 16 символов SHA-256 по файлу прошивки. Он одинаков для одной и той же прошивки на любом компьютере. Если хеш не совпадает с ожидаемым — значит, прошивка другая или повреждённая. Полный хеш лежит в /opt/flashjig/status и в журнале."},{"type":"heading","text":"Шаг 5. Проверьте пробной платой"},{"type":"para","text":"Приложите пробную плату STM32 (4 провода: SWDIO, SWCLK, GND, 3V3). Прошивка запускается сама, одним «тачем» — отдельную кнопку нажимать не нужно. Это работает и для чистой платы, и для платы, которая уже была защищена раньше."},{"type":"para","text":"Пока идёт прошивка, на дисплее видно: имя, хеш, строку с этапом слева и процентами справа, полосу прогресса и снизу «НЕ ОТКЛЮЧАЙТЕ #<N>». Этапы сменяются по порядку:"},{"type":"code","lang":"text","text":"«СТАРТ» -> «СВЯЗЬ» -> «РАЗБЛОК» -> «ЗАПИСЬ» -> «ПРОВЕРКА» -> «ЗАЩИТА»"},{"type":"callout","variant":"warn","title":"Пока зелёный мигает — плату не снимайте","text":"Проценты только растут и назад не идут. Светодиод в это время: зелёный ЧАСТО мигает. ПОКА ЗЕЛЁНЫЙ МИГАЕТ — ПЛАТУ НЕ СНИМАЙТЕ."},{"type":"para","text":"Когда всё прошло успешно, на дисплее появится:"},{"type":"code","lang":"text","text":"имя\\nхеш\\nгалочка + «ГОТОВО-СНИМИТЕ»\\n«RDP защита ВКЛ»\\n«#<N> ок сбой <M>»"},{"type":"callout","variant":"ok","title":"Ровный зелёный — плату можно снимать","text":"Светодиод: зелёный горит РОВНО, не мигает. Это и есть сигнал, что плату можно снимать. Главное правило: снимайте плату только при РОВНОМ зелёном (когда на дисплее «ГОТОВО»). Ровный зелёный «ГОТОВО» означает, что прошивка записана, проверена и защита от чтения подтверждена обратным считыванием."},{"type":"para","text":"Если вместо этого появилась ОШИБКА, на дисплее будет крестик и «ОШИБКА код <K>», а ниже — причина:"},{"type":"table","columns":["Код на дисплее","Причина"],"rows":[["код 2","«нет контакта SWD» (проверьте провода и прижим)."],["код 3","«запись/пров/RDP» (запись, проверка или включение защиты не прошли)."],["иначе","«см. журнал»."]]},{"type":"para","text":"Снизу будет «снимите плату». Светодиод при ошибке: красный мигает кодом — сосчитайте число вспышек в группе (пауза, потом повтор). Так держится, пока плату не снимут:"},{"type":"table","columns":["Вспышки красного","Что значит"],"rows":[["2 вспышки","Нет или потерян контакт SWD."],["3 вспышки","Не прошли запись, проверка или подтверждение защиты."]]},{"type":"para","text":"Снимите плату, устраните причину и приложите снова. При «нет контакта SWD» это почти всегда провода или прижим: проверьте все четыре провода, их порядок и плотность контакта. Стенд сам повторяет попытки при дребезжащем контакте."},{"type":"callout","variant":"info","title":"Случайно выдернули плату во время прошивки — это не брак","text":"Светодиоды коротко «стробят» зелёным и красным вместе, потом возвращается сердцебиение зелёного. Просто приложите плату снова — стенд сразу прошьёт её заново."},{"type":"para","text":"Дайте стенду прошить пробную плату до конца и дождитесь именно ровного зелёного и «ГОТОВО». На этом стенд проверен и готов к повседневной работе."},{"type":"heading","text":"Продвинутый необязательный вариант (по умолчанию так не делают)"},{"type":"para","text":"Можно положить файл .hex рядом с install.sh ещё ДО установки. Тогда install.sh подхватит его при разворачивании, и прошивка сразу окажется в стенде (имя файла сохранится). Флешка после этого не понадобится."},{"type":"callout","variant":"warn","title":"Это необязательный путь","text":"Это именно ПРОДВИНУТЫЙ и НЕОБЯЗАТЕЛЬНЫЙ путь. По умолчанию так не делают. Обычный, рекомендуемый порядок другой: сначала установка и опечатывание, потом перезагрузка, и только затем прошивка флешкой — как описано выше в шагах 1–5. Если сомневаетесь — идите по основному пути с флешкой."},{"type":"para","text":"Обновлять прошивку потом можно в любой момент, на лету, той же флешкой, без переустановки стенда."},{"type":"heading","text":"Повседневная работа (чтобы было под рукой)"},{"type":"list","ordered":false,"items":["Приложите плату по четырём проводам (SWDIO, SWCLK, GND, 3V3).","Смотрите на дисплей: этап, проценты, полоса прогресса.","Зелёный часто мигает — идёт прошивка, плату НЕ трогайте.","Зелёный загорелся РОВНО и на дисплее «ГОТОВО» — готово, защита RDP включена, плату можно снимать.","Крестик и «ОШИБКА код <K>» — смотрите причину на дисплее и число вспышек красного, поправьте провода/прижим, приложите плату снова.","Плату выдернули в процессе — не брак: верните её, перепрошьётся."]},{"type":"callout","variant":"ok","title":"Правило одной фразой","text":"Снимайте плату только при РОВНОМ зелёном."},{"type":"heading","text":"Если ещё не опечатано: куда смотреть при проблемах"},{"type":"para","text":"Эти команды работают, только пока прибор НЕ опечатан (после lockdown вход закрыт):"},{"type":"table","columns":["Что нужно","Команда / путь"],"rows":[["Живой журнал прошивки","journalctl -u flash-jig -f"],["Текущее состояние","cat /opt/flashjig/status"],["Файл журнала","/opt/flashjig/flash.log"],["Дисплей не появился","один раз  sudo reboot"]]},{"type":"para","text":"Прошивки лежат в /opt/flashjig/firmware/, имя файла сохраняется. Активная прошивка — это ссылка current или самый новый файл."},{"type":"callout","variant":"info","title":"Стенд устойчив","text":"Каждая прошивка ограничена по времени, поэтому сломанная или выдернутая плата не «вешает» прибор. Плохой контакт повторяется автоматически."}]'),kn={steps:[{title:"Перенесите архив на SD-карту",text:"С компьютера скопируйте архив .zip на SD-карту в раздел /boot и распакуйте его там, чтобы рядом оказались install.sh и lockdown.sh. Вставьте SD-карту обратно в Raspberry Pi и включите питание. Раздел /boot виден с обычного компьютера — это самый простой способ передать файлы, пока прибор не опечатан."},{title:"Подключитесь к Raspberry",text:"Один раз подключитесь к прибору, например по сети SSH под пользователем pi.",command:"ssh pi@<адрес>"},{title:"Установите и сразу опечатайте (одной командой)",text:"Перейдите в папку с распакованным архивом и запустите установку и опечатывание одной строкой. Вторая команда запустится только если первая прошла без ошибок. install.sh разворачивает статический OpenOCD, службы flash-jig и flashjig-oled, правила udev, включает I2C и создаёт /opt/flashjig/firmware (идемпотентно). lockdown.sh --commit убирает все способы входа, блокир
